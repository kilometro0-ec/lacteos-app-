<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Recibir Mercancía | Lógica Láctea</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <!-- El script del menú que solicitaste -->
    <script src="menu-logic.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#a21caf", 
            secondary: "#db2777", 
            background: "#faf5ff", 
            outline: "#e9d5ff" 
          }
        }
      }
    }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; }
        .glass-card-header { background: linear-gradient(135deg, #a21caf 0%, #6b21a8 100%); }
        
        /* Animación de pantalla borrosa */
        #loading-overlay { 
            display: flex; 
            position: fixed; 
            inset: 0; 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); /* Pantalla borrosa */
            z-index: 9999; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.3s ease;
        }

        .card-recepcion {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e9d5ff;
            border-left: 6px solid #a21caf;
        }
        
        .rotate-animation { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
    </style>
</head>
<body class="pb-32 antialiased">

<!-- Overlay de Carga (Pantalla Borrosa Inicial) -->
<div id="loading-overlay">
    <div class="flex flex-col items-center">
        <span class="material-symbols-outlined text-6xl text-primary rotate-animation">sync</span>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-primary mt-4 italic">Cargando Inventarios...</p>
    </div>
</div>

<!-- Header -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-24 glass-card-header shadow-lg">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 backdrop-blur-md border border-white/30 text-white" onclick="history.back()">
            <span class="material-symbols-outlined font-bold">chevron_left</span>
        </div>
        <div>
            <h1 class="text-[10px] font-black text-purple-200 uppercase tracking-widest leading-none">Logística</h1>
            <h2 class="text-lg font-black text-white italic uppercase tracking-tighter">Verificar Mercadería</h2>
        </div>
    </div>
</header>

<main class="pt-32 px-4 max-w-xl mx-auto space-y-6">
    <!-- Buscador -->
    <div class="relative">
        <span class="material-symbols-outlined absolute left-5 top-4 text-primary">search</span>
        <input type="text" id="buscador" oninput="filtrarPedidos()" placeholder="Filtrar por proveedor o ID..." 
            class="w-full bg-white border border-outline rounded-3xl py-4 pl-14 pr-6 text-slate-800 focus:ring-2 focus:ring-primary focus:border-primary outline-none font-bold text-xs shadow-sm">
    </div>

    <!-- Contenedor de Lotes -->
    <div id="lista-pedidos" class="grid gap-4"></div>
</main>

<!-- Modal de Validación de Cantidades Reales -->
<div id="modal-confirmar" class="fixed inset-0 bg-purple-900/40 backdrop-blur-md z-[60] hidden flex items-end">
    <div class="bg-white w-full rounded-t-[3rem] p-8 space-y-6 border-t-4 border-primary shadow-2xl animate-in slide-in-from-bottom duration-300">
        <div class="flex justify-between items-start">
            <div>
                <span class="text-[10px] font-black bg-primary text-white px-4 py-1 rounded-full uppercase italic">Checklist Real</span>
                <h2 id="id-factura-modal" class="text-3xl font-black text-slate-800 tracking-tighter mt-2"></h2>
            </div>
            <button onclick="cerrarModal()" class="bg-purple-50 p-3 rounded-full text-primary">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <p class="text-[11px] font-bold text-slate-500 uppercase tracking-tight">Ajusta las cantidades si el camión trajo menos de lo pedido:</p>
        
        <div id="detalle-recepcion" class="max-h-[40vh] overflow-y-auto space-y-3 pr-2"></div>

        <div class="pt-4">
            <button id="btn-confirmar" onclick="confirmarIngreso()" 
                class="w-full glass-card-header text-white font-black py-6 rounded-[2rem] shadow-xl shadow-primary/30 uppercase text-xs tracking-[0.2em] active:scale-95 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">inventory_2</span>
                Finalizar Recepción
            </button>
        </div>
    </div>
</div>

<!-- Contenedor para el Menú de Navegación (inyectado por menu-logic.js) -->
<nav id="menu-container"></nav>

<script>
    let todosLosPedidos = [];
    let idSeleccionado = "";

    async function cargarDatos() {
        const loader = document.getElementById('loading-overlay');
        loader.style.opacity = "1";
        loader.style.display = "flex";

        try {
            const datos = await DairyAPI.obtenerDatos("Compras");
            todosLosPedidos = (datos || []).filter(f => 
                String(f.Estado_Entrega).trim().toUpperCase() === "PENDIENTE"
            );
            renderizar(todosLosPedidos);
        } catch (e) {
            console.error(e);
        } finally {
            // Quitamos el efecto borroso cuando ya hay info
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 300);
            }, 500);
        }
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('lista-pedidos');
        const grupos = lista.reduce((acc, curr) => {
            const id = curr.ID_Compra || "SIN-ID";
            if (!acc[id]) acc[id] = [];
            acc[id].push(curr);
            return acc;
        }, {});

        const ids = Object.keys(grupos);
        if (ids.length === 0) {
            contenedor.innerHTML = `<p class="text-center py-20 font-black text-[10px] uppercase text-slate-400">No hay mercadería pendiente</p>`;
            return;
        }

        contenedor.innerHTML = ids.map(id => {
            const p = grupos[id][0];
            return `
                <div onclick="abrirModal('${id}')" class="card-recepcion p-6 flex justify-between items-center shadow-sm active:bg-purple-50 transition-colors">
                    <div>
                        <p class="text-[10px] font-black text-primary italic uppercase">${id}</p>
                        <p class="font-black text-slate-800 text-sm">${p.Proveedor}</p>
                        <p class="text-[9px] font-bold text-slate-400">${p.Fecha} • ${grupos[id].length} SKUs</p>
                    </div>
                    <span class="material-symbols-outlined text-primary bg-purple-50 p-3 rounded-2xl">local_shipping</span>
                </div>
            `;
        }).join('');
    }

    function abrirModal(id) {
        idSeleccionado = id;
        document.getElementById('id-factura-modal').innerText = id;
        const items = todosLosPedidos.filter(p => p.ID_Compra === id);
        
        document.getElementById('detalle-recepcion').innerHTML = items.map((item, index) => `
            <div class="bg-slate-50 p-4 rounded-2xl border border-outline flex justify-between items-center gap-4">
                <div class="flex-1">
                    <p class="text-[11px] font-black uppercase text-slate-700 leading-tight">${item.Producto}</p>
                    <p class="text-[9px] text-primary font-bold">Pedido: ${item.Cantidad} ud.</p>
                </div>
                <div class="w-24">
                    <input type="number" data-index="${index}" value="${item.Cantidad}" 
                        class="input-real w-full text-center font-black text-primary bg-white border-2 border-primary rounded-xl py-2 focus:ring-0"
                        min="0">
                    <p class="text-[7px] font-black text-center text-slate-400 uppercase mt-1">Llegó Real</p>
                </div>
            </div>
        `).join('');
        
        document.getElementById('modal-confirmar').classList.remove('hidden');
    }

    async function confirmarIngreso() {
        const inputs = document.querySelectorAll('.input-real');
        const itemsSeleccionados = todosLosPedidos.filter(p => p.ID_Compra === idSeleccionado);
        
        // Mapeamos lo que el usuario escribió como cantidad real
        const datosParaEnviar = itemsSeleccionados.map((item, idx) => ({
            ...item,
            Cantidad_Real: inputs[idx].value // Aquí capturamos lo que "en realidad llegó"
        }));

        const btn = document.getElementById('btn-confirmar');
        btn.disabled = true;
        document.getElementById('loading-overlay').style.display = "flex";

        try {
            const respuesta = await DairyAPI.guardarDatos("Compras", {
                accion: "marcar_recibido_ajustado",
                ID_Compra: idSeleccionado,
                items: datosParaEnviar
            });

            if (respuesta === "OK") {
                cerrarModal();
                await cargarDatos();
            } else { alert(respuesta); }
        } catch (e) {
            alert("Error de conexión");
        } finally {
            btn.disabled = false;
        }
    }

    function cerrarModal() { document.getElementById('modal-confirmar').classList.add('hidden'); }
    
    function filtrarPedidos() {
        const b = document.getElementById('buscador').value.toLowerCase();
        renderizar(todosLosPedidos.filter(p => 
            p.ID_Compra.toLowerCase().includes(b) || p.Proveedor.toLowerCase().includes(b)
        ));
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
