<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Checklist de Recepción | Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js?v=1.4"></script>
    <script src="menu-logic.js?v=1.4"></script>
    
    <link rel="stylesheet" href="estilos-lacteos.css?v=1.4">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        #loading-overlay { display: flex; position: fixed; inset: 0; background: rgba(250, 245, 255, 0.8); backdrop-filter: blur(10px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .card-recepcion { background: white; border-radius: 2rem; border: 1px solid var(--outline); border-left: 6px solid var(--primary); transition: transform 0.2s; position: relative; overflow: hidden; cursor: pointer; }
        .card-recepcion:active { transform: scale(0.96); }
        .glass-card-header { background: linear-gradient(135deg, #a21caf 0%, #6b21a8 100%); }
        .badge-retraso { position: absolute; top: 0; right: 0; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 4px 12px; border-bottom-left-radius: 12px; text-transform: uppercase; }
        
        /* Estilo para el área de texto */
        .textarea-novedades {
            width: 100%;
            border-radius: 1.5rem;
            border: 2px solid #e2e8f0;
            font-size: 12px;
            font-weight: 600;
            padding: 1rem;
            transition: all 0.3s;
            background: white;
        }
        .textarea-novedades:focus {
            border-color: #6b21a8;
            ring: 0;
            outline: none;
            box-shadow: 0 0 0 4px rgba(107, 33, 168, 0.1);
        }
    </style>
</head>
<body class="pb-32 bg-slate-50">

<div id="loading-overlay">
    <div class="relative flex items-center justify-center">
        <div class="absolute w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <span class="material-symbols-outlined text-2xl text-primary font-bold">conveyor_belt</span>
    </div>
    <p class="text-[10px] font-black uppercase tracking-widest text-primary mt-6 animate-pulse">Sincronizando...</p>
</div>

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 glass-card-header shadow-lg">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 text-white" onclick="history.back()">
            <span class="material-symbols-outlined font-bold">arrow_back</span>
        </div>
        <div>
            <h1 class="text-[10px] font-black text-purple-200 uppercase tracking-widest">Logística</h1>
            <h2 class="text-lg font-black text-white italic uppercase tracking-tighter">Checklist Real</h2>
        </div>
    </div>
</header>

<main class="pt-28 px-4 max-w-xl mx-auto space-y-6">
    <div class="relative">
        <span class="material-symbols-outlined absolute left-5 top-4 text-primary">search</span>
        <input type="text" id="buscador" oninput="filtrarPedidos()" placeholder="Buscar por ID o Proveedor..." class="w-full rounded-3xl border-none shadow-sm py-4 pl-14 font-bold text-xs focus:ring-2 focus:ring-primary">
    </div>
    <div id="lista-pedidos" class="grid gap-4">
        <!-- Los pedidos pendientes se cargan aquí -->
    </div>
</main>

<!-- MODAL DE RECEPCIÓN -->
<div id="modal-confirmar" class="fixed inset-0 bg-purple-900/60 backdrop-blur-sm hidden flex items-end justify-center z-[100]">
    <div class="bg-white w-full max-w-lg rounded-t-[3rem] border-t-4 border-primary shadow-2xl flex flex-col relative" style="height: 92vh;">
        
        <!-- Cabecera del Modal -->
        <div class="p-8 pb-4 flex justify-between items-start">
            <div>
                <span class="text-[10px] font-black bg-primary text-white px-4 py-1 rounded-full uppercase italic">Verificación de Mercadería</span>
                <h2 id="id-factura-modal" class="text-2xl font-black text-slate-800 mt-2"></h2>
            </div>
            <button onclick="cerrarModal()" class="bg-purple-50 p-3 rounded-full text-primary active:scale-90 transition-transform">
                <span class="material-symbols-outlined font-bold">close</span>
            </button>
        </div>
        
        <!-- Lista de Productos en el pedido -->
        <div id="detalle-recepcion" class="flex-1 overflow-y-auto px-8 pb-4 space-y-3">
            <!-- Los productos se inyectan dinámicamente -->
        </div>

        <!-- SECCIÓN DE OBSERVACIONES (Aquí escribes las novedades) -->
        <div class="px-8 py-5 bg-slate-100 border-t border-slate-200">
            <div class="flex items-center gap-2 mb-2">
                <span class="material-symbols-outlined text-sm text-primary">edit_note</span>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Observaciones y Novedades:</label>
            </div>
            <textarea id="nota-recepcion" 
                placeholder="Ej: Faltó un ítem, el empaque llegó mojado, producto reemplazado por otra marca..." 
                class="textarea-novedades" rows="3"></textarea>
        </div>

        <!-- Footer con Botón de Acción -->
        <div class="p-8 pt-2">
            <button id="btn-confirmar" onclick="confirmarIngreso()" 
                class="w-full glass-card-header text-white font-black py-5 rounded-[2rem] shadow-xl uppercase text-xs tracking-widest active:scale-95 flex items-center justify-center gap-3 transition-all">
                <span class="material-symbols-outlined text-xl">inventory_2</span>
                Confirmar e Ingresar Stock
            </button>
        </div>
    </div>
</div>

<nav id="menu-container"></nav>

<script>
    let todosLosPedidos = [];
    let itemsEnEdicion = [];
    let idSeleccionado = "";

    async function cargarDatos() {
        try {
            const datos = await DairyAPI.obtenerDatos("Compras");
            // Solo mostramos los que están PENDIENTES
            todosLosPedidos = (datos || []).filter(f => String(f.Estado_Entrega).trim() === "PENDIENTE");
            todosLosPedidos.sort((a, b) => new Date(a.Fecha) - new Date(b.Fecha));
            renderizar(todosLosPedidos);
        } catch (e) { 
            console.error("Error cargando compras:", e); 
        } finally { 
            document.getElementById('loading-overlay').style.display = "none"; 
        }
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('lista-pedidos');
        // Agrupamos por ID_Compra
        const grupos = lista.reduce((acc, curr) => {
            const id = curr.ID_Compra || "S/N";
            if (!acc[id]) acc[id] = [];
            acc[id].push(curr);
            return acc;
        }, {});

        if (Object.keys(grupos).length === 0) {
            contenedor.innerHTML = `<p class="text-center text-slate-400 font-bold py-10">No hay pedidos pendientes de ingreso.</p>`;
            return;
        }

        contenedor.innerHTML = Object.keys(grupos).map(id => {
            const principal = grupos[id][0];
            const diffDias = Math.floor((new Date() - new Date(principal.Fecha)) / (1000 * 60 * 60 * 24));
            return `
            <div onclick="abrirModal('${id}')" class="card-recepcion p-6 flex justify-between items-center shadow-sm">
                ${diffDias > 2 ? `<div class="badge-retraso animate-pulse">${diffDias} DÍAS DE ATRASO</div>` : ''}
                <div>
                    <div class="flex items-center gap-2 mb-1">
                         <p class="text-[10px] font-black text-primary uppercase tracking-tighter">${id}</p>
                         <span class="text-[9px] text-slate-400 font-bold italic">${principal.Fecha}</span>
                    </div>
                    <p class="font-black text-slate-800 text-sm uppercase">${principal.Proveedor}</p>
                </div>
                <span class="material-symbols-outlined text-primary font-bold">arrow_forward_ios</span>
            </div>`;
        }).join('');
    }

    function abrirModal(id) {
        idSeleccionado = id;
        document.getElementById('id-factura-modal').innerText = id;
        document.getElementById('nota-recepcion').value = ""; // Limpiar notas previas
        
        // Clonamos los items de esta factura para editarlos
        itemsEnEdicion = JSON.parse(JSON.stringify(todosLosPedidos.filter(p => p.ID_Compra === id)));
        renderizarItemsModal();
        
        document.getElementById('modal-confirmar').classList.remove('hidden');
    }

    function renderizarItemsModal() {
        const contenedor = document.getElementById('detalle-recepcion');
        contenedor.innerHTML = itemsEnEdicion.map((item, index) => `
            <div class="bg-slate-50 p-4 rounded-2xl border border-outline flex items-center gap-3">
                <button onclick="eliminarItem(${index})" class="text-red-400 p-2 hover:bg-red-50 rounded-full transition-colors">
                    <span class="material-symbols-outlined text-xl">delete_sweep</span>
                </button>
                <div class="flex-1">
                    <p class="text-[11px] font-black uppercase text-slate-700 leading-tight mb-1">${item.Producto}</p>
                    <p class="text-[9px] text-slate-400 font-bold italic">Pedido original: ${item.Cantidad} unidades</p>
                </div>
                <div class="text-right">
                    <span class="block text-[8px] font-black text-primary uppercase mb-1">Recibido:</span>
                    <input type="number" oninput="actualizarCantidad(${index}, this.value)" value="${item.Cantidad}" 
                        class="w-16 text-center font-black text-primary border-2 border-primary rounded-xl py-2 text-sm bg-white focus:ring-0">
                </div>
            </div>`).join('');
    }

    function eliminarItem(index) {
        if(confirm("¿Este producto NO llegó en absoluto?")) {
            itemsEnEdicion.splice(index, 1);
            renderizarItemsModal();
        }
    }

    function actualizarCantidad(index, val) { 
        itemsEnEdicion[index].Cantidad = parseFloat(val) || 0; 
    }

    async function confirmarIngreso() {
        const btn = document.getElementById('btn-confirmar');
        const nota = document.getElementById('nota-recepcion').value;
        
        if (itemsEnEdicion.length === 0) {
            alert("No hay productos para ingresar. Si la factura fue cancelada, comunícalo a administración.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="animate-spin material-symbols-outlined">sync</span> PROCESANDO...`;
        
        const payload = {
            pestaña: "Compras",
            accion: "recepcion_final",
            id_operacion: idSeleccionado,
            observaciones: nota, // ENVIAMOS EL TEXTO DEL TEXTAREA
            datos_actualizados: itemsEnEdicion
        };

        try {
            const res = await DairyAPI.guardarDatos("Compras", payload);
            if (res === "OK") {
                cerrarModal();
                location.reload(); // Recargar para actualizar lista
            } else {
                alert("Respuesta del servidor: " + res);
            }
        } catch (e) { 
            alert("Error de conexión con el sistema."); 
        } finally { 
            btn.disabled = false; 
            btn.innerHTML = `<span class="material-symbols-outlined text-xl">inventory_2</span> Confirmar e Ingresar Stock`;
        }
    }

    function cerrarModal() { 
        document.getElementById('modal-confirmar').classList.add('hidden'); 
    }

    function filtrarPedidos() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const filtrados = todosLosPedidos.filter(p => 
            p.ID_Compra.toLowerCase().includes(busqueda) || 
            p.Proveedor.toLowerCase().includes(busqueda)
        );
        renderizar(filtrados);
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
