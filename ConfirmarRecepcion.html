<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Checklist de Recepción | Lógica Láctea</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#a21caf", 
            secondary: "#db2777", 
            background: "#faf5ff", 
            outline: "#e9d5ff" 
          }
        }
      }
    }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; overflow-x: hidden; }
        .glass-card-header { background: linear-gradient(135deg, #a21caf 0%, #6b21a8 100%); }
        
        /* Animación de carga idéntica al Dashboard */
        #loading-overlay { 
            display: flex; 
            position: fixed; 
            inset: 0; 
            background: rgba(250, 245, 255, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            transition: all 0.5s ease;
        }

        .card-recepcion {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e9d5ff;
            border-left: 6px solid #a21caf;
            transition: transform 0.2s;
        }
        
        .card-recepcion:active { transform: scale(0.96); }
        
        .rotate-animation { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Scroll sutil para el listado */
        #detalle-recepcion::-webkit-scrollbar { width: 4px; }
        #detalle-recepcion::-webkit-scrollbar-thumb { background: #e9d5ff; border-radius: 10px; }
    </style>
</head>
<body class="pb-32 antialiased">

<!-- Overlay de Carga (Blur) -->
<div id="loading-overlay">
    <div class="relative flex items-center justify-center">
        <div class="absolute w-20 h-20 border-4 border-primary/20 border-t-primary rounded-full rotate-animation"></div>
        <span class="material-symbols-outlined text-3xl text-primary font-bold">conveyor_belt</span>
    </div>
    <p class="text-[10px] font-black uppercase tracking-[0.4em] text-primary mt-8 italic animate-pulse">Sincronizando...</p>
</div>

<!-- Header Principal -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-24 glass-card-header shadow-lg">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 backdrop-blur-md border border-white/30 text-white" onclick="history.back()">
            <span class="material-symbols-outlined font-bold">arrow_back</span>
        </div>
        <div>
            <h1 class="text-[10px] font-black text-purple-200 uppercase tracking-widest leading-none">Logística</h1>
            <h2 class="text-lg font-black text-white italic uppercase tracking-tighter leading-tight">Checklist Real</h2>
        </div>
    </div>
</header>

<main class="pt-32 px-4 max-w-xl mx-auto space-y-6">
    <!-- Buscador -->
    <div class="relative">
        <span class="material-symbols-outlined absolute left-5 top-4 text-primary">search</span>
        <input type="text" id="buscador" oninput="filtrarPedidos()" placeholder="Buscar Proveedor o Lote..." 
            class="w-full bg-white border border-outline rounded-[2rem] py-4 pl-14 pr-6 text-slate-800 focus:ring-2 focus:ring-primary focus:border-primary outline-none font-bold text-xs shadow-sm">
    </div>

    <!-- Lista de Lotes Pendientes -->
    <div id="lista-pedidos" class="grid gap-4">
        <p class="text-center py-20 text-slate-300 font-black text-[10px] uppercase italic">Escaneando base de datos...</p>
    </div>
</main>

<!-- Modal de Validación (Botón Fijo) -->
<div id="modal-confirmar" class="fixed inset-0 bg-purple-900/60 backdrop-blur-sm z-[60] hidden flex items-end justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-[3rem] border-t-4 border-primary shadow-2xl animate-in slide-in-from-bottom duration-500 flex flex-col relative" style="height: 85vh;">
        
        <!-- Header del Modal -->
        <div class="p-8 pb-4 flex justify-between items-start bg-white rounded-t-[3rem] z-10">
            <div>
                <span class="text-[10px] font-black bg-primary text-white px-4 py-1 rounded-full uppercase italic">Verificación de Mercancía</span>
                <h2 id="id-factura-modal" class="text-2xl font-black text-slate-800 tracking-tighter mt-2 uppercase"></h2>
            </div>
            <button onclick="cerrarModal()" class="bg-purple-50 p-3 rounded-full text-primary active:scale-90">
                <span class="material-symbols-outlined font-bold">close</span>
            </button>
        </div>
        
        <!-- Cuerpo de Productos (Scrollable) -->
        <div id="detalle-recepcion" class="flex-1 overflow-y-auto px-8 pb-40 space-y-3">
            <!-- Los productos se inyectan aquí -->
        </div>

        <!-- Footer con Botón Fijo (Sticky) -->
        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent pt-12 z-20">
            <button id="btn-confirmar" onclick="confirmarIngreso()" 
                class="w-full glass-card-header text-white font-black py-5 rounded-[2rem] shadow-xl shadow-primary/30 uppercase text-xs tracking-[0.2em] active:scale-95 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-xl">verified</span>
                Confirmar e Ingresar
            </button>
        </div>
    </div>
</div>

<!-- Menú de Navegación -->
<nav id="menu-container"></nav>

<script>
    let todosLosPedidos = [];
    let itemsEnEdicion = [];
    let idSeleccionado = "";

    async function cargarDatos() {
        const loader = document.getElementById('loading-overlay');
        loader.style.display = "flex";
        loader.style.opacity = "1";

        try {
            const datos = await DairyAPI.obtenerDatos("Compras");
            todosLosPedidos = (datos || []).filter(f => 
                String(f.Estado_Entrega).trim().toUpperCase() === "PENDIENTE"
            );
            renderizar(todosLosPedidos);
        } catch (e) {
            console.error("Error cargando compras:", e);
        } finally {
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
            }, 600);
        }
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('lista-pedidos');
        const grupos = lista.reduce((acc, curr) => {
            const id = curr.ID_Compra || "SIN-ID";
            if (!acc[id]) acc[id] = [];
            acc[id].push(curr);
            return acc;
        }, {});

        const ids = Object.keys(grupos);
        if (ids.length === 0) {
            contenedor.innerHTML = `<div class="text-center py-20"><p class="font-black text-[10px] uppercase text-slate-300 italic tracking-widest">Sin camiones pendientes</p></div>`;
            return;
        }

        contenedor.innerHTML = ids.map(id => `
            <div onclick="abrirModal('${id}')" class="card-recepcion p-6 flex justify-between items-center shadow-sm">
                <div>
                    <p class="text-[10px] font-black text-primary italic uppercase tracking-tighter">${id}</p>
                    <p class="font-black text-slate-800 text-sm uppercase">${grupos[id][0].Proveedor}</p>
                    <p class="text-[9px] font-bold text-slate-400 italic mt-1">Lote de ${grupos[id].length} productos</p>
                </div>
                <div class="bg-purple-50 p-3 rounded-2xl">
                    <span class="material-symbols-outlined text-primary font-bold">arrow_forward_ios</span>
                </div>
            </div>
        `).join('');
    }

    function abrirModal(id) {
        idSeleccionado = id;
        document.getElementById('id-factura-modal').innerText = id;
        // Clonamos los datos para poder editarlos o borrarlos localmente sin dañar el original
        itemsEnEdicion = JSON.parse(JSON.stringify(todosLosPedidos.filter(p => p.ID_Compra === id)));
        renderizarItemsModal();
        document.getElementById('modal-confirmar').classList.remove('hidden');
    }

    function renderizarItemsModal() {
        const contenedor = document.getElementById('detalle-recepcion');
        if (itemsEnEdicion.length === 0) {
            contenedor.innerHTML = `<div class="py-10 text-center"><p class="font-black text-[10px] text-red-500 uppercase italic">Lote vacío - Cierra y recarga</p></div>`;
            return;
        }

        contenedor.innerHTML = itemsEnEdicion.map((item, index) => `
            <div class="bg-slate-50 p-4 rounded-[1.5rem] border border-outline flex justify-between items-center gap-3 animate-in fade-in slide-in-from-right-4 duration-300">
                <button onclick="eliminarItem(${index})" class="text-red-400 p-2 active:scale-75 transition-all">
                    <span class="material-symbols-outlined text-xl">delete</span>
                </button>
                <div class="flex-1">
                    <p class="text-[11px] font-black uppercase text-slate-700 leading-none mb-1">${item.Producto}</p>
                    <p class="text-[9px] text-slate-400 font-bold italic uppercase tracking-tighter">Pedido: ${item.Cantidad} ud.</p>
                </div>
                <div class="w-20">
                    <input type="number" onchange="actualizarCantidad(${index}, this.value)" value="${item.Cantidad}" 
                        class="w-full text-center font-black text-primary bg-white border-2 border-primary rounded-xl py-2 focus:ring-0 text-sm">
                </div>
            </div>
        `).join('');
    }

    function eliminarItem(index) {
        itemsEnEdicion.splice(index, 1);
        renderizarItemsModal();
    }

    function actualizarCantidad(index, valor) {
        itemsEnEdicion[index].Cantidad = valor;
    }

    async function confirmarIngreso() {
        if (itemsEnEdicion.length === 0) return alert("No hay productos para confirmar.");

        const btn = document.getElementById('btn-confirmar');
        const loader = document.getElementById('loading-overlay');
        
        btn.disabled = true;
        loader.style.display = "flex";
        loader.style.opacity = "1";

        try {
            // El objeto "payload" que se envía al Google Apps Script (Hoja Compras)
            const payload = {
                accion: "recepcion_final_ajustada",
                id_compra: idSeleccionado,
                productos_reales: itemsEnEdicion,
                fecha_ingreso: new Date().toISOString()
            };

            const respuesta = await DairyAPI.guardarDatos("Compras", payload);

            if (respuesta === "OK") {
                cerrarModal();
                await cargarDatos(); // Recarga la lista principal
            } else { 
                alert("Error del Servidor: " + respuesta); 
            }
        } catch (e) {
            alert("Fallo de red al conectar con Google Sheets.");
        } finally {
            btn.disabled = false;
        }
    }

    function cerrarModal() { document.getElementById('modal-confirmar').classList.add('hidden'); }
    
    function filtrarPedidos() {
        const b = document.getElementById('buscador').value.toLowerCase();
        renderizar(todosLosPedidos.filter(p => 
            p.ID_Compra.toLowerCase().includes(b) || p.Proveedor.toLowerCase().includes(b)
        ));
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
