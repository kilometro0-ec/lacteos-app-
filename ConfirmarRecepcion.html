<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Checklist de Recepción | Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js?v=1.3"></script>
    <script src="menu-logic.js?v=1.3"></script>
    
    <link rel="stylesheet" href="estilos-lacteos.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        #loading-overlay { display: flex; position: fixed; inset: 0; background: rgba(250, 245, 255, 0.8); backdrop-filter: blur(10px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .card-recepcion { background: white; border-radius: 2rem; border: 1px solid var(--outline); border-left: 6px solid var(--primary); transition: transform 0.2s; position: relative; overflow: hidden; }
        .card-recepcion:active { transform: scale(0.96); }
        .glass-card-header { background: linear-gradient(135deg, #a21caf 0%, #6b21a8 100%); }
        .badge-retraso { position: absolute; top: 0; right: 0; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 4px 12px; border-bottom-left-radius: 12px; text-transform: uppercase; }
    </style>
</head>
<body class="pb-32">

<div id="loading-overlay">
    <div class="relative flex items-center justify-center">
        <div class="absolute w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full rotate-animation"></div>
        <span class="material-symbols-outlined text-2xl text-primary font-bold">conveyor_belt</span>
    </div>
    <p class="text-[10px] font-black uppercase tracking-widest text-primary mt-6 animate-pulse">Sincronizando...</p>
</div>

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 glass-card-header shadow-lg">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 text-white" onclick="history.back()">
            <span class="material-symbols-outlined font-bold">arrow_back</span>
        </div>
        <div>
            <h1 class="text-[10px] font-black text-purple-200 uppercase tracking-widest">Logística</h1>
            <h2 class="text-lg font-black text-white italic uppercase tracking-tighter">Checklist Real</h2>
        </div>
    </div>
</header>

<main class="pt-28 px-4 max-w-xl mx-auto space-y-6">
    <div class="relative">
        <span class="material-symbols-outlined absolute left-5 top-4 text-primary">search</span>
        <input type="text" id="buscador" oninput="filtrarPedidos()" placeholder="Buscar por ID o Proveedor..." class="input-sutil pl-14 font-bold text-xs">
    </div>
    <div id="lista-pedidos" class="grid gap-4"></div>
</main>

<!-- MODAL CON OBSERVACIONES -->
<div id="modal-confirmar" class="fixed inset-0 bg-purple-900/60 backdrop-blur-sm hidden flex items-end justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-[3rem] border-t-4 border-primary shadow-2xl animate-in slide-in-from-bottom duration-500 flex flex-col relative" style="height: 90vh;">
        
        <div class="p-8 pb-4 flex justify-between items-start">
            <div>
                <span class="text-[10px] font-black bg-primary text-white px-4 py-1 rounded-full uppercase italic">Verificación</span>
                <h2 id="id-factura-modal" class="text-2xl font-black text-slate-800 mt-2"></h2>
            </div>
            <button onclick="cerrarModal()" class="bg-purple-50 p-3 rounded-full text-primary active:scale-90">
                <span class="material-symbols-outlined font-bold">close</span>
            </button>
        </div>
        
        <div id="detalle-recepcion" class="flex-1 overflow-y-auto px-8 pb-4 space-y-3"></div>

        <!-- CAMPO DE RESPALDO (OBSERVACIONES) -->
        <div class="px-8 py-4 bg-slate-50 border-t border-outline">
            <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Nota de Respaldo / Novedades:</label>
            <textarea id="nota-recepcion" placeholder="Ej: Solo llegó 1 de 2 piezas, caja abierta..." 
                class="w-full rounded-2xl border-outline text-xs font-bold p-4 focus:ring-primary focus:border-primary" rows="2"></textarea>
        </div>

        <div class="footer-modal-fijo">
            <button id="btn-confirmar" onclick="confirmarIngreso()" 
                class="w-full glass-card-header text-white font-black py-5 rounded-[2rem] shadow-xl uppercase text-xs tracking-widest active:scale-95 flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-xl">verified</span>
                Confirmar e Ingresar
            </button>
        </div>
    </div>
</div>

<nav id="menu-container"></nav>

<script>
    let todosLosPedidos = [];
    let itemsEnEdicion = [];
    let idSeleccionado = "";

    async function cargarDatos() {
        try {
            const datos = await DairyAPI.obtenerDatos("Compras");
            todosLosPedidos = (datos || []).filter(f => String(f.Estado_Entrega).trim() === "PENDIENTE");
            todosLosPedidos.sort((a, b) => new Date(a.Fecha) - new Date(b.Fecha));
            renderizar(todosLosPedidos);
        } catch (e) { console.error(e); }
        finally { document.getElementById('loading-overlay').style.display = "none"; }
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('lista-pedidos');
        const grupos = lista.reduce((acc, curr) => {
            const id = curr.ID_Compra || "S/N";
            if (!acc[id]) acc[id] = [];
            acc[id].push(curr);
            return acc;
        }, {});

        contenedor.innerHTML = Object.keys(grupos).map(id => {
            const principal = grupos[id][0];
            const diffDias = Math.floor((new Date() - new Date(principal.Fecha)) / (1000 * 60 * 60 * 24));
            return `
            <div onclick="abrirModal('${id}')" class="card-recepcion p-6 flex justify-between items-center">
                ${diffDias > 2 ? `<div class="badge-retraso animate-pulse">${diffDias} DÍAS</div>` : ''}
                <div>
                    <div class="flex items-center gap-2 mb-1">
                         <p class="text-[10px] font-black text-primary uppercase">${id}</p>
                         <span class="text-[9px] text-slate-400 font-bold">${principal.Fecha}</span>
                    </div>
                    <p class="font-black text-slate-800 text-sm uppercase">${principal.Proveedor}</p>
                </div>
                <span class="material-symbols-outlined text-primary font-bold">arrow_forward_ios</span>
            </div>`;
        }).join('');
    }

    function abrirModal(id) {
        idSeleccionado = id;
        document.getElementById('id-factura-modal').innerText = id;
        document.getElementById('nota-recepcion').value = ""; // Limpiar nota
        itemsEnEdicion = JSON.parse(JSON.stringify(todosLosPedidos.filter(p => p.ID_Compra === id)));
        renderizarItemsModal();
        document.getElementById('modal-confirmar').classList.remove('hidden');
    }

    function renderizarItemsModal() {
        const contenedor = document.getElementById('detalle-recepcion');
        contenedor.innerHTML = itemsEnEdicion.map((item, index) => `
            <div class="bg-slate-50 p-4 rounded-2xl border border-outline flex items-center gap-3">
                <div class="flex-1">
                    <p class="text-[11px] font-black uppercase text-slate-700">${item.Producto}</p>
                    <p class="text-[9px] text-slate-400 font-bold italic">Pedido: ${item.Cantidad} ud.</p>
                </div>
                <div class="text-right">
                    <span class="block text-[8px] font-black text-primary uppercase mb-1">Llegó:</span>
                    <input type="number" oninput="actualizarCantidad(${index}, this.value)" value="${item.Cantidad}" 
                        class="w-16 text-center font-black text-primary border-2 border-primary rounded-xl py-1 text-sm bg-white">
                </div>
            </div>`).join('');
    }

    function actualizarCantidad(index, val) { itemsEnEdicion[index].Cantidad = parseFloat(val) || 0; }

    async function confirmarIngreso() {
        const btn = document.getElementById('btn-confirmar');
        const nota = document.getElementById('nota-recepcion').value; // Capturamos la nota
        btn.disabled = true;
        
        const payload = {
            pestaña: "Compras",
            accion: "recepcion_final",
            id_operacion: idSeleccionado,
            observaciones: nota, // Se envía al Excel
            datos_actualizados: itemsEnEdicion
        };

        try {
            const res = await DairyAPI.guardarDatos("Compras", payload);
            if (res === "OK") {
                cerrarModal();
                location.reload();
            }
        } catch (e) { alert("Error al guardar"); }
        finally { btn.disabled = false; }
    }

    function cerrarModal() { document.getElementById('modal-confirmar').classList.add('hidden'); }
    function filtrarPedidos() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        renderizar(todosLosPedidos.filter(p => p.ID_Compra.toLowerCase().includes(busqueda) || p.Proveedor.toLowerCase().includes(busqueda)));
    }
    window.onload = cargarDatos;
</script>
</body>
</html>
