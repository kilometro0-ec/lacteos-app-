<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Inventario | Lógica Láctea</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <!-- Librerías para PDF (Carga Segura) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; background-color: #f0f7ff; }
      .azul-electrico { color: #0047FF; }
      .bg-azul-electrico { background-color: #0047FF; }
      .card-prod { background: white; border-radius: 1.5rem; border: 2px solid #e2e8f0; transition: all 0.2s; cursor: pointer; position: relative; }
      .card-prod.selected { border-color: #0047FF; background-color: #e0eaff; transform: scale(0.96); }
      .selection-check { position: absolute; top: 10px; right: 10px; display: none; color: #0047FF; font-size: 24px; }
      .selected .selection-check { display: block; }
      .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
      .modal.active { display: flex; }
    </style>
</head>

<body class="pb-40">

<header class="fixed top-0 w-full h-16 bg-white border-b border-blue-100 flex justify-between items-center px-4 shadow-md z-50">
  <div class="flex items-center gap-2">
    <div id="btn-cancelar-seleccion" class="hidden bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase cursor-pointer" onclick="cancelarSeleccion()">Cancelar</div>
    <h1 id="header-title" class="text-lg font-black azul-electrico uppercase italic">Inventario</h1>
  </div>
  
  <div class="flex items-center gap-2">
      <!-- Botón PDF Azul Eléctrico -->
      <button onclick="descargarReportePDF()" class="p-2 text-blue-600 bg-blue-50 rounded-full hover:bg-blue-100 active:scale-90 transition-all">
          <span class="material-symbols-outlined text-3xl">picture_as_pdf</span>
      </button>
      <button id="btn-eliminar-multi" class="hidden bg-red-600 text-white p-2 rounded-xl shadow-lg" onclick="eliminarSeleccionados()">
          <span class="material-symbols-outlined">delete_sweep</span>
      </button>
      <button onclick="window.location.reload()" class="p-2 azul-electrico">
          <span class="material-symbols-outlined text-3xl">refresh</span>
      </button>
  </div>
</header>

<main class="pt-20 px-4 space-y-6">
  <!-- Dashboard de Totales -->
  <section class="grid grid-cols-3 gap-2">
    <div class="bg-white p-4 rounded-2xl border-b-4 border-blue-500 shadow-sm text-center">
        <p class="text-[9px] font-bold text-gray-400 uppercase">Ventas Total</p>
        <p id="total-ventas-num" class="text-sm font-black azul-electrico">0</p>
    </div>
    <div class="bg-white p-4 rounded-2xl border-b-4 border-red-500 shadow-sm text-center">
        <p class="text-[9px] font-bold text-gray-400 uppercase">Bajo Stock</p>
        <p id="count-critico" class="text-sm font-black text-red-600">0</p>
    </div>
    <div class="bg-white p-4 rounded-2xl border-b-4 border-green-500 shadow-sm text-center">
        <p class="text-[9px] font-bold text-gray-400 uppercase">Productos</p>
        <p id="total-sku" class="text-sm font-black text-green-600">0</p>
    </div>
  </section>

  <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar por nombre..." class="w-full bg-white border-2 border-blue-50 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 shadow-inner">

  <div id="grid-productos" class="grid grid-cols-2 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">Sincronizando productos...</div>
  </div>

  <div class="fixed bottom-24 left-0 w-full px-6 z-40">
    <button onclick="abrirModal('modal-nuevo')" class="w-full bg-azul-electrico text-white py-5 rounded-2xl font-black shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
        <span class="material-symbols-outlined text-2xl">add_box</span> 
        <span>NUEVO PRODUCTO</span>
    </button>
  </div>
</main>

<!-- MODAL STOCK -->
<div id="modal-stock" class="modal">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 space-y-6 shadow-2xl text-center">
        <h2 id="edit-nombre" class="font-black text-gray-800 uppercase text-sm">---</h2>
        <div class="flex items-center justify-center gap-4 py-2">
            <button onclick="ajustarStockNum(-1)" class="w-12 h-12 bg-gray-100 rounded-xl font-bold text-2xl">-</button>
            <input type="number" id="edit-cantidad" value="0" class="w-20 text-center border-none text-4xl font-black azul-electrico focus:ring-0">
            <button onclick="ajustarStockNum(1)" class="w-12 h-12 bg-gray-100 rounded-xl font-bold text-2xl">+</button>
        </div>
        <div class="space-y-2">
            <button id="btn-confirmar-stock" class="w-full bg-azul-electrico text-white py-4 rounded-xl font-black uppercase">GUARDAR CAMBIOS</button>
            <button onclick="cerrarModal('modal-stock')" class="w-full text-gray-400 py-2 font-bold uppercase text-xs">CANCELAR</button>
        </div>
    </div>
</div>

<!-- MODAL NUEVO -->
<div id="modal-nuevo" class="modal">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
        <h3 class="font-black azul-electrico text-center uppercase">Nuevo Registro</h3>
        <input type="text" id="n-nombre" placeholder="Nombre del Producto" class="w-full border-2 border-gray-50 rounded-xl p-3 font-bold uppercase">
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="n-pvp" placeholder="PVP $" class="w-full border-2 border-gray-50 rounded-xl p-3 font-bold">
            <input type="number" id="n-stock" placeholder="Stock" class="w-full border-2 border-gray-50 rounded-xl p-3 font-bold">
        </div>
        <button onclick="guardarNuevo()" class="w-full bg-azul-electrico text-white py-4 rounded-xl font-black uppercase mt-2">CREAR AHORA</button>
        <button onclick="cerrarModal('modal-nuevo')" class="w-full text-gray-400 font-bold text-xs uppercase">CERRAR</button>
    </div>
</div>

<script>
let inventarioLocal = [];
let seleccionados = new Set();
let modoSeleccion = false;
let pressTimer;

const aNum = (v) => {
    if(!v) return 0;
    let n = parseFloat(v.toString().replace(',', '.'));
    return isNaN(n) ? 0 : n;
};

async function cargarInventario() {
    try {
        const res = await DairyAPI.obtenerDatos("Inventario");
        if (Array.isArray(res)) {
            // ORDENAR POR MÁS VENDIDO (Columna 'Ventas')
            inventarioLocal = res.sort((a, b) => aNum(b.Ventas) - aNum(a.Ventas));
            renderizar(inventarioLocal);
        }
    } catch (e) { console.error("Error al cargar:", e); }
}

function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let criticos = 0, tVentas = 0;

    lista.forEach((p) => {
        const stock = aNum(p.Stock);
        const ventas = aNum(p.Ventas);
        tVentas += ventas;
        if(stock <= 3) criticos++;

        const card = document.createElement('div');
        card.className = `card-prod p-4 h-48 shadow-sm ${stock <= 3 ? 'bg-red-50 border-red-200' : 'bg-white'}`;
        card.dataset.id = p.ID;
        card.innerHTML = `
            <span class="selection-check material-symbols-outlined">check_circle</span>
            <p class="text-[8px] font-bold text-blue-300 uppercase mb-1">ID: ${p.ID}</p>
            <h3 class="font-bold text-xs uppercase text-gray-700 leading-tight h-10 overflow-hidden">${p.Producto}</h3>
            <div class="mt-4 flex justify-between items-end border-t border-gray-100 pt-3">
                <div>
                    <p class="text-[8px] text-gray-400 font-bold uppercase">Ventas</p>
                    <p class="azul-electrico font-black text-lg">${ventas}</p>
                </div>
                <div class="text-right">
                    <p class="text-[8px] text-gray-400 font-bold uppercase">Stock</p>
                    <span class="inline-block text-[10px] px-2 py-1 rounded-lg ${stock <= 3 ? 'bg-red-600 text-white' : 'bg-blue-100 azul-electrico'} font-black">${stock}</span>
                </div>
            </div>`;

        // Lógica de Selección (PC: Clic Derecho | Móvil: Long Press)
        card.addEventListener('contextmenu', (e) => { e.preventDefault(); activarModoSeleccion(p.ID); });
        card.addEventListener('touchstart', () => { pressTimer = setTimeout(() => activarModoSeleccion(p.ID), 700); });
        card.addEventListener('touchend', () => clearTimeout(pressTimer));
        
        card.addEventListener('click', () => {
            if(modoSeleccion) toggleSeleccion(p.ID);
            else abrirEditorStock(p);
        });

        container.appendChild(card);
    });

    document.getElementById('total-ventas-num').innerText = tVentas;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

function activarModoSeleccion(id) {
    modoSeleccion = true;
    document.getElementById('btn-cancelar-seleccion').classList.remove('hidden');
    document.getElementById('btn-eliminar-multi').classList.remove('hidden');
    toggleSeleccion(id);
}

function toggleSeleccion(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if(seleccionados.has(id)) {
        seleccionados.delete(id);
        el.classList.remove('selected');
    } else {
        seleccionados.add(id);
        el.classList.add('selected');
    }
    if(seleccionados.size === 0) cancelarSeleccion();
    else document.getElementById('header-title').innerText = `${seleccionados.size} Selecc.`;
}

function cancelarSeleccion() {
    modoSeleccion = false;
    seleccionados.clear();
    document.querySelectorAll('.card-prod').forEach(c => c.classList.remove('selected'));
    document.getElementById('btn-cancelar-seleccion').classList.add('hidden');
    document.getElementById('btn-eliminar-multi').classList.add('hidden');
    document.getElementById('header-title').innerText = "Inventario";
}

function descargarReportePDF() {
    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(16);
        doc.setTextColor(0, 71, 255); // Azul Eléctrico
        doc.text("REPORTE DE STOCK - LÓGICA LÁCTEA", 14, 15);
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Fecha: ${new Date().toLocaleString()}`, 14, 22);

        const rows = inventarioLocal.map(p => [
            p.ID,
            p.Producto.substring(0, 40),
            p.Stock,
            p.Ventas || 0,
            `$${aNum(p.Precio_Venta).toFixed(2)}`
        ]);

        doc.autoTable({
            head: [['ID', 'Producto', 'Stock', 'Ventas', 'PVP']],
            body: rows,
            startY: 30,
            styles: { fontSize: 8 },
            headStyles: { fillColor: [0, 71, 255] }
        });

        doc.save("Reporte_Stock_LogicaLactea.pdf");
    } catch (err) {
        alert("Error al generar PDF. Asegúrate de tener conexión a internet.");
        console.error(err);
    }
}

async function eliminarSeleccionados() {
    if(!confirm("¿Eliminar productos seleccionados?")) return;
    for(let id of seleccionados) {
        await DairyAPI.enviarDatos("Inventario", { ID: id, ELIMINAR: true, pestaña: "Inventario" });
    }
    window.location.reload();
}

function abrirEditorStock(p) {
    document.getElementById('edit-nombre').innerText = p.Producto;
    document.getElementById('edit-cantidad').value = 0;
    abrirModal('modal-stock');
    document.getElementById('btn-confirmar-stock').onclick = async () => {
        const suma = parseFloat(document.getElementById('edit-cantidad').value);
        const nuevoStock = aNum(p.Stock) + suma;
        cerrarModal('modal-stock');
        await DairyAPI.enviarDatos("Inventario", { ID: p.ID, Stock: nuevoStock, pestaña: "Inventario" });
        window.location.reload();
    };
}

async function guardarNuevo() {
    const data = {
        ID: "PROD-" + Math.floor(Math.random()*999),
        Producto: document.getElementById('n-nombre').value.toUpperCase(),
        Precio_Venta: aNum(document.getElementById('n-pvp').value),
        Stock: aNum(document.getElementById('n-stock').value),
        Ventas: 0,
        pestaña: "Inventario"
    };
    if(!data.Producto) return alert("Nombre requerido");
    await DairyAPI.enviarDatos("Inventario", data);
    window.location.reload();
}

function filtrar() {
    const b = document.getElementById('filtroProd').value.toLowerCase();
    renderizar(inventarioLocal.filter(p => p.Producto.toLowerCase().includes(b)));
}

function abrirModal(id) { document.getElementById(id).classList.add('active'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }
function ajustarStockNum(v) { document.getElementById('edit-cantidad').value = parseInt(document.getElementById('edit-cantidad').value) + v; }

window.onload = cargarInventario;
</script>
</body>
</html>
