<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dairy Logic | Inventory Management</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#6d28d9",
        "primary-container": "#ede9fe",
        secondary: "#7c3aed",
        "secondary-container": "#ddd6fe",
        background: "#faf5ff",
        surface: "#ffffff",
        outline: "#6b7280",
        error: "#dc2626"
      }
    }
  }
}
</script>

<style>
body { font-family: 'Work Sans', sans-serif; }
</style>
</head>

<body class="bg-background text-gray-900">

<!-- HEADER -->
<header class="fixed top-0 w-full h-16 bg-white border-b flex justify-between items-center px-4 shadow-sm">
  <h1 class="text-xl font-bold text-primary">Dairy Logic</h1>
  <span class="material-symbols-outlined text-primary">notifications</span>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto">

<!-- TITLE -->
<section class="mb-6">
  <h1 class="text-3xl font-bold text-primary">Inventory Overview</h1>
  <p class="text-gray-500">Real-time stock tracking</p>
</section>

<!-- STATS -->
<section class="grid md:grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 rounded-lg shadow">
  <p class="text-sm text-gray-500">Warehouse Value</p>
  <h2 class="text-2xl font-bold">$142,580</h2>
</div>

<div class="bg-purple-100 p-4 rounded-lg">
  <p class="text-sm text-purple-700">Critical Items</p>
  <h2 class="text-xl font-bold">14</h2>
</div>

<div class="bg-purple-200 p-4 rounded-lg">
  <p class="text-sm text-purple-800">Capacity</p>
  <h2 class="text-xl font-bold">82%</h2>
</div>

</section>

<!-- PRODUCTS -->
<section class="grid md:grid-cols-4 gap-4">

<div class="bg-white p-4 rounded-lg shadow">
  <img src="https://via.placeholder.com/200" class="rounded mb-3"/>
  <h3 class="font-bold">Milk 1L</h3>
  <p class="text-primary font-bold">$3.45</p>
</div>

<div class="bg-white p-4 rounded-lg shadow border border-red-300">
  <img src="https://via.placeholder.com/200" class="rounded mb-3"/>
  <h3 class="font-bold">Butter</h3>
  <p class="text-red-600 font-bold">Low Stock</p>
</div>

<div class="bg-white p-4 rounded-lg shadow">
  <img src="https://via.placeholder.com/200" class="rounded mb-3"/>
  <h3 class="font-bold">Yogurt</h3>
  <p class="text-primary font-bold">$4.10</p>
</div>

<div class="bg-white p-4 rounded-lg shadow">
  <img src="https://via.placeholder.com/200" class="rounded mb-3"/>
  <h3 class="font-bold">Cheese</h3>
  <p class="text-primary font-bold">$22.90</p>
</div>

</section>

<!-- SCANNER -->
<section class="mt-10 bg-primary text-white p-6 rounded-xl">
  <h2 class="text-xl font-bold mb-2">Quick Scan</h2>
  <button class="bg-white text-primary px-4 py-2 rounded-lg font-bold">
    Scan Product
  </button>
</section>

</main>

<!-- NAV -->
<nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-2">

<div class="text-gray-500 text-center">
<span class="material-symbols-outlined">home</span>
<p class="text-xs">Home</p>
</div>

<div class="text-gray-500 text-center">
<span class="material-symbols-outlined">receipt</span>
<p class="text-xs">Sales</p>
</div>

<div class="text-primary text-center">
<span class="material-symbols-outlined">inventory</span>
<p class="text-xs">Stock</p>
</div>

<div class="text-gray-500 text-center">
<span class="material-symbols-outlined">group</span>
<p class="text-xs">Customers</p>
</div>

</nav>

</body>
</html>
