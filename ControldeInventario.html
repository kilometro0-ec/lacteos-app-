<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Inventario | Lógica Láctea</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <!-- TU ARCHIVO DE ESTILOS -->
    <link rel="stylesheet" href="estilos-lacteos.css">
    
    <!-- Librerías PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      /* Ajustes adicionales para que combine con tus variables de CSS */
      .nav-menu { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: white; border-top: 1px solid var(--outline); display: flex; justify-content: space-around; align-items: center; z-index: 60; }
      .nav-item { display: flex; flex-direction: column; align-items: center; color: #9ca3af; font-size: 10px; font-weight: bold; }
      .nav-item.active { color: var(--primary); }
      
      /* Tus tarjetas redondeadas */
      .card-inventario {
          background: white;
          border-radius: 2.5rem; /* El redondeado de tu estilos-lacteos.css */
          border: 1px solid var(--outline);
          padding: 1.5rem;
          margin-bottom: 1rem;
      }
      .critico-border { border-left: 8px solid var(--secondary) !important; }
    </style>
</head>

<body class="pb-24">

<header class="fixed top-0 w-full h-16 bg-white border-b border-purple-100 flex justify-between items-center px-6 shadow-sm z-50">
  <h1 class="brand-logo text-titulo italic">Lógica Láctea</h1>
  <button onclick="descargarReportePDF()" class="header-btn p-2 rounded-full transition-all">
      <span class="material-symbols-outlined text-3xl" style="color: var(--secondary)">picture_as_pdf</span>
  </button>
</header>

<main class="pt-20 px-4">
  <!-- Barra de búsqueda con tu estilo .input-sutil -->
  <div class="mb-6">
      <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar en inventario..." class="input-sutil">
  </div>

  <div id="grid-productos">
      <!-- Los productos se cargarán con la clase .card-inventario -->
      <p class="text-center py-10 opacity-50">Cargando datos...</p>
  </div>
</main>

<!-- MENÚ DE NAVEGACIÓN INFERIOR -->
<nav class="nav-menu">
    <a href="panel-operativo-tienda.html" class="nav-item">
        <span class="material-symbols-outlined">dashboard</span>Panel
    </a>
    <a href="ventas.html" class="nav-item">
        <span class="material-symbols-outlined">shopping_cart</span>Ventas
    </a>
    <a href="inventario.html" class="nav-item active">
        <span class="material-symbols-outlined">inventory_2</span>Stock
    </a>
    <a href="clientes.html" class="nav-item">
        <span class="material-symbols-outlined">group</span>Clientes
    </a>
</nav>

<script>
let DATA_LOCAL = [];

async function cargarInventario() {
    const grid = document.getElementById('grid-productos');
    try {
        const resp = await fetch(`${API_URL}?pestaña=Inventario`);
        const data = await resp.json();
        
        // Ordenar por VENTAS (Columna H) - Más vendido primero
        DATA_LOCAL = data.sort((a, b) => (parseFloat(b.Ventas) || 0) - (parseFloat(a.Ventas) || 0));
        renderizar(DATA_LOCAL);
    } catch (e) {
        grid.innerHTML = '<p class="text-center text-red-500">Revisa la conexión con Google Sheets</p>';
    }
}

function renderizar(lista) {
    const grid = document.getElementById('grid-productos');
    grid.innerHTML = '';
    
    lista.forEach(p => {
        const esCritico = parseFloat(p.Stock) <= 5;
        grid.innerHTML += `
            <div class="card-inventario ${esCritico ? 'critico-border' : ''}">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-extrabold text-gray-800 uppercase text-sm">${p.Producto}</h3>
                        <p class="text-[10px] opacity-50">CÓDIGO: ${p.ID}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black" style="color: var(--primary)">$${p.Precio_Venta}</p>
                        <p class="text-[10px] font-bold ${esCritico ? 'text-red-500' : 'text-green-600'}">
                            STOCK: ${p.Stock}
                        </p>
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t border-purple-50 flex justify-between items-center">
                    <span class="text-[9px] font-bold uppercase opacity-40">Movimientos: ${p.Ventas || 0}</span>
                    <button class="btn-magenta px-4 py-1">Editar</button>
                </div>
            </div>
        `;
    });
}

function filtrar() {
    const q = document.getElementById('filtroProd').value.toLowerCase();
    renderizar(DATA_LOCAL.filter(p => p.Producto.toLowerCase().includes(q)));
}

window.onload = cargarInventario;

async function descargarReportePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFont("helvetica", "bold");
    doc.text("LÓGICA LÁCTEA - REPORTE DE STOCK", 14, 20);
    
    const body = DATA_LOCAL.map(p => [p.ID, p.Producto, p.Stock, p.Precio_Venta, p.Ventas || 0]);
    doc.autoTable({
        head: [['ID', 'PRODUCTO', 'STOCK', 'PVP', 'VENTAS']],
        body: body,
        startY: 30,
        headStyles: { fillColor: [162, 28, 175] } // Color Magenta (#a21caf)
    });
    doc.save("Reporte_Inventario.pdf");
}
</script>
</body>
</html>
