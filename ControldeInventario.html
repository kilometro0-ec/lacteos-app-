<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea | Inventario Pro</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
      .rotate-animation { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .active-nav { color: #a21caf !important; }
      .card-prod { background: white; border-radius: 2.5rem; border: 2px solid #e9d5ff; transition: all 0.2s ease; }
    </style>
</head>

<body class="bg-[#faf5ff] text-gray-900 pb-44">

<header class="fixed top-0 w-full h-16 bg-white border-b border-[#e9d5ff] flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLacteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-[#a21caf] font-black shadow-inner">LL</div>
    <h1 class="text-xl font-black text-[#a21caf] tracking-tight uppercase">Inventario</h1>
  </div>
  <button onclick="cargarInventario()" class="p-2 text-[#a21caf] hover:bg-purple-50 rounded-full transition-colors">
      <span id="refresh-icon" class="material-symbols-outlined scale-110">refresh</span>
  </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  <section class="grid grid-cols-3 gap-3">
    <div class="bg-white p-4 rounded-[2rem] border-2 border-[#e9d5ff] text-center">
      <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Valor Neto</p>
      <h2 id="valor-bodega" class="text-base font-black text-[#a21caf]">$0.00</h2>
    </div>
    <div class="bg-red-50 p-4 rounded-[2rem] border-2 border-red-200 text-center">
      <p class="text-[9px] text-red-600 uppercase font-black mb-1">Críticos</p>
      <h2 id="count-critico" class="text-base font-black text-red-600">0</h2>
    </div>
    <div class="bg-white p-4 rounded-[2rem] border-2 border-[#e9d5ff] text-center">
      <p class="text-[9px] text-green-600 uppercase font-black mb-1">Stock</p>
      <h2 id="total-sku" class="text-base font-black text-green-600">0</h2>
    </div>
  </section>

  <div class="px-1">
    <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar producto..." 
           class="w-full bg-white border-2 border-[#e9d5ff] rounded-2xl p-4 font-bold outline-none">
  </div>

  <div id="grid-productos" class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">Sincronizando con Google Sheets...</div>
  </div>

  <div class="fixed bottom-24 left-0 w-full px-4 z-40">
    <button onclick="abrirModalNuevo()" class="w-full bg-[#a21caf] text-white py-5 rounded-2xl font-black shadow-2xl flex items-center justify-center gap-3 uppercase">
        <span class="material-symbols-outlined">add_circle</span> 
        <span>Nuevo Producto</span>
    </button>
  </div>
</main>

<script>
let inventarioLocal = [];
const aNum = (v) => v ? parseFloat(v.toString().replace(',', '.')) : 0;

async function cargarInventario() {
  const icon = document.getElementById('refresh-icon');
  if (icon) icon.classList.add('rotate-animation');
  
  try {
    const respuesta = await DairyAPI.obtenerDatos("Inventario");
    
    // VALIDACIÓN CRÍTICA: ¿Es una lista real?
    if (Array.isArray(respuesta)) {
        inventarioLocal = respuesta;
        renderizar(inventarioLocal);
    } else {
        console.error("La API no devolvió un Array:", respuesta);
        document.getElementById('grid-productos').innerHTML = `
            <div class="col-span-full text-center py-10 bg-orange-50 border-2 border-orange-200 rounded-3xl p-6">
                <p class="text-orange-600 font-black uppercase text-xs">Error de Formato</p>
                <p class="text-[10px] text-orange-400">La respuesta de la base de datos no es una lista válida.</p>
            </div>`;
    }
  } catch (e) { 
      console.error("Error de conexión:", e);
      document.getElementById('grid-productos').innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold tracking-tighter">ERROR DE CONEXIÓN A GOOGLE SHEETS</div>';
  } finally {
      if (icon) icon.classList.remove('rotate-animation');
  }
}

function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    
    let totalCosto = 0, criticos = 0;

    lista.forEach((prod, index) => {
        const stock = aNum(prod.Stock);
        const pvp = aNum(prod.Precio_Venta);
        const costo = aNum(prod.Precio_Distribuidor || prod.Costo_Unitario);
        
        if(stock <= 5) criticos++;
        totalCosto += (costo * stock);

        container.innerHTML += `
        <div class="bg-white p-5 rounded-[2.5rem] border-2 ${stock <= 5 ? 'border-red-400 bg-red-50' : 'border-[#e9d5ff]'} shadow-sm flex flex-col justify-between h-52">
          <div>
            <p class="text-[10px] font-black text-[#a21caf] mb-1 uppercase opacity-50">${prod.ID || 'SIN ID'}</p> 
            <h3 class="font-black text-[14px] leading-tight uppercase text-slate-800 line-clamp-2">${prod.Producto}</h3>
          </div>
          <div class="flex justify-between items-end border-t border-dashed pt-3">
              <div>
                  <p class="text-[8px] text-gray-400 font-black uppercase">PVP</p>
                  <p class="text-[#a21caf] font-black text-lg">$${pvp.toFixed(2)}</p>
              </div>
              <div class="text-right">
                  <p class="text-[8px] text-gray-400 font-black uppercase">Stock</p>
                  <span class="inline-block text-xs px-3 py-1 rounded-full ${stock <= 5 ? 'bg-red-600 text-white' : 'bg-purple-100 text-[#a21caf]'} font-black">${stock}</span>
              </div>
          </div>
        </div>`;
    });
    
    document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

function filtrar() {
    const b = document.getElementById('filtroProd').value.toLowerCase();
    const filtrados = inventarioLocal.filter(p => 
        p.Producto.toLowerCase().includes(b) || 
        (p.ID && String(p.ID).toLowerCase().includes(b))
    );
    renderizar(filtrados);
}

window.onload = cargarInventario;
</script>
</body>
</html>
