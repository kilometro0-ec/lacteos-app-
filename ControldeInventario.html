<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Inventario | Lógica Láctea</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <!-- Librerías PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; background-color: #f0f7ff; }
      .azul-electrico { color: #0047FF; }
      .bg-azul-electrico { background-color: #0047FF; }
      
      /* Estilos de las Tarjetas */
      .card-prod { background: white; border-radius: 1.5rem; border: 2px solid #e2e8f0; transition: all 0.2s; cursor: pointer; position: relative; }
      .card-prod.selected { border-color: #0047FF; background-color: #e0eaff; transform: scale(0.96); }
      
      /* Modales */
      .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
      .modal.active { display: flex; }

      /* Menú de Navegación Inferior - DEVUELTO */
      .nav-menu { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; z-index: 60; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
      .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; }
      .nav-item.active { color: #0047FF; }
    </style>
</head>

<body class="pb-32">

<!-- HEADER -->
<header class="fixed top-0 w-full h-16 bg-white border-b border-blue-100 flex justify-between items-center px-4 shadow-md z-50">
  <div class="flex items-center gap-2">
    <div id="btn-cancelar-seleccion" class="hidden bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase cursor-pointer" onclick="cancelarSeleccion()">Cancelar</div>
    <h1 id="header-title" class="text-lg font-black azul-electrico uppercase italic">Inventario</h1>
  </div>
  
  <div class="flex items-center gap-2">
      <button onclick="descargarReportePDF()" class="p-2 text-blue-600 bg-blue-50 rounded-full">
          <span class="material-symbols-outlined text-3xl">picture_as_pdf</span>
      </button>
      <button id="btn-eliminar-multi" class="hidden bg-red-600 text-white p-2 rounded-xl" onclick="eliminarSeleccionados()">
          <span class="material-symbols-outlined">delete_sweep</span>
      </button>
  </div>
</header>

<main class="pt-20 px-4 space-y-6">
  <!-- Dashboard Rápido -->
  <section class="grid grid-cols-3 gap-2">
    <div class="bg-white p-4 rounded-2xl border-b-4 border-blue-500 shadow-sm text-center">
        <p class="text-[9px] font-bold text-gray-400 uppercase">Ventas</p>
        <p id="total-ventas-num" class="text-sm font-black azul-electrico">0</p>
    </div>
    <div class="bg-white p-4 rounded-2xl border-b-4 border-red-500 shadow-sm text-center">
        <p class="text-[9px] font-bold text-gray-400 uppercase">Crítico</p>
        <p id="count-critico" class="text-sm font-black text-red-600">0</p>
    </div>
    <div class="bg-white p-4 rounded-2xl border-b-4 border-green-500 shadow-sm text-center">
        <p class="text-[9px] font-bold text-gray-400 uppercase">SKUs</p>
        <p id="total-sku" class="text-sm font-black text-green-600">0</p>
    </div>
  </section>

  <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar producto..." class="w-full bg-white border-2 border-blue-50 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 shadow-inner">

  <!-- Grilla de Productos -->
  <div id="grid-productos" class="grid grid-cols-2 gap-4 pb-20">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">Cargando datos de Lógica Láctea...</div>
  </div>
</main>

<!-- BOTÓN FLOTANTE "NUEVO" -->
<div class="fixed bottom-24 right-6 z-40">
    <button onclick="abrirModal('modal-nuevo')" class="w-16 h-16 bg-azul-electrico text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all">
        <span class="material-symbols-outlined text-3xl">add</span>
    </button>
</div>

<!-- MENU DE NAVEGACION INFERIOR -->
<nav class="nav-menu">
    <a href="panel-operativo-tienda.html" class="nav-item">
        <span class="material-symbols-outlined">dashboard</span>
        Panel
    </a>
    <a href="ventas.html" class="nav-item">
        <span class="material-symbols-outlined">shopping_cart</span>
        Ventas
    </a>
    <a href="inventario.html" class="nav-item active">
        <span class="material-symbols-outlined">inventory_2</span>
        Stock
    </a>
    <a href="clientes.html" class="nav-item">
        <span class="material-symbols-outlined">group</span>
        Clientes
    </a>
</nav>

<!-- MODAL STOCK (Edición Rápida) -->
<div id="modal-stock" class="modal">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 space-y-6 shadow-2xl text-center">
        <h2 id="edit-nombre" class="font-black text-gray-800 uppercase text-sm">---</h2>
        <div class="flex items-center justify-center gap-4 py-2">
            <button onclick="ajustarStockNum(-1)" class="w-12 h-12 bg-gray-100 rounded-xl font-bold text-2xl">-</button>
            <input type="number" id="edit-cantidad" value="0" class="w-20 text-center border-none text-4xl font-black azul-electrico focus:ring-0">
            <button onclick="ajustarStockNum(1)" class="w-12 h-12 bg-gray-100 rounded-xl font-bold text-2xl">+</button>
        </div>
        <button id="btn-confirmar-stock" class="w-full bg-azul-electrico text-white py-4 rounded-xl font-black uppercase">ACTUALIZAR</button>
        <button onclick="cerrarModal('modal-stock')" class="w-full text-gray-400 py-2 font-bold uppercase text-xs">CERRAR</button>
    </div>
</div>

<!-- MODAL NUEVO PRODUCTO -->
<div id="modal-nuevo" class="modal">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
        <h3 class="font-black azul-electrico text-center uppercase">Crear Producto</h3>
        <input type="text" id="n-nombre" placeholder="Nombre" class="w-full border-2 border-gray-50 rounded-xl p-3 font-bold uppercase">
        <input type="number" id="n-pvp" placeholder="Precio Venta ($)" class="w-full border-2 border-gray-50 rounded-xl p-3 font-bold">
        <input type="number" id="n-stock" placeholder="Stock Inicial" class="w-full border-2 border-gray-50 rounded-xl p-3 font-bold">
        <button onclick="guardarNuevo()" class="w-full bg-azul-electrico text-white py-4 rounded-xl font-black uppercase mt-2">GUARDAR EN SISTEMA</button>
        <button onclick="cerrarModal('modal-nuevo')" class="w-full text-gray-400 font-bold text-xs uppercase text-center w-full block">CANCELAR</button>
    </div>
</div>

<script>

</body>
</html>
