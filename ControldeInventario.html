<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea | Inventario Pro</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #faf5ff; overflow-x: hidden; }
      .rotate-animation { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      
      .card-prod { 
        background: white; border-radius: 2rem; border: 2px solid #e9d5ff; 
        transition: all 0.2s ease; position: relative; overflow: hidden;
      }
      .card-prod.selected { border-color: #a21caf; background-color: #f5d0fe; transform: scale(0.95); }
      .selection-check { position: absolute; top: 10px; right: 10px; display: none; color: #a21caf; font-weight: bold; }
      .selected .selection-check { display: block; }

      .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
      .modal.active { display: flex; }
      
      ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="text-gray-900 pb-44">

<header class="fixed top-0 w-full h-16 bg-white border-b border-[#e9d5ff] flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3">
    <div id="btn-cancelar-seleccion" class="hidden text-red-500 font-bold text-xs uppercase" onclick="cancelarSeleccion()">Cancelar</div>
    <h1 id="header-title" class="text-lg font-black text-[#a21caf] tracking-tight uppercase italic">Inventario</h1>
  </div>
  <div class="flex items-center gap-2">
      <button id="btn-eliminar-multi" class="hidden text-red-600 p-2" onclick="eliminarSeleccionados()">
          <span class="material-symbols-outlined">delete_sweep</span>
      </button>
      <button onclick="cargarInventario()" class="p-2 text-[#a21caf]">
          <span id="refresh-icon" class="material-symbols-outlined">refresh</span>
      </button>
  </div>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  <section class="grid grid-cols-3 gap-2">
    <div class="bg-white p-3 rounded-2xl border border-purple-100 text-center">
        <p class="text-[8px] font-black uppercase text-gray-400">Bodega</p>
        <p id="valor-bodega" class="text-xs font-black text-primary">$0.00</p>
    </div>
    <div class="bg-white p-3 rounded-2xl border border-purple-100 text-center">
        <p class="text-[8px] font-black uppercase text-gray-400">Críticos</p>
        <p id="count-critico" class="text-xs font-black text-red-500">0</p>
    </div>
    <div class="bg-white p-3 rounded-2xl border border-purple-100 text-center">
        <p class="text-[8px] font-black uppercase text-gray-400">Total</p>
        <p id="total-sku" class="text-xs font-black text-green-600">0</p>
    </div>
  </section>

  <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar producto..." class="w-full bg-white border-2 border-purple-100 rounded-2xl p-4 font-bold outline-none">

  <div id="grid-productos" class="grid grid-cols-2 gap-3">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold">Cargando...</div>
  </div>

  <div class="fixed bottom-24 left-0 w-full px-4 z-40 flex gap-2">
    <button onclick="abrirModal('modal-nuevo')" class="flex-1 bg-[#a21caf] text-white py-4 rounded-2xl font-black shadow-lg uppercase active:scale-95 transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">add_box</span> Nuevo
    </button>
  </div>
</main>

<div id="modal-nuevo" class="modal">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-6 space-y-4 shadow-2xl">
        <h2 class="font-black text-primary uppercase text-center">Nuevo Producto</h2>
        <input type="text" id="n-nombre" placeholder="Nombre del Producto" class="w-full border-purple-100 rounded-xl p-3 font-bold uppercase">
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="n-costo" placeholder="Costo Dist." class="border-purple-100 rounded-xl p-3 font-bold">
            <input type="number" id="n-pvp" placeholder="PVP Venta" class="border-purple-100 rounded-xl p-3 font-bold">
        </div>
        <input type="number" id="n-stock" placeholder="Stock Inicial" class="w-full border-purple-100 rounded-xl p-3 font-bold">
        <div class="flex gap-2">
            <button onclick="guardarNuevo()" class="flex-1 bg-primary text-white py-3 rounded-xl font-black uppercase">Guardar</button>
            <button onclick="cerrarModal('modal-nuevo')" class="flex-1 bg-gray-100 text-gray-500 py-3 rounded-xl font-black uppercase">Cerrar</button>
        </div>
    </div>
</div>

<div id="modal-stock" class="modal">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-6 space-y-4 shadow-2xl text-center">
        <h2 id="edit-nombre" class="font-black text-slate-800 uppercase">PRODUCTO</h2>
        <p class="text-[10px] font-black text-gray-400 uppercase">El precio está bloqueado</p>
        <div class="flex items-center justify-center gap-4 py-4">
            <button onclick="ajustarStockNum(-1)" class="w-12 h-12 bg-purple-100 rounded-full text-primary font-black text-2xl">-</button>
            <input type="number" id="edit-cantidad" value="0" class="w-20 text-center border-none text-3xl font-black text-primary">
            <button onclick="ajustarStockNum(1)" class="w-12 h-12 bg-purple-100 rounded-full text-primary font-black text-2xl">+</button>
        </div>
        <div class="flex gap-2">
            <button id="btn-confirmar-stock" class="flex-1 bg-primary text-white py-3 rounded-xl font-black uppercase">Actualizar</button>
            <button onclick="cerrarModal('modal-stock')" class="flex-1 bg-gray-100 text-gray-500 py-3 rounded-xl font-black uppercase">Cancelar</button>
        </div>
    </div>
</div>

<div id="menu-container"></div>

<script>
let inventarioLocal = [];
let seleccionados = new Set();
let modoSeleccion = false;
let pressTimer;

const aNum = (v) => v ? parseFloat(v.toString().replace(',', '.')) : 0;

// INICIO
async function cargarInventario() {
    const icon = document.getElementById('refresh-icon');
    icon?.classList.add('rotate-animation');
    try {
        const res = await DairyAPI.obtenerDatos("Inventario");
        if (Array.isArray(res)) {
            inventarioLocal = res;
            renderizar(inventarioLocal);
        }
    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('rotate-animation'); }
}

function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let totalCosto = 0, criticos = 0;

    lista.forEach((p) => {
        const stock = aNum(p.Stock);
        const pvp = aNum(p.Precio_Venta);
        const costo = aNum(p.Costo_Unitario || p.Precio_Distribuidor);
        if(stock <= 5) criticos++;
        totalCosto += (costo * stock);

        const card = document.createElement('div');
        card.className = `card-prod p-4 h-48 ${stock <= 5 ? 'border-red-300 bg-red-50' : ''}`;
        card.dataset.id = p.ID;
        card.innerHTML = `
            <span class="selection-check material-symbols-outlined">check_circle</span>
            <div>
                <p class="text-[8px] font-black text-primary/40 uppercase">ID: ${p.ID}</p>
                <h3 class="font-bold text-xs uppercase text-slate-800 leading-tight line-clamp-2">${p.Producto}</h3>
            </div>
            <div class="flex justify-between items-end border-t border-dashed pt-2">
                <div>
                    <p class="text-[7px] text-gray-400 font-black uppercase">PVP (Bloq)</p>
                    <p class="text-slate-300 font-black text-base italic">$${pvp.toFixed(2)}</p>
                </div>
                <div class="text-right">
                    <p class="text-[7px] text-gray-400 font-black uppercase">Stock</p>
                    <span class="inline-block text-[10px] px-2 py-1 rounded-full ${stock <= 5 ? 'bg-red-600 text-white' : 'bg-purple-100 text-primary'} font-black">${stock}</span>
                </div>
            </div>`;

        // EVENTOS PARA MÓVIL (Long Press)
        card.addEventListener('touchstart', () => {
            pressTimer = setTimeout(() => activarModoSeleccion(p.ID), 700);
        });
        card.addEventListener('touchend', () => clearTimeout(pressTimer));
        card.addEventListener('click', () => {
            if(modoSeleccion) toggleSeleccion(p.ID);
            else abrirEditorStock(p);
        });

        container.appendChild(card);
    });

    document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

// MODOS Y SELECCION
function activarModoSeleccion(id) {
    modoSeleccion = true;
    document.getElementById('btn-cancelar-seleccion').classList.remove('hidden');
    document.getElementById('btn-eliminar-multi').classList.remove('hidden');
    document.getElementById('header-title').innerText = "Seleccionar...";
    toggleSeleccion(id);
}

function toggleSeleccion(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if(seleccionados.has(id)) {
        seleccionados.delete(id);
        el.classList.remove('selected');
    } else {
        seleccionados.add(id);
        el.classList.add('selected');
    }
    if(seleccionados.size === 0) cancelarSeleccion();
}

function cancelarSeleccion() {
    modoSeleccion = false;
    seleccionados.clear();
    document.querySelectorAll('.card-prod').forEach(c => c.classList.remove('selected'));
    document.getElementById('btn-cancelar-seleccion').classList.add('hidden');
    document.getElementById('btn-eliminar-multi').classList.add('hidden');
    document.getElementById('header-title').innerText = "Inventario";
}

// ACCIONES API
async function eliminarSeleccionados() {
    if(!confirm(`¿Eliminar ${seleccionados.size} productos?`)) return;
    for(let id of seleccionados) {
        await DairyAPI.enviarDatos("Inventario", { ID: id, ELIMINAR: true, pestaña: "Inventario" });
    }
    alert("Eliminados correctamente");
    cancelarSeleccion();
    cargarInventario();
}

function abrirEditorStock(p) {
    document.getElementById('edit-nombre').innerText = p.Producto;
    document.getElementById('edit-cantidad').value = 0;
    abrirModal('modal-stock');
    document.getElementById('btn-confirmar-stock').onclick = async () => {
        const suma = parseFloat(document.getElementById('edit-cantidad').value);
        const nuevoStock = aNum(p.Stock) + suma;
        cerrarModal('modal-stock');
        await DairyAPI.enviarDatos("Inventario", { ID: p.ID, Stock: nuevoStock, pestaña: "Inventario" });
        cargarInventario();
    };
}

async function guardarNuevo() {
    const data = {
        ID: "P" + Date.now().toString().slice(-5),
        Producto: document.getElementById('n-nombre').value.toUpperCase(),
        Precio_Distribuidor: aNum(document.getElementById('n-costo').value),
        Precio_Venta: aNum(document.getElementById('n-pvp').value),
        Stock: aNum(document.getElementById('n-stock').value),
        Estado: "ACTIVO",
        Fecha: new Date().toLocaleDateString(),
        pestaña: "Inventario"
    };
    if(!data.Producto) return alert("Nombre requerido");
    cerrarModal('modal-nuevo');
    await DairyAPI.enviarDatos("Inventario", data);
    cargarInventario();
}

// UI HELPERS
function abrirModal(id) { document.getElementById(id).classList.add('active'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }
function ajustarStockNum(v) { document.getElementById('edit-cantidad').value = parseInt(document.getElementById('edit-cantidad').value) + v; }
function filtrar() {
    const b = document.getElementById('filtroProd').value.toLowerCase();
    renderizar(inventarioLocal.filter(p => p.Producto.toLowerCase().includes(b)));
}

window.onload = cargarInventario;
</script>
</body>
</html>
