<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Inventario | Lógica Láctea</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="estilos-lacteos.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
      body { background-color: #faf5ff; padding-bottom: 100px; }
      
      /* ID CARDS SUPERIORES */
      .id-card {
        background: white; border-radius: 1.5rem; padding: 12px 8px;
        display: flex; flex-direction: column; align-items: center;
        border: 2px solid #f3e8ff; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      }
      .id-card .value { font-size: 18px; font-weight: 900; color: #1f012a; }
      .id-card .label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #94a3b8; }

      /* BUSCADOR MEJORADO */
      .search-container {
        position: relative; margin-bottom: 20px;
      }
      .search-input {
        width: 100%; background: white; border: 2px solid #e9d5ff;
        border-radius: 1.2rem; padding: 14px 14px 14px 45px;
        font-weight: 600; color: #a21caf; outline: none;
      }
      .search-icon { position: absolute; left: 15px; top: 14px; color: #a21caf; }

      /* PRODUCT CARDS (TEXTO GRANDE Y BOTÓN STOCK) */
      .card-prod { 
        background: white; border-radius: 1.8rem; border: 1px solid #e9d5ff; 
        padding: 15px; display: flex; flex-direction: column; gap: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.03); position: relative;
      }
      .prod-title { 
        font-size: 14px; font-weight: 800; color: #1f012a; 
        line-height: 1.2; text-transform: uppercase;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .btn-add-stock {
        background: #fdf4ff; color: #a21caf; border: 1px solid #f5d0fe;
        border-radius: 12px; padding: 6px; display: flex; align-items: center; justify-content: center;
      }

      /* MODALES */
      .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
      .modal.active { display: flex; }
    </style>
</head>
<body>

<!-- HEADER CON ELIMINAR Y AGREGAR -->
<header class="fixed top-0 w-full h-16 bg-white border-b border-purple-100 flex justify-between items-center px-4 z-50">
    <div class="flex items-center gap-2">
        <button id="btn-borrar" class="hidden text-red-500" onclick="eliminarSeleccion()"><span class="material-symbols-outlined text-3xl">delete_forever</span></button>
        <h1 id="header-title" class="text-xl font-black text-[#a21caf] italic uppercase">STOCK</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="abrirModal('modal-nuevo')" class="text-green-600"><span class="material-symbols-outlined text-3xl">add_circle</span></button>
        <button onclick="descargarPDF()" class="text-[#a21caf]"><span class="material-symbols-outlined text-3xl">picture_as_pdf</span></button>
    </div>
</header>

<main class="pt-20 px-4">
    <!-- INDICADORES SUPERIORES -->
    <section class="grid grid-cols-3 gap-2 mb-6">
        <div class="id-card"><div class="label">Bodega</div><div id="valor-bodega" class="value">$0</div></div>
        <div class="id-card border-red-100"><div class="label text-red-500">Críticos</div><div id="count-critico" class="value">0</div></div>
        <div class="id-card border-green-100"><div class="label text-green-500">Stock</div><div id="total-sku" class="value">0</div></div>
    </section>

    <!-- BUSCADOR -->
    <div class="search-container">
        <span class="material-symbols-outlined search-icon">search</span>
        <input type="text" id="filtro" oninput="filtrar()" placeholder="Buscar producto..." class="search-input">
    </div>

    <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-20"></div>
</main>

<div id="menu-container"></div>

<!-- MODAL NUEVO PRODUCTO -->
<div id="modal-nuevo" class="modal">
    <div class="card-sutil w-full max-w-sm space-y-4">
        <h2 class="text-titulo text-center text-[#a21caf]">Nuevo Producto</h2>
        <input type="text" id="n-nombre" placeholder="Nombre del producto" class="input-sutil">
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="n-pvp" placeholder="PVP $" class="input-sutil">
            <input type="number" id="n-stock" placeholder="Stock Inicial" class="input-sutil">
        </div>
        <button onclick="guardarNuevo()" class="btn-magenta w-full py-4">Guardar Producto</button>
        <button onclick="cerrarModal('modal-nuevo')" class="w-full text-gray-400 font-bold uppercase text-[10px]">Cerrar</button>
    </div>
</div>

<script>
let inventarioLocal = [];
let seleccionados = new Set();

async function cargarInventario() {
    try {
        const res = await DairyAPI.obtenerDatos("Inventario");
        if (Array.isArray(res)) {
            inventarioLocal = res;
            renderizar(inventarioLocal);
        }
    } catch (e) { console.error(e); }
}

function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let totalBodega = 0, criticos = 0, stockTotal = 0;

    lista.forEach(p => {
        const stock = Number(p.Stock) || 0;
        if(stock <= 5) criticos++;
        stockTotal += stock;
        totalBodega += (Number(p.Precio_Distribuidor || 0) * stock);

        const card = document.createElement('div');
        card.className = `card-prod ${seleccionados.has(p.ID) ? 'border-2 border-[#a21caf] bg-purple-50' : ''}`;
        card.innerHTML = `
            <div class="flex justify-between items-start">
                <span class="text-[9px] font-bold text-gray-400">#${p.ID}</span>
                <span class="font-black text-green-600 text-lg">$${Number(p.Precio_Venta || 0).toFixed(2)}</span>
            </div>
            <h3 class="prod-title">${p.Producto}</h3>
            <div class="flex justify-between items-center mt-2">
                <div class="flex flex-col">
                    <span class="text-[9px] font-bold text-gray-400 uppercase">En Stock</span>
                    <span class="font-black text-xl ${stock <= 5 ? 'text-red-500' : 'text-[#a21caf]'}">${stock}</span>
                </div>
                <button onclick="event.stopPropagation(); sumarStock('${p.ID}', ${stock})" class="btn-add-stock">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
        `;

        card.onclick = () => toggleSeleccion(p.ID);
        container.appendChild(card);
    });

    document.getElementById('valor-bodega').innerText = `$${totalBodega.toFixed(0)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = stockTotal; // Cambiado a Stock total de unidades
}

async function sumarStock(id, actual) {
    const cant = prompt("¿Cuánto stock vas a sumar?", "1");
    if (cant && !isNaN(cant)) {
        const nuevoTotal = actual + parseInt(cant);
        await DairyAPI.actualizarDato("Inventario", id, { Stock: nuevoTotal });
        cargarInventario();
    }
}

function toggleSeleccion(id) {
    seleccionados.has(id) ? seleccionados.delete(id) : seleccionados.add(id);
    document.getElementById('btn-borrar').classList.toggle('hidden', seleccionados.size === 0);
    document.getElementById('header-title').innerText = seleccionados.size > 0 ? `${seleccionados.size} SELEC.` : "STOCK";
    renderizar(inventarioLocal);
}

async function eliminarSeleccion() {
    if (confirm(`¿Eliminar ${seleccionados.size} productos?`)) {
        for (let id of seleccionados) {
            await DairyAPI.eliminarDato("Inventario", id);
        }
        seleccionados.clear();
        cargarInventario();
    }
}

async function guardarNuevo() {
    const data = {
        Producto: document.getElementById('n-nombre').value.toUpperCase(),
        Precio_Venta: document.getElementById('n-pvp').value,
        Stock: document.getElementById('n-stock').value,
        Ventas: 0
    };
    if(data.Producto) {
        await DairyAPI.crearDato("Inventario", data);
        cerrarModal('modal-nuevo');
        cargarInventario();
    }
}

function abrirModal(id) { document.getElementById(id).classList.add('active'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }
function filtrar() { 
    const b = document.getElementById('filtro').value.toLowerCase();
    renderizar(inventarioLocal.filter(p => p.Producto.toLowerCase().includes(b))); 
}

window.onload = cargarInventario;
</script>

</body>
</html>
