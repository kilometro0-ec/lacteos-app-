<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Inventario | Lógica Láctea</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="estilos-lacteos.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
      body { background-color: #faf5ff; padding-bottom: 90px; }
      
      /* ID CARDS SUPERIORES MEJORADAS */
      .id-card {
        background: white;
        border-radius: 1.8rem;
        padding: 1rem 0.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 2px solid #f3e8ff;
        box-shadow: 0 4px 12px rgba(162, 28, 175, 0.03);
      }
      .id-card span.material-symbols-outlined { font-size: 20px; margin-bottom: 4px; }
      .id-card .label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
      .id-card .value { font-size: 15px; font-weight: 900; line-height: 1; margin-top: 2px; }

      /* TARJETAS DE PRODUCTO */
      .card-prod { 
        background: white; border-radius: 2rem; border: 1px solid #e9d5ff; 
        transition: all 0.2s ease; position: relative; overflow: hidden;
      }
      .card-prod.selected { border: 3px solid #a21caf; background-color: #f5d0fe; }
    </style>
</head>
<body>

<header class="fixed top-0 w-full h-16 bg-white border-b border-purple-100 flex justify-between items-center px-4 z-50">
    <div class="flex items-center gap-2">
        <div id="btn-cancelar" class="hidden bg-red-500 text-white px-3 py-1 rounded-full font-black text-[10px]" onclick="cancelarSeleccion()">X</div>
        <h1 id="header-title" class="text-xl font-black text-[#a21caf] italic uppercase">STOCK</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="descargarPDF()" class="text-[#a21caf]"><span class="material-symbols-outlined text-3xl">picture_as_pdf</span></button>
        <button onclick="window.location.reload()" class="text-gray-400"><span class="material-symbols-outlined text-3xl">sync</span></button>
    </div>
</header>

<main class="pt-20 px-4">
    <section class="grid grid-cols-3 gap-3 mb-6">
        <div class="id-card">
            <span class="material-symbols-outlined text-purple-500">payments</span>
            <div class="label">Bodega</div>
            <div id="valor-bodega" class="value text-[#a21caf]">$0</div>
        </div>
        <div class="id-card border-red-100">
            <span class="material-symbols-outlined text-red-500">warning</span>
            <div class="label text-red-400">Críticos</div>
            <div id="count-critico" class="value text-red-600">0</div>
        </div>
        <div class="id-card border-green-100">
            <span class="material-symbols-outlined text-green-500">inventory_2</span>
            <div class="label text-green-500">Items</div>
            <div id="total-sku" class="value text-green-700">0</div>
        </div>
    </section>

    <input type="text" id="filtro" oninput="filtrar()" placeholder="Buscar producto..." class="input-sutil mb-6">

    <div id="grid-productos" class="grid grid-cols-2 gap-4 mb-20"></div>
</main>

<div id="menu-container"></div>

<script>
let inventarioLocal = [];
let seleccionados = new Set();
let modoSeleccion = false;

async function cargarInventario() {
    try {
        const res = await DairyAPI.obtenerDatos("Inventario");
        if (Array.isArray(res)) {
            inventarioLocal = res.sort((a, b) => (Number(b.Ventas) || 0) - (Number(a.Ventas) || 0));
            renderizar(inventarioLocal);
        }
    } catch (e) { console.error(e); }
}

function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let totalBodega = 0, criticos = 0;

    lista.forEach(p => {
        const stock = Number(p.Stock) || 0;
        if(stock <= 5) criticos++;
        totalBodega += (Number(p.Precio_Distribuidor || 0) * stock);

        const card = document.createElement('div');
        card.className = `card-prod p-4 h-44 flex flex-col justify-between shadow-sm ${stock <= 5 ? 'border-red-200 bg-red-50' : ''}`;
        card.dataset.id = p.ID;
        card.innerHTML = `
            <div>
                <div class="flex justify-between items-start">
                    <span class="text-[8px] font-black text-gray-300">ID: ${p.ID}</span>
                    <span class="text-[9px] font-black text-orange-500 uppercase">🔥 ${p.Ventas || 0}</span>
                </div>
                <h3 class="font-bold text-[11px] uppercase leading-tight mt-1 text-slate-700">${p.Producto}</h3>
            </div>
            <div class="flex justify-between items-end border-t border-purple-50 pt-2">
                <span class="text-green-600 font-black text-xl">$${Number(p.Precio_Venta || 0).toFixed(2)}</span>
                <span class="px-2 py-1 rounded-lg ${stock <= 5 ? 'bg-red-600 text-white' : 'bg-purple-100 text-[#a21caf]'} font-black text-xs">${stock}</span>
            </div>`;

        card.oncontextmenu = (e) => { e.preventDefault(); activarModo(p.ID); };
        card.onclick = () => modoSeleccion ? toggleSeleccion(p.ID) : null;
        container.appendChild(card);
    });

    document.getElementById('valor-bodega').innerText = `$${totalBodega.toFixed(0)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

function descargarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const ahora = new Date();
    
    doc.autoTable({
        head: [['ID', 'PRODUCTO', 'VENTAS', 'STOCK']],
        body: inventarioLocal.map(p => [p.ID, p.Producto.toUpperCase(), p.Ventas || 0, p.Stock]),
        startY: 40,
        margin: { bottom: 25 },
        didDrawPage: (data) => {
            doc.setFontSize(16);
            doc.setTextColor(162, 28, 175);
            doc.text("REPORTE DE INVENTARIO", 14, 20);
            doc.setFontSize(9);
            doc.setTextColor(100);
            doc.text(`QUITO - ECUADOR | ${ahora.toLocaleDateString()} ${ahora.toLocaleTimeString()}`, 14, 27);
            
            // Numeración de páginas
            const pagenum = doc.internal.getNumberOfPages();
            doc.text("Página " + pagenum, 180, 285);
        }
    });

    const finalY = doc.lastAutoTable.finalY + 15;
    doc.setFontSize(10);
    doc.setTextColor(0);
    doc.text("DOCUMENTO OFICIAL - LOGICA LACTEA", 14, finalY);
    doc.setFontSize(8);
    doc.text("by Corporación 360 | muuuu...", 14, finalY + 5);

    doc.save(`Inventario_${ahora.getTime()}.pdf`);
}

function activarModo(id) { modoSeleccion = true; document.getElementById('btn-cancelar').classList.remove('hidden'); toggleSeleccion(id); }
function cancelarSeleccion() { modoSeleccion = false; seleccionados.clear(); document.querySelectorAll('.card-prod').forEach(c => c.classList.remove('selected')); document.getElementById('btn-cancelar').classList.add('hidden'); }
function toggleSeleccion(id) { 
    const el = document.querySelector(`[data-id="${id}"]`);
    seleccionados.has(id) ? seleccionados.delete(id) : seleccionados.add(id);
    el.classList.toggle('selected');
}
function filtrar() { const b = document.getElementById('filtro').value.toLowerCase(); renderizar(inventarioLocal.filter(p => p.Producto.toLowerCase().includes(b))); }

window.onload = cargarInventario;
</script>

</body>
</html>
