<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lógica Láctea | Gestión Inteligente</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="api-config.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#a21caf",
        secondary: "#db2777",
        success: "#16a34a",
        background: "#faf5ff",
        outline: "#e9d5ff",
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
body { font-family: 'Work Sans', sans-serif; }
.rotate-animation { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>

<body class="bg-background text-gray-900 pb-32">

<header class="fixed top-0 w-full h-16 bg-white border-b border-outline flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
    <div class="w-8 h-8 rounded-lg bg-purple-100 flex items-center justify-center text-primary">
        <span class="material-symbols-outlined">opacity</span>
    </div>
    <h1 class="text-xl font-bold text-primary">Lógica Láctea</h1>
  </div>
  <button onclick="cargarInventario()" class="p-2 text-primary hover:bg-purple-50 rounded-full transition-colors">
      <span id="refresh-icon" class="material-symbols-outlined">refresh</span>
  </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto">

<section class="mb-6">
  <h1 class="text-3xl font-bold text-primary">Control de Stock</h1>
</section>

<section class="grid grid-cols-3 gap-2 mb-8">
  <div class="bg-white p-3 rounded-xl border border-outline shadow-sm flex flex-col items-center text-center">
    <p class="text-[8px] text-gray-400 uppercase font-black mb-1">Valor Bodega</p>
    <h2 id="valor-bodega" class="text-sm md:text-xl font-bold text-primary">$0.00</h2>
  </div>

  <div class="bg-red-50 p-3 rounded-xl border border-red-100 shadow-sm flex flex-col items-center text-center">
    <p class="text-[8px] text-red-600 uppercase font-black mb-1">Críticos</p>
    <h2 id="count-critico" class="text-xl font-bold text-red-600">0</h2>
  </div>

  <div class="bg-white p-3 rounded-xl border border-outline shadow-sm flex flex-col items-center text-center">
    <p class="text-[8px] text-success uppercase font-black mb-1">Total SKUs</p>
    <h2 id="total-sku" class="text-xl font-bold text-success">0</h2>
  </div>
</section>

<div id="grid-productos" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    </div>

<section class="bg-primary text-white p-6 rounded-3xl shadow-xl">
  <div class="flex flex-col gap-4">
    <div>
        <h2 class="text-xl font-bold">Gestión de Existencias</h2>
        <p class="text-purple-200 text-xs">Si el producto existe, se sumará el stock automáticamente.</p>
    </div>
    <button onclick="abrirModal()" class="w-full bg-white text-primary py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-purple-50 transition-all active:scale-95">
        <span class="material-symbols-outlined">post_add</span> AGREGAR / NUEVO PRODUCTO
    </button>
  </div>
</section>

</main>

<div id="modalNuevo" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
  <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl relative">
    <h3 class="text-2xl font-black text-primary mb-6 flex items-center gap-2">
        <span class="material-symbols-outlined">inventory_2</span> Entrada de Producto
    </h3>
    <form id="formProducto" class="space-y-4">
      <div>
        <label class="text-[10px] font-black text-gray-400 uppercase">Nombre del Producto</label>
        <input type="text" id="nombreP" required list="lista-productos" placeholder="Buscar o escribir nuevo..." class="w-full border-outline rounded-xl p-3">
        <datalist id="lista-productos"></datalist>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-black text-gray-400 uppercase">Cantidad a Sumar</label>
          <input type="number" id="stockP" required placeholder="0" class="w-full border-outline rounded-xl p-3">
        </div>
        <div>
          <label class="text-[10px] font-black text-gray-400 uppercase">Precio Compra</label>
          <input type="number" step="0.01" id="costoP" required placeholder="0.00" class="w-full border-outline rounded-xl p-3">
        </div>
      </div>
      <div>
        <label class="text-[10px] font-black text-gray-400 uppercase">Precio Venta sugerido</label>
        <input type="number" step="0.01" id="ventaP" required placeholder="0.00" class="w-full border-outline rounded-xl p-3">
      </div>
      <div class="flex gap-3 pt-4">
        <button type="button" onclick="cerrarModal()" class="flex-1 py-4 text-gray-500 font-bold hover:bg-gray-50 rounded-2xl">CANCELAR</button>
        <button type="submit" id="btnGuardar" class="flex-1 py-4 bg-primary text-white rounded-2xl font-bold shadow-lg">PROCESAR</button>
      </div>
    </form>
  </div>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50">
  <button onclick="window.location.href='DashboardLácteo.html'" class="text-gray-400 flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px]">Inicio</span>
  </button>
  <button onclick="window.location.href='RegistrodeVentas.html'" class="text-gray-400 flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">receipt</span>
    <span class="text-[10px]">Ventas</span>
  </button>
  <button onclick="window.location.href='ControldeInventario.html'" class="text-primary flex flex-col items-center gap-1 font-bold">
    <span class="material-symbols-outlined">inventory</span>
    <span class="text-[10px]">Stock</span>
  </button>
  <button onclick="window.location.href='GestióndeDespachos.html'" class="text-success flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">local_shipping</span>
    <span class="text-[10px]">Entregas</span>
  </button>
</nav>

<script>
let inventarioLocal = [];

async function cargarInventario() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('rotate-animation');
  
  try {
    const inventario = await DairyAPI.obtenerDatos("Inventario");
    inventarioLocal = inventario;
    const container = document.getElementById('grid-productos');
    const dataList = document.getElementById('lista-productos');
    container.innerHTML = "";
    dataList.innerHTML = "";
    
    let totalCosto = 0;
    let criticos = 0;

    inventario.forEach(prod => {
      const stock = parseInt(prod.Stock) || 0;
      const esCritico = stock < 15;
      if(esCritico) criticos++;
      totalCosto += (parseFloat(prod.Precio_Distribuidor) || 0) * stock;

      // Llenar datalist para el buscador del modal
      dataList.innerHTML += `<option value="${prod.Producto}">`;

      container.innerHTML += `
        <div class="bg-white p-4 rounded-2xl border ${esCritico ? 'border-red-200' : 'border-outline'} shadow-sm relative">
          <div class="aspect-square ${esCritico ? 'bg-red-50' : 'bg-purple-50'} rounded-xl mb-2 flex items-center justify-center">
              <span class="material-symbols-outlined text-3xl ${esCritico ? 'text-red-300' : 'text-primary/30'}">inventory_2</span>
          </div>
          <h3 class="font-bold text-xs truncate">${prod.Producto}</h3>
          <div class="flex justify-between items-center mt-1">
              <p class="text-primary font-black text-xs">$${parseFloat(prod.Precio_Venta).toFixed(2)}</p>
              <span class="text-[10px] ${esCritico ? 'text-red-600 font-bold' : 'text-gray-500'}">${stock}u</span>
          </div>
        </div>`;
    });

    document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = inventario.length;

  } catch (e) { console.error(e); }
  finally { icon.classList.remove('rotate-animation'); }
}

document.getElementById('formProducto').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnGuardar');
  const nombre = document.getElementById('nombreP').value;
  const cantidad = parseInt(document.getElementById('stockP').value);
  
  btn.innerText = "PROCESANDO...";
  btn.disabled = true;

  // Verificar si el producto ya existe para decidir la acción
  const existe = inventarioLocal.find(p => p.Producto.toLowerCase() === nombre.toLowerCase());
  
  const payload = {
    pestaña: "Inventario",
    accion: existe ? "SUMAR_STOCK" : "NUEVO_PRODUCTO",
    Producto: nombre,
    Cantidad: cantidad,
    Precio_Distribuidor: document.getElementById('costoP').value,
    Precio_Venta: document.getElementById('ventaP').value
  };

  try {
    await DairyAPI.enviarDatos("Inventario", payload);
    cerrarModal();
    cargarInventario();
    document.getElementById('formProducto').reset();
    alert(existe ? "Stock actualizado correctamente" : "Nuevo producto registrado");
  } catch (err) {
    alert("Error de conexión");
  } finally {
    btn.innerText = "PROCESAR";
    btn.disabled = false;
  }
};

function abrirModal() { document.getElementById('modalNuevo').classList.remove('hidden'); }
function cerrarModal() { document.getElementById('modalNuevo').classList.add('hidden'); }

window.onload = cargarInventario;
</script>
</body>
</html>
