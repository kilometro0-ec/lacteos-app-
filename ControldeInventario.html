<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea | Control de Inventario</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#a21caf",
            secondary: "#db2777",
            success: "#16a34a",
            background: "#faf5ff",
            outline: "#e9d5ff",
            error: "#dc2626"
          }
        }
      }
    }
    </script>

    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .active-icon { font-variation-settings: 'FILL' 1 !important; }
    body { font-family: 'Work Sans', sans-serif; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Resalte Crítico (Stock <= 5) */
    @keyframes blink-red {
      0% { border-color: #dc2626; box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.2); }
      50% { border-color: #fca5a5; box-shadow: 0 0 0 8px rgba(220, 38, 38, 0.05); }
      100% { border-color: #dc2626; box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.2); }
    }
    .card-critica { animation: blink-red 2s infinite; border-width: 2px !important; }
    </style>
</head>

<body class="bg-background text-gray-900 pb-40">

<header class="fixed top-0 w-full h-16 bg-white border-b border-outline flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary">
        <span class="material-symbols-outlined text-3xl active-icon">opacity</span>
    </div>
    <h1 class="text-xl font-extrabold text-primary tracking-tight">Inventario</h1>
  </div>
  <button onclick="cargarInventario()" class="p-2 text-primary hover:bg-purple-50 rounded-full transition-colors">
      <span id="refresh-icon" class="material-symbols-outlined">refresh</span>
  </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  
  <section class="grid grid-cols-3 gap-3">
    <div class="bg-white p-4 rounded-[1.5rem] border border-outline shadow-sm flex flex-col items-center text-center">
      <p class="text-[9px] text-gray-400 uppercase font-black mb-1 tracking-widest">Valor Neto</p>
      <h2 id="valor-bodega" class="text-sm font-black text-primary">$0.00</h2>
    </div>
    <div class="bg-red-50 p-4 rounded-[1.5rem] border border-red-100 shadow-sm flex flex-col items-center text-center">
      <p class="text-[9px] text-red-600 uppercase font-black mb-1 tracking-widest">Agotándose</p>
      <h2 id="count-critico" class="text-sm font-black text-red-600">0</h2>
    </div>
    <div class="bg-white p-4 rounded-[1.5rem] border border-outline shadow-sm flex flex-col items-center text-center">
      <p class="text-[9px] text-success uppercase font-black mb-1 tracking-widest">Productos</p>
      <h2 id="total-sku" class="text-sm font-black text-success">0</h2>
    </div>
  </section>

  <div id="grid-productos" class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 italic font-bold">
          Sincronizando con bodega...
      </div>
  </div>

  <div class="fixed bottom-24 left-0 w-full px-4 z-40">
    <button onclick="abrirModalNuevo()" class="w-full bg-primary text-white py-5 rounded-2xl font-black shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-all uppercase tracking-tight">
        <span class="material-symbols-outlined">add_box</span> Registrar Nuevo Producto
    </button>
  </div>
</main>

<div id="modalNuevo" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-md">
  <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl relative border border-outline">
    <h3 id="modal-titulo" class="text-2xl font-black text-primary mb-6 flex items-center gap-2 uppercase text-lg tracking-tight">
        <span class="material-symbols-outlined active-icon">inventory_2</span> Entrada de Producto
    </h3>
    <form id="formProducto" class="space-y-4">
      <div>
        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest">Nombre del Producto</label>
        <input type="text" id="nombreP" required autocomplete="off" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold focus:ring-primary focus:bg-white transition-all">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label id="label-cantidad" class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest">Cantidad</label>
          <input type="number" id="stockP" required placeholder="0" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold focus:bg-white">
        </div>
        <div>
          <label class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest">Costo Unit.</label>
          <input type="number" step="0.01" id="costoP" required placeholder="0.00" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold focus:bg-white">
        </div>
      </div>
      <div>
        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest">Precio de Venta (PVP)</label>
        <input type="number" step="0.01" id="ventaP" required placeholder="0.00" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold focus:bg-white">
      </div>
      <div class="flex flex-col gap-2 pt-6">
        <button type="submit" id="btnGuardar" class="w-full py-5 bg-primary text-white rounded-2xl font-black shadow-lg uppercase tracking-widest">Procesar Entrada</button>
        <button type="button" onclick="cerrarModal()" class="w-full py-4 text-gray-400 font-black uppercase text-xs tracking-widest">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<div id="menu-container"></div>

<script>
let inventarioLocal = [];

// 1. CARGAR MENÚ Y DATOS
async function iniciar() {
    fetch('menu.html').then(r => r.text()).then(data => {
        document.getElementById('menu-container').innerHTML = data;
        marcarBotonActivo();
    });
    cargarInventario();
}

function marcarBotonActivo() {
    const botones = document.querySelectorAll('.nav-item');
    botones.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes('ControldeInventario.html')) {
            btn.classList.add('text-primary');
            btn.classList.remove('text-gray-400');
        }
    });
}

async function cargarInventario() {
  const icon = document.getElementById('refresh-icon');
  if (icon) icon.classList.add('rotate-animation');
  
  try {
    const inventario = await DairyAPI.obtenerDatos("Inventario");
    inventarioLocal = inventario;

    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    
    let totalCosto = 0;
    let criticos = 0;

    inventario.forEach(prod => {
      const stock = parseInt(prod.Stock) || 0;
      const esCritico = stock <= 5;
      if(esCritico) criticos++;
      totalCosto += (parseFloat(prod.Precio_Distribuidor) || 0) * stock;

      container.innerHTML += `
        <div onclick="abrirModalSumar('${prod.Producto}')" class="bg-white p-4 rounded-[2rem] border ${esCritico ? 'card-critica' : 'border-outline'} shadow-sm cursor-pointer active:scale-95 transition-all flex flex-col justify-between h-32">
          <h3 class="font-black text-[11px] leading-tight uppercase text-gray-700 line-clamp-2">${prod.Producto}</h3>
          <div class="flex justify-between items-end">
              <div>
                <p class="text-[9px] text-gray-400 font-black uppercase">Precio</p>
                <p class="text-primary font-black text-sm">$${parseFloat(prod.Precio_Venta || 0).toFixed(2)}</p>
              </div>
              <span class="text-xs px-3 py-1 rounded-xl ${esCritico ? 'bg-red-500 text-white' : 'bg-purple-100 text-primary'} font-black">${stock} u</span>
          </div>
        </div>`;
    });

    document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = inventario.length;

  } catch (e) {
    console.error(e);
  } finally {
    if (icon) icon.classList.remove('rotate-animation');
  }
}

// MODALES
function abrirModalSumar(nombre) {
  const prod = inventarioLocal.find(p => p.Producto === nombre);
  if (!prod) return;
  document.getElementById('modal-titulo').innerText = "Abastecer Stock";
  document.getElementById('label-cantidad').innerText = "Cantidad a SUMAR";
  document.getElementById('nombreP').value = prod.Producto;
  document.getElementById('nombreP').readOnly = true;
  document.getElementById('costoP').value = prod.Precio_Distribuidor;
  document.getElementById('ventaP').value = prod.Precio_Venta;
  document.getElementById('modalNuevo').classList.remove('hidden');
}

function abrirModalNuevo() {
  document.getElementById('modal-titulo').innerText = "Nuevo Producto SKU";
  document.getElementById('label-cantidad').innerText = "Stock Inicial";
  document.getElementById('formProducto').reset();
  document.getElementById('nombreP').readOnly = false;
  document.getElementById('modalNuevo').classList.remove('hidden');
}

// ENVÍO DE DATOS
document.getElementById('formProducto').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnGuardar');
  if (btn.disabled) return;

  btn.innerText = "ACTUALIZANDO...";
  btn.disabled = true;

  try {
    await DairyAPI.enviarDatos("Inventario", {
        pestaña: "Inventario",
        Producto: document.getElementById('nombreP').value.trim(),
        Cantidad: document.getElementById('stockP').value, 
        Precio_Distribuidor: document.getElementById('costoP').value,
        Precio_Venta: document.getElementById('ventaP').value
    });
    
    cerrarModal();
    setTimeout(() => { cargarInventario(); }, 1200);
  } catch (err) {
    alert("Error de red");
  } finally {
    btn.innerText = "PROCESAR ENTRADA";
    btn.disabled = false;
  }
};

function cerrarModal() {
  document.getElementById('modalNuevo').classList.add('hidden');
  document.getElementById('formProducto').reset();
}

window.onload = iniciar;
</script>
</body>
</html>
