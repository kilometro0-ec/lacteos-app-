<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea | Inventario Pro</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #faf5ff; overflow-x: hidden; }
      .rotate-animation { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      
      .card-prod { 
        background: white; border-radius: 2rem; border: 2px solid #e9d5ff; 
        transition: all 0.2s ease; position: relative; overflow: hidden;
      }
      .card-prod.selected { border-color: #a21caf; background-color: #f5d0fe; transform: scale(0.95); }
      .selection-check { position: absolute; top: 10px; right: 10px; display: none; color: #a21caf; font-weight: bold; }
      .selected .selection-check { display: block; }

      .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
      .modal.active { display: flex; }
      
      ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="text-gray-900 pb-44">

<header class="fixed top-0 w-full h-16 bg-white border-b border-[#e9d5ff] flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3">
    <div id="btn-cancelar-seleccion" class="hidden text-red-500 font-bold text-xs uppercase" onclick="cancelarSeleccion()">Cancelar</div>
    <h1 id="header-title" class="text-xl font-black text-[#a21caf] tracking-tight uppercase italic">Inventario</h1>
  </div>
  <div class="flex items-center gap-2">
      <button id="btn-eliminar-multi" class="hidden text-red-600 p-2" onclick="eliminarSeleccionados()">
          <span class="material-symbols-outlined">delete_sweep</span>
      </button>
      <button onclick="window.location.reload()" class="p-2 text-[#a21caf] active:scale-90 transition-transform">
          <span id="refresh-icon" class="material-symbols-outlined text-3xl">refresh</span>
      </button>
  </div>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  <section class="grid grid-cols-3 gap-3">
    <div class="bg-white p-5 rounded-[2rem] border-2 border-purple-100 text-center shadow-sm">
        <p class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-1">Bodega</p>
        <p id="valor-bodega" class="text-lg font-black text-primary leading-none">$0.00</p>
    </div>
    <div class="bg-white p-5 rounded-[2rem] border-2 border-red-100 text-center shadow-sm">
        <p class="text-[10px] font-black uppercase text-red-400 tracking-widest mb-1">Críticos</p>
        <p id="count-critico" class="text-lg font-black text-red-500 leading-none">0</p>
    </div>
    <div class="bg-white p-5 rounded-[2rem] border-2 border-green-100 text-center shadow-sm">
        <p class="text-[10px] font-black uppercase text-green-400 tracking-widest mb-1">Total</p>
        <p id="total-sku" class="text-lg font-black text-green-600 leading-none">0</p>
    </div>
  </section>

  <div class="px-1">
    <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar producto..." class="w-full bg-white border-2 border-purple-100 rounded-3xl p-4 font-bold outline-none shadow-sm focus:border-primary transition-all">
  </div>

  <div id="grid-productos" class="grid grid-cols-2 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold">Sincronizando inventario...</div>
  </div>

  <div class="fixed bottom-24 left-0 w-full px-4 z-40">
    <button onclick="abrirModal('modal-nuevo')" class="w-full bg-[#a21caf] text-white py-5 rounded-[2rem] font-black shadow-2xl uppercase active:scale-95 transition-all flex items-center justify-center gap-3 border-b-4 border-purple-900">
        <span class="material-symbols-outlined text-2xl">add_circle</span> 
        <span class="text-base">Nuevo Producto</span>
    </button>
  </div>
</main>

<div id="modal-nuevo" class="modal">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 space-y-5 shadow-2xl border-4 border-purple-50">
        <h2 class="font-black text-primary uppercase text-center text-xl tracking-tighter">Registrar Producto</h2>
        <input type="text" id="n-nombre" placeholder="Nombre del Producto" class="w-full border-2 border-purple-100 rounded-2xl p-4 font-bold uppercase focus:ring-0 focus:border-primary">
        <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
                <span class="text-[9px] font-black text-gray-400 uppercase ml-2">Costo Dist.</span>
                <input type="number" id="n-costo" class="w-full border-2 border-purple-100 rounded-2xl p-4 font-bold focus:border-primary">
            </div>
            <div class="space-y-1">
                <span class="text-[9px] font-black text-gray-400 uppercase ml-2">PVP Venta</span>
                <input type="number" id="n-pvp" class="w-full border-2 border-purple-100 rounded-2xl p-4 font-bold focus:border-primary">
            </div>
        </div>
        <div class="space-y-1">
            <span class="text-[9px] font-black text-gray-400 uppercase ml-2">Stock Inicial</span>
            <input type="number" id="n-stock" class="w-full border-2 border-purple-100 rounded-2xl p-4 font-bold focus:border-primary">
        </div>
        <div class="flex gap-3 pt-2">
            <button onclick="guardarNuevo()" class="flex-1 bg-primary text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Guardar</button>
            <button onclick="cerrarModal('modal-nuevo')" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-black uppercase active:scale-95 transition-all">Cerrar</button>
        </div>
    </div>
</div>

<div id="modal-stock" class="modal">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 space-y-6 shadow-2xl text-center border-4 border-purple-50">
        <div>
            <h2 id="edit-nombre" class="font-black text-slate-800 uppercase text-lg leading-tight">PRODUCTO</h2>
            <p class="text-[10px] font-black text-red-400 uppercase mt-2 bg-red-50 inline-block px-3 py-1 rounded-full">Precio bloqueado por seguridad</p>
        </div>
        <div class="flex items-center justify-center gap-6 py-4">
            <button onclick="ajustarStockNum(-1)" class="w-16 h-16 bg-purple-100 rounded-3xl text-primary font-black text-3xl shadow-sm active:bg-primary active:text-white transition-all">-</button>
            <input type="number" id="edit-cantidad" value="0" class="w-24 text-center border-none text-5xl font-black text-primary focus:ring-0">
            <button onclick="ajustarStockNum(1)" class="w-16 h-16 bg-purple-100 rounded-3xl text-primary font-black text-3xl shadow-sm active:bg-primary active:text-white transition-all">+</button>
        </div>
        <div class="flex gap-3">
            <button id="btn-confirmar-stock" class="flex-1 bg-primary text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Actualizar</button>
            <button onclick="cerrarModal('modal-stock')" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-black uppercase">Cancelar</button>
        </div>
    </div>
</div>

<div id="menu-container"></div>

<script>
let inventarioLocal = [];
let seleccionados = new Set();
let modoSeleccion = false;
let pressTimer;

const aNum = (v) => v ? parseFloat(v.toString().replace(',', '.')) : 0;

async function cargarInventario() {
    const icon = document.getElementById('refresh-icon');
    icon?.classList.add('rotate-animation');
    try {
        const res = await DairyAPI.obtenerDatos("Inventario");
        if (Array.isArray(res)) {
            // ORDENAR POR MÁS VENDIDO (Asumiendo columna "Ventas" o similar, si no existe usa Stock descendente)
            inventarioLocal = res.sort((a, b) => (aNum(b.Ventas || 0)) - (aNum(a.Ventas || 0)));
            renderizar(inventarioLocal);
        }
    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('rotate-animation'); }
}

function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let totalCosto = 0, criticos = 0;

    lista.forEach((p) => {
        const stock = aNum(p.Stock);
        const pvp = aNum(p.Precio_Venta);
        const costo = aNum(p.Costo_Unitario || p.Precio_Distribuidor);
        if(stock <= 5) criticos++;
        totalCosto += (costo * stock);

        const card = document.createElement('div');
        card.className = `card-prod p-5 h-52 shadow-sm ${stock <= 5 ? 'border-red-300 bg-red-50' : 'bg-white'}`;
        card.dataset.id = p.ID;
        card.innerHTML = `
            <span class="selection-check material-symbols-outlined text-2xl">check_circle</span>
            <div class="mb-2">
                <p class="text-[9px] font-black text-primary/50 uppercase tracking-tighter">ID: ${p.ID}</p>
                <h3 class="font-bold text-sm uppercase text-slate-800 leading-tight line-clamp-2">${p.Producto}</h3>
            </div>
            <div class="flex justify-between items-end border-t-2 border-purple-50 pt-4 mt-auto">
                <div>
                    <p class="text-[9px] text-gray-400 font-black uppercase mb-1">Precio Venta</p>
                    <p class="text-green-600 font-black text-2xl tracking-tighter">$${pvp.toFixed(2)}</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-400 font-black uppercase mb-1">Stock</p>
                    <span class="inline-block text-xs px-3 py-1.5 rounded-xl ${stock <= 5 ? 'bg-red-600 text-white' : 'bg-purple-100 text-primary'} font-black italic">
                        ${stock}
                    </span>
                </div>
            </div>`;

        // LÓGICA DE PRESIONAR PARA SELECCIONAR
        card.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => {
                window.navigator.vibrate?.(50); // Vibración táctil
                activarModoSeleccion(p.ID);
            }, 600);
        });
        card.addEventListener('touchend', () => clearTimeout(pressTimer));
        
        card.addEventListener('click', () => {
            if(modoSeleccion) toggleSeleccion(p.ID);
            else abrirEditorStock(p);
        });

        container.appendChild(card);
    });

    document.getElementById('valor-bodega').innerText = `$${totalCosto.toLocaleString()}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

function activarModoSeleccion(id) {
    modoSeleccion = true;
    document.getElementById('btn-cancelar-seleccion').classList.remove('hidden');
    document.getElementById('btn-eliminar-multi').classList.remove('hidden');
    document.getElementById('header-title').innerText = "Seleccionar";
    toggleSeleccion(id);
}

function toggleSeleccion(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if(seleccionados.has(id)) {
        seleccionados.delete(id);
        el.classList.remove('selected');
    } else {
        seleccionados.add(id);
        el.classList.add('selected');
    }
    if(seleccionados.size === 0) cancelarSeleccion();
    else document.getElementById('header-title').innerText = `${seleccionados.size} Seleccionados`;
}

function cancelarSeleccion() {
    modoSeleccion = false;
    seleccionados.clear();
    document.querySelectorAll('.card-prod').forEach(c => c.classList.remove('selected'));
    document.getElementById('btn-cancelar-seleccion').classList.add('hidden');
    document.getElementById('btn-eliminar-multi').classList.add('hidden');
    document.getElementById('header-title').innerText = "Inventario";
}

async function eliminarSeleccionados() {
    if(!confirm(`¿Eliminar definitivamente ${seleccionados.size} productos?`)) return;
    for(let id of seleccionados) {
        await DairyAPI.enviarDatos("Inventario", { ID: id, ELIMINAR: true, pestaña: "Inventario" });
    }
    cancelarSeleccion();
    cargarInventario();
}

function abrirEditorStock(p) {
    document.getElementById('edit-nombre').innerText = p.Producto;
    document.getElementById('edit-cantidad').value = 0;
    abrirModal('modal-stock');
    document.getElementById('btn-confirmar-stock').onclick = async () => {
        const suma = parseFloat(document.getElementById('edit-cantidad').value);
        const nuevoStock = aNum(p.Stock) + suma;
        cerrarModal('modal-stock');
        await DairyAPI.enviarDatos("Inventario", { ID: p.ID, Stock: nuevoStock, pestaña: "Inventario" });
        cargarInventario();
    };
}

async function guardarNuevo() {
    const data = {
        ID: "ID-" + Math.floor(1000 + Math.random() * 9000),
        Producto: document.getElementById('n-nombre').value.toUpperCase(),
        Precio_Distribuidor: aNum(document.getElementById('n-costo').value),
        Precio_Venta: aNum(document.getElementById('n-pvp').value),
        Stock: aNum(document.getElementById('n-stock').value),
        Estado: "ACTIVO",
        Fecha: new Date().toLocaleDateString(),
        pestaña: "Inventario"
    };
    if(!data.Producto) return alert("El nombre es obligatorio");
    cerrarModal('modal-nuevo');
    await DairyAPI.enviarDatos("Inventario", data);
    cargarInventario();
}

function abrirModal(id) { document.getElementById(id).classList.add('active'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }
function ajustarStockNum(v) { document.getElementById('edit-cantidad').value = parseInt(document.getElementById('edit-cantidad').value) + v; }

function filtrar() {
    const b = document.getElementById('filtroProd').value.toLowerCase();
    renderizar(inventarioLocal.filter(p => p.Producto.toLowerCase().includes(b) || p.ID.toLowerCase().includes(b)));
}

window.onload = cargarInventario;
</script>
</body>
</html>
