<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea | Inventario Pro</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #faf5ff; }
      
      /* Animaciones */
      .rotate-animation { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      
      /* Card de producto */
      .card-prod { 
        background: white; 
        border-radius: 2.5rem; 
        border: 2px solid #e9d5ff; 
        transition: all 0.2s ease; 
      }
      .card-prod:active { transform: scale(0.96); }

      /* Ocultar barra de scroll */
      ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="text-gray-900 pb-44">

<header class="fixed top-0 w-full h-16 bg-white border-b border-[#e9d5ff] flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLacteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-[#a21caf] font-black shadow-inner">LL</div>
    <h1 class="text-xl font-black text-[#a21caf] tracking-tight uppercase">Inventario</h1>
  </div>
  <button onclick="cargarInventario()" class="p-2 text-[#a21caf] hover:bg-purple-50 rounded-full transition-colors">
      <span id="refresh-icon" class="material-symbols-outlined scale-110">refresh</span>
  </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  
  <section class="grid grid-cols-3 gap-3">
    <div class="bg-white p-4 rounded-[2rem] border-2 border-[#e9d5ff] text-center shadow-sm">
      <p class="text-[9px] text-gray-500 uppercase font-black mb-1 tracking-widest">Valor Neto</p>
      <h2 id="valor-bodega" class="text-base font-black text-[#a21caf]">$0.00</h2>
    </div>
    <div class="bg-red-50 p-4 rounded-[2rem] border-2 border-red-200 text-center shadow-sm">
      <p class="text-[9px] text-red-600 uppercase font-black mb-1 tracking-widest">Críticos</p>
      <h2 id="count-critico" class="text-base font-black text-red-600">0</h2>
    </div>
    <div class="bg-white p-4 rounded-[2rem] border-2 border-[#e9d5ff] text-center shadow-sm">
      <p class="text-[9px] text-green-600 uppercase font-black mb-1 tracking-widest">En Stock</p>
      <h2 id="total-sku" class="text-base font-black text-green-600">0</h2>
    </div>
  </section>

  <div class="px-1">
    <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar producto..." 
           class="w-full bg-white border-2 border-[#e9d5ff] rounded-2xl p-4 font-bold text-base shadow-sm focus:ring-2 focus:ring-[#a21caf] focus:border-[#a21caf] outline-none transition-all">
  </div>

  <div id="grid-productos" class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">Sincronizando con Google Sheets...</div>
  </div>

  <div class="fixed bottom-24 left-0 w-full px-4 z-40">
    <button onclick="abrirModalNuevo()" class="w-full bg-[#a21caf] text-white py-5 rounded-2xl font-black shadow-2xl flex items-center justify-center gap-3 uppercase active:scale-95 transition-all">
        <span class="material-symbols-outlined scale-125">add_circle</span> 
        <span>Nuevo Producto</span>
    </button>
  </div>

</main>

<div id="menu-container"></div>

<script>
let inventarioLocal = [];
const aNum = (v) => v ? parseFloat(v.toString().replace(',', '.')) : 0;

// 1. OBTENER DATOS DE LA API
async function cargarInventario() {
  const icon = document.getElementById('refresh-icon');
  if (icon) icon.classList.add('rotate-animation');
  
  try {
    const respuesta = await DairyAPI.obtenerDatos("Inventario");
    
    if (Array.isArray(respuesta)) {
        inventarioLocal = respuesta;
        renderizar(inventarioLocal);
    } else {
        console.error("Respuesta no válida:", respuesta);
        document.getElementById('grid-productos').innerHTML = `
            <div class="col-span-full text-center py-10 bg-orange-50 border-2 border-orange-200 rounded-[2rem] p-6 mx-2">
                <p class="text-orange-600 font-black uppercase text-xs">Pestaña no encontrada</p>
                <p class="text-[10px] text-orange-400 mt-1">Verifica que en Google Sheets la hoja se llame exactamente "Inventario".</p>
            </div>`;
    }
  } catch (e) { 
      document.getElementById('grid-productos').innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold">Error de Conexión</div>';
  } finally {
      if (icon) icon.classList.remove('rotate-animation');
  }
}

// 2. DIBUJAR LOS PRODUCTOS EN PANTALLA
function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    
    let totalCosto = 0, criticos = 0;

    lista.forEach((prod, index) => {
        const stock = aNum(prod.Stock);
        const pvp = aNum(prod.Precio_Venta);
        const costo = aNum(prod.Precio_Distribuidor || prod.Costo_Unitario);
        
        if(stock <= 5) criticos++;
        totalCosto += (costo * stock);

        container.innerHTML += `
        <div class="card-prod p-5 flex flex-col justify-between h-56 shadow-sm ${stock <= 5 ? 'border-red-300 bg-red-50' : 'border-[#e9d5ff] bg-white'}">
          <div>
            <p class="text-[10px] font-black text-[#a21caf] mb-1 uppercase opacity-50">${prod.ID || 'S/N'}</p> 
            <h3 class="font-black text-[15px] leading-tight uppercase text-slate-800 line-clamp-2">${prod.Producto}</h3>
          </div>
          
          <div class="flex justify-between items-end border-t border-dashed border-purple-100 pt-3">
              <div>
                  <p class="text-[9px] text-gray-400 font-black uppercase mb-0.5">Venta</p>
                  <p class="text-[#a21caf] font-black text-xl leading-none">$${pvp.toFixed(2)}</p>
              </div>
              <div class="text-right">
                  <p class="text-[9px] text-gray-400 font-black uppercase mb-0.5">Stock</p>
                  <span class="inline-block text-xs px-3 py-1.5 rounded-2xl ${stock <= 5 ? 'bg-red-600 text-white' : 'bg-purple-100 text-[#a21caf]'} font-black italic">
                    ${stock}
                  </span>
              </div>
          </div>
        </div>`;
    });
    
    document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

// 3. FILTRAR BUSQUEDA
function filtrar() {
    const b = document.getElementById('filtroProd').value.toLowerCase();
    const filtrados = inventarioLocal.filter(p => 
        p.Producto.toLowerCase().includes(b) || 
        (p.ID && String(p.ID).toLowerCase().includes(b))
    );
    renderizar(filtrados);
}

// 4. INICIALIZACIÓN
window.onload = () => {
    // Ya no llamamos a cargarMenu(), menu-logic.js lo hace solo al detectar el DOM cargado
    cargarInventario();
};
</script>

</body>
</html>
