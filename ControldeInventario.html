<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea | Inventario Pro</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #faf5ff; }
      
      .rotate-animation { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      
      .card-prod { 
        background: white; 
        border-radius: 2rem; 
        border: 2px solid #e9d5ff; 
        transition: all 0.2s ease; 
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 190px;
        cursor: pointer;
      }
      .card-prod:active { transform: scale(0.95); opacity: 0.8; }

      ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="text-gray-900 pb-44">

<header class="fixed top-0 w-full h-16 bg-white border-b border-[#e9d5ff] flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLacteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-[#a21caf] font-black shadow-inner">LL</div>
    <h1 class="text-xl font-black text-[#a21caf] tracking-tight uppercase italic">Inventario</h1>
  </div>
  <button onclick="cargarInventario()" class="p-2 text-[#a21caf] hover:bg-purple-50 rounded-full transition-colors">
      <span id="refresh-icon" class="material-symbols-outlined scale-110">refresh</span>
  </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  
  <!-- RESUMEN TÉCNICO -->
  <section class="grid grid-cols-3 gap-3">
    <div class="bg-white p-4 rounded-[2rem] border-2 border-[#e9d5ff] text-center shadow-sm">
      <p class="text-[9px] text-gray-500 uppercase font-black mb-1 tracking-widest leading-none">Valor Neto</p>
      <h2 id="valor-bodega" class="text-sm font-black text-[#a21caf]">$0.00</h2>
    </div>
    <div class="bg-red-50 p-4 rounded-[2rem] border-2 border-red-200 text-center shadow-sm">
      <p class="text-[9px] text-red-600 uppercase font-black mb-1 tracking-widest leading-none">Críticos</p>
      <h2 id="count-critico" class="text-sm font-black text-red-600">0</h2>
    </div>
    <div class="bg-white p-4 rounded-[2rem] border-2 border-[#e9d5ff] text-center shadow-sm">
      <p class="text-[9px] text-green-600 uppercase font-black mb-1 tracking-widest leading-none">Skus</p>
      <h2 id="total-sku" class="text-sm font-black text-green-600">0</h2>
    </div>
  </section>

  <!-- BUSCADOR -->
  <div class="px-1">
    <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar por nombre o ID..." 
           class="w-full bg-white border-2 border-[#e9d5ff] rounded-2xl p-4 font-bold text-base shadow-sm focus:ring-2 focus:ring-[#a21caf] focus:border-[#a21caf] outline-none transition-all">
  </div>

  <!-- GRILLA DE PRODUCTOS -->
  <div id="grid-productos" class="grid grid-cols-2 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">Sincronizando datos...</div>
  </div>

  <!-- BOTÓN AGREGAR -->
  <div class="fixed bottom-24 left-0 w-full px-4 z-40">
    <button onclick="abrirModalNuevo()" class="w-full bg-[#a21caf] text-white py-5 rounded-3xl font-black shadow-2xl flex items-center justify-center gap-3 uppercase active:scale-95 transition-all border-b-4 border-purple-900">
        <span class="material-symbols-outlined scale-125">add_box</span> 
        <span>Nuevo Producto</span>
    </button>
  </div>

</main>

<div id="menu-container"></div>

<script>
let inventarioLocal = [];

// Utilidad para convertir texto de Sheets a número usable
const aNum = (v) => {
    if (!v) return 0;
    let n = v.toString().replace(/[^\d,.-]/g, '').replace(',', '.');
    return parseFloat(n) || 0;
};

// 1. CARGAR DATOS
async function cargarInventario() {
  const icon = document.getElementById('refresh-icon');
  if (icon) icon.classList.add('rotate-animation');
  
  try {
    const respuesta = await DairyAPI.obtenerDatos("Inventario");
    if (Array.isArray(respuesta)) {
        inventarioLocal = respuesta;
        renderizar(inventarioLocal);
    }
  } catch (e) { 
      document.getElementById('grid-productos').innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold">Error de Red</div>';
  } finally {
      if (icon) icon.classList.remove('rotate-animation');
  }
}

// 2. RENDERIZAR CON EVENTO DE CLIC
function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let totalCosto = 0, criticos = 0;

    lista.forEach((prod) => {
        const stock = aNum(prod.Stock);
        const pvp = aNum(prod.Precio_Venta);
        const costo = aNum(prod.Costo_Unitario || prod.Precio_Distribuidor || 0);
        
        if(stock <= 5) criticos++;
        totalCosto += (costo * stock);

        container.innerHTML += `
        <div class="card-prod p-4 ${stock <= 5 ? 'border-red-300 bg-red-50' : 'border-[#e9d5ff] bg-white shadow-sm'}" 
             onclick="gestionarProducto('${prod.ID}', '${prod.Producto}', ${stock})">
          <div>
            <p class="text-[9px] font-black text-[#a21caf] mb-1 uppercase opacity-40">ID: ${prod.ID || 'S/N'}</p> 
            <h3 class="font-bold text-[13px] leading-tight uppercase text-slate-800 line-clamp-2">${prod.Producto}</h3>
          </div>
          
          <div class="flex justify-between items-end border-t border-purple-100 pt-3">
              <div>
                  <p class="text-[8px] text-gray-400 font-black uppercase mb-0.5">Precio</p>
                  <p class="text-slate-400 font-black text-lg leading-none italic">$${pvp.toFixed(2)}</p>
              </div>
              <div class="text-right">
                  <p class="text-[8px] text-gray-400 font-black uppercase mb-0.5">Stock</p>
                  <span class="inline-block text-[12px] px-3 py-1 rounded-full ${stock <= 5 ? 'bg-red-600 text-white' : 'bg-purple-100 text-[#a21caf]'} font-black">
                    ${stock}
                  </span>
              </div>
          </div>
        </div>`;
    });
    
    document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

// 3. LOGICA EDITAR/ELIMINAR AL CLIC
async function gestionarProducto(id, nombre, stockActual) {
    const op = confirm(`PRODUCTO: ${nombre}\n\n¿Desea EDITAR EL STOCK?\n(Cancelar para ELIMINAR el producto)`);
    
    if (op) {
        const suma = prompt(`Stock actual: ${stockActual}\n¿Cuánto desea sumar al inventario?`, "0");
        if (suma !== null && !isNaN(suma)) {
            const nuevoStock = stockActual + parseFloat(suma);
            await ejecutarAccion(id, { Stock: nuevoStock }, "Actualizando Stock...");
        }
    } else {
        if (confirm(`¿ELIMINAR definitivamente ${nombre}?\nEsta acción no se puede deshacer.`)) {
            await ejecutarAccion(id, { ELIMINAR: true }, "Eliminando producto...");
        }
    }
}

// 4. LOGICA NUEVO PRODUCTO
async function abrirModalNuevo() {
    const nombre = prompt("Nombre del nuevo producto:");
    if (!nombre) return;
    const precio = prompt("Precio de Venta (PVP):", "0.00");
    const costo = prompt("Costo Unitario (Distribuidor):", "0.00");
    const stock = prompt("Stock inicial:", "0");

    const data = {
        ID: "ID-" + Math.floor(Math.random()*9999),
        Producto: nombre.toUpperCase(),
        Precio_Venta: aNum(precio),
        Costo_Unitario: aNum(costo),
        Stock: aNum(stock),
        pestaña: "Inventario"
    };

    await ejecutarAccion(data.ID, data, "Guardando nuevo producto...");
}

// 5. ENVÍO A API
async function ejecutarAccion(id, payload, msg) {
    try {
        console.log(msg, payload);
        // Asegúrate de que tu Apps Script reciba "ID" y "pestaña"
        await DairyAPI.enviarDatos("Inventario", { ID: id, ...payload, pestaña: "Inventario" });
        alert("¡Operación completada!");
        cargarInventario();
    } catch (e) {
        alert("Error al sincronizar con Google Sheets");
    }
}

function filtrar() {
    const busqueda = document.getElementById('filtroProd').value.toLowerCase();
    const filtrados = inventarioLocal.filter(p => 
        (p.Producto && p.Producto.toLowerCase().includes(busqueda)) || 
        (p.ID && String(p.ID).toLowerCase().includes(busqueda))
    );
    renderizar(filtrados);
}

window.onload = cargarInventario;
</script>

</body>
</html>
