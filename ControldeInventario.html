<script>
let inventarioLocal = [];
let seleccionados = new Set();

// 🔧 Conversión segura (coma → punto)
const aNum = (v) => parseFloat((v || "0").toString().replace(',', '.')) || 0;

// 🔧 Cargar inventario robusto
async function cargarInventario() {
  const icon = document.getElementById('refresh-icon');
  icon?.classList.add('rotate-animation');

  const container = document.getElementById('grid-productos');
  container.innerHTML = `
    <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">
      Cargando datos...
    </div>`;

  try {
    const data = await DairyAPI.obtenerDatos("Inventario");

    console.log("DATA INVENTARIO:", data);

    // 🚨 VALIDACIÓN CLAVE
    if (!Array.isArray(data)) {
      throw new Error("Respuesta inválida del API");
    }

    inventarioLocal = data;

    if (inventarioLocal.length === 0) {
      container.innerHTML = `
        <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">
          Sin productos registrados
        </div>`;
      return;
    }

    renderizar(inventarioLocal);
    seleccionados.clear();
    actualizarBarra();

  } catch (e) {
    console.error("ERROR INVENTARIO:", e);

    container.innerHTML = `
      <div class="col-span-full text-center py-20 text-red-500 font-black space-y-2">
        <p>Error cargando inventario</p>
        <p class="text-xs text-gray-400">Revisa conexión o API</p>
      </div>`;
  }

  icon?.classList.remove('rotate-animation');
}

// 🔧 Render robusto
function renderizar(lista) {
  const container = document.getElementById('grid-productos');
  container.innerHTML = "";

  let totalCosto = 0;
  let criticos = 0;

  lista.forEach((prod, index) => {
    const stock = aNum(prod.Stock);
    const pvp = aNum(prod.Precio_Venta);
    const costo = aNum(prod.Precio_Distribuidor);

    if (stock <= 5) criticos++;
    totalCosto += (costo * stock);

    const cardId = `card-${index}`;

    container.innerHTML += `
    <div id="${cardId}" class="relative bg-white p-5 rounded-[2.5rem] border-2 ${stock <= 5 ? 'border-red-400 bg-red-50' : 'border-[#e9d5ff]'} shadow-sm flex flex-col justify-between h-56 overflow-hidden">
      
      <div class="absolute top-4 right-4">
        <input type="checkbox" onchange="toggleSel('${cardId}', '${prod.Producto}', this)" class="w-6 h-6">
      </div>

      <div onclick="abrirModalSumar('${prod.Producto}')" class="h-full flex flex-col justify-between cursor-pointer">

        <div>
          <p class="text-xs font-black text-purple-500">${prod.ID || 'S/N'}</p>
          <h3 class="font-black text-sm uppercase">${prod.Producto}</h3>
        </div>

        <div class="flex justify-between items-end pt-3 border-t">
          <div>
            <p class="text-xs text-gray-400">Venta</p>
            <p class="text-lg font-black text-purple-600">$${pvp.toFixed(2)}</p>
          </div>

          <div class="text-right">
            <p class="text-xs text-gray-400">Stock</p>
            <span class="px-3 py-1 rounded-xl font-black ${stock <= 5 ? 'bg-red-500 text-white' : 'bg-purple-100 text-purple-600'}">
              ${stock}
            </span>
          </div>
        </div>

      </div>
    </div>`;
  });

  document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
  document.getElementById('count-critico').innerText = criticos;
  document.getElementById('total-sku').innerText = lista.length;
}

// 🔧 Selección
function toggleSel(id, nombre, el) {
  if (el.checked) {
    seleccionados.add({ cardId: id, nombreProd: nombre });
  } else {
    seleccionados.forEach(it => {
      if (it.cardId === id) seleccionados.delete(it);
    });
  }
  actualizarBarra();
}

// 🔧 Barra inferior
function actualizarBarra() {
  const bar = document.getElementById('delete-bar');
  document.getElementById('selected-count').innerText = seleccionados.size;

  if (seleccionados.size > 0) {
    bar.classList.remove('translate-y-32', 'opacity-0');
  } else {
    bar.classList.add('translate-y-32', 'opacity-0');
  }
}

// 🔧 Eliminar
async function confirmarBorrado() {
  if (!confirm("¿Eliminar productos?")) return;

  try {
    for (const it of seleccionados) {
      await DairyAPI.enviarDatos("Inventario", {
        pestaña: "Inventario",
        accion: "eliminar",
        Producto: it.nombreProd
      });
    }

    cargarInventario();

  } catch (e) {
    alert("Error eliminando");
  }
}

// 🔧 Filtro
function filtrar() {
  const b = document.getElementById('filtroProd').value.toLowerCase();
  renderizar(inventarioLocal.filter(p =>
    (p.Producto || "").toLowerCase().includes(b)
  ));
}

// 🔧 INIT
window.onload = () => {
  cargarInventario();
};
</script>
