<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea | Inventario Pro</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <!-- LIBRERÍAS PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
      body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #faf5ff; overflow-x: hidden; }
      .card-prod { 
        background: white; border-radius: 2rem; border: 2px solid #e9d5ff; 
        transition: all 0.2s ease; position: relative; overflow: hidden; cursor: pointer;
      }
      .card-prod.selected { border-color: #a21caf; background-color: #f5d0fe; transform: scale(0.95); z-index: 10; }
      .selection-check { position: absolute; top: 12px; right: 12px; display: none; color: #a21caf; font-size: 24px; font-weight: bold; }
      .selected .selection-check { display: block; }
      .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
      .modal.active { display: flex; }
      ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="text-gray-900 pb-44">

<header class="fixed top-0 w-full h-16 bg-white border-b border-[#e9d5ff] flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3">
    <div id="btn-cancelar-seleccion" class="hidden bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold text-[10px] uppercase cursor-pointer" onclick="cancelarSeleccion()">Cancelar</div>
    <h1 id="header-title" class="text-xl font-black text-[#a21caf] tracking-tight uppercase italic">Inventario</h1>
  </div>
  <div class="flex items-center gap-2">
      <button onclick="descargarPDF()" class="p-2 text-[#a21caf] active:scale-90 transition-transform">
          <span class="material-symbols-outlined text-3xl">picture_as_pdf</span>
      </button>
      <button onclick="window.location.reload()" class="p-2 text-[#a21caf] active:rotate-180 transition-transform duration-500">
          <span id="refresh-icon" class="material-symbols-outlined text-3xl">refresh</span>
      </button>
  </div>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  <!-- Dashboard de KPIs -->
  <section class="grid grid-cols-3 gap-3">
    <div class="bg-white p-5 rounded-[2rem] border-2 border-purple-100 text-center shadow-sm">
        <p class="text-[10px] font-black uppercase text-gray-400 mb-1">Bodega</p>
        <p id="valor-bodega" class="text-lg font-black text-[#a21caf] leading-none">$0.00</p>
    </div>
    <div class="bg-white p-5 rounded-[2rem] border-2 border-red-100 text-center shadow-sm">
        <p class="text-[10px] font-black uppercase text-red-400 mb-1">Críticos</p>
        <p id="count-critico" class="text-lg font-black text-red-500 leading-none">0</p>
    </div>
    <div class="bg-white p-5 rounded-[2rem] border-2 border-green-100 text-center shadow-sm">
        <p class="text-[10px] font-black uppercase text-green-400 mb-1">Total</p>
        <p id="total-sku" class="text-lg font-black text-green-600 leading-none">0</p>
    </div>
  </section>

  <div class="px-1">
    <input type="text" id="filtroProd" oninput="filtrar()" placeholder="🔍 Buscar producto..." class="w-full bg-white border-2 border-purple-100 rounded-3xl p-4 font-bold outline-none shadow-sm focus:border-[#a21caf] transition-all">
  </div>

  <div id="grid-productos" class="grid grid-cols-2 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 font-bold italic">Sincronizando con Sheets...</div>
  </div>
</main>

<!-- MODAL DE STOCK -->
<div id="modal-stock" class="modal">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 space-y-6 shadow-2xl text-center border-4 border-purple-50">
        <h2 id="edit-nombre" class="font-black text-slate-800 uppercase text-lg">PRODUCTO</h2>
        <div class="flex items-center justify-center gap-6 py-4">
            <button onclick="ajustarStockNum(-1)" class="w-16 h-16 bg-purple-100 rounded-2xl text-[#a21caf] font-black text-3xl">-</button>
            <input type="number" id="edit-cantidad" value="0" class="w-24 text-center border-none text-5xl font-black text-[#a21caf] focus:ring-0">
            <button onclick="ajustarStockNum(1)" class="w-16 h-16 bg-purple-100 rounded-2xl text-[#a21caf] font-black text-3xl">+</button>
        </div>
        <div class="flex flex-col gap-3">
            <button id="btn-confirmar-stock" class="w-full bg-[#a21caf] text-white py-4 rounded-2xl font-black uppercase shadow-lg">ACTUALIZAR</button>
            <button onclick="cerrarModal('modal-stock')" class="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-black uppercase">CANCELAR</button>
        </div>
    </div>
</div>

<script>
let inventarioLocal = [];
const aNum = (v) => {
    if (!v) return 0;
    return parseFloat(v.toString().replace(/[^0-9.-]+/g, "")) || 0;
};

async function cargarInventario() {
    try {
        const res = await DairyAPI.obtenerDatos("Inventario");
        if (Array.isArray(res)) {
            // ORDENAR: El que tiene más ventas va primero (Descendente)
            inventarioLocal = res.sort((a, b) => aNum(b.Ventas) - aNum(a.Ventas));
            renderizar(inventarioLocal);
        }
    } catch (e) { console.error(e); }
}

async function descargarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Asegurar que el PDF también esté ordenado por ventas antes de generar
    const datosOrdenados = [...inventarioLocal].sort((a, b) => aNum(b.Ventas) - aNum(a.Ventas));

    doc.setFontSize(16);
    doc.setTextColor(162, 28, 175); // Magenta
    doc.text("LÓGICA LÁCTEA - RANKING DE VENTAS", 14, 20);
    
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text(`Reporte de stock ordenado por mayor demanda - ${new Date().toLocaleDateString()}`, 14, 27);

    const filas = datosOrdenados.map(p => [
        p.ID,
        p.Producto,
        aNum(p.Ventas), // Columna de ventas
        `$${aNum(p.Precio_Venta).toFixed(2)}`,
        aNum(p.Stock)
    ]);

    doc.autoTable({
        head: [['ID', 'PRODUCTO', 'VENTAS', 'PVP', 'STOCK']],
        body: filas,
        startY: 35,
        theme: 'grid',
        headStyles: { fillColor: [162, 28, 175], halign: 'center' },
        columnStyles: {
            2: { halign: 'center', fontStyle: 'bold' }, // Resaltar columna ventas
            3: { halign: 'right' },
            4: { halign: 'center' }
        }
    });

    doc.save(`Ranking_Ventas_LogicaLactea.pdf`);
}

function renderizar(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let totalCosto = 0, criticos = 0;

    lista.forEach((p) => {
        const stock = aNum(p.Stock);
        const ventas = aNum(p.Ventas);
        const pvp = aNum(p.Precio_Venta);
        const costo = aNum(p.Costo_Unitario || p.Precio_Distribuidor);
        
        if(stock <= 5) criticos++;
        totalCosto += (costo * stock);

        const card = document.createElement('div');
        card.className = `card-prod p-5 h-52 shadow-sm ${stock <= 5 ? 'border-red-300 bg-red-50' : 'bg-white'}`;
        card.innerHTML = `
            <div class="mb-2">
                <div class="flex justify-between">
                    <p class="text-[9px] font-black text-purple-300 uppercase">ID: ${p.ID}</p>
                    <p class="text-[9px] font-black text-orange-500 uppercase">🔥 ${ventas} vendidos</p>
                </div>
                <h3 class="font-bold text-sm uppercase text-slate-800 leading-tight line-clamp-2">${p.Producto}</h3>
            </div>
            <div class="flex justify-between items-end border-t-2 border-purple-50 pt-4 mt-auto">
                <div>
                    <p class="text-[9px] text-gray-400 font-black uppercase mb-1">PVP</p>
                    <p class="text-green-600 font-black text-2xl tracking-tighter">$${pvp.toFixed(2)}</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-400 font-black uppercase mb-1">Stock</p>
                    <span class="inline-block text-xs px-3 py-1.5 rounded-xl ${stock <= 5 ? 'bg-red-600 text-white' : 'bg-purple-100 text-[#a21caf]'} font-black">${stock}</span>
                </div>
            </div>`;

        card.onclick = () => abrirEditorStock(p);
        container.appendChild(card);
    });

    document.getElementById('valor-bodega').innerText = `$${totalCosto.toLocaleString()}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

function abrirEditorStock(p) {
    document.getElementById('edit-nombre').innerText = p.Producto;
    document.getElementById('edit-cantidad').value = 0;
    document.getElementById('modal-stock').classList.add('active');
    document.getElementById('btn-confirmar-stock').onclick = async () => {
        const suma = parseFloat(document.getElementById('edit-cantidad').value);
        const nuevoStock = aNum(p.Stock) + suma;
        document.getElementById('modal-stock').classList.remove('active');
        await DairyAPI.enviarDatos("Inventario", { ID: p.ID, Stock: nuevoStock, pestaña: "Inventario" });
        window.location.reload();
    };
}

function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }
function ajustarStockNum(v) { document.getElementById('edit-cantidad').value = parseInt(document.getElementById('edit-cantidad').value) + v; }

function filtrar() {
    const b = document.getElementById('filtroProd').value.toLowerCase();
    renderizar(inventarioLocal.filter(p => p.Producto.toLowerCase().includes(b)));
}

window.onload = cargarInventario;
</script>
</body>
</html>
