<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea | Control de Inventario</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#a21caf", background: "#faf5ff", outline: "#e9d5ff" }
        }
      }
    }
    </script>
    <style>
      body { font-family: 'Work Sans', sans-serif; }
      .card-critica { border: 2px solid #dc2626 !important; background-color: #fef2f2; }
      .rotate-animation { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-background text-gray-900 pb-40">

<header class="fixed top-0 w-full h-16 bg-white border-b border-outline flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-black">LL</div>
    <h1 class="text-xl font-extrabold text-primary tracking-tight">Inventario</h1>
  </div>
  <button onclick="cargarInventario()" class="p-2 text-primary hover:bg-purple-50 rounded-full">
      <span id="refresh-icon" class="material-symbols-outlined">refresh</span>
  </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  
  <section class="grid grid-cols-3 gap-3">
    <div class="bg-white p-4 rounded-[1.5rem] border border-outline text-center shadow-sm">
      <p class="text-[9px] text-gray-400 uppercase font-black mb-1">Valor Bodega</p>
      <h2 id="valor-bodega" class="text-sm font-black text-primary">$0.00</h2>
    </div>
    <div class="bg-red-50 p-4 rounded-[1.5rem] border border-red-100 text-center">
      <p class="text-[9px] text-red-600 uppercase font-black mb-1">Críticos</p>
      <h2 id="count-critico" class="text-sm font-black text-red-600">0</h2>
    </div>
    <div class="bg-white p-4 rounded-[1.5rem] border border-outline text-center shadow-sm">
      <p class="text-[9px] text-green-600 uppercase font-black mb-1">Total SKU</p>
      <h2 id="total-sku" class="text-sm font-black text-green-600">0</h2>
    </div>
  </section>

  <div class="px-1">
    <input type="text" id="filtroProd" oninput="filtrarPantalla()" placeholder="🔍 Buscar producto o ID..." class="w-full bg-white border-outline rounded-2xl p-4 font-bold text-sm shadow-sm focus:ring-primary">
  </div>

  <div id="grid-productos" class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-20 text-gray-400 italic font-bold">Cargando datos...</div>
  </div>

  <div class="fixed bottom-24 left-0 w-full px-4 z-40">
    <button onclick="abrirModalNuevo()" class="w-full bg-primary text-white py-5 rounded-2xl font-black shadow-2xl flex items-center justify-center gap-3 uppercase">
        <span class="material-symbols-outlined">add_circle</span> Nuevo Producto
    </button>
  </div>
</main>

<div id="modalNuevo" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-md">
  <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl">
    <h3 id="modal-titulo" class="text-2xl font-black text-primary mb-6 uppercase">Entrada de Stock</h3>
    <form id="formProducto" class="space-y-4">
      <input type="text" id="nombreP" required placeholder="Producto" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold">
      <div class="grid grid-cols-2 gap-4">
        <input type="number" id="stockP" required placeholder="Cantidad" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold">
        <input type="number" step="0.01" id="costoP" required placeholder="Costo" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold">
      </div>
      <input type="number" step="0.01" id="ventaP" required placeholder="Precio Venta (PVP)" class="w-full bg-gray-50 border-outline rounded-2xl p-4 font-bold">
      <button type="submit" id="btnGuardar" class="w-full py-5 bg-primary text-white rounded-2xl font-black uppercase shadow-lg">Guardar</button>
      <button type="button" onclick="cerrarModal()" class="w-full py-2 text-gray-400 font-bold uppercase text-[10px]">Cancelar</button>
    </form>
  </div>
</div>

<div id="menu-container"></div>

<script>
let inventarioLocal = [];

async function iniciarApp() {
    try {
        const resp = await fetch('menu.html');
        if (resp.ok) {
            document.getElementById('menu-container').innerHTML = await resp.text();
            marcarMenuActivo();
        }
    } catch (e) { console.log("Menú no encontrado"); }
    cargarInventario();
}

async function cargarInventario() {
  const icon = document.getElementById('refresh-icon');
  icon?.classList.add('rotate-animation');
  try {
    const data = await DairyAPI.obtenerDatos("Inventario");
    inventarioLocal = data;
    renderizarGrid(inventarioLocal);
  } catch (e) { console.error(e); }
  icon?.classList.remove('rotate-animation');
}

function renderizarGrid(lista) {
    const container = document.getElementById('grid-productos');
    container.innerHTML = "";
    let totalCosto = 0; let criticos = 0;

    lista.forEach(prod => {
        // CORRECCIÓN PVP: Forzamos la lectura de la propiedad correcta
        const stock = parseInt(prod.Stock) || 0;
        const pvp = parseFloat(prod.Precio_Venta) || 0;
        const costo = parseFloat(prod.Precio_Distribuidor) || 0;
        const esCritico = stock <= 5;
        if(esCritico) criticos++;
        totalCosto += (costo * stock);

        container.innerHTML += `
        <div onclick="abrirModalSumar('${prod.Producto}')" class="bg-white p-4 rounded-[2.5rem] border ${esCritico ? 'card-critica' : 'border-outline'} shadow-sm active:scale-95 transition-all flex flex-col justify-between h-44">
          <div>
            <p class="text-[16px] font-black text-primary mb-1">${prod.ID || 'S/N'}</p> 
            <h3 class="font-bold text-[11px] leading-tight uppercase text-gray-700 line-clamp-2">${prod.Producto}</h3>
          </div>
          <div class="flex justify-between items-end">
              <div>
                <p class="text-[8px] text-gray-400 font-black">PVP</p>
                <p class="text-primary font-black text-lg">$${pvp.toFixed(2)}</p>
              </div>
              <div class="bg-purple-100 text-primary px-3 py-1 rounded-xl font-black text-sm ${esCritico ? 'bg-red-600 text-white' : ''}">
                ${stock}
              </div>
          </div>
        </div>`;
    });
    document.getElementById('valor-bodega').innerText = `$${totalCosto.toFixed(2)}`;
    document.getElementById('count-critico').innerText = criticos;
    document.getElementById('total-sku').innerText = lista.length;
}

function filtrarPantalla() {
    const b = document.getElementById('filtroProd').value.toLowerCase();
    renderizarGrid(inventarioLocal.filter(p => p.Producto.toLowerCase().includes(b) || p.ID?.toLowerCase().includes(b)));
}

function abrirModalSumar(n) {
    const p = inventarioLocal.find(x => x.Producto === n);
    document.getElementById('modal-titulo').innerText = "Abastecer";
    document.getElementById('nombreP').value = p.Producto;
    document.getElementById('nombreP').readOnly = true;
    document.getElementById('costoP').value = p.Precio_Distribuidor;
    document.getElementById('ventaP').value = p.Precio_Venta;
    document.getElementById('modalNuevo').classList.remove('hidden');
}

function abrirModalNuevo() {
    document.getElementById('modal-titulo').innerText = "Nuevo SKU";
    document.getElementById('formProducto').reset();
    document.getElementById('nombreP').readOnly = false;
    document.getElementById('modalNuevo').classList.remove('hidden');
}

document.getElementById('formProducto').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.innerText = "Guardando...";
    await DairyAPI.enviarDatos("Inventario", {
        pestaña: "Inventario",
        Producto: document.getElementById('nombreP').value,
        Cantidad: document.getElementById('stockP').value,
        Precio_Distribuidor: document.getElementById('costoP').value,
        Precio_Venta: document.getElementById('ventaP').value
    });
    cerrarModal();
    setTimeout(cargarInventario, 1500);
    btn.disabled = false; btn.innerText = "Guardar";
};

function cerrarModal() { document.getElementById('modalNuevo').classList.add('hidden'); }
function marcarMenuActivo() {
    document.querySelectorAll('.nav-item').forEach(i => {
        if(i.getAttribute('onclick')?.includes('ControldeInventario.html')) i.classList.add('text-primary');
    });
}
window.onload = iniciarApp;
</script>
</body>
</html>
