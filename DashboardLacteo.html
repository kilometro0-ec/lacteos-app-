<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lógica Láctea - Panel Principal</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="api-config.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Work Sans', sans-serif; }
.rotate-animation { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
</style>
</head>

<body class="bg-gray-50">

<header class="p-4 bg-white shadow flex justify-between">
<h1 class="font-black text-purple-700">Lógica Láctea</h1>
<button onclick="cargarDatos()" id="icon-refresh">🔄</button>
</header>

<main class="p-4 space-y-4">

<div>
<h2>Ventas</h2>
<p id="ventas-hoy">$0</p>
</div>

<div>
<h2>Invertido</h2>
<p id="valor-invertido">$0</p>
</div>

<div>
<h2>Ganancia</h2>
<p id="ganancia-total">$0</p>
</div>

<div>
<h2>Inventario</h2>
<table class="w-full border">
<tbody id="tabla-inventario">
<tr><td>Cargando...</td></tr>
</tbody>
</table>
</div>

<div>
<h2>Entregas</h2>
<div id="lista-entregas">Cargando...</div>
</div>

</main>

<script>
async function cargarDatos() {
    const icon = document.getElementById('icon-refresh');
    icon.classList.add('rotate-animation');

    try {

        let inventario = [];
        let ventas = [];

        try {
            inventario = await DairyAPI.obtenerDatos("Inventario");
        } catch (e) {
            console.error("Error Inventario:", e);
        }

        try {
            ventas = await DairyAPI.obtenerDatos("Ventas");
        } catch (e) {
            console.error("Error Ventas:", e);
        }

        if (!Array.isArray(inventario)) inventario = [];
        if (!Array.isArray(ventas)) ventas = [];

        // INVENTARIO
        const tabla = document.getElementById('tabla-inventario');
        tabla.innerHTML = "";

        inventario.forEach(p => {
            const stock = parseFloat(p.Stock) || 0;
            tabla.innerHTML += `<tr><td>${p.Producto}</td><td>${stock}</td></tr>`;
        });

        // FINANZAS
        let totalVendido = 0;
        let totalInvertido = 0;

        inventario.forEach(p => {
            const costo = parseFloat((p.Costo_Unitario || p.Precio_Distribuidor || 0).toString().replace(',','.')) || 0;
            const stock = parseFloat(p.Stock) || 0;
            totalInvertido += costo * stock;
        });

        ventas.forEach(v => {
            const total = parseFloat(v["Precio Total"]?.toString().replace(',','.')) || 0;
            totalVendido += total;
        });

        document.getElementById('ventas-hoy').innerText = "$" + totalVendido.toFixed(2);
        document.getElementById('valor-invertido').innerText = "$" + totalInvertido.toFixed(2);
        document.getElementById('ganancia-total').innerText = "$" + (totalVendido - totalInvertido).toFixed(2);

        // ENTREGAS
        const lista = document.getElementById('lista-entregas');
        lista.innerHTML = "";

        const pendientes = ventas.filter(v => (v.Estado || "").toUpperCase() === "PENDIENTE");

        if (pendientes.length === 0) {
            lista.innerHTML = "Sin pendientes";
        } else {
            pendientes.forEach(v => {
                lista.innerHTML += `<div>${v.Cliente}</div>`;
            });
        }

    } catch (e) {
        console.error("Error general:", e);

        document.getElementById('tabla-inventario').innerHTML =
            `<tr><td style="color:red">Error cargando</td></tr>`;

        document.getElementById('lista-entregas').innerHTML =
            `<div style="color:red">Error</div>`;
    }

    icon.classList.remove('rotate-animation');
}

window.onload = cargarDatos;
</script>

</body>
</html>
