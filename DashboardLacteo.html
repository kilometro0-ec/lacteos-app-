<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Dashboard Total</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#a21caf", 
            secondary: "#db2777", 
            success: "#16a34a", 
            electric: "#0055ff", 
            background: "#faf5ff", 
            outline: "#e9d5ff" 
          }
        }
      }
    }
    </script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    #loading-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(4px);
        z-index: 9999;
        justify-content: center;
        align-items: center;
    }

    .pulse-notif { animation: shadow-pulse 1.5s infinite; }
    @keyframes shadow-pulse {
        0% { box-shadow: 0 0 0 0px rgba(0, 85, 255, 0.5); }
        70% { box-shadow: 0 0 0 10px rgba(0, 85, 255, 0); }
        100% { box-shadow: 0 0 0 0px rgba(0, 85, 255, 0); }
    }
    .glass-card { background: linear-gradient(135deg, #a21caf 0%, #6b21a8 100%); }
    </style>
</head>

<body class="bg-background text-[#1f012a] font-[Work_Sans] antialiased pb-10">

<!-- Overlay de Carga -->
<div id="loading-overlay">
    <div class="flex flex-col items-center gap-2">
        <span class="material-symbols-outlined text-5xl text-primary rotate-animation">sync</span>
        <span class="text-[10px] font-black uppercase tracking-widest text-primary italic">Sincronizando...</span>
    </div>
</div>

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-24 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary border border-purple-200">
      <span class="material-symbols-outlined text-3xl">analytics</span>
    </div>
    <div class="flex flex-col">
        <h1 class="text-xs font-black text-primary tracking-tight uppercase italic leading-none mb-1">Lógica Láctea</h1>
        <select id="periodo-filtro" onchange="cargarDatos()" class="text-[11px] font-black border-none p-0 bg-transparent text-slate-600 focus:ring-0 uppercase">
            <option value="hoy">Ventas de Hoy</option>
            <option value="semana">Esta Semana</option>
            <option value="mes">Este Mes</option>
            <option value="personalizado">Día Específico</option>
        </select>
        <input type="date" id="filtro-fecha" onchange="cargarDatos()" class="hidden text-[10px] font-bold border-none p-0 bg-transparent text-gray-500 focus:ring-0">
    </div>
  </div>
  <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 active:scale-90 transition-transform">
    <span class="material-symbols-outlined text-slate-500">sync</span>
  </button>
</header>

<main class="pt-28 px-4 max-w-7xl mx-auto space-y-5">

    <!-- 1. CARD DE DINERO -->
    <div class="glass-card p-6 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
        <div class="relative z-10 space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <p id="label-dinero" class="text-[10px] font-black uppercase tracking-[0.2em] text-purple-200 italic">Ventas Totales</p>
                    <h2 id="ventas-total-hoy" class="text-5xl font-black tracking-tighter">$0.00</h2>
                </div>
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/30">
                    <span class="material-symbols-outlined text-3xl">payments</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 border-t border-white/20 pt-4">
                <div>
                    <p class="text-[9px] font-bold uppercase text-purple-200">Utilidad Neta</p>
                    <p id="ganancia-real" class="text-xl font-black text-green-300">$0.00</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-bold uppercase text-purple-200">Por Cobrar Total</p>
                    <p id="por-recaudar" class="text-xl font-black text-amber-300">$0.00</p>
                </div>
            </div>

            <div class="bg-black/20 p-3 rounded-2xl flex justify-between items-center border border-white/10">
                <span class="text-[9px] font-bold uppercase tracking-widest text-white/70">Capital en Stock (Costo)</span>
                <span id="valor-invertido" class="font-black text-sm">$0.00</span>
            </div>
        </div>
    </div>

    <!-- 2. BOTONES DE ACCIÓN (LOS 6 ORIGINALES) -->
    <div class="grid grid-cols-2 gap-3">
        <button onclick="location.href='RegistrodeVentas.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-purple-100 text-primary flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Vender</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Registrar salida</span>
        </button>
        
        <button id="btn-ruta" onclick="location.href='GestióndeDespachos.html'" class="relative bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center shadow-sm active:scale-95 transition-all">
          <span id="badge-ruta" class="absolute top-3 right-5 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
          <div class="w-12 h-12 rounded-2xl bg-green-100 text-success flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl font-bold">local_shipping</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">En Ruta</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Gestión envíos</span>
        </button>

        <button onclick="location.href='ControldeInventario.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-pink-100 text-secondary flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">inventory</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Stock</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Ver existencias</span>
        </button>

        <button onclick="location.href='Proveedores.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-slate-100 text-slate-700 flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">factory</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Proveedores</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Contacto compra</span>
        </button>

        <button id="btn-recepcion" onclick="location.href='ConfirmarRecepcion.html'" class="relative bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center shadow-sm active:scale-95 transition-all">
            <span id="badge-recepcion" class="absolute top-3 right-5 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
            <div class="w-12 h-12 rounded-2xl bg-blue-100 text-electric flex items-center justify-center mb-1">
              <span class="material-symbols-outlined text-3xl font-bold">inventory_2</span>
            </div>
            <span class="text-[11px] font-black uppercase text-electric">Recibir</span>
            <span class="text-[8px] font-bold text-blue-400 uppercase leading-none">Ingreso mercadería</span>
        </button>

        <button onclick="location.href='GestiondeClientes.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-purple-50 text-primary flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">groups</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Clientes</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Base de datos</span>
        </button>
    </div>

    <!-- 3. RANKING Y DESPACHOS (CON ORDEN) -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
            <h3 class="text-[10px] font-black text-primary mb-4 uppercase tracking-[0.1em] flex items-center gap-2 italic">
                <span class="material-symbols-outlined text-sm font-bold">stars</span> Ranking Ventas
            </h3>
            <div id="ranking-productos" class="space-y-2"></div>
        </section>

        <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
            <h3 class="text-[10px] font-black text-amber-600 mb-4 uppercase tracking-[0.1em] flex items-center justify-between italic">
                <span class="flex items-center gap-2"><span class="material-symbols-outlined text-sm font-bold">timer</span> Despachos Pendientes</span>
            </h3>
            <div id="lista-pedidos" class="space-y-3"></div>
        </section>
    </div>

    <!-- 4. STOCK CRÍTICO -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-red-100 shadow-sm">
        <h3 class="text-[10px] font-black text-red-500 mb-4 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm font-bold">trending_down</span> Por agotarse (Stock Bajo)
        </h3>
        <div id="cont-criticos" class="grid grid-cols-1 gap-2 text-[11px]"></div>
    </section>

</main>

<script>
const fInput = document.getElementById('filtro-fecha');
const hoy = new Date();
fInput.value = new Date(hoy - (hoy.getTimezoneOffset() * 60000)).toISOString().split('T')[0];

function mostrarCargando(show) {
    document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

function cumpleFiltro(fechaVenta, periodo, fechaSeleccionada) {
    const fV = new Date(fechaVenta);
    if (periodo === 'hoy') return fV.toDateString() === hoy.toDateString();
    if (periodo === 'semana') {
        const diff = hoy.getDate() - hoy.getDay() + (hoy.getDay() === 0 ? -6 : 1);
        const lunes = new Date(hoy.setDate(diff)); lunes.setHours(0,0,0,0);
        return fV >= lunes;
    }
    if (periodo === 'mes') return fV.getMonth() === hoy.getMonth() && fV.getFullYear() === hoy.getFullYear();
    return fV.toISOString().split('T')[0] === fechaSeleccionada;
}

async function cargarDatos() {
    mostrarCargando(true);
    const periodo = document.getElementById('periodo-filtro').value;
    const fSel = fInput.value;
    fInput.classList.toggle('hidden', periodo !== 'personalizado');

    try {
        const [resInv, resVentas, resCompras] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"), DairyAPI.obtenerDatos("Ventas"), DairyAPI.obtenerDatos("Compras")
        ]);

        const inventario = resInv || [];
        const ventas = resVentas || [];
        const compras = resCompras || [];

        // 1. Costos y Valor Bodega
        const costosMap = {};
        let valorBodega = 0;
        inventario.forEach(p => {
            const c = parseFloat(String(p.Precio_Distribuidor || 0).replace(',','.'));
            const s = parseFloat(p.Stock) || 0;
            costosMap[p.Producto] = c;
            valorBodega += (c * s);
        });
        document.getElementById('valor-invertido').innerText = `$${valorBodega.toFixed(2)}`;

        // 2. Procesar Ventas
        let totalVentas = 0;
        let utilidad = 0;
        let porRecaudar = 0;
        let ranking = {};
        let pedidosPendientes = {};

        ventas.forEach(v => {
            const totalFila = parseFloat(String(v["Precio Total"] || 0).replace(',','.'));
            const idVenta = v.ID_Venta;
            const esPendiente = String(v.Estado).toUpperCase() === "PENDIENTE";

            if(cumpleFiltro(v.Fecha, periodo, fSel)) {
                totalVentas += totalFila;
                const costoBase = costosMap[v.Producto] || 0;
                utilidad += (totalFila - (costoBase * (parseFloat(v.Cantidad) || 0)));
                ranking[v.Producto] = (ranking[v.Producto] || 0) + (parseFloat(v.Cantidad) || 0);
            }

            if(esPendiente && idVenta) {
                porRecaudar += totalFila;
                if(!pedidosPendientes[idVenta]) {
                    const fP = new Date(v.Fecha);
                    const dias = Math.floor((hoy - fP) / (1000 * 60 * 60 * 24));
                    pedidosPendientes[idVenta] = { cliente: v.Cliente, dias, total: 0, fecha: fP };
                }
                pedidosPendientes[idVenta].total += totalFila;
            }
        });

        document.getElementById('ventas-total-hoy').innerText = `$${totalVentas.toFixed(2)}`;
        document.getElementById('ganancia-real').innerText = `$${utilidad.toFixed(2)}`;
        document.getElementById('por-recaudar').innerText = `$${porRecaudar.toFixed(2)}`;

        // 3. Render Pendientes (Ordenados por Días DESC)
        const listaPed = document.getElementById('lista-pedidos');
        const sorted = Object.entries(pedidosPendientes).sort((a,b) => b[1].dias - a[1].dias);
        listaPed.innerHTML = sorted.map(([id, p]) => `
            <div class="p-3 bg-slate-50 rounded-2xl border ${p.dias > 1 ? 'border-l-4 border-l-red-500' : 'border-slate-100'} flex justify-between items-center">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black uppercase text-slate-700">${p.cliente}</span>
                    <span class="text-[9px] font-bold ${p.dias > 1 ? 'text-red-500' : 'text-amber-500'}">Hace ${p.dias} días (ID: ${id})</span>
                </div>
                <span class="text-amber-600 font-black italic text-xs">$${p.total.toFixed(2)}</span>
            </div>
        `).join('') || '<p class="text-center text-slate-300 text-xs italic">Sin pendientes</p>';

        document.getElementById('badge-ruta').innerText = sorted.length;
        document.getElementById('badge-ruta').classList.toggle('hidden', sorted.length === 0);

        // 4. Badge Compras
        const bRec = document.getElementById('badge-recepcion');
        const cPends = compras.filter(c => String(c.Estado_Entrega).toUpperCase() === "PENDIENTE");
        if(cPends.length > 0){
            bRec.innerText = [...new Set(cPends.map(p => p.ID_Compra))].length;
            bRec.classList.remove('hidden');
            document.getElementById('btn-recepcion').classList.add('pulse-notif');
        } else {
            bRec.classList.add('hidden');
            document.getElementById('btn-recepcion').classList.remove('pulse-notif');
        }

        // 5. Ranking
        const rDiv = document.getElementById('ranking-productos');
        rDiv.innerHTML = Object.entries(ranking).sort((a,b) => b[1]-a[1]).slice(0,5).map(([n,c],i) => `
            <div class="flex justify-between p-2 bg-purple-50 rounded-xl text-[10px] font-bold">
                <span>${i+1}. ${n}</span>
                <span class="text-primary">${c} ud.</span>
            </div>
        `).join('') || '<p class="text-center text-slate-300 text-xs">Sin ventas</p>';

        // 6. Stock Crítico
        const contCrit = document.getElementById('cont-criticos');
        const criticos = inventario.filter(p => {
            const s = parseFloat(p.Stock) || 0;
            return s > 0 && s <= 5;
        });
        contCrit.innerHTML = criticos.map(p => `
            <div class="flex justify-between p-3 bg-red-50 rounded-2xl border border-red-100">
                <span class="font-black uppercase text-red-900">${p.Producto}</span>
                <span class="font-black text-red-600 uppercase">${p.Stock} UNIDADES</span>
            </div>
        `).join('') || '<p class="text-center text-slate-300 italic text-xs">Stock OK</p>';

    } catch (e) { console.error(e); }
    finally { setTimeout(() => mostrarCargando(false), 400); }
}
window.onload = cargarDatos;
</script>
</body>
</html>
