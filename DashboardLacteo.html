<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#a21caf", 
            secondary: "#db2777", 
            success: "#16a34a", 
            electric: "#0055ff", 
            background: "#faf5ff", 
            outline: "#e9d5ff" 
          }
        }
      }
    }
    </script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    /* Overlay de carga */
    #loading-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(2px);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        transition: opacity 0.3s;
    }

    .glass-card { background: linear-gradient(135deg, #a21caf 0%, #6b21a8 100%); }
    </style>
</head>

<body class="bg-background text-[#1f012a] font-[Work_Sans] antialiased pb-10">

<!-- Overlay de Carga -->
<div id="loading-overlay">
    <div class="bg-white p-4 rounded-2xl flex flex-col items-center gap-3 shadow-2xl">
        <span class="material-symbols-outlined text-4xl text-primary rotate-animation">sync</span>
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500 italic">Actualizando...</span>
    </div>
</div>

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-24 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary border border-purple-200">
      <span class="material-symbols-outlined text-3xl">analytics</span>
    </div>
    <div class="flex flex-col">
        <h1 class="text-xs font-black text-primary tracking-tight uppercase italic leading-none mb-1">Lógica Láctea</h1>
        <select id="periodo-filtro" onchange="cargarDatos()" class="text-[10px] font-black border-none p-0 bg-transparent text-slate-600 focus:ring-0 uppercase">
            <option value="hoy">Hoy</option>
            <option value="semana">Esta Semana</option>
            <option value="mes">Este Mes</option>
            <option value="personalizado">Fecha Específica</option>
        </select>
        <input type="date" id="filtro-fecha" onchange="cargarDatos()" class="hidden text-[10px] font-bold border-none p-0 bg-transparent text-gray-500 focus:ring-0">
    </div>
  </div>
  <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
    <span class="material-symbols-outlined text-slate-500">sync</span>
  </button>
</header>

<main class="pt-28 px-4 max-w-7xl mx-auto space-y-5">

    <!-- 1. CARD DE DINERO -->
    <div class="glass-card p-6 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
        <div class="relative z-10 space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <p id="label-dinero" class="text-[10px] font-black uppercase tracking-[0.2em] text-purple-200 italic">Ventas Totales</p>
                    <h2 id="ventas-total-hoy" class="text-5xl font-black tracking-tighter">$0.00</h2>
                </div>
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/30">
                    <span class="material-symbols-outlined text-3xl">payments</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 border-t border-white/20 pt-4">
                <div>
                    <p class="text-[9px] font-bold uppercase text-purple-200">Utilidad Neta</p>
                    <p id="ganancia-real" class="text-xl font-black text-green-300">$0.00</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-bold uppercase text-purple-200">Por Cobrar Total</p>
                    <p id="por-recaudar" class="text-xl font-black text-amber-300">$0.00</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. BOTONES DE ACCIÓN (Resumidos para scannability) -->
    <div class="grid grid-cols-3 gap-2">
        <button onclick="location.href='RegistrodeVentas.html'" class="bg-white border border-outline p-3 rounded-3xl flex flex-col items-center shadow-sm">
          <span class="material-symbols-outlined text-primary mb-1 text-2xl">add_shopping_cart</span>
          <span class="text-[8px] font-black uppercase">Vender</span>
        </button>
        <button id="btn-ruta" onclick="location.href='GestióndeDespachos.html'" class="relative bg-white border border-outline p-3 rounded-3xl flex flex-col items-center shadow-sm">
          <span id="badge-ruta" class="absolute -top-1 -right-1 bg-red-600 text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
          <span class="material-symbols-outlined text-success mb-1 text-2xl">local_shipping</span>
          <span class="text-[8px] font-black uppercase">Ruta</span>
        </button>
        <button id="btn-recepcion" onclick="location.href='ConfirmarRecepcion.html'" class="relative bg-white border border-outline p-3 rounded-3xl flex flex-col items-center shadow-sm">
            <span id="badge-recepcion" class="absolute -top-1 -right-1 bg-red-600 text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
            <span class="material-symbols-outlined text-electric mb-1 text-2xl">inventory_2</span>
            <span class="text-[8px] font-black uppercase">Recibir</span>
        </button>
    </div>

    <!-- 3. SECCIÓN DE DESPACHOS CON TIEMPO -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
        <h3 class="text-[10px] font-black text-amber-600 mb-4 uppercase tracking-[0.1em] flex items-center justify-between italic">
            <span class="flex items-center gap-2"><span class="material-symbols-outlined text-sm">timer</span> Despachos en Espera</span>
            <span class="text-[8px] text-slate-400 font-bold">ORDENADO POR ANTIGÜEDAD</span>
        </h3>
        <div id="lista-pedidos" class="space-y-3"></div>
    </section>

    <!-- 4. RANKING -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
        <h3 class="text-[10px] font-black text-primary mb-4 uppercase tracking-[0.1em] flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm font-bold">stars</span> Top Ventas
        </h3>
        <div id="ranking-productos" class="grid grid-cols-1 gap-2"></div>
    </section>

</main>

<script>
// Inicializar fechas
const fInput = document.getElementById('filtro-fecha');
const hoy = new Date();
fInput.value = new Date(hoy - (hoy.getTimezoneOffset() * 60000)).toISOString().split('T')[0];

function mostrarCargando(show) {
    document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

function filtrarPorPeriodo(fechaVenta, periodo, fechaSeleccionada) {
    const fV = new Date(fechaVenta);
    const fS = new Date(fechaSeleccionada);
    
    if (periodo === 'hoy') return fV.toDateString() === hoy.toDateString();
    
    if (periodo === 'semana') {
        const inicioSemana = new Date(hoy);
        inicioSemana.setDate(hoy.getDate() - hoy.getDay()); // Domingo
        return fV >= inicioSemana;
    }
    
    if (periodo === 'mes') return fV.getMonth() === hoy.getMonth() && fV.getFullYear() === hoy.getFullYear();
    
    return fV.toDateString() === fS.toDateString(); // Personalizado
}

async function cargarDatos() {
    mostrarCargando(true);
    const periodo = document.getElementById('periodo-filtro').value;
    const fSel = document.getElementById('filtro-fecha').value;
    
    // Mostrar/ocultar input fecha si es personalizado
    fInput.classList.toggle('hidden', periodo !== 'personalizado');

    try {
        const [resInv, resVentas, resCompras] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Compras")
        ]);

        const inventario = Array.isArray(resInv) ? resInv : [];
        const ventas = Array.isArray(resVentas) ? resVentas : [];
        const compras = Array.isArray(resCompras) ? resCompras : [];

        // Costos
        const costosMap = {};
        inventario.forEach(p => costosMap[p.Producto] = parseFloat(String(p.Precio_Distribuidor || 0).replace(',','.').trim()));

        let utilidadVentas = 0;
        let totalVentas = 0;
        let porRecaudarTotal = 0;
        let rankingMap = {};
        let pedidosPendientesMap = {};

        ventas.forEach(v => {
            const totalFila = parseFloat(String(v["Precio Total"] || 0).replace(',','.').trim()) || 0;
            const esPendiente = String(v.Estado).toUpperCase() === "PENDIENTE";
            const idVenta = v.ID_Venta;

            // 1. Filtro de Tiempo para Métricas
            if(filtrarPorPeriodo(v.Fecha, periodo, fSel)) {
                totalVentas += totalFila;
                const costoProd = costosMap[v.Producto] || 0;
                utilidadVentas += (totalFila - (costoProd * (parseFloat(v.Cantidad) || 0)));
                rankingMap[v.Producto] = (rankingMap[v.Producto] || 0) + (parseFloat(v.Cantidad) || 0);
            }

            // 2. Despachos Pendientes (Siempre GLOBAL y agrupado por ID_Venta)
            if(esPendiente && idVenta) {
                porRecaudarTotal += totalFila;
                if(!pedidosPendientesMap[idVenta]) {
                    const fechaPedido = new Date(v.Fecha);
                    const diffDias = Math.floor((hoy - fechaPedido) / (1000 * 60 * 60 * 24));
                    pedidosPendientesMap[idVenta] = {
                        cliente: v.Cliente,
                        fecha: fechaPedido,
                        dias: diffDias,
                        total: 0
                    };
                }
                pedidosPendientesMap[idVenta].total += totalFila;
            }
        });

        // Actualizar Card Dinero
        document.getElementById('ventas-total-hoy').innerText = `$${totalVentas.toFixed(2)}`;
        document.getElementById('ganancia-real').innerText = `$${utilidadVentas.toFixed(2)}`;
        document.getElementById('por-recaudar').innerText = `$${porRecaudarTotal.toFixed(2)}`;
        document.getElementById('label-dinero').innerText = `Ventas ${periodo === 'personalizado' ? 'Día' : periodo}`;

        // Render Pendientes (Ordenados por Días de forma descendente)
        const listaPed = document.getElementById('lista-pedidos');
        const sortedPendientes = Object.entries(pedidosPendientesMap)
            .sort((a, b) => b[1].dias - a[1].dias);

        listaPed.innerHTML = sortedPendientes.map(([id, p]) => `
            <div class="p-4 bg-slate-50 rounded-3xl border border-slate-100 flex justify-between items-center ${p.dias > 2 ? 'border-l-4 border-l-red-500' : ''}">
                <div class="flex flex-col">
                    <span class="text-[11px] font-black uppercase text-slate-700">${p.cliente}</span>
                    <div class="flex gap-2 items-center">
                        <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${p.dias > 2 ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}">
                            Hace ${p.dias} días
                        </span>
                        <span class="text-[8px] text-slate-400 font-bold uppercase">ID: ${id}</span>
                    </div>
                </div>
                <span class="text-amber-600 font-black italic">$${p.total.toFixed(2)}</span>
            </div>
        `).join('') || '<p class="text-center py-4 text-slate-300 italic text-xs">¡Todo entregado!</p>';

        // Badges
        document.getElementById('badge-ruta').innerText = sortedPendientes.length;
        document.getElementById('badge-ruta').classList.toggle('hidden', sortedPendientes.length === 0);

        // Ranking
        const rankingDiv = document.getElementById('ranking-productos');
        const top5 = Object.entries(rankingMap).sort((a,b) => b[1] - a[1]).slice(0,5);
        rankingDiv.innerHTML = top5.map(([prod, cant], i) => `
            <div class="flex items-center justify-between p-3 bg-purple-50/50 rounded-2xl">
                <span class="text-[10px] font-black uppercase text-slate-600">${i+1}. ${prod}</span>
                <span class="text-primary font-black text-xs">${cant} ud.</span>
            </div>
        `).join('') || '<p class="text-center text-slate-300 text-xs italic">Sin datos</p>';

    } catch (e) { console.error(e); }
    finally { setTimeout(() => mostrarCargando(false), 500); }
}

window.onload = cargarDatos;
</script>
</body>
</html>
