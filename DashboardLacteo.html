<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#a21caf", secondary: "#db2777", success: "#16a34a", background: "#faf5ff", outline: "#e9d5ff" }
        }
      }
    }
    </script>

    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .pulse-notif { animation: shadow-pulse 1.5s infinite; }
    @keyframes shadow-pulse {
        0% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0.5); }
        70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
        100% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0); }
    }
    </style>
</head>

<body class="bg-background text-[#1f012a] font-[Work_Sans] antialiased pb-24">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-20 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-3xl">opacity</span>
    </div>
    <div>
        <h1 class="text-sm font-black text-primary tracking-tight uppercase italic leading-none">Lógica Láctea</h1>
        <input type="date" id="filtro-fecha" onchange="cargarDatos()" class="mt-1 text-[10px] font-bold border-none p-0 bg-transparent text-gray-500 focus:ring-0">
    </div>
  </div>
  <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
    <span id="icon-refresh" class="material-symbols-outlined text-slate-500">sync</span>
  </button>
</header>

<main class="pt-24 px-4 max-w-7xl mx-auto space-y-4">

    <!-- 1. MÉTRICAS PRINCIPALES -->
    <div class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm space-y-4">
        <div>
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Inversión en Bodega</h3>
            <span id="valor-invertido" class="text-4xl font-black tracking-tighter text-gray-900">$0.00</span>
        </div>
        <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-50">
            <div>
                <span class="text-[10px] text-slate-400 block uppercase font-bold">Por Recaudar</span>
                <span id="por-recaudar" class="text-lg font-black text-amber-600">$0.00</span>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-400 block uppercase font-bold">Balance Real</span>
                <span id="balance-real" class="text-lg font-black text-success">$0.00</span>
            </div>
        </div>
    </div>

    <!-- 2. BOTONES DE ACCIÓN (MISMO TAMAÑO CON RESUMEN) -->
    <div class="grid grid-cols-2 gap-3">
        <!-- VENDER -->
        <button onclick="location.href='RegistrodeVentas.html'" class="bg-primary text-white p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-lg active:scale-95 transition-all">
          <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
          <span class="text-[10px] font-black uppercase">Vender</span>
          <span class="text-[8px] opacity-80 leading-tight">Registrar nueva salida de productos</span>
        </button>
        
        <!-- RUTA -->
        <button id="btn-ruta" onclick="location.href='GestióndeDespachos.html'" class="relative bg-success text-white p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-lg active:scale-95 transition-all">
          <span id="badge-ruta" class="absolute top-2 right-4 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
          <span class="material-symbols-outlined text-3xl">local_shipping</span>
          <span class="text-[10px] font-black uppercase">En Ruta</span>
          <span class="text-[8px] opacity-80 leading-tight">Gestión de entregas pendientes</span>
        </button>

        <!-- STOCK -->
        <button onclick="location.href='ControldeInventario.html'" class="relative bg-secondary text-white p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-lg active:scale-95 transition-all">
          <span id="badge-stock" class="absolute top-2 right-4 bg-white text-secondary text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-secondary hidden">0</span>
          <span class="material-symbols-outlined text-3xl">inventory</span>
          <span class="text-[10px] font-black uppercase">Stock</span>
          <span class="text-[8px] opacity-80 leading-tight">Ajustar inventario y precios</span>
        </button>

        <!-- CLIENTES/PROV -->
        <button onclick="location.href='GestiondeClientes.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 active:bg-slate-50 transition-all">
          <span class="material-symbols-outlined text-primary text-3xl">group</span>
          <span class="text-[10px] font-black uppercase text-slate-600">Contactos</span>
          <span class="text-[8px] text-slate-400 leading-tight">Base de clientes y proveedores</span>
        </button>
    </div>

    <!-- 3. PEDIDOS POR ENTREGAR (NUEVA SECCIÓN) -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
        <h3 class="text-[10px] font-black text-amber-600 mb-4 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm">schedule</span> Pedidos por Entregar
        </h3>
        <div id="lista-pedidos" class="space-y-3">
            <!-- Cargado por JS -->
        </div>
    </section>

    <!-- 4. RANKING DE VENTAS -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
        <h3 class="text-[10px] font-black text-primary mb-5 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm">trending_up</span> Productos más vendidos
        </h3>
        <div id="grafico-vendidos" class="space-y-5"></div>
    </section>

    <!-- 5. STOCK CRÍTICO -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-red-100 shadow-sm">
        <h3 class="text-[10px] font-black text-red-500 mb-4 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm">warning</span> Alerta: Stock Bajo (1-5 un.)
        </h3>
        <div class="overflow-hidden">
            <table class="w-full text-left">
                <tbody id="tabla-criticos" class="text-[11px] font-bold divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </section>

</main>

<script>
const hoy = new Date();
const offset = hoy.getTimezoneOffset() * 60000;
const fechaLocal = new Date(hoy - offset).toISOString().split('T')[0];
document.getElementById('filtro-fecha').value = fechaLocal;

async function cargarDatos() {
    const icon = document.getElementById('icon-refresh');
    icon?.classList.add('rotate-animation');
    const fechaSel = document.getElementById('filtro-fecha').value;

    try {
        const [resInv, resVentas] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        const inventario = Array.isArray(resInv) ? resInv : [];
        const ventas = Array.isArray(resVentas) ? resVentas : [];

        // 1. LÓGICA DE STOCK CRÍTICO
        const tablaCriticos = document.getElementById('tabla-criticos');
        const badgeStock = document.getElementById('badge-stock');
        tablaCriticos.innerHTML = "";
        
        const criticos = inventario.filter(p => {
            const s = parseFloat(p.Stock) || 0;
            return s > 0 && s <= 5;
        }).sort((a,b) => (parseFloat(a.Stock)||0) - (parseFloat(b.Stock)||0));

        if(criticos.length > 0) {
            badgeStock.innerText = criticos.length;
            badgeStock.classList.remove('hidden');
            criticos.forEach(p => {
                tablaCriticos.innerHTML += `
                    <tr>
                        <td class="p-3 uppercase truncate italic text-slate-700">${p.Producto}</td>
                        <td class="p-3 text-center text-red-600 font-black">${p.Stock} un.</td>
                    </tr>`;
            });
        } else {
            badgeStock.classList.add('hidden');
            tablaCriticos.innerHTML = '<tr><td class="p-4 text-center text-slate-300 italic text-[10px]">Stock saludable</td></tr>';
        }

        // 2. INVERSIÓN Y DINEROS
        let totalInversion = 0;
        inventario.forEach(p => {
            const cost = parseFloat(String(p.Precio_Distribuidor || 0).replace(',','.')) || 0;
            totalInversion += (cost * (parseFloat(p.Stock) || 0));
        });

        let totalVentasHoy = 0;
        let porRecaudar = 0;
        const pends = [];

        ventas.forEach(v => {
            const fV = new Date(v.Fecha).toISOString().split('T')[0];
            if(fV === fechaSel) {
                const total = parseFloat(String(v["Precio Total"] || 0).replace(',','.')) || 0;
                totalVentasHoy += total;
                if(String(v.Estado).toUpperCase() === "PENDIENTE") {
                    porRecaudar += total;
                    pends.push(v);
                }
            }
        });

        document.getElementById('valor-invertido').innerText = `$${totalInversion.toFixed(2)}`;
        document.getElementById('por-recaudar').innerText = `$${porRecaudar.toFixed(2)}`;
        document.getElementById('balance-real').innerText = `$${(totalVentasHoy - totalInversion).toFixed(2)}`;

        // 3. RUTA Y PEDIDOS
        const badgeRuta = document.getElementById('badge-ruta');
        const listaPedidos = document.getElementById('lista-pedidos');
        const clientesUnicos = [...new Set(pends.map(p => p.Cliente))];
        
        if(clientesUnicos.length > 0) {
            badgeRuta.innerText = clientesUnicos.length;
            badgeRuta.classList.remove('hidden');
            document.getElementById('btn-ruta').classList.add('pulse-notif');
            listaPedidos.innerHTML = "";
            clientesUnicos.forEach(c => {
                listaPedidos.innerHTML += `
                    <div class="flex justify-between items-center bg-amber-50 p-3 rounded-2xl border border-amber-100">
                        <span class="text-[10px] font-black uppercase text-amber-900">${c}</span>
                        <span class="text-[9px] font-bold text-amber-700">PAGO PENDIENTE</span>
                    </div>`;
            });
        } else {
            badgeRuta.classList.add('hidden');
            document.getElementById('btn-ruta').classList.remove('pulse-notif');
            listaPedidos.innerHTML = '<p class="text-center py-2 text-slate-300 italic text-[10px]">No hay pedidos pendientes hoy</p>';
        }

        // 4. RANKING
        const rank = {};
        ventas.forEach(v => { rank[v.Producto] = (rank[v.Producto] || 0) + (parseFloat(v.Cantidad) || 0); });
        const top = Object.entries(rank).sort((a,b) => b[1]-a[1]).slice(0, 4);
        const grafico = document.getElementById('grafico-vendidos');
        grafico.innerHTML = "";
        const max = top[0] ? top[0][1] : 1;
        top.forEach(([name, qty]) => {
            grafico.innerHTML += `
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] font-black uppercase italic text-slate-700">
                        <span>${name}</span>
                        <span class="text-primary">${qty} un.</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-primary h-full" style="width:${(qty/max)*100}%"></div>
                    </div>
                </div>`;
        });

    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('rotate-animation'); }
}

window.onload = cargarDatos;
</script>
</body>
</html>
