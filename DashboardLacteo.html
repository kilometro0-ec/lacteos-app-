<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#a21caf", secondary: "#db2777", success: "#16a34a", background: "#faf5ff", outline: "#e9d5ff" }
        }
      }
    }
    </script>

    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .pulse-notif { animation: shadow-pulse 1.5s infinite; }
    @keyframes shadow-pulse {
        0% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0.5); }
        70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
        100% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0); }
    }
    </style>
</head>

<body class="bg-background text-[#1f012a] font-[Work_Sans] antialiased pb-24">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-20 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-3xl">opacity</span>
    </div>
    <div>
        <h1 class="text-sm font-black text-primary tracking-tight uppercase italic leading-none">Lógica Láctea</h1>
        <input type="date" id="filtro-fecha" onchange="cargarDatos()" class="mt-1 text-[10px] font-bold border-none p-0 bg-transparent text-gray-500 focus:ring-0">
    </div>
  </div>
  <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
    <span id="icon-refresh" class="material-symbols-outlined text-slate-500">sync</span>
  </button>
</header>

<main class="pt-24 px-4 max-w-7xl mx-auto space-y-4">

    <!-- FILA 1: VENDER Y RUTA -->
    <div class="grid grid-cols-2 gap-3">
        <button onclick="location.href='RegistrodeVentas.html'" class="bg-primary text-white p-5 rounded-[2rem] flex flex-col items-center gap-2 shadow-lg active:scale-95 transition-transform">
          <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
          <span class="text-xs font-black uppercase tracking-widest">Vender</span>
        </button>
        
        <button id="btn-ruta" onclick="location.href='GestióndeDespachos.html'" class="relative bg-success text-white p-5 rounded-[2rem] flex flex-col items-center gap-2 shadow-lg active:scale-95 transition-transform">
          <span id="badge-ruta" class="absolute top-2 right-4 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
          <span class="material-symbols-outlined text-3xl">local_shipping</span>
          <span class="text-xs font-black uppercase tracking-widest">En Ruta</span>
        </button>
    </div>

    <!-- FILA 2: STOCK (TARJETA GRANDE) -->
    <div class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm relative overflow-hidden">
        <div id="critico-label" class="absolute top-4 right-6 bg-red-100 text-red-600 text-[9px] font-black px-3 py-1 rounded-full border border-red-200 hidden">0 PRODUCTOS CRÍTICOS</div>
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Inversión en Bodega</h3>
        <div class="flex items-baseline gap-2">
            <span id="valor-invertido" class="text-4xl font-black tracking-tighter text-gray-900">$0.00</span>
        </div>
        <button onclick="location.href='ControldeInventario.html'" class="mt-4 w-full py-3 bg-slate-50 rounded-2xl text-[10px] font-black text-primary uppercase border border-slate-100 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">inventory</span> Ver Inventario Completo
        </button>
    </div>

    <!-- MARGEN DE GANANCIA (Fórmula: Recaudado - Invertido) -->
    <div class="bg-white p-6 rounded-[2.5rem] border-2 border-success/20 shadow-md bg-gradient-to-br from-white to-green-50/20">
      <span class="text-success text-xs uppercase font-black tracking-widest block mb-1">Balance (Recaudo - Inversión)</span>
      <div class="flex justify-between items-end">
          <div>
            <span id="ganancia-total" class="text-4xl font-black tracking-tighter text-success">$0.00</span>
            <div id="comparativa-ayer" class="flex items-center gap-1 mt-1 text-[10px] font-bold text-slate-400"></div>
          </div>
          <div class="text-right">
              <span class="text-[10px] text-slate-400 block uppercase font-bold">Ventas Brutas</span>
              <span id="ventas-hoy" class="text-lg font-black text-slate-700">$0.00</span>
          </div>
      </div>
    </div>

    <!-- FILA 3: CLIENTES Y PROVEEDORES -->
    <div class="grid grid-cols-2 gap-3">
        <button onclick="location.href='GestiondeClientes.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex items-center gap-3 active:scale-95 transition-transform">
          <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-primary">
              <span class="material-symbols-outlined">group</span>
          </div>
          <span class="text-[10px] font-black uppercase text-slate-600">Clientes</span>
        </button>

        <button onclick="location.href='Proveedores.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex items-center gap-3 active:scale-95 transition-transform">
          <div class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center text-amber-600">
              <span class="material-symbols-outlined">factory</span>
          </div>
          <span class="text-[10px] font-black uppercase text-slate-600">Proveedores</span>
        </button>
    </div>

    <!-- TOP PRODUCTOS -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline">
        <h3 class="text-[10px] font-black text-primary mb-5 uppercase tracking-widest flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">trending_up</span> Ranking de Salida
        </h3>
        <div id="grafico-vendidos" class="space-y-5"></div>
    </section>

</main>

<div id="menu-container"></div>

<script>
// Ajuste de fecha local
const hoy = new Date();
const offset = hoy.getTimezoneOffset() * 60000;
const fechaLocal = new Date(hoy - offset).toISOString().split('T')[0];
document.getElementById('filtro-fecha').value = fechaLocal;

async function cargarDatos() {
    const icon = document.getElementById('icon-refresh');
    icon?.classList.add('rotate-animation');
    const fechaSel = document.getElementById('filtro-fecha').value;

    try {
        const [resInv, resVentas] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        const inventario = Array.isArray(resInv) ? resInv : [];
        const ventas = Array.isArray(resVentas) ? resVentas : [];

        // 1. LÓGICA DE STOCK Y CRÍTICOS
        let totalInv = 0;
        const pCriticos = inventario.filter(p => {
            const s = parseFloat(p.Stock) || 0;
            return s > 0 && s <= 5;
        });

        const lblCritico = document.getElementById('critico-label');
        if(pCriticos.length > 0) {
            lblCritico.innerText = `${pCriticos.length} CRÍTICOS EN STOCK`;
            lblCritico.classList.remove('hidden');
        } else {
            lblCritico.classList.add('hidden');
        }

        inventario.forEach(p => {
            const cost = parseFloat(String(p.Precio_Distribuidor || 0).replace(',','.')) || 0;
            totalInv += (cost * (parseFloat(p.Stock) || 0));
        });
        document.getElementById('valor-invertido').innerText = `$${totalInv.toFixed(2)}`;

        // 2. VENTAS Y MARGEN (Recaudado - Inversión)
        const ayer = new Date(new Date(fechaSel) - 86400000).toISOString().split('T')[0];
        let recaudadoHoy = 0;
        let recaudadoAyer = 0;

        ventas.forEach(v => {
            const fV = new Date(v.Fecha).toISOString().split('T')[0];
            const val = parseFloat(String(v["Precio Total"] || 0).replace(',','.')) || 0;
            if(fV === fechaSel) recaudadoHoy += val;
            if(fV === ayer) recaudadoAyer += val;
        });

        // Fórmula pedida: Recaudado - Valor Invertido
        // Nota: Para que el margen sea coherente al día, usamos el Recaudo del periodo filtrado.
        const margenReal = recaudadoHoy - totalInv;

        document.getElementById('ventas-hoy').innerText = `$${recaudadoHoy.toFixed(2)}`;
        document.getElementById('ganancia-total').innerText = `$${margenReal.toFixed(2)}`;

        const compDiv = document.getElementById('comparativa-ayer');
        const subio = recaudadoHoy >= recaudadoAyer;
        compDiv.innerHTML = `
            <span class="material-symbols-outlined text-sm ${subio?'text-success':'text-red-500'}">${subio?'bolt':'south'}</span>
            Recaudo ayer: $${recaudadoAyer.toFixed(2)}`;

        // 3. TOP PRODUCTOS
        const rank = {};
        ventas.forEach(v => { rank[v.Producto] = (rank[v.Producto] || 0) + (parseFloat(v.Cantidad) || 0); });
        const top = Object.entries(rank).sort((a,b) => b[1]-a[1]).slice(0, 4);
        const grafico = document.getElementById('grafico-vendidos');
        grafico.innerHTML = "";
        const max = top[0] ? top[0][1] : 1;
        top.forEach(([name, qty]) => {
            grafico.innerHTML += `
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] font-black uppercase italic">
                        <span class="text-slate-700 truncate pr-4">${name}</span>
                        <span class="text-primary">${qty} UN.</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div class="bg-primary h-full rounded-full" style="width:${(qty/max)*100}%"></div>
                    </div>
                </div>`;
        });

        // 4. RUTA (Por clientes únicos)
        const pends = ventas.filter(v => String(v.Estado).toUpperCase() === "PENDIENTE");
        const clientesPends = [...new Set(pends.map(v => v.Cliente))];
        const badge = document.getElementById('badge-ruta');
        const btnRuta = document.getElementById('btn-ruta');
        
        if(clientesPends.length > 0) {
            badge.innerText = clientesPends.length;
            badge.classList.remove('hidden');
            btnRuta.classList.add('pulse-notif');
        } else {
            badge.classList.add('hidden');
            btnRuta.classList.remove('pulse-notif');
        }

    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('rotate-animation'); }
}

window.onload = cargarDatos;
</script>
</body>
</html>
