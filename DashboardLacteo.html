<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#a21caf", 
            secondary: "#db2777", 
            success: "#16a34a", 
            electric: "#0055ff", 
            background: "#faf5ff", 
            outline: "#e9d5ff" 
          }
        }
      }
    }
    </script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .pulse-notif { animation: shadow-pulse 1.5s infinite; }
    @keyframes shadow-pulse {
        0% { box-shadow: 0 0 0 0px rgba(0, 85, 255, 0.5); }
        70% { box-shadow: 0 0 0 10px rgba(0, 85, 255, 0); }
        100% { box-shadow: 0 0 0 0px rgba(0, 85, 255, 0); }
    }
    .pulse-success { animation: shadow-success 1.5s infinite; }
    @keyframes shadow-success {
        0% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0.5); }
        70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
        100% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0); }
    }
    .glass-card { background: linear-gradient(135deg, #a21caf 0%, #6b21a8 100%); }
    </style>
</head>

<body class="bg-background text-[#1f012a] font-[Work_Sans] antialiased pb-10">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-20 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary border border-purple-200">
      <span class="material-symbols-outlined text-3xl">analytics</span>
    </div>
    <div>
        <h1 class="text-sm font-black text-primary tracking-tight uppercase italic leading-none">Lógica Láctea</h1>
        <input type="date" id="filtro-fecha" onchange="cargarDatos()" class="mt-1 text-[10px] font-bold border-none p-0 bg-transparent text-gray-500 focus:ring-0 uppercase">
    </div>
  </div>
  <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 active:scale-90 transition-transform">
    <span id="icon-refresh" class="material-symbols-outlined text-slate-500">sync</span>
  </button>
</header>

<main class="pt-24 px-4 max-w-7xl mx-auto space-y-5">

    <!-- 1. CARD DE DINERO (REDISEÑADA PARA INSPIRAR) -->
    <div class="glass-card p-6 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        <div class="relative z-10 space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-[10px] font-black uppercase tracking-[0.2em] text-purple-200 italic">Ventas Totales Hoy</p>
                    <h2 id="ventas-total-hoy" class="text-5xl font-black tracking-tighter">$0.00</h2>
                </div>
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/30">
                    <span class="material-symbols-outlined text-3xl">payments</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 border-t border-white/20 pt-4">
                <div>
                    <p class="text-[9px] font-bold uppercase text-purple-200">Utilidad Neta</p>
                    <p id="ganancia-real" class="text-xl font-black text-green-300">$0.00</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-bold uppercase text-purple-200">Por Cobrar</p>
                    <p id="por-recaudar" class="text-xl font-black text-amber-300">$0.00</p>
                </div>
            </div>

            <div class="bg-black/20 p-3 rounded-2xl flex justify-between items-center border border-white/10">
                <span class="text-[9px] font-bold uppercase tracking-widest text-white/70">Capital en Stock (Costo)</span>
                <span id="valor-invertido" class="font-black text-sm">$0.00</span>
            </div>
        </div>
    </div>

    <!-- 2. BOTONES DE ACCIÓN CON DESCRIPCIÓN -->
    <div class="grid grid-cols-2 gap-3">
        <!-- VENDER -->
        <button onclick="location.href='RegistrodeVentas.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-purple-100 text-primary flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Vender</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Registrar salida</span>
        </button>
        
        <!-- EN RUTA -->
        <button id="btn-ruta" onclick="location.href='GestióndeDespachos.html'" class="relative bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-sm active:scale-95 transition-all">
          <span id="badge-ruta" class="absolute top-3 right-5 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
          <div class="w-12 h-12 rounded-2xl bg-green-100 text-success flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl font-bold">local_shipping</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">En Ruta</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Gestión envíos</span>
        </button>

        <!-- STOCK -->
        <button onclick="location.href='ControldeInventario.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-pink-100 text-secondary flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">inventory</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Stock</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Ver existencias</span>
        </button>

        <!-- PROVEEDORES -->
        <button onclick="location.href='Proveedores.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-slate-100 text-slate-700 flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">factory</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Proveedores</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Contacto compra</span>
        </button>

        <!-- RECIBIR PRODUCTOS -->
        <button id="btn-recepcion" onclick="location.href='ConfirmarRecepcion.html'" class="relative bg-white border-2 border-electric/30 p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-md active:scale-95 transition-all">
            <span id="badge-recepcion" class="absolute top-3 right-5 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
            <div class="w-12 h-12 rounded-2xl bg-blue-100 text-electric flex items-center justify-center mb-1">
              <span class="material-symbols-outlined text-3xl font-bold">inventory_2</span>
            </div>
            <span class="text-[11px] font-black uppercase text-electric">Recibir</span>
            <span class="text-[8px] font-bold text-blue-400 uppercase leading-none">Ingreso mercadería</span>
        </button>

        <!-- CLIENTES -->
        <button onclick="location.href='GestiondeClientes.html'" class="bg-white border border-outline p-4 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-sm active:scale-95 transition-all">
          <div class="w-12 h-12 rounded-2xl bg-purple-50 text-primary flex items-center justify-center mb-1">
            <span class="material-symbols-outlined text-3xl">groups</span>
          </div>
          <span class="text-[11px] font-black uppercase text-slate-800">Clientes</span>
          <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Base de datos</span>
        </button>
    </div>

    <!-- 3. RANKING Y PENDIENTES -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
            <h3 class="text-[10px] font-black text-primary mb-4 uppercase tracking-[0.1em] flex items-center gap-2 italic">
                <span class="material-symbols-outlined text-sm font-bold">stars</span> Lo más vendido (Mes)
            </h3>
            <div id="ranking-productos" class="space-y-2"></div>
        </section>

        <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
            <h3 class="text-[10px] font-black text-amber-600 mb-4 uppercase tracking-[0.1em] flex items-center gap-2 italic">
                <span class="material-symbols-outlined text-sm font-bold">timer</span> Despachos Pendientes
            </h3>
            <div id="lista-pedidos" class="space-y-2"></div>
        </section>
    </div>

    <!-- 4. STOCK CRÍTICO (SIN AGOTADOS 0) -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-red-100 shadow-sm">
        <h3 class="text-[10px] font-black text-red-500 mb-4 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm font-bold">trending_down</span> Por agotarse (Stock Bajo)
        </h3>
        <div id="cont-criticos" class="grid grid-cols-1 gap-2 text-[11px]"></div>
    </section>

</main>

<script>
const hoy = new Date();
const offset = hoy.getTimezoneOffset() * 60000;
const fechaLocal = new Date(hoy - offset).toISOString().split('T')[0];
document.getElementById('filtro-fecha').value = fechaLocal;

async function cargarDatos() {
    const icon = document.getElementById('icon-refresh');
    icon?.classList.add('rotate-animation');
    const fechaSel = document.getElementById('filtro-fecha').value;

    try {
        const [resInv, resVentas, resCompras] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Compras")
        ]);

        const inventario = Array.isArray(resInv) ? resInv : [];
        const ventas = Array.isArray(resVentas) ? resVentas : [];
        const compras = Array.isArray(resCompras) ? resCompras : [];

        // 1. INVENTARIO
        const costosMap = {};
        let totalCostoBodega = 0;
        let utilidadProyectada = 0;
        inventario.forEach(p => {
            const costo = parseFloat(String(p.Precio_Distribuidor || 0).replace(',','.')) || 0;
            const precioV = parseFloat(String(p.Precio_Venta || 0).replace(',','.')) || 0;
            const stock = parseFloat(p.Stock) || 0;
            costosMap[p.Producto] = costo;
            totalCostoBodega += (costo * stock);
            utilidadProyectada += ((precioV - costo) * stock);
        });
        document.getElementById('valor-invertido').innerText = `$${totalCostoBodega.toFixed(2)}`;

        // 2. VENTAS Y RANKING
        let utilidadHoy = 0;
        let porRecaudar = 0;
        let ventaTotalHoy = 0;
        let pendsHoy = [];
        let rankingMap = {};

        ventas.forEach(v => {
            const fV = new Date(v.Fecha).toISOString().split('T')[0];
            const cantidad = parseFloat(v.Cantidad) || 0;
            const totalVenta = parseFloat(String(v["Precio Total"] || 0).replace(',','.')) || 0;
            
            if(new Date(v.Fecha).getMonth() === hoy.getMonth()){
                rankingMap[v.Producto] = (rankingMap[v.Producto] || 0) + cantidad;
            }

            if(fV === fechaSel) {
                ventaTotalHoy += totalVenta;
                utilidadHoy += (totalVenta - ((costosMap[v.Producto] || 0) * cantidad));
                if(String(v.Estado).toUpperCase() === "PENDIENTE") {
                    porRecaudar += totalVenta;
                    pendsHoy.push(v);
                }
            }
        });
        document.getElementById('ventas-total-hoy').innerText = `$${ventaTotalHoy.toFixed(2)}`;
        document.getElementById('ganancia-real').innerText = `$${utilidadHoy.toFixed(2)}`;
        document.getElementById('por-recaudar').innerText = `$${porRecaudar.toFixed(2)}`;

        // 3. BADGES
        const bRuta = document.getElementById('badge-ruta');
        if(pendsHoy.length > 0){
            bRuta.innerText = pendsHoy.length;
            bRuta.classList.remove('hidden');
            document.getElementById('btn-ruta').classList.add('pulse-success');
        } else {
            bRuta.classList.add('hidden');
            document.getElementById('btn-ruta').classList.remove('pulse-success');
        }

        const bRec = document.getElementById('badge-recepcion');
        const cPends = compras.filter(c => String(c.Estado_Entrega).toUpperCase() === "PENDIENTE");
        if(cPends.length > 0){
            const facts = [...new Set(cPends.map(p => p.ID_Compra))];
            bRec.innerText = facts.length;
            bRec.classList.remove('hidden');
            document.getElementById('btn-recepcion').classList.add('pulse-notif');
        } else {
            bRec.classList.add('hidden');
            document.getElementById('btn-recepcion').classList.remove('pulse-notif');
        }

        // 4. RENDER RANKING
        const rankingDiv = document.getElementById('ranking-productos');
        const sortedRanking = Object.entries(rankingMap).sort((a,b) => b[1] - a[1]).slice(0,5);
        rankingDiv.innerHTML = sortedRanking.map(([prod, cant], i) => `
            <div class="flex items-center justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100">
                <span class="text-[11px] font-black uppercase text-slate-700">${i+1}. ${prod}</span>
                <span class="text-primary font-black text-xs">${cant} <span class="text-[9px]">unid.</span></span>
            </div>
        `).join('') || '<p class="text-center text-slate-300 italic">Sin ventas aún</p>';

        // 5. RENDER PENDIENTES
        const listaPed = document.getElementById('lista-pedidos');
        listaPed.innerHTML = pendsHoy.map(p => `
            <div class="p-3 bg-amber-50/50 rounded-2xl flex justify-between items-center border border-amber-100">
                <div class="text-[11px] font-black uppercase text-slate-700">${p.Cliente}</div>
                <span class="text-amber-600 font-black italic">$${parseFloat(String(p["Precio Total"]).replace(',','.')).toFixed(2)}</span>
            </div>
        `).join('') || '<p class="text-center text-slate-300 italic">Todo al día</p>';

        // 6. STOCK CRÍTICO (Solo mayores a 0 y menores o iguales a 5)
        const contCrit = document.getElementById('cont-criticos');
        const criticos = inventario.filter(p => {
            const s = parseFloat(p.Stock) || 0;
            return s > 0 && s <= 5; // Filtro: Mayor que 0 y menor/igual a 5
        });
        contCrit.innerHTML = criticos.map(p => `
            <div class="flex justify-between p-3 bg-red-50 rounded-2xl border border-red-100">
                <span class="font-black uppercase text-red-900">${p.Producto}</span>
                <span class="font-black text-red-600 uppercase">${p.Stock} UNIDADES</span>
            </div>
        `).join('') || '<p class="text-center text-slate-300 italic">Stock suficiente</p>';

    } catch (e) { console.error("Error API:", e); }
    finally { icon?.classList.remove('rotate-animation'); }
}
window.onload = cargarDatos;
</script>
</body>
</html>
