<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lógica Láctea - Panel Principal</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#a21caf",
            secondary: "#db2777",
            success: "#16a34a",
            background: "#faf5ff",
            outline: "#e9d5ff",
            "on-surface": "#1f012a",
          }
        }
      }
    }
    </script>

    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    /* Clase para los iconos rellenos del menú cuando están activos */
    .active-icon { font-variation-settings: 'FILL' 1 !important; }
    </style>
</head>

<body class="bg-background text-on-surface font-[Work_Sans] antialiased pb-40">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-3 cursor-pointer">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
      <span class="material-symbols-outlined text-3xl active-icon">opacity</span>
    </div>
    <h1 class="text-xl font-extrabold text-primary tracking-tight">Lógica Láctea</h1>
  </div>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">

    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
      <div class="md:col-span-8 bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
        <span class="text-secondary text-xs uppercase font-black tracking-widest">Ventas del Día</span>
        <div class="flex items-center gap-2 mt-2">
          <span id="ventas-hoy" class="text-5xl font-black tracking-tighter text-gray-900">$0.00</span>
        </div>
      </div>

      <div class="md:col-span-4 grid grid-cols-2 gap-2">
        <button onclick="window.location.href='RegistrodeVentas.html'" class="bg-primary text-white p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 shadow-md">
          <span class="material-symbols-outlined text-2xl">add_shopping_cart</span>
          <span class="text-[10px] font-black uppercase">Nueva Venta</span>
        </button>
        <button onclick="window.location.href='ControldeInventario.html'" class="bg-secondary text-white p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 shadow-md">
          <span class="material-symbols-outlined text-2xl">inventory</span>
          <span class="text-[10px] font-black uppercase">Stock</span>
        </button>
        <button onclick="window.location.href='GestiondeClientes.html'" class="bg-white border-2 border-outline p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95">
          <span class="material-symbols-outlined text-2xl text-primary">group</span>
          <span class="text-[10px] font-black uppercase text-primary">Clientes</span>
        </button>
        <button onclick="window.location.href='GestióndeDespachos.html'" class="bg-success text-white p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 shadow-lg shadow-green-100">
          <span class="material-symbols-outlined text-2xl">local_shipping</span>
          <span class="text-[10px] font-black uppercase text-white">Ruta</span>
        </button>
      </div>
    </div>

    <section class="bg-white p-5 rounded-[2.5rem] border border-outline shadow-sm">
      <h3 class="text-lg font-black text-success flex items-center gap-2 mb-4 uppercase text-xs tracking-widest">
        <span class="material-symbols-outlined">route</span> Próximas Entregas
      </h3>
      <div id="lista-entregas" class="space-y-3 text-sm">
        <p class="text-center py-4 text-gray-400 italic font-bold">Cargando ruta...</p>
      </div>
    </section>

    <section>
      <div class="flex justify-between items-center mb-4 px-2">
        <h3 class="text-xl font-black tracking-tight">Estado de Stock</h3>
        <button id="btn-refresh" onclick="cargarDatos()" class="text-primary text-xs font-black flex items-center gap-2 bg-white px-4 py-2 rounded-2xl border border-outline active:bg-purple-50 shadow-sm transition-all">
            <span id="icon-refresh" class="material-symbols-outlined text-sm">refresh</span> ACTUALIZAR
        </button>
      </div>

      <div class="overflow-hidden border border-outline rounded-[2rem] bg-white shadow-sm">
        <table class="w-full text-left">
          <thead class="bg-gray-50 text-[10px] uppercase font-black text-gray-400 tracking-widest border-b border-outline">
            <tr>
              <th class="p-4">Producto</th>
              <th class="p-4 text-center">Stock</th>
              <th class="p-4 text-center">Estado</th>
            </tr>
          </thead>
          <tbody id="tabla-inventario" class="text-sm">
            <tr><td colspan="3" class="p-12 text-center text-gray-400 font-bold">Sincronizando bodega...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

</main>

<div id="menu-container"></div>

<script>
// 1. CARGAR EL MENÚ EXTERNO
fetch('menu.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('menu-container').innerHTML = data;
        marcarBotonActivo();
    });

function marcarBotonActivo() {
    // Detectamos si es el Dashboard o el Inicio
    const botones = document.querySelectorAll('.nav-item');
    botones.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes('DashboardLácteo.html')) {
            btn.classList.add('text-primary');
            btn.classList.remove('text-gray-400');
        }
    });
}

// 2. LÓGICA DE DATOS DEL DASHBOARD
async function cargarDatos() {
    const icon = document.getElementById('icon-refresh');
    icon.classList.add('rotate-animation');

    try {
        // Cargar Ventas, Inventario y Despachos en paralelo
        const [inventario, ventas] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        // Renderizar Inventario
        const tabla = document.getElementById('tabla-inventario');
        tabla.innerHTML = "";
        inventario.slice(0, 5).forEach(prod => {
            const stock = parseFloat(prod.Stock) || 0;
            const esBajo = stock <= 10;
            tabla.innerHTML += `
                <tr class="border-t border-purple-50">
                    <td class="p-4 font-extrabold text-gray-800">${prod.Producto}</td>
                    <td class="p-4 text-center font-black text-lg">${stock}</td>
                    <td class="p-4 text-center">
                        <div class="w-3 h-3 rounded-full mx-auto ${esBajo ? 'bg-red-500 animate-pulse' : 'bg-green-500'}"></div>
                    </td>
                </tr>`;
        });

        // Calcular Ventas del Día (Filtrando por fecha de hoy si la tienes en el Excel)
        const totalVentas = ventas.reduce((acc, v) => acc + (parseFloat(v["Precio Total"]) || 0), 0);
        document.getElementById('ventas-hoy').innerText = `$${totalVentas.toFixed(2)}`;

        // Cargar Despachos Pendientes (de la misma lógica que GestióndeDespachos)
        const listaEntregas = document.getElementById('lista-entregas');
        const pendientes = ventas.filter(v => v.Estado === "PENDIENTE");
        
        // Agrupar por cliente para mostrar los 3 primeros en el Dashboard
        const clientesUnicos = [...new Set(pendientes.map(v => v.Cliente))].slice(0, 3);

        listaEntregas.innerHTML = "";
        if (clientesUnicos.length === 0) {
            listaEntregas.innerHTML = `<p class="text-center py-4 text-gray-400 font-bold">No hay entregas pendientes</p>`;
        } else {
            clientesUnicos.forEach(cliente => {
                listaEntregas.innerHTML += `
                    <div class="flex justify-between items-center bg-green-50 p-4 rounded-2xl border border-green-100">
                        <div>
                            <p class="text-sm font-black text-green-800 uppercase tracking-tight">${cliente}</p>
                            <p class="text-[10px] font-bold text-green-600">CLIENTE PENDIENTE</p>
                        </div>
                        <span class="material-symbols-outlined text-green-600 active-icon">local_shipping</span>
                    </div>`;
            });
        }

    } catch (e) {
        console.error("Error al cargar dashboard:", e);
    } finally {
        setTimeout(() => icon.classList.remove('rotate-animation'), 800);
    }
}

window.onload = cargarDatos;
</script>
</body>
</html>
