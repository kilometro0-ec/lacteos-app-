<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#a21caf", secondary: "#db2777", success: "#16a34a", background: "#faf5ff", outline: "#e9d5ff" }
        }
      }
    }
    </script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .pulse-notif { animation: shadow-pulse 1.5s infinite; }
    @keyframes shadow-pulse {
        0% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0.5); }
        70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
        100% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0); }
    }
    /* Sombra especial para el botón de clientes */
    .btn-cliente-especial {
        box-shadow: 0 10px 15px -3px rgba(162, 28, 175, 0.3), 0 4px 6px -4px rgba(162, 28, 175, 0.3);
    }
    </style>
</head>

<body class="bg-background text-[#1f012a] font-[Work_Sans] antialiased pb-24">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-20 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-3xl">opacity</span>
    </div>
    <div>
        <h1 class="text-sm font-black text-primary tracking-tight uppercase italic leading-none">Lógica Láctea</h1>
        <input type="date" id="filtro-fecha" onchange="cargarDatos()" class="mt-1 text-[10px] font-bold border-none p-0 bg-transparent text-gray-500 focus:ring-0">
    </div>
  </div>
  <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
    <span id="icon-refresh" class="material-symbols-outlined text-slate-500">sync</span>
  </button>
</header>

<main class="pt-24 px-4 max-w-7xl mx-auto space-y-4">

    <!-- 1. BLOQUE DE MÉTRICAS -->
    <div class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm space-y-6">
        <div class="flex justify-between items-start">
            <div>
                <h3 class="text-[10px] font-black text-success uppercase tracking-widest italic mb-1">Utilidad Real Hoy</h3>
                <span id="ganancia-real" class="text-5xl font-black tracking-tighter text-success">$0.00</span>
            </div>
            <div class="text-right">
                <h3 class="text-[10px] font-black text-amber-600 uppercase tracking-widest italic mb-1 italic">Por Cobrar</h3>
                <span id="por-recaudar" class="text-xl font-black text-amber-600">$0.00</span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 pt-6 border-t border-slate-100">
            <div>
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Inversión Actual</h3>
                <span id="valor-invertido" class="text-lg font-black text-slate-800">$0.00</span>
            </div>
            <div class="text-right">
                <h3 class="text-[9px] font-black text-primary uppercase mb-1 italic">Potencial de Ganancia</h3>
                <span id="utilidad-proyectada" class="text-lg font-black text-primary">$0.00</span>
            </div>
        </div>
    </div>

    <!-- 2. BOTONES DE ACCIÓN -->
    <div class="grid grid-cols-2 gap-3">
        <button onclick="location.href='RegistrodeVentas.html'" class="bg-primary text-white p-5 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-lg active:scale-95 transition-all">
          <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
          <span class="text-[10px] font-black uppercase">Vender</span>
        </button>
        
        <button id="btn-ruta" onclick="location.href='GestióndeDespachos.html'" class="relative bg-success text-white p-5 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-lg active:scale-95 transition-all">
          <span id="badge-ruta" class="absolute top-2 right-4 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
          <span class="material-symbols-outlined text-3xl">local_shipping</span>
          <span class="text-[10px] font-black uppercase">En Ruta</span>
        </button>

        <button onclick="location.href='ControldeInventario.html'" class="bg-secondary text-white p-5 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-lg active:scale-95 transition-all">
          <span class="material-symbols-outlined text-3xl">inventory</span>
          <span class="text-[10px] font-black uppercase">Stock</span>
        </button>

        <button onclick="location.href='GestiondeProveedores.html'" class="bg-slate-800 text-white p-5 rounded-[2rem] flex flex-col items-center text-center gap-1 shadow-lg active:scale-95 transition-all">
          <span class="material-symbols-outlined text-3xl">factory</span>
          <span class="text-[10px] font-black uppercase">Proveedor</span>
        </button>

        <!-- BOTÓN CLIENTES CON SOMBRA DIFERENTE -->
        <button onclick="location.href='GestiondeClientes.html'" class="btn-cliente-especial bg-white border-2 border-primary/20 p-5 rounded-[2rem] flex flex-col items-center text-center gap-1 active:bg-slate-50 transition-all col-span-2">
          <span class="material-symbols-outlined text-primary text-3xl">person_search</span>
          <span class="text-[11px] font-black uppercase text-primary tracking-widest">Base de Clientes</span>
        </button>
    </div>

    <!-- 3. LISTADO DE PEDIDOS PENDIENTES (6 PEDIDOS) -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
        <h3 class="text-[10px] font-black text-amber-600 mb-4 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm font-bold">pending_actions</span> Pedidos Pendientes
        </h3>
        <div id="lista-pedidos" class="space-y-2"></div>
    </section>

    <!-- 4. LISTADO DE STOCK CRÍTICO (RESCATADO) -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-red-100 shadow-sm">
        <h3 class="text-[10px] font-black text-red-500 mb-4 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm font-bold">warning</span> Alerta: Por agotarse
        </h3>
        <div id="cont-criticos" class="space-y-2 text-[11px]"></div>
    </section>

    <!-- 5. RANKING -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm">
        <h3 class="text-[10px] font-black text-primary mb-5 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm font-bold">analytics</span> Tendencia de Ventas
        </h3>
        <div id="grafico-vendidos" class="space-y-5"></div>
    </section>

</main>

<div id="menu-container"></div>

<script>
const hoy = new Date();
const offset = hoy.getTimezoneOffset() * 60000;
const fechaLocal = new Date(hoy - offset).toISOString().split('T')[0];
document.getElementById('filtro-fecha').value = fechaLocal;

async function cargarDatos() {
    const icon = document.getElementById('icon-refresh');
    icon?.classList.add('rotate-animation');
    const fechaSel = document.getElementById('filtro-fecha').value;

    try {
        const [resInv, resVentas] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        const inventario = Array.isArray(resInv) ? resInv : [];
        const ventas = Array.isArray(resVentas) ? resVentas : [];

        // MAPEO Y DINERO
        const costosMap = {};
        let totalCostoBodega = 0;
        let utilidadProyectada = 0;

        inventario.forEach(p => {
            const costo = parseFloat(String(p.Precio_Distribuidor || 0).replace(',','.')) || 0;
            const precioVenta = parseFloat(String(p.Precio_Venta || 0).replace(',','.')) || 0;
            const stock = parseFloat(p.Stock) || 0;
            costosMap[p.Producto] = costo;
            totalCostoBodega += (costo * stock);
            utilidadProyectada += ((precioVenta - costo) * stock);
        });

        document.getElementById('valor-invertido').innerText = `$${totalCostoBodega.toFixed(2)}`;
        document.getElementById('utilidad-proyectada').innerText = `$${utilidadProyectada.toFixed(2)}`;

        // VENTAS Y GANANCIA DEL DÍA
        let utilidadHoy = 0;
        let porRecaudar = 0;
        let pendsHoy = [];

        ventas.forEach(v => {
            const fV = new Date(v.Fecha).toISOString().split('T')[0];
            if(fV === fechaSel) {
                const totalVenta = parseFloat(String(v["Precio Total"] || 0).replace(',','.')) || 0;
                const cantidad = parseFloat(v.Cantidad) || 0;
                const costoUnitario = costosMap[v.Producto] || 0;
                utilidadHoy += (totalVenta - (costoUnitario * cantidad));

                if(String(v.Estado).toUpperCase() === "PENDIENTE") {
                    porRecaudar += totalVenta;
                    pendsHoy.push(v);
                }
            }
        });

        document.getElementById('ganancia-real').innerText = `$${utilidadHoy.toFixed(2)}`;
        document.getElementById('por-recaudar').innerText = `$${porRecaudar.toFixed(2)}`;

        // STOCK CRÍTICO (LISTADO REAL)
        const contCriticos = document.getElementById('cont-criticos');
        const criticos = inventario.filter(p => {
            const s = parseFloat(p.Stock) || 0;
            return s > 0 && s <= 5;
        }).sort((a,b) => parseFloat(a.Stock) - parseFloat(b.Stock));

        if(criticos.length > 0) {
            contCriticos.innerHTML = "";
            criticos.forEach(p => {
                contCriticos.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-red-50 rounded-xl border border-red-100">
                        <span class="font-black uppercase text-red-900 italic">${p.Producto}</span>
                        <span class="bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">${p.Stock} un.</span>
                    </div>`;
            });
        } else {
            contCriticos.innerHTML = '<p class="text-center text-slate-300 italic">Inventario saludable</p>';
        }

        // RUTA (CONTEO CORREGIDO DE PEDIDOS)
        const badgeRuta = document.getElementById('badge-ruta');
        const listaPed = document.getElementById('lista-pedidos');
        
        // Aquí contamos el total de pedidos pendientes (no solo clientes únicos)
        if(pendsHoy.length > 0) {
            badgeRuta.innerText = pendsHoy.length;
            badgeRuta.classList.remove('hidden');
            document.getElementById('btn-ruta').classList.add('pulse-notif');
            listaPed.innerHTML = "";
            pendsHoy.forEach(p => {
                listaPed.innerHTML += `
                    <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="font-black uppercase text-slate-700 leading-none">${p.Cliente}</p>
                            <p class="text-[9px] text-slate-400 mt-1 uppercase font-bold">${p.Producto}</p>
                        </div>
                        <span class="text-amber-600 font-black italic">$${parseFloat(String(p["Precio Total"]).replace(',','.')).toFixed(2)}</span>
                    </div>`;
            });
        } else {
            badgeRuta.classList.add('hidden');
            listaPed.innerHTML = '<p class="text-center text-slate-300 italic">No hay pedidos pendientes</p>';
        }

        // RANKING
        const rank = {};
        ventas.forEach(v => { rank[v.Producto] = (rank[v.Producto] || 0) + (parseFloat(v.Cantidad) || 0); });
        const top = Object.entries(rank).sort((a,b) => b[1]-a[1]).slice(0, 5);
        const grafico = document.getElementById('grafico-vendidos');
        grafico.innerHTML = "";
        const max = top[0] ? top[0][1] : 1;
        top.forEach(([name, qty]) => {
            grafico.innerHTML += `
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] font-black uppercase italic text-slate-600">
                        <span>${name}</span>
                        <span class="text-primary">${qty} un.</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-primary h-full" style="width:${(qty/max)*100}%"></div>
                    </div>
                </div>`;
        });

    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('rotate-animation'); }
}
window.onload = cargarDatos;
</script>
</body>
</html>
