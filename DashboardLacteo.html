<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dairy Logic - Panel Principal</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="api-config.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#a21caf",
        "primary-container": "#c026d3",
        secondary: "#db2777",
        background: "#faf5ff",
        surface: "#ffffff",
        outline: "#e9d5ff",
        "on-surface": "#1f012a",
        "on-surface-variant": "#6b21a8",
        error: "#dc2626",
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
body { min-height: 100vh; }
</style>
</head>

<body class="bg-background text-on-surface font-body-md antialiased">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-primary-fixed flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-3xl">water_drop</span> </div>
    <h1 class="text-xl font-bold text-primary">Dairy Logic</h1>
  </div>

  <button class="p-2 text-on-surface-variant hover:bg-surface-container rounded-lg">
    <span class="material-symbols-outlined">notifications</span>
  </button>
</header>

<main class="pt-20 pb-32 px-4 max-w-7xl mx-auto">

<section class="mb-6">
  <h2 class="text-3xl font-bold text-primary">Bienvenido</h2>
  <p class="text-on-surface-variant">Panel de control en tiempo real</p>
</section>

<div class="grid grid-cols-1 md:grid-cols-12 gap-4">

  <div class="md:col-span-8 bg-white p-6 rounded-2xl border border-outline shadow-sm">
    <span class="text-secondary text-xs uppercase font-bold tracking-wider">Ventas del Día</span>
    <div class="flex items-center gap-2 mt-2">
      <span id="ventas-hoy" class="text-5xl font-black">$0.00</span>
      <span class="text-green-600 text-sm font-bold bg-green-50 px-2 py-1 rounded-full">+12%</span>
    </div>
  </div>

  <div class="md:col-span-4 grid grid-cols-2 gap-2">
    <button onclick="window.location.href='RegistrodeVentas.html'" class="bg-primary hover:bg-primary-container text-white p-4 rounded-xl flex flex-col items-center gap-2 transition-all active:scale-95">
      <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
      <span class="text-xs font-bold uppercase">Nueva Venta</span>
    </button>
    <button onclick="window.location.href='ControldeInventario.html'" class="bg-secondary hover:bg-secondary-container text-white p-4 rounded-xl flex flex-col items-center gap-2 transition-all active:scale-95">
      <span class="material-symbols-outlined text-3xl">inventory</span>
      <span class="text-xs font-bold uppercase">Stock</span>
    </button>
    <button onclick="window.location.href='GestióndeClientes.html'" class="bg-surface-container hover:bg-surface-container-high p-4 rounded-xl flex flex-col items-center gap-2 border border-outline transition-all active:scale-95">
      <span class="material-symbols-outlined text-3xl">group</span>
      <span class="text-xs font-bold uppercase">Clientes</span>
    </button>
    <button onclick="window.location.href='GestióndeDespachos.html'" class="bg-surface-container hover:bg-surface-container-high p-4 rounded-xl flex flex-col items-center gap-2 border border-outline transition-all active:scale-95">
      <span class="material-symbols-outlined text-3xl">local_shipping</span>
      <span class="text-xs font-bold uppercase">Entregas</span>
    </button>
  </div>

</div>

<section class="mt-8">
  <div class="flex justify-between items-end mb-4">
    <h3 class="text-2xl font-bold">Estado de Productos</h3>
    <button onclick="cargarDatosDashboard()" class="text-primary text-sm font-bold flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">refresh</span> Actualizar
    </button>
  </div>

  <div class="overflow-x-auto border border-outline rounded-2xl bg-white shadow-sm">
    <table class="w-full text-left">
      <thead class="bg-surface-container text-on-surface-variant text-xs uppercase">
        <tr>
          <th class="p-4">Producto</th>
          <th class="p-4">Stock Actual</th>
          <th class="p-4">Estado</th>
        </tr>
      </thead>
      <tbody id="tabla-inventario">
        <tr>
            <td colspan="3" class="p-8 text-center text-gray-400">Cargando datos desde Google Sheets...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50">
  <button onclick="window.location.href='DashboardLácteo.html'" class="text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-bold">Inicio</span>
  </button>
  <button onclick="window.location.href='RegistrodeVentas.html'" class="text-on-surface-variant hover:text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">receipt</span>
    <span class="text-[10px]">Ventas</span>
  </button>
  <button onclick="window.location.href='ControldeInventario.html'" class="text-on-surface-variant hover:text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">inventory</span>
    <span class="text-[10px]">Stock</span>
  </button>
  <button onclick="window.location.href='GestióndeDespachos.html'" class="text-on-surface-variant hover:text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">local_shipping</span>
    <span class="text-[10px]">Entregas</span>
  </button>
</nav>

<script>
// FUNCIÓN PARA CARGAR DATOS DESDE LA API CENTRAL
async function cargarDatosDashboard() {
  try {
    // 1. Obtener datos de Inventario
    const inventario = await DairyAPI.obtenerDatos("Inventario");
    const tabla = document.getElementById('tabla-inventario');
    tabla.innerHTML = "";

    inventario.slice(0, 5).forEach(prod => {
      const isLow = prod.Stock < 15;
      tabla.innerHTML += `
        <tr class="border-t">
          <td class="p-4 font-semibold">${prod.Producto}</td>
          <td class="p-4">${prod.Stock}</td>
          <td class="p-4">
            <span class="${isLow ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'} px-3 py-1 rounded-full text-xs font-bold">
              ${isLow ? 'CRÍTICO' : 'DISPONIBLE'}
            </span>
          </td>
        </tr>
      `;
    });

    // 2. Obtener total de ventas (ejemplo simple sumando la columna 'Total')
    const ventas = await DairyAPI.obtenerDatos("Ventas");
    const hoyTotal = ventas.reduce((acc, v) => acc + (parseFloat(v.Total) || 0), 0);
    document.getElementById('ventas-hoy').innerText = `$${hoyTotal.toFixed(2)}`;

  } catch (error) {
    console.error("Error cargando datos:", error);
    document.getElementById('tabla-inventario').innerHTML = `<tr><td colspan="3" class="p-4 text-center text-red-500">Error de conexión</td></tr>`;
  }
}

// Ejecutar al iniciar
window.onload = cargarDatosDashboard;
</script>

</body>
</html>
