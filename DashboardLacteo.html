<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lógica Láctea - Panel Principal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#a21caf", secondary: "#db2777", success: "#16a34a", background: "#faf5ff", outline: "#e9d5ff" } } }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-icon { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="bg-background text-slate-900 antialiased pb-40">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined text-3xl active-icon">opacity</span>
        </div>
        <h1 class="text-xl font-extrabold text-primary tracking-tighter uppercase">Lógica Láctea</h1>
    </div>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-4">
    <div class="grid grid-cols-2 gap-3">
        <div class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm">
            <span class="text-secondary text-[10px] uppercase font-black tracking-widest block mb-1">Ventas</span>
            <span id="ventas-hoy" class="text-2xl font-black tracking-tighter">$0.00</span>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm">
            <span class="text-primary text-[10px] uppercase font-black tracking-widest block mb-1">Inversión</span>
            <span id="valor-invertido" class="text-2xl font-black tracking-tighter">$0.00</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 py-2">
        <button onclick="window.location.href='RegistrodeVentas.html'" class="bg-primary text-white p-4 rounded-3xl flex flex-col items-center gap-2 shadow-md active:scale-95 transition-all">
            <span class="material-symbols-outlined">add_shopping_cart</span>
            <span class="text-[9px] font-black uppercase">Vender</span>
        </button>
        <button onclick="window.location.href='ControldeInventario.html'" class="bg-secondary text-white p-4 rounded-3xl flex flex-col items-center gap-2 shadow-md active:scale-95 transition-all">
            <span class="material-symbols-outlined">inventory</span>
            <span class="text-[9px] font-black uppercase">Stock</span>
        </button>

        <button onclick="window.location.href='PedidosProveedor.html'" class="col-span-2 bg-amber-500 text-white p-5 rounded-[2rem] flex items-center justify-center gap-4 shadow-lg shadow-amber-100 active:scale-95 transition-all">
            <div class="bg-white/20 p-2 rounded-xl">
                <span class="material-symbols-outlined text-3xl">shopping_cart_checkout</span>
            </div>
            <div class="text-left">
                <p class="text-[10px] font-black uppercase opacity-80 leading-none">Compras</p>
                <p class="text-sm font-black uppercase tracking-tight">Hacer Pedido a Proveedor</p>
            </div>
        </button>

        <button onclick="window.location.href='GestiondeProveedores.html'" class="bg-white border border-outline p-4 rounded-3xl flex flex-col items-center gap-2 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-amber-600">storefront</span>
            <span class="text-[9px] font-black uppercase text-amber-600">Proveedores</span>
        </button>
        <button onclick="window.location.href='GestiondeClientes.html'" class="bg-white border border-outline p-4 rounded-3xl flex flex-col items-center gap-2 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-primary">group</span>
            <span class="text-[9px] font-black uppercase text-primary">Clientes</span>
        </button>
    </div>
</main>

<div id="menu-container"></div>

<script>
    async function cargarTodo() {
        const resMenu = await fetch('menu.html');
        document.getElementById('menu-container').innerHTML = await resMenu.text();
        // Aquí iría tu lógica actual de cargarDatos() para los números del dashboard
    }
    window.onload = cargarTodo;
</script>
</body>
</html>
