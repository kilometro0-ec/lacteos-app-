<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#a21caf", secondary: "#db2777", success: "#16a34a", background: "#faf5ff", outline: "#e9d5ff" }
        }
      }
    }
    </script>

    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .rotate-animation { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    /* Animación para el botón de Ruta si hay pedidos */
    .pulse-notif { animation: shadow-pulse 1.5s infinite; }
    @keyframes shadow-pulse {
        0% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0.5); }
        70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
        100% { box-shadow: 0 0 0 0px rgba(22, 163, 74, 0); }
    }
    </style>
</head>

<body class="bg-background text-[#1f012a] font-[Work_Sans] antialiased pb-24">

<!-- HEADER LIMPIO -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-20 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-3xl">opacity</span>
    </div>
    <div>
        <h1 class="text-sm font-black text-primary tracking-tight uppercase italic leading-none">Lógica Láctea</h1>
        <input type="date" id="filtro-fecha" onchange="cargarDatos()" class="mt-1 text-[10px] font-bold border-none p-0 bg-transparent text-gray-500 focus:ring-0">
    </div>
  </div>
  <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
    <span id="icon-refresh" class="material-symbols-outlined text-slate-500">sync</span>
  </button>
</header>

<main class="pt-24 px-4 max-w-7xl mx-auto space-y-6">

    <!-- FILA 1: ACCIÓN DIRECTA (VENDER Y RUTA) -->
    <div class="grid grid-cols-2 gap-4">
        <button onclick="location.href='RegistrodeVentas.html'" class="bg-primary text-white p-6 rounded-[2.5rem] flex flex-col items-center gap-2 shadow-lg active:scale-95 transition-all">
          <span class="material-symbols-outlined text-4xl">add_shopping_cart</span>
          <span class="text-[10px] font-black uppercase tracking-widest">Nueva Venta</span>
        </button>
        
        <button id="btn-ruta" onclick="location.href='GestióndeDespachos.html'" class="relative bg-success text-white p-6 rounded-[2.5rem] flex flex-col items-center gap-2 shadow-lg active:scale-95 transition-all">
          <span id="badge-ruta" class="absolute top-4 right-6 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
          <span class="material-symbols-outlined text-4xl">local_shipping</span>
          <span class="text-[10px] font-black uppercase tracking-widest">En Ruta</span>
        </button>
    </div>

    <!-- FILA 2: STOCK (TARJETA DE INVERSIÓN) -->
    <div class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm relative">
        <div id="critico-label" class="absolute top-6 right-6 bg-red-50 text-red-600 text-[8px] font-black px-2 py-1 rounded-lg border border-red-100 hidden uppercase tracking-wider">0 Stock Crítico</div>
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Valor de Stock en Bodega</h3>
        <div class="flex items-baseline gap-2">
            <span id="valor-invertido" class="text-4xl font-black tracking-tighter text-gray-900">$0.00</span>
        </div>
        <button onclick="location.href='ControldeInventario.html'" class="mt-4 w-full py-3 bg-slate-50 rounded-2xl text-[9px] font-bold text-primary uppercase flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">inventory_2</span> Ir a Inventario
        </button>
    </div>

    <!-- MARGEN Y BALANCE -->
    <div class="bg-white p-6 rounded-[2.5rem] border-2 border-success/20 shadow-md bg-gradient-to-br from-white to-green-50/20">
      <div class="flex justify-between items-start mb-2">
          <span class="text-success text-[10px] uppercase font-black tracking-widest">Balance de Operación</span>
          <div id="comparativa-ayer" class="flex items-center gap-1 text-[10px] font-bold text-slate-400"></div>
      </div>
      <div class="flex justify-between items-end">
          <div>
            <span id="ganancia-total" class="text-5xl font-black tracking-tighter text-success">$0.00</span>
            <p class="text-[9px] text-slate-400 font-bold mt-1 uppercase">(Recaudo Hoy - Inversión Bodega)</p>
          </div>
          <div class="text-right">
              <span class="text-[10px] text-slate-400 block uppercase font-bold">Ventas Brutas</span>
              <span id="ventas-hoy" class="text-xl font-black text-slate-700">$0.00</span>
          </div>
      </div>
    </div>

    <!-- FILA 3: GESTIÓN DE BASE -->
    <div class="grid grid-cols-2 gap-4">
        <button onclick="location.href='GestiondeClientes.html'" class="bg-white border border-outline p-5 rounded-[2.5rem] flex items-center justify-center gap-3 active:bg-slate-50">
          <span class="material-symbols-outlined text-primary">group</span>
          <span class="text-[10px] font-black uppercase text-slate-600">Clientes</span>
        </button>

        <button onclick="location.href='Proveedores.html'" class="bg-white border border-outline p-5 rounded-[2.5rem] flex items-center justify-center gap-3 active:bg-slate-50">
          <span class="material-symbols-outlined text-amber-600">factory</span>
          <span class="text-[10px] font-black uppercase text-slate-600">Prov.</span>
        </button>
    </div>

    <!-- RANKING DE SALIDA -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline">
        <h3 class="text-[10px] font-black text-primary mb-6 uppercase tracking-widest flex items-center gap-2 italic">
            <span class="material-symbols-outlined text-sm">bar_chart</span> Productos con mayor rotación
        </h3>
        <div id="grafico-vendidos" class="space-y-6"></div>
    </section>

</main>

<div id="menu-container"></div>

<script>
const hoy = new Date();
const offset = hoy.getTimezoneOffset() * 60000;
const fechaLocal = new Date(hoy - offset).toISOString().split('T')[0];
document.getElementById('filtro-fecha').value = fechaLocal;

async function cargarDatos() {
    const icon = document.getElementById('icon-refresh');
    icon?.classList.add('rotate-animation');
    const fechaSel = document.getElementById('filtro-fecha').value;

    try {
        const [resInv, resVentas] = await Promise.all([
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        const inventario = Array.isArray(resInv) ? resInv : [];
        const ventas = Array.isArray(resVentas) ? resVentas : [];

        // STOCK CRÍTICO E INVERSIÓN
        let totalInv = 0;
        const pCriticos = inventario.filter(p => (parseFloat(p.Stock) || 0) <= 5);
        const lblCritico = document.getElementById('critico-label');
        
        if(pCriticos.length > 0) {
            lblCritico.innerText = `${pCriticos.length} AGOTÁNDOSE`;
            lblCritico.classList.remove('hidden');
        } else {
            lblCritico.classList.add('hidden');
        }

        inventario.forEach(p => {
            const cost = parseFloat(String(p.Precio_Distribuidor || 0).replace(',','.')) || 0;
            totalInv += (cost * (parseFloat(p.Stock) || 0));
        });
        document.getElementById('valor-invertido').innerText = `$${totalInv.toFixed(2)}`;

        // VENTAS Y BALANCE
        const ayer = new Date(new Date(fechaSel) - 86400000).toISOString().split('T')[0];
        let recHoy = 0, recAyer = 0;

        ventas.forEach(v => {
            const fV = new Date(v.Fecha).toISOString().split('T')[0];
            const val = parseFloat(String(v["Precio Total"] || 0).replace(',','.')) || 0;
            if(fV === fechaSel) recHoy += val;
            if(fV === ayer) recAyer += val;
        });

        // Margen = Recaudado - Valor de lo que hay en bodega actualmente
        const balance = recHoy - totalInv;

        document.getElementById('ventas-hoy').innerText = `$${recHoy.toFixed(2)}`;
        document.getElementById('ganancia-total').innerText = `$${balance.toFixed(2)}`;

        const compDiv = document.getElementById('comparativa-ayer');
        const subio = recHoy >= recAyer;
        compDiv.innerHTML = `
            <span class="material-symbols-outlined text-[12px] ${subio?'text-success':'text-red-500'}">${subio?'bolt':'south'}</span>
            Ayer: $${recAyer.toFixed(2)}`;

        // RANKING (Detalle completo)
        const rank = {};
        ventas.forEach(v => { rank[v.Producto] = (rank[v.Producto] || 0) + (parseFloat(v.Cantidad) || 0); });
        const top = Object.entries(rank).sort((a,b) => b[1]-a[1]).slice(0, 4);
        const grafico = document.getElementById('grafico-vendidos');
        grafico.innerHTML = "";
        const max = top[0] ? top[0][1] : 1;
        top.forEach(([name, qty]) => {
            grafico.innerHTML += `
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] font-black uppercase">
                        <span class="text-slate-700 truncate pr-4">${name}</span>
                        <span class="text-primary">${qty} un.</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-primary h-full" style="width:${(qty/max)*100}%"></div>
                    </div>
                </div>`;
        });

        // RUTA POR ENTREGAS
        const pends = ventas.filter(v => String(v.Estado).toUpperCase() === "PENDIENTE");
        const clientesPends = [...new Set(pends.map(v => v.Cliente))];
        const badge = document.getElementById('badge-ruta');
        if(clientesPends.length > 0) {
            badge.innerText = clientesPends.length;
            badge.classList.remove('hidden');
            document.getElementById('btn-ruta').classList.add('pulse-notif');
        } else {
            badge.classList.add('hidden');
            document.getElementById('btn-ruta').classList.remove('pulse-notif');
        }

    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('rotate-animation'); }
}

window.onload = cargarDatos;
</script>
</body>
</html>
