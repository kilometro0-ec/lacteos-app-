<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lógica Láctea - Panel Principal</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="api-config.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#a21caf",
        secondary: "#db2777",
        success: "#16a34a", // Color verde para entregas
        background: "#faf5ff",
        outline: "#e9d5ff",
        "on-surface": "#1f012a",
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.rotate-animation { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>

<body class="bg-background text-on-surface font-body-md antialiased pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
      <span class="material-symbols-outlined text-3xl">opacity</span>
    </div>
    <h1 class="text-xl font-bold text-primary">Lógica Láctea</h1>
  </div>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">

<div class="grid grid-cols-1 md:grid-cols-12 gap-4">
  <div class="md:col-span-8 bg-white p-6 rounded-2xl border border-outline shadow-sm">
    <span class="text-secondary text-xs uppercase font-bold tracking-wider">Ventas del Día</span>
    <div class="flex items-center gap-2 mt-2">
      <span id="ventas-hoy" class="text-5xl font-black">$0.00</span>
    </div>
  </div>

  <div class="md:col-span-4 grid grid-cols-2 gap-2">
    <button onclick="window.location.href='RegistrodeVentas.html'" class="bg-primary text-white p-4 rounded-xl flex flex-col items-center gap-2 transition-all active:scale-95">
      <span class="material-symbols-outlined text-2xl">add_shopping_cart</span>
      <span class="text-[10px] font-bold uppercase">Ventas</span>
    </button>
    <button onclick="window.location.href='ControldeInventario.html'" class="bg-secondary text-white p-4 rounded-xl flex flex-col items-center gap-2 transition-all active:scale-95">
      <span class="material-symbols-outlined text-2xl">inventory</span>
      <span class="text-[10px] font-bold uppercase">Stock</span>
    </button>
    <button onclick="window.location.href='GestióndeClientes.html'" class="bg-white border border-outline p-4 rounded-xl flex flex-col items-center gap-2 transition-all">
      <span class="material-symbols-outlined text-2xl text-primary">group</span>
      <span class="text-[10px] font-bold uppercase text-primary">Clientes</span>
    </button>
    <button onclick="window.location.href='GestióndeDespachos.html'" class="bg-success text-white p-4 rounded-xl flex flex-col items-center gap-2 transition-all active:scale-95 shadow-lg shadow-green-100">
      <span class="material-symbols-outlined text-2xl">local_shipping</span>
      <span class="text-[10px] font-bold uppercase">Entregas</span>
    </button>
  </div>
</div>

<section class="bg-white p-4 rounded-2xl border border-outline shadow-sm">
  <h3 class="text-lg font-bold text-success flex items-center gap-2 mb-3">
    <span class="material-symbols-outlined">route</span> Próximas Entregas
  </h3>
  <div id="lista-entregas" class="space-y-3">
    <p class="text-xs text-gray-400">Cargando despachos...</p>
  </div>
</section>

<section>
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-xl font-bold">Estado de Stock</h3>
    <button id="btn-refresh" onclick="cargarDatos()" class="text-primary text-sm font-bold flex items-center gap-1 bg-white px-3 py-2 rounded-lg border border-outline active:bg-purple-50">
        <span id="icon-refresh" class="material-symbols-outlined text-sm">refresh</span> Actualizar
    </button>
  </div>

  <div class="overflow-hidden border border-outline rounded-2xl bg-white">
    <table class="w-full text-left">
      <thead class="bg-gray-50 text-[10px] uppercase font-bold text-gray-500">
        <tr>
          <th class="p-4">ID</th>
          <th class="p-4">Producto</th>
          <th class="p-4 text-center">Stock</th>
          <th class="p-4 text-center">Estado</th>
        </tr>
      </thead>
      <tbody id="tabla-inventario" class="text-sm">
        <tr><td colspan="4" class="p-8 text-center">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</section>

</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50">
  <button onclick="window.location.href='DashboardLácteo.html'" class="text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-bold">Inicio</span>
  </button>
  <button onclick="window.location.href='RegistrodeVentas.html'" class="text-gray-400 hover:text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">receipt</span>
    <span class="text-[10px]">Ventas</span>
  </button>
  <button onclick="window.location.href='ControldeInventario.html'" class="text-gray-400 hover:text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">inventory</span>
    <span class="text-[10px]">Stock</span>
  </button>
  <button onclick="window.location.href='GestióndeDespachos.html'" class="text-success flex flex-col items-center gap-1 font-bold">
    <span class="material-symbols-outlined">local_shipping</span>
    <span class="text-[10px]">Entregas</span>
  </button>
</nav>

<script>
async function cargarDatos() {
  const icon = document.getElementById('icon-refresh');
  icon.classList.add('rotate-animation'); // Iniciar animación

  try {
    // 1. Cargar Inventario
    const inventario = await DairyAPI.obtenerDatos("Inventario");
    const tabla = document.getElementById('tabla-inventario');
    tabla.innerHTML = "";
    inventario.slice(0, 6).forEach(prod => {
      const stock = parseInt(prod.Stock) || 0;
      const esBajo = stock < 15;
      tabla.innerHTML += `
        <tr class="border-t">
          <td class="p-4 text-gray-400 text-xs">#${prod.ID}</td>
          <td class="p-4 font-semibold">${prod.Producto}</td>
          <td class="p-4 text-center font-bold">${stock}</td>
          <td class="p-4 text-center">
            <div class="w-2 h-2 rounded-full mx-auto ${esBajo ? 'bg-error animate-pulse' : 'bg-success'}"></div>
          </td>
        </tr>`;
    });

    // 2. Cargar Ventas
    const ventas = await DairyAPI.obtenerDatos("Ventas");
    const hoy = ventas.reduce((acc, v) => acc + (parseFloat(v.Total) || 0), 0);
    document.getElementById('ventas-hoy').innerText = `$${hoy.toFixed(2)}`;

    // 3. Cargar Estados de Entrega (Simulado desde pestaña Pedidos)
    const entregas = await DairyAPI.obtenerDatos("Pedidos");
    const listaEntregas = document.getElementById('lista-entregas');
    listaEntregas.innerHTML = "";
    entregas.slice(0, 2).forEach(ped => {
      listaEntregas.innerHTML += `
        <div class="flex justify-between items-center bg-green-50 p-3 rounded-xl border border-green-100">
          <div>
            <p class="text-sm font-bold text-green-800">${ped.Cliente}</p>
            <p class="text-[10px] text-green-600">Estado: ${ped.Estado || 'En camino'}</p>
          </div>
          <span class="material-symbols-outlined text-green-600">check_circle</span>
        </div>`;
    });

  } catch (e) {
    console.error(e);
  } finally {
    setTimeout(() => icon.classList.remove('rotate-animation'), 800); // Detener animación
  }
}

window.onload = cargarDatos;
</script>
</body>
</html>
