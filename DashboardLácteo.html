<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dairy Logic - Dashboard</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#a21caf",
        "primary-container": "#c026d3",
        "primary-fixed": "#f5d0fe",
        "primary-fixed-dim": "#e879f9",

        secondary: "#db2777",
        "secondary-container": "#fbcfe8",
        "secondary-fixed": "#fbcfe8",
        "secondary-fixed-dim": "#f472b6",

        tertiary: "#7e22ce",
        "tertiary-container": "#c4b5fd",

        background: "#faf5ff",
        surface: "#ffffff",

        "on-primary": "#ffffff",
        "on-secondary": "#ffffff",
        "on-surface": "#1f012a",
        "on-surface-variant": "#6b21a8",

        error: "#dc2626",
        "error-container": "#fee2e2",

        outline: "#e9d5ff",
        "outline-variant": "#f3e8ff",

        "surface-container-low": "#fdf4ff",
        "surface-container": "#fae8ff",
        "surface-container-high": "#f5d0fe",
        "surface-container-lowest": "#ffffff",
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
}
body {
  min-height: 100vh;
}
</style>
</head>

<body class="bg-background text-on-surface font-body-md antialiased">

<!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm shadow-purple-500/10">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center">
      <span class="material-symbols-outlined text-primary">person</span>
    </div>
    <h1 class="text-xl font-bold text-primary">Dairy Logic</h1>
  </div>

  <button class="p-2 text-on-surface-variant hover:bg-surface-container rounded-lg">
    <span class="material-symbols-outlined">notifications</span>
  </button>
</header>

<main class="pt-20 pb-24 px-4 max-w-7xl mx-auto">

<!-- BIENVENIDA -->
<section class="mb-6">
  <h2 class="text-3xl font-bold text-primary">Bienvenido</h2>
  <p class="text-on-surface-variant">Sistema de ventas activo</p>
</section>

<!-- DASHBOARD -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-4">

<!-- VENTAS -->
<div class="md:col-span-8 bg-white p-4 rounded-xl border border-outline shadow-sm">
  <span class="text-secondary text-xs uppercase">Ventas Hoy</span>
  <div class="flex items-center gap-2 mt-2">
    <span class="text-4xl font-bold">$0.00</span>
    <span class="text-green-600 text-sm">+0%</span>
  </div>
</div>

<!-- BOTONES -->
<div class="md:col-span-4 grid grid-cols-2 gap-2">

<button class="bg-primary text-white p-4 rounded-xl flex flex-col items-center gap-2">
  <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
  Nueva Venta
</button>

<button class="bg-secondary text-white p-4 rounded-xl flex flex-col items-center gap-2">
  <span class="material-symbols-outlined text-3xl">inventory</span>
  Stock
</button>

<button class="bg-surface-container p-4 rounded-xl flex flex-col items-center gap-2 border border-outline">
  <span class="material-symbols-outlined text-3xl">group</span>
  Clientes
</button>

<button class="bg-surface-container p-4 rounded-xl flex flex-col items-center gap-2 border border-outline">
  <span class="material-symbols-outlined text-3xl">local_shipping</span>
  Entregas
</button>

</div>

<!-- ALERTA STOCK -->
<div class="md:col-span-6 bg-white p-4 rounded-xl border border-outline shadow-sm">
  <h3 class="text-lg font-bold text-error mb-2">Stock Bajo</h3>
  <p class="text-sm">Leche: 10 unidades</p>
</div>

<!-- PEDIDOS -->
<div class="md:col-span-6 bg-white p-4 rounded-xl border border-outline shadow-sm">
  <h3 class="text-lg font-bold text-primary mb-2">Pedidos Activos</h3>
  <p class="text-sm">Supermercado Central</p>
</div>

</div>

<!-- TABLA -->
<section class="mt-8">
  <h3 class="text-2xl font-bold mb-4">Inventario</h3>

  <div class="overflow-x-auto border border-outline rounded-xl">
    <table class="w-full text-left">
      <thead class="bg-surface-container">
        <tr>
          <th class="p-3">Producto</th>
          <th class="p-3">Stock</th>
          <th class="p-3">Estado</th>
        </tr>
      </thead>

      <tbody>
        <tr class="border-t">
          <td class="p-3">Leche</td>
          <td class="p-3">50</td>
          <td class="p-3 text-green-600">OK</td>
        </tr>

        <tr class="border-t">
          <td class="p-3">Queso</td>
          <td class="p-3">10</td>
          <td class="p-3 text-red-500">Bajo</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

</main>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-2 shadow">
  
  <button class="text-primary flex flex-col items-center">
    <span class="material-symbols-outlined">home</span>
    <span class="text-xs">Inicio</span>
  </button>

  <button class="flex flex-col items-center text-on-surface-variant">
    <span class="material-symbols-outlined">receipt</span>
    <span class="text-xs">Ventas</span>
  </button>

  <button class="flex flex-col items-center text-on-surface-variant">
    <span class="material-symbols-outlined">inventory</span>
    <span class="text-xs">Stock</span>
  </button>

</nav>

</body>
</html>
