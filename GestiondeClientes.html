<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea | Ranking de Clientes</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                primary: "#a21caf",
                secondary: "#db2777",
                background: "#faf5ff",
                outline: "#e9d5ff"
              }
            }
          }
        }
    </script>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        .active-icon { font-variation-settings: 'FILL' 1 !important; }
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Ocultar scrollbars */
        ::-webkit-scrollbar { display: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .medal-shadow { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    </style>
</head>

<body class="bg-background text-gray-900 pb-40">

<header class="fixed top-0 w-full h-16 bg-white border-b border-outline flex justify-between items-center px-4 shadow-sm z-50">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLacteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
        <span class="material-symbols-outlined text-3xl active-icon">workspace_premium</span>
    </div>
    <h1 class="text-xl font-black text-primary tracking-tight uppercase">Ranking</h1>
  </div>
  <div class="relative">
      <input type="text" id="buscador" oninput="filtrarClientes()" placeholder="Buscar..." class="w-32 focus:w-48 transition-all bg-purple-50 border-none rounded-full px-4 py-2 text-xs font-bold outline-none focus:ring-2 focus:ring-primary">
  </div>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
  
  <!-- INDICADORES PRINCIPALES -->
  <section class="grid grid-cols-2 gap-4 fade-in">
    <div class="bg-primary p-5 rounded-[2rem] text-white shadow-lg text-center">
      <p class="text-[10px] uppercase font-black tracking-widest opacity-80">Clientes Activos</p>
      <h2 id="total-clientes" class="text-3xl font-black">0</h2>
    </div>
    <div class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm flex flex-col justify-center text-center">
      <p class="text-[10px] text-secondary uppercase font-black tracking-widest">Entregas Totales</p>
      <h2 id="total-entregas" class="text-3xl font-black text-secondary">0</h2>
    </div>
  </section>

  <!-- LISTA DE RANKING -->
  <section id="lista-clientes" class="space-y-4 fade-in" style="animation-delay: 0.1s;">
      <div class="flex flex-col items-center justify-center py-20 gap-4">
          <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
          <p class="text-gray-400 italic font-bold">Calculando podio de ventas...</p>
      </div>
  </section>

</main>

<div id="menu-container"></div>

<script>
let clientesData = [];

async function cargarDatos() {
    try {
        const [clientes, ventas] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        // 1. Contar entregas entregadas de forma eficiente (O(n))
        const conteoVentas = {};
        let entregasConfirmadas = 0;

        if (Array.isArray(ventas)) {
            ventas.forEach(v => {
                if (String(v.Estado).trim().toUpperCase() === "ENTREGADO") {
                    const nombreCli = String(v.Cliente).trim().toLowerCase();
                    conteoVentas[nombreCli] = (conteoVentas[nombreCli] || 0) + 1;
                    entregasConfirmadas++;
                }
            });
        }

        const rawClientes = Array.isArray(clientes) ? clientes : [];
        
        // 2. Mapear datos vinculando el conteo
        clientesData = rawClientes.map(c => {
            const nombreKey = String(c.Nombre).trim().toLowerCase();
            return { 
                ...c, 
                totalEntregas: conteoVentas[nombreKey] || 0 
            };
        });

        // 3. Ordenar: De mayor a menor entregas
        clientesData.sort((a, b) => b.totalEntregas - a.totalEntregas);

        renderizarClientes(clientesData);

        document.getElementById('total-clientes').innerText = rawClientes.length;
        document.getElementById('total-entregas').innerText = entregasConfirmadas;

    } catch (e) {
        console.error("Error al cargar datos:", e);
        document.getElementById('lista-clientes').innerHTML = `<p class="text-center text-red-400 font-black">ERROR DE CONEXIÓN</p>`;
    }
}

function renderizarClientes(lista) {
    const container = document.getElementById('lista-clientes');
    container.innerHTML = "";

    if(lista.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-400 font-bold py-10 uppercase text-xs">No hay registros de clientes</p>`;
        return;
    }

    lista.forEach((c, index) => {
        // Lógica de colores para el podio (Top 3)
        let medalStyle = "bg-purple-50 text-primary"; // Estilo por defecto
        let iconName = "person";

        if (c.totalEntregas > 0) {
            if (index === 0) { 
                medalStyle = "bg-yellow-400 text-white medal-shadow scale-105 ring-4 ring-yellow-100"; 
                iconName = "emoji_events";
            } else if (index === 1) { 
                medalStyle = "bg-slate-300 text-white medal-shadow scale-105 ring-4 ring-slate-100"; 
                iconName = "emoji_events";
            } else if (index === 2) { 
                medalStyle = "bg-orange-400 text-white medal-shadow scale-105 ring-4 ring-orange-100"; 
                iconName = "emoji_events";
            }
        }

        // Limpiar teléfono para WhatsApp
        let rawTel = c.Teléfono?.toString() || "";
        let limpio = rawTel.replace(/\D/g, ''); 
        if (limpio.startsWith('0')) limpio = limpio.substring(1); 
        if (limpio.length > 0 && !limpio.startsWith('593')) limpio = '593' + limpio;

        container.innerHTML += `
            <div class="bg-white p-5 rounded-[2.2rem] border border-outline shadow-sm flex items-center gap-4 active:scale-[0.98] transition-all relative overflow-hidden">
                
                <!-- ICONO / MEDALLA -->
                <div class="w-14 h-14 rounded-2xl ${medalStyle} flex items-center justify-center shrink-0 transition-transform">
                    <span class="material-symbols-outlined text-3xl font-bold">${iconName}</span>
                </div>

                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                         <h3 class="font-extrabold text-gray-800 leading-tight uppercase text-[13px] truncate">${c.Nombre}</h3>
                         ${index < 3 && c.totalEntregas > 0 ? '<span class="text-[10px] bg-secondary/10 text-secondary px-2 py-0.5 rounded-full font-black">TOP</span>' : ''}
                    </div>
                    <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-black ${index < 3 && c.totalEntregas > 0 ? 'text-secondary' : 'text-primary'}">${c.totalEntregas}</span>
                        <span class="text-[9px] font-bold text-gray-400 uppercase">Entregas</span>
                    </div>
                    
                    <div class="flex gap-2 mt-1">
                        <a href="https://wa.me/${limpio}" target="_blank" class="flex items-center gap-1 text-[9px] font-black text-green-600 bg-green-50 px-3 py-1.5 rounded-xl uppercase">
                            <span class="material-symbols-outlined text-xs">chat</span> WhatsApp
                        </a>
                    </div>
                </div>

                <!-- ACCIONES LADO DERECHO -->
                <div class="shrink-0 flex flex-col items-center gap-1">
                    <span class="text-[10px] font-black text-gray-300">#${index + 1}</span>
                    <button onclick="verMapa('${c.Dirección}')" class="w-11 h-11 rounded-2xl bg-purple-50 flex items-center justify-center text-primary active:bg-primary active:text-white transition-colors">
                        <span class="material-symbols-outlined active-icon text-2xl">location_on</span>
                    </button>
                </div>
            </div>`;
    });
}

function filtrarClientes() {
    const busqueda = document.getElementById('buscador').value.toLowerCase();
    const filtrados = clientesData.filter(c => 
        String(c.Nombre).toLowerCase().includes(busqueda)
    );
    renderizarClientes(filtrados);
}

function verMapa(dir) {
    if(!dir || dir === "undefined" || dir.trim() === "") return alert("Dirección no registrada");
    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dir)}`, '_blank');
}

window.onload = () => {
    cargarDatos();
};
</script>
</body>
</html>
