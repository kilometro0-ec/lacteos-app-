<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea | Gestión de Clientes</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#a21caf",
            background: "#faf5ff",
            outline: "#e9d5ff",
            secondary: "#db2777"
          }
        }
      }
    }
    </script>

    <style>
    body { font-family: 'Work Sans', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .active-icon { font-variation-settings: 'FILL' 1 !important; }
    </style>
</head>

<body class="bg-background text-gray-900 pb-32">

<header class="fixed top-0 left-0 w-full flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm z-50">
  <div class="flex items-center gap-3" onclick="window.location.href='DashboardLácteo.html'">
    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-3xl active-icon">group</span>
    </div>
    <h1 class="text-xl font-black text-primary tracking-tight">Clientes</h1>
  </div>
  <button onclick="cargarClientes()" class="p-2 text-primary">
      <span id="refresh-icon" class="material-symbols-outlined">refresh</span>
  </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto">
    <div class="mb-6">
        <input type="text" id="buscador" oninput="filtrarClientes()" 
               placeholder="Buscar por nombre o ID..." 
               class="w-full px-5 py-4 border border-outline rounded-2xl bg-white shadow-sm focus:ring-2 focus:ring-primary outline-none font-medium">
    </div>

    <div id="contenedor-clientes" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="col-span-full text-center py-20 text-gray-400 italic">
            Conectando con la base de datos...
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around bg-white border-t border-outline py-3 shadow-lg z-50">
    <button onclick="window.location.href='DashboardLácteo.html'" class="text-gray-400 flex flex-col items-center">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px]">Inicio</span>
    </button>
    <button onclick="window.location.href='ControldeInventario.html'" class="text-gray-400 flex flex-col items-center">
        <span class="material-symbols-outlined">inventory</span>
        <span class="text-[10px]">Stock</span>
    </button>
    <button class="text-primary flex flex-col items-center font-bold">
        <span class="material-symbols-outlined active-icon">group</span>
        <span class="text-[10px]">Clientes</span>
    </button>
</nav>

<script>
let clientesData = [];

async function cargarClientes() {
    const refreshIcon = document.getElementById('refresh-icon');
    if(refreshIcon) refreshIcon.classList.add('animate-spin');

    try {
        const respuesta = await DairyAPI.obtenerDatos("Clientes");
        console.log("Datos recibidos:", respuesta); // Esto ayuda a ver errores en la consola F12
        clientesData = respuesta;
        renderizarClientes(clientesData);
    } catch (error) {
        console.error("Error cargando clientes:", error);
        document.getElementById('contenedor-clientes').innerHTML = 
            `<div class="col-span-full text-center text-red-500 font-bold">Error de conexión</div>`;
    } finally {
        if(refreshIcon) refreshIcon.classList.remove('animate-spin');
    }
}

function renderizarClientes(lista) {
    const contenedor = document.getElementById('contenedor-clientes');
    contenedor.innerHTML = "";

    if (!lista || lista.length === 0) {
        contenedor.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400 font-bold">No hay clientes en la base de datos</div>`;
        return;
    }

    lista.forEach(cliente => {
        // Mapeo exacto de tus columnas de Excel
        const nombre = cliente['Nombre'] || 'Sin Nombre';
        const id = cliente['ID'] || 'S/N';
        const telefono = cliente['Teléfono'] || '';
        const direccion = cliente['Dirección'] || 'Sin dirección registrada';

        contenedor.innerHTML += `
            <div class="bg-white border border-outline rounded-[2rem] p-5 shadow-sm active:scale-95 transition-all">
                <div class="flex justify-between items-start mb-4">
                    <div class="w-12 h-12 rounded-2xl bg-purple-50 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined text-3xl">account_circle</span>
                    </div>
                    <span class="bg-purple-100 text-primary px-3 py-1 rounded-full text-[10px] font-black tracking-wider">
                        ID: ${id}
                    </span>
                </div>

                <h3 class="font-black text-lg text-gray-800 leading-tight mb-1 uppercase">${nombre}</h3>
                <p class="text-sm text-gray-500 font-medium mb-3 flex items-start gap-1">
                    <span class="material-symbols-outlined text-sm mt-0.5">location_on</span> 
                    <span>${direccion}</span>
                </p>

                <div class="grid grid-cols-2 gap-2 mt-4">
                    <a href="tel:${telefono}" class="flex items-center justify-center gap-2 bg-purple-50 text-primary py-3 rounded-xl font-bold text-xs uppercase">
                        <span class="material-symbols-outlined text-sm">call</span> Llamar
                    </a>
                    <a href="https://wa.me/${telefono.toString().replace(/\D/g, '')}" target="_blank" class="flex items-center justify-center gap-2 bg-green-50 text-green-600 py-3 rounded-xl font-bold text-xs uppercase">
                        <span class="material-symbols-outlined text-sm">chat</span> WhatsApp
                    </a>
                </div>
            </div>`;
    });
}

function filtrarClientes() {
    const termino = document.getElementById('buscador').value.toLowerCase();
    const filtrados = clientesData.filter(c => 
        (c.Nombre && c.Nombre.toLowerCase().includes(termino)) || 
        (c.ID && c.ID.toString().includes(termino))
    );
    renderizarClientes(filtrados);
}

window.onload = cargarClientes;
</script>
</body>
</html>
