<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea - Despachos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        primary: "#a21caf", 
                        success: "#10b981",
                        background: "#faf5ff", 
                        outline: "#e9d5ff" 
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        .tab-active { border-bottom: 3px solid #a21caf; color: #a21caf; }
    </style>
</head>
<body class="bg-background text-gray-900 font-[Work_Sans] pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined text-3xl">local_shipping</span>
        </div>
        <h1 class="text-xl font-bold text-primary">Despachos</h1>
    </div>
    <button onclick="cargarDespachos()" class="p-2 text-primary active:rotate-180 transition-transform">
        <span class="material-symbols-outlined">refresh</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-4xl mx-auto space-y-6">
    
    <div class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
        <button onclick="filtrar('pendientes')" id="btn-pendientes" class="tab-active px-6 py-2 font-bold text-sm whitespace-nowrap">Pendientes</button>
        <button onclick="filtrar('entregados')" id="btn-entregados" class="text-gray-400 px-6 py-2 font-bold text-sm whitespace-nowrap">Entregados</button>
    </div>

    <div id="lista-despachos" class="space-y-4">
        <div class="text-center py-20 text-gray-400">
            <span class="material-symbols-outlined animate-spin text-4xl">sync</span>
            <p class="mt-2 font-medium">Buscando rutas...</p>
        </div>
    </div>

</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50">
    <button onclick="window.location.href='DashboardLácteo.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-bold">Inicio</span>
    </button>
    <button onclick="window.location.href='RegistrodeVentas.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">receipt</span>
        <span class="text-[10px]">Ventas</span>
    </button>
    <button onclick="window.location.href='ControldeInventario.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">inventory</span>
        <span class="text-[10px]">Stock</span>
    </button>
    <button class="text-success flex flex-col items-center gap-1 font-bold">
        <span class="material-symbols-outlined text-fill">local_shipping</span>
        <span class="text-[10px]">Entregas</span>
    </button>
</nav>

<script>
let todosLosDespachos = [];
let filtroActual = 'pendientes';

async function cargarDespachos() {
    const container = document.getElementById('lista-despachos');
    try {
        // Obtenemos ventas y clientes para cruzar la información de dirección
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        // Unimos los datos: A cada venta le buscamos su dirección de cliente
        todosLosDespachos = ventas.map(v => {
            const clienteInfo = clientes.find(c => c.Nombre === v.Cliente);
            return {
                ...v,
                Direccion: clienteInfo ? clienteInfo.Dirección : "Dirección no registrada",
                Telefono: clienteInfo ? clienteInfo.Teléfono : ""
            };
        }).reverse(); // Mostrar los más recientes primero

        renderizar();
    } catch (e) {
        container.innerHTML = `<p class="text-center text-red-500 font-bold p-10">Error al conectar con la base de datos.</p>`;
    }
}

function filtrar(tipo) {
    filtroActual = tipo;
    document.getElementById('btn-pendientes').className = tipo === 'pendientes' ? 'tab-active px-6 py-2 font-bold text-sm' : 'text-gray-400 px-6 py-2 font-bold text-sm';
    document.getElementById('btn-entregados').className = tipo === 'entregados' ? 'tab-active px-6 py-2 font-bold text-sm' : 'text-gray-400 px-6 py-2 font-bold text-sm';
    renderizar();
}

function renderizar() {
    const container = document.getElementById('lista-despachos');
    container.innerHTML = "";

    // Aquí podrías filtrar por un campo "Estado" si lo añades a tu Sheets. 
    // Por ahora mostraremos todos como pendientes para que veas el diseño.
    const listaFiltrada = todosLosDespachos; 

    if (listaFiltrada.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-gray-400 italic">No hay despachos registrados</div>`;
        return;
    }

    listaFiltrada.forEach((d, index) => {
        container.innerHTML += `
            <div class="bg-white p-5 rounded-2xl border border-outline shadow-sm space-y-3 relative overflow-hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[10px] font-black text-primary uppercase bg-purple-50 px-2 py-1 rounded-md">Pedido #${index + 1}</span>
                        <h3 class="font-bold text-lg mt-1 text-gray-800">${d.Cliente}</h3>
                    </div>
                    <span class="text-xs font-bold text-gray-400">${new Date(d.Fecha).toLocaleDateString()}</span>
                </div>

                <div class="flex items-center gap-2 text-gray-500">
                    <span class="material-symbols-outlined text-sm">inventory_2</span>
                    <p class="text-sm font-medium">${d.Producto} <span class="text-primary font-bold">(x${d.Cantidad})</span></p>
                </div>

                <div class="flex items-center gap-2 text-gray-500">
                    <span class="material-symbols-outlined text-sm">location_on</span>
                    <p class="text-sm line-clamp-1">${d.Direccion}</p>
                </div>

                <div class="pt-3 flex gap-2">
                    <a href="https://wa.me/${d.Telefono.replace('+', '')}" class="flex-1 bg-green-50 text-success py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs border border-green-100">
                        <span class="material-symbols-outlined text-sm">chat</span> WHATSAPP
                    </a>
                    <button onclick="marcarEntregado(${index})" class="flex-1 bg-primary text-white py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs shadow-md shadow-purple-100">
                        <span class="material-symbols-outlined text-sm">check_circle</span> ENTREGAR
                    </button>
                </div>
            </div>
        `;
    });
}

function marcarEntregado(idx) {
    // Aquí podrías enviar una actualización a Google Sheets si tuvieras una columna "Estado"
    alert("Funcionalidad de cambio de estado: En desarrollo. El pedido ha sido marcado visualmente.");
}

window.onload = cargarDespachos;
</script>
</body>
</html>
