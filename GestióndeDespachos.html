<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Despachos - Lógica Láctea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        primary: "#a21caf", 
                        background: "#faf5ff", 
                        outline: "#e9d5ff" 
                    } 
                } 
            } 
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .active-icon { font-variation-settings: 'FILL' 1; }
        .anim-slide-out {
            animation: slideRight 0.6s forwards cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        @keyframes slideRight {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(150%); opacity: 0; }
        }
        body { font-size: 16px; font-family: 'Work Sans', sans-serif; }
    </style>
</head>
<body class="bg-background text-gray-900 pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-2" onclick="window.location.href='DashboardLácteo.html'">
        <span class="material-symbols-outlined text-primary text-3xl">local_shipping</span>
        <h1 class="text-2xl font-extrabold text-primary tracking-tight">Despachos</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="reiniciarContadoresHoy()" class="p-2 text-gray-400">
            <span class="material-symbols-outlined">delete_history</span>
        </button>
        <button onclick="cargarDatos()" class="p-2 text-primary active:rotate-180 transition-transform">
            <span id="refresh-icon" class="material-symbols-outlined">refresh</span>
        </button>
    </div>
</header>

<main class="pt-20 px-4 max-w-4xl mx-auto space-y-4">
    <div class="grid grid-cols-2 gap-3">
        <div class="bg-white p-4 rounded-3xl border border-orange-100 shadow-sm text-center">
            <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Por Recaudar</p>
            <div class="flex flex-col mt-1">
                <p id="dinero-pend" class="text-2xl font-black text-orange-600">$0.00</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase"><span id="items-pend">0</span> Ítems</p>
            </div>
        </div>
        <div class="bg-primary p-4 rounded-3xl shadow-lg text-center">
            <p class="text-[10px] font-black text-purple-200 uppercase tracking-widest">Recaudado Hoy</p>
            <div class="flex flex-col mt-1">
                <p id="dinero-ent" class="text-2xl font-black text-white">$0.00</p>
                <p class="text-[10px] font-bold text-purple-200 uppercase"><span id="items-ent">0</span> Ítems</p>
            </div>
        </div>
    </div>

    <div class="px-1">
        <input type="text" id="filtroDespacho" oninput="filtrar()" placeholder="🔍 Buscar cliente o ID..." 
               class="w-full bg-white border-2 border-outline rounded-2xl p-4 font-bold outline-none focus:ring-2 focus:ring-primary">
    </div>

    <div id="contenedor-pedidos" class="space-y-5 pt-2">
        <div class="text-center py-20 text-gray-400 font-bold italic">Sincronizando ruta...</div>
    </div>
</main>

<div id="menu-container"></div>

<script>
let statsSesion = JSON.parse(localStorage.getItem('statsDespachos')) || { pedidos: 0, items: 0, dinero: 0 };
let ventasGlobal = [];

async function iniciarApp() {
    try {
        const resp = await fetch('menu.html');
        if (resp.ok) {
            document.getElementById('menu-container').innerHTML = await resp.text();
            marcarBotonActivo();
        }
    } catch (e) { console.log("Error menú:", e); }
    cargarDatos();
}

function marcarBotonActivo() {
    const botones = document.querySelectorAll('.nav-item');
    botones.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes('Despachos')) {
            btn.classList.remove('text-gray-400');
            btn.classList.add('text-primary');
        }
    });
}

async function cargarDatos() {
    const contenedor = document.getElementById('contenedor-pedidos');
    const icon = document.getElementById('refresh-icon');
    icon.classList.add('rotate-180');
    
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        ventasGlobal = ventas;
        const agrupados = {};
        let totalDineroPendiente = 0;
        let totalItemsPendientes = 0;

        // Filtrar solo PENDIENTES y agrupar por ID_Venta
        ventas.filter(v => v.Estado === "PENDIENTE").forEach(v => {
            const idV = v.ID_Venta || "S/N";
            if (!agrupados[idV]) {
                agrupados[idV] = {
                    id: idV,
                    cliente: v.Cliente,
                    fecha: v.Fecha,
                    items: [],
                    totalVenta: 0,
                    info: clientes.find(c => String(c.Nombre).trim().toLowerCase() === String(v.Cliente).trim().toLowerCase())
                };
            }
            const cant = parseFloat(v.Cantidad) || 0;
            const totalFila = parseFloat(v.Total?.toString().replace(',', '.') || 0);
            
            agrupados[idV].items.push({ nombre: v.Producto, cant: cant, pvp: totalFila / cant });
            agrupados[idV].totalVenta += totalFila;
            
            totalDineroPendiente += totalFila;
            totalItemsPendientes += cant;
        });

        renderizarCards(Object.values(agrupados).reverse());
        actualizarPantallaContadores(totalDineroPendiente, totalItemsPendientes);

    } catch (e) {
        contenedor.innerHTML = `<p class="text-center text-red-500 py-20 font-bold">Error de conexión</p>`;
    } finally {
        icon.classList.remove('rotate-180');
    }
}

function renderizarCards(lista) {
    const contenedor = document.getElementById('contenedor-pedidos');
    contenedor.innerHTML = "";

    if (lista.length === 0) {
        contenedor.innerHTML = `<p class="text-center py-20 text-gray-400 font-bold text-xl">Ruta limpia. ¡Buen trabajo!</p>`;
        return;
    }

    lista.forEach((ped, idx) => {
        const telf = ped.info ? String(ped.info.Teléfono || "").replace(/[^0-9]/g, '') : "";
        const sumaItems = ped.items.reduce((acc, curr) => acc + curr.cant, 0);
        
        const itemsHTML = ped.items.map(i => `
            <div class="flex justify-between items-center border-b border-purple-50 py-2">
                <span class="text-sm text-gray-700 font-bold">${i.nombre}</span>
                <span class="text-sm font-black text-primary bg-purple-50 px-2 py-1 rounded-lg">x${i.cant}</span>
            </div>
        `).join('');

        contenedor.innerHTML += `
            <div id="card-${idx}" class="bg-white p-6 rounded-[2.5rem] border-2 border-outline shadow-md space-y-4">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[10px] font-black bg-purple-100 text-primary px-2 py-1 rounded-md uppercase mb-1 inline-block">${ped.id}</span>
                        <h2 class="text-xl font-black text-gray-800 uppercase leading-none">${ped.cliente}</h2>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400">${new Date(ped.fecha).toLocaleDateString()}</span>
                </div>

                <div class="py-1">${itemsHTML}</div>

                <div class="bg-purple-50 p-3 rounded-2xl flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">location_on</span>
                    <p class="text-xs font-bold text-gray-600">${ped.info ? ped.info.Dirección : 'Sin dirección registrada'}</p>
                </div>

                <div class="flex justify-between items-center pt-2">
                    <div>
                        <p class="text-[10px] font-black text-gray-400 uppercase">Cobrar</p>
                        <p class="text-3xl font-black text-gray-900">$${ped.totalVenta.toFixed(2)}</p>
                    </div>
                    <div class="flex gap-2">
                        ${telf ? `<a href="https://wa.me/593${telf.startsWith('0') ? telf.substring(1) : telf}" target="_blank" class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined">chat</span></a>` : ''}
                        <button onclick="confirmarEntrega('${ped.id}', 'card-${idx}', ${ped.totalVenta}, ${sumaItems})" 
                                class="h-12 bg-primary text-white px-6 rounded-2xl text-xs font-black shadow-lg active:scale-95 transition-transform">
                            ENTREGADO
                        </button>
                    </div>
                </div>
            </div>`;
    });
}

async function confirmarEntrega(idVenta, cardId, monto, cantItems) {
    if(!confirm("¿Confirmar entrega y cobro?")) return;
    const card = document.getElementById(cardId);
    card.classList.add('anim-slide-out');

    try {
        await DairyAPI.enviarDatos("Ventas", { 
            pestaña: "Ventas", 
            accion: "editar_estado", 
            ID_Venta: idVenta, 
            Estado: "ENTREGADO" 
        });

        setTimeout(() => {
            card.remove();
            statsSesion.pedidos += 1;
            statsSesion.items += cantItems;
            statsSesion.dinero += monto;
            localStorage.setItem('statsDespachos', JSON.stringify(statsSesion));
            cargarDatos();
        }, 600);
    } catch (e) {
        alert("Error al actualizar Excel");
        card.classList.remove('anim-slide-out');
    }
}

function actualizarPantallaContadores(dPend, iPend) {
    document.getElementById('dinero-pend').innerText = `$${dPend.toFixed(2)}`;
    document.getElementById('items-pend').innerText = iPend;
    document.getElementById('dinero-ent').innerText = `$${statsSesion.dinero.toFixed(2)}`;
    document.getElementById('items-ent').innerText = statsSesion.items;
}

function filtrar() {
    const busqueda = document.getElementById('filtroDespacho').value.toLowerCase();
    // Re-renderizado basado en filtro (agregando lógica de filtro aquí si es necesario)
    cargarDatos(); // Para simplificar, recargamos, pero lo ideal es filtrar el array local
}

function reiniciarContadoresHoy() {
    if(confirm("¿Poner en cero lo recaudado hoy?")) {
        statsSesion = { pedidos: 0, items: 0, dinero: 0 };
        localStorage.setItem('statsDespachos', JSON.stringify(statsSesion));
        cargarDatos();
    }
}

window.onload = iniciarApp;
</script>
</body>
</html>
