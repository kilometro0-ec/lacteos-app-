<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Rutas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <style>
        body { background-color: #f8fafc; padding-bottom: 80px; font-family: 'sans-serif'; }
        
        /* Animaciones */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos de Tarjeta */
        .card-pro {
            background: white; border-radius: 2rem; border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05); overflow: hidden;
        }

        .btn-verde {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white; font-weight: 900; text-transform: uppercase;
            border-radius: 1.2rem; transition: all 0.2s;
        }
        .btn-verde:active { transform: scale(0.96); opacity: 0.9; }

        /* NAVEGACIÓN (Ajustada para ser más fina como las otras páginas) */
        .nav-fija { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(8px);
            border-top: 1px solid #f3e8ff; padding: 8px 0 12px 0; z-index: 9999;
        }
        .menu-grid { max-width: 500px; margin: 0 auto; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            gap: 2px; color: #94a3b8; background: none; border: none; outline: none;
        }
        .nav-btn .material-symbols-outlined { 
            font-size: 22px !important; 
            font-variation-settings: 'wght' 300; 
        }
        .nav-btn span:last-child { 
            font-size: 8px !important; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .active-btn { color: #a21caf !important; }
        .active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; }

        /* Modales */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 24px; }
        .modal-content { background: white; width: 100%; max-width: 320px; border-radius: 2.5rem; p-6; text-align: center; }
    </style>
</head>
<body>

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-white/80 backdrop-blur-sm border-b border-purple-50">
    <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-tr from-[#a21caf] to-[#db2777] flex items-center justify-center text-white shadow-md shadow-purple-100">
            <span class="material-symbols-outlined font-black">local_shipping</span>
        </div>
        <div>
            <h1 class="font-black text-slate-800 leading-none">DESPACHOS</h1>
            <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">Hoja de ruta</p>
        </div>
    </div>
    <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 active:rotate-180 transition-all duration-500">
        <span id="refresh-icon" class="material-symbols-outlined text-slate-500">sync</span>
    </button>
</header>

<main class="pt-24 px-5 max-w-lg mx-auto space-y-6">
    <!-- CONTADORES -->
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-5 rounded-[2rem] border border-orange-50 shadow-sm text-center">
            <p id="cont-pend" class="text-3xl font-black text-orange-500">0</p>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Por Entregar</p>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border border-green-50 shadow-sm text-center">
            <p id="cont-ent" class="text-3xl font-black text-green-500">0</p>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Entregados</p>
        </div>
    </div>

    <div id="contenedor-pedidos" class="space-y-6 pb-20"></div>
</main>

<!-- SELECTOR DE MAPAS -->
<div id="modal-mapas" class="modal-overlay" onclick="cerrarModal()">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 space-y-4 shadow-2xl scale-up" onclick="event.stopPropagation()">
        <div class="w-16 h-16 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-2 text-purple-600">
            <span class="material-symbols-outlined text-3xl">explore</span>
        </div>
        <h3 class="font-black text-slate-800 text-lg">¿Cómo deseas llegar?</h3>
        <div class="grid gap-3 pt-2">
            <button id="btn-gmaps" class="w-full py-4 bg-[#4285F4] text-white rounded-2xl font-black flex items-center justify-center gap-2">
                GOOGLE MAPS
            </button>
            <button id="btn-waze" class="w-full py-4 bg-[#33CCFF] text-white rounded-2xl font-black flex items-center justify-center gap-2">
                WAZE
            </button>
        </div>
        <button onclick="cerrarModal()" class="text-slate-400 font-bold text-xs uppercase tracking-widest pt-2">Cerrar</button>
    </div>
</div>

<div id="menu-container"></div>

<script>
// Corregimos el contador: Si no hay datos en el storage para "hoy", empezamos en 0
let statsSesion = JSON.parse(localStorage.getItem('statsDespachos')) || { pedidos: 0, dinero: 0 };
let pedidosLocal = [];

async function cargarDatos() {
    const icon = document.getElementById('refresh-icon');
    icon?.classList.add('animate-spin');
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        const agrupados = {};
        // Filtramos solo pendientes
        ventas.filter(v => String(v.Estado).trim().toUpperCase() === "PENDIENTE").forEach(v => {
            const idV = v.ID_Venta || "S/N";
            if (!agrupados[idV]) {
                agrupados[idV] = {
                    id: idV, cliente: v.Cliente, total: 0, items: [],
                    direccion: clientes.find(c => String(c.Nombre).trim().toLowerCase() === String(v.Cliente).trim().toLowerCase())?.Dirección || ""
                };
            }
            const precio = parseFloat(String(v["Precio Total"] || 0).replace(',', '.')) || 0;
            agrupados[idV].items.push({ producto: v.Producto, cant: v.Cantidad, precio: precio });
            agrupados[idV].total += precio;
        });

        pedidosLocal = Object.values(agrupados).reverse();
        renderizar();
    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('animate-spin'); }
}

function renderizar() {
    const container = document.getElementById('contenedor-pedidos');
    document.getElementById('cont-pend').innerText = pedidosLocal.length;
    document.getElementById('cont-ent').innerText = statsSesion.pedidos;
    
    container.innerHTML = pedidosLocal.length ? "" : `
        <div class="text-center py-20 fade-in">
            <span class="material-symbols-outlined text-6xl text-green-200">task_alt</span>
            <p class="text-slate-400 font-black mt-4 uppercase text-xs">¡Excelente trabajo!<br>Ruta finalizada</p>
        </div>`;
    
    pedidosLocal.forEach((ped, idx) => {
        container.innerHTML += `
            <div class="card-pro p-6 space-y-5 fade-in">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <span class="bg-purple-100 text-[#a21caf] text-[10px] font-black px-2 py-1 rounded-lg">ORDEN #${ped.id}</span>
                        <h2 class="text-xl font-black text-slate-800 uppercase mt-2 leading-tight">${ped.cliente}</h2>
                    </div>
                    <button onclick="abrirSelectorMapas('${ped.direccion}')" class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center border border-slate-100 active:bg-purple-600 active:text-white transition-all">
                        <span class="material-symbols-outlined text-2xl">location_on</span>
                    </button>
                </div>

                <div class="bg-slate-50/50 rounded-2xl p-3 border border-slate-50">
                    ${ped.items.map((it, iIdx) => `
                        <div class="flex justify-between items-center py-2.5 px-2 border-b border-white last:border-0">
                            <span class="text-xs font-bold text-slate-600 uppercase">${it.producto} <span class="text-purple-400 ml-2">x${it.cant}</span></span>
                            <button onclick="eliminarProducto(${idx}, ${iIdx})" class="w-8 h-8 flex items-center justify-center text-slate-300 active:text-red-500 transition-colors">
                                <span class="material-symbols-outlined text-lg">close</span>
                            </button>
                        </div>
                    `).join('')}
                </div>

                <div class="flex justify-between items-center pt-2">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Total a cobrar</p>
                        <p class="text-3xl font-black text-slate-900 leading-none">$${ped.total.toFixed(2)}</p>
                    </div>
                    <button onclick="confirmarEntrega('${ped.id}', ${idx})" class="btn-verde px-8 h-14 shadow-lg shadow-green-100">ENTREGADO</button>
                </div>
            </div>`;
    });
}

function eliminarProducto(pedidoIdx, itemIdx) {
    if(!confirm("¿Deseas quitar este producto del pedido?")) return;
    const item = pedidosLocal[pedidoIdx].items[itemIdx];
    pedidosLocal[pedidoIdx].total -= item.precio;
    pedidosLocal[pedidoIdx].items.splice(itemIdx, 1);
    
    if(pedidosLocal[pedidoIdx].items.length === 0) {
        pedidosLocal.splice(pedidoIdx, 1);
    }
    renderizar();
}

function abrirSelectorMapas(dir) {
    if(!dir) {
        alert("El cliente no tiene dirección registrada 📍");
        return;
    }
    const modal = document.getElementById('modal-mapas');
    modal.style.display = 'flex';
    document.getElementById('btn-gmaps').onclick = () => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dir)}`);
    document.getElementById('btn-waze').onclick = () => window.open(`https://waze.com/ul?q=${encodeURIComponent(dir)}&navigate=yes`);
}

function cerrarModal() { document.getElementById('modal-mapas').style.display = 'none'; }

async function confirmarEntrega(idVenta, idx) {
    // Mensaje más amigable
    if(!confirm("¿Confirmas que el pedido de " + pedidosLocal[idx].cliente + " ha sido entregado? 🥛")) return;
    
    try {
        await DairyAPI.enviarDatos("Ventas", { pestaña: "Ventas", accion: "editar_estado", ID_Venta: idVenta, Estado: "ENTREGADO" });
        statsSesion.pedidos++;
        localStorage.setItem('statsDespachos', JSON.stringify(statsSesion));
        cargarDatos(); // Recargar lista
    } catch (e) { alert("Hubo un problema de conexión. Intenta de nuevo."); }
}

function renderMenu() {
    const container = document.getElementById('menu-container');
    const opciones = [
        { nombre: 'Panel', icon: 'dashboard', link: 'DashboardLacteo.html' },
        { nombre: 'Ventas', icon: 'add_shopping_cart', link: 'RegistrodeVentas.html' },
        { nombre: 'Stock', icon: 'inventory', link: 'ControldeInventario.html' },
        { nombre: 'Clientes', icon: 'group', link: 'GestiondeClientes.html' },
        { nombre: 'Rutas', icon: 'local_shipping', link: 'GestióndeDespachos.html' }
    ];
    
    const pathActual = decodeURIComponent(window.location.pathname);
    let html = '<nav class="nav-fija"><div class="menu-grid">';
    opciones.forEach(opt => {
        const esActivo = pathActual.includes(opt.link) ? 'active-btn' : '';
        html += `
            <button onclick="location.href='${opt.link}'" class="nav-btn ${esActivo}">
                <span class="material-symbols-outlined">${opt.icon}</span>
                <span>${opt.nombre}</span>
            </button>`;
    });
    container.innerHTML = html + '</div></nav>';
}

window.onload = () => { cargarDatos(); renderMenu(); };
</script>
</body>
</html>
