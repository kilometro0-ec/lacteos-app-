<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea - Despachos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#a21caf", background: "#faf5ff", outline: "#e9d5ff" } } }
        }
    </script>
</head>
<body class="bg-background text-gray-900 font-[Work_Sans] pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined text-3xl">local_shipping</span>
        </div>
        <h1 class="text-xl font-bold text-primary">Despachos</h1>
    </div>
    <button onclick="cargarDatos()" class="p-2 text-primary">
        <span class="material-symbols-outlined">refresh</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-4xl mx-auto space-y-6">
    <div id="contenedor-pedidos" class="space-y-4">
        <div class="text-center py-20 text-gray-400">
            <p>Cargando pedidos...</p>
        </div>
    </div>
</main>

<script>
async function cargarDatos() {
    const contenedor = document.getElementById('contenedor-pedidos');
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        if (!ventas || ventas.length === 0) {
            contenedor.innerHTML = `<p class="text-center py-10">No hay ventas registradas.</p>`;
            return;
        }

        contenedor.innerHTML = ""; // Limpiar cargando

        // Invertimos para ver lo más nuevo primero
        ventas.reverse().forEach(venta => {
            // Buscamos al cliente (usamos trim() para evitar errores de espacios)
            const clienteInfo = clientes.find(c => 
                c.Nombre.toString().trim().toLowerCase() === venta.Cliente.toString().trim().toLowerCase()
            );

            // IMPORTANTE: Si la columna en Excel tiene espacios, se accede así: venta["Nombre Columna"]
            const pvp = venta["Precio PVP"] || "0.00";
            const total = venta["Precio Total"] || "0.00";
            const direccion = clienteInfo ? clienteInfo.Dirección : "Dirección no encontrada";
            const telf = clienteInfo ? clienteInfo.Teléfono : "";

            contenedor.innerHTML += `
                <div class="bg-white p-5 rounded-3xl border border-outline shadow-sm space-y-3">
                    <div class="flex justify-between">
                        <span class="text-[10px] font-black text-primary uppercase">Pendiente</span>
                        <span class="text-[10px] text-gray-400">${new Date(venta.Fecha).toLocaleDateString()}</span>
                    </div>
                    
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">${venta.Cliente}</h2>
                        <p class="text-sm font-bold text-primary">${venta.Producto} (x${venta.Cantidad})</p>
                    </div>

                    <div class="bg-purple-50 p-3 rounded-xl flex items-start gap-2">
                        <span class="material-symbols-outlined text-primary text-sm">location_on</span>
                        <p class="text-xs text-gray-600">${direccion}</p>
                    </div>

                    <div class="flex justify-between items-center pt-2">
                        <p class="text-lg font-black text-gray-800">$${total}</p>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${telf.replace(/[^0-9]/g, '')}" class="w-10 h-10 bg-green-100 text-green-600 rounded-full flex items-center justify-center">
                                <span class="material-symbols-outlined">chat</span>
                            </a>
                            <button onclick="this.parentElement.parentElement.parentElement.style.opacity='0.5'" class="bg-primary text-white px-4 py-2 rounded-xl text-xs font-bold">
                                ENTREGAR
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        contenedor.innerHTML = `<p class="text-center text-red-500">Error al cargar datos. Revisa la consola (F12).</p>`;
        console.error(error);
    }
}

window.onload = cargarDatos;
</script>
</body>
</html>
