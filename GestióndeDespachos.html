<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Despachos Pro - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    <link rel="stylesheet" href="estilos-lacteos.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <style>
        :root {
            --magenta-glow: rgba(219, 39, 119, 0.15);
            --purple-deep: #a21caf;
        }

        body { background-color: #f8fafc; }

        /* Tarjeta con más carácter */
        .card-pro {
            background: white;
            border-radius: 2rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            overflow: hidden;
        }

        .card-pro:active { transform: scale(0.98); }

        /* Badge de ID con estilo "Neon" */
        .badge-id {
            background: linear-gradient(135deg, #fdf4ff 0%, #fae8ff 100%);
            color: var(--purple-deep);
            border: 1px solid #f5d0fe;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 8px;
        }

        /* Contenedor de items tipo "Lista Elegante" */
        .items-box {
            background-color: #fcfaff;
            border-radius: 1.5rem;
            border: 1px solid #f3e8ff;
        }

        /* Botón de entregado con degradado potente */
        .btn-entregado {
            background: linear-gradient(135deg, #db2777 0%, #9d174d 100%);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 1.2rem;
            box-shadow: 0 4px 15px var(--magenta-glow);
            transition: all 0.3s;
        }

        .btn-entregado:active { transform: translateY(2px); box-shadow: none; }

        /* Animación de entrada */
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-slide-out { animation: slideRight 0.5s forwards; }
        @keyframes slideRight { to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body class="pb-32 text-slate-800">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-white/80 backdrop-blur-md border-b border-purple-100">
    <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-[#a21caf] to-[#db2777] flex items-center justify-center text-white shadow-lg shadow-purple-200">
            <span class="material-symbols-outlined font-black">delivery_dining</span>
        </div>
        <div>
            <h1 class="brand-logo text-xl leading-none">LOGICA LACTEA</h1>
            <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase">Panel Despachos</p>
        </div>
    </div>
    <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-200 active:rotate-180 transition-all duration-500">
        <span id="refresh-icon" class="material-symbols-outlined text-slate-500">sync</span>
    </button>
</header>

<main class="pt-24 px-5 max-w-lg mx-auto space-y-6">
    
    <!-- RESUMEN DE HOY -->
    <div class="flex gap-4">
        <div class="flex-1 bg-white p-4 rounded-[1.8rem] border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Pendiente</p>
            <h2 id="dinero-pend" class="text-xl font-black text-slate-700">$0.00</h2>
        </div>
        <div class="flex-1 bg-gradient-to-br from-[#a21caf] to-[#7e22ce] p-4 rounded-[1.8rem] shadow-md shadow-purple-100">
            <p class="text-[9px] font-black text-purple-200 uppercase mb-1">Cobrado</p>
            <h2 id="dinero-ent" class="text-xl font-black text-white">$0.00</h2>
        </div>
    </div>

    <!-- BUSCADOR -->
    <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-4 text-slate-400">search</span>
        <input type="text" id="filtroDespacho" oninput="filtrar()" placeholder="Buscar cliente..." 
               class="w-full bg-white border border-slate-200 rounded-2xl py-4 pl-12 pr-4 font-bold text-slate-600 focus:outline-none focus:ring-2 focus:ring-purple-200 transition-all shadow-sm">
    </div>

    <div id="contenedor-pedidos" class="space-y-5">
        <!-- Las tarjetas se inyectan aquí -->
    </div>
</main>

<!-- MODAL MAPAS -->
<div id="modal-mapas" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-md">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-6 text-center space-y-4 shadow-2xl scale-95 animate-in">
        <div class="w-16 h-16 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-2">
            <span class="material-symbols-outlined text-purple-600 text-3xl">near_me</span>
        </div>
        <h3 class="font-black text-slate-800">¿Cómo quieres llegar?</h3>
        <div class="grid gap-3">
            <button id="btn-gmaps" class="flex items-center justify-center gap-3 py-4 bg-[#4285F4] text-white rounded-2xl font-black shadow-lg">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg" class="w-5 h-5 bg-white rounded-full p-0.5"> GOOGLE MAPS
            </button>
            <button id="btn-waze" class="flex items-center justify-center gap-3 py-4 bg-[#33CCFF] text-white rounded-2xl font-black shadow-lg">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/66/Waze_icon.svg" class="w-5 h-5"> WAZE APP
            </button>
        </div>
        <button onclick="cerrarModal('modal-mapas')" class="text-slate-400 font-bold text-xs uppercase tracking-widest pt-2">Cancelar</button>
    </div>
</div>

<script>
let statsSesion = JSON.parse(localStorage.getItem('statsDespachos')) || { pedidos: 0, dinero: 0 };
let pedidosLocal = [];

async function cargarDatos() {
    const icon = document.getElementById('refresh-icon');
    icon?.classList.add('animate-spin');
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        const agrupados = {};
        ventas.filter(v => String(v.Estado).trim().toUpperCase() === "PENDIENTE").forEach(v => {
            const idV = v.ID_Venta || "S/N";
            if (!agrupados[idV]) {
                agrupados[idV] = {
                    id: idV, cliente: v.Cliente, total: 0, items: [],
                    direccion: clientes.find(c => String(c.Nombre).trim().toLowerCase() === String(v.Cliente).trim().toLowerCase())?.Dirección || ""
                };
            }
            const precio = parseFloat(String(v["Precio Total"] || v["Precio_Total"] || 0).replace(',', '.')) || 0;
            const cant = parseFloat(v.Cantidad) || 0;
            agrupados[idV].items.push({ producto: v.Producto, cant: cant, precioUnit: cant > 0 ? precio/cant : 0 });
            agrupados[idV].total += precio;
        });

        pedidosLocal = Object.values(agrupados).reverse();
        renderizar();
        actualizarResumen();
    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('animate-spin'); }
}

function renderizar() {
    const container = document.getElementById('contenedor-pedidos');
    container.innerHTML = pedidosLocal.length ? "" : '<div class="text-center py-20"><span class="material-symbols-outlined text-6xl text-slate-200">check_circle</span><p class="text-slate-400 font-black mt-4">RUTA COMPLETADA</p></div>';
    
    pedidosLocal.forEach((ped, idx) => {
        const numItems = ped.items.length;
        const totalUnid = ped.items.reduce((acc, it) => acc + it.cant, 0);

        const itemsHTML = ped.items.map(it => `
            <div class="flex justify-between items-center py-3 border-b border-purple-50 last:border-0 px-2">
                <span class="text-[11px] font-black text-slate-600 uppercase">${it.producto}</span>
                <span class="text-xs font-black text-purple-600 bg-white border border-purple-100 px-3 py-1 rounded-full">x${it.cant}</span>
            </div>
        `).join('');

        container.innerHTML += `
            <div id="card-${idx}" class="card-pro p-5 space-y-4 fade-in-up" style="animation-delay: ${idx * 0.1}s">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <div class="flex gap-2">
                            <span class="badge-id">ID: ${ped.id}</span>
                            <span class="bg-slate-100 text-slate-500 text-[9px] font-black px-2 py-0.5 rounded-md uppercase">📦 ${numItems} Items (${totalUnid} Unid.)</span>
                        </div>
                        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">${ped.cliente}</h2>
                    </div>
                    <button onclick="elegirMapa('${ped.direccion}')" class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center active:bg-purple-600 active:text-white transition-all shadow-sm border border-slate-100">
                        <span class="material-symbols-outlined">map</span>
                    </button>
                </div>

                <div class="items-box p-2">
                    ${itemsHTML}
                </div>

                <div class="flex justify-between items-center pt-2">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">Cobro Total</p>
                        <p class="text-3xl font-black text-slate-900">$${ped.total.toFixed(2)}</p>
                    </div>
                    <button onclick="confirmarEntrega('${ped.id}', ${idx})" class="btn-entregado px-8 h-14">
                        Entregado
                    </button>
                </div>
            </div>`;
    });
}

function elegirMapa(dir) {
    if(!dir) return alert("El cliente no tiene dirección cargada.");
    document.getElementById('modal-mapas').classList.remove('hidden');
    document.getElementById('btn-gmaps').onclick = () => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dir)}`);
    document.getElementById('btn-waze').onclick = () => window.open(`https://waze.com/ul?q=${encodeURIComponent(dir)}&navigate=yes`);
}

async function confirmarEntrega(idVenta, idx) {
    if(!confirm("¿Registrar entrega?")) return;
    document.getElementById(`card-${idx}`).classList.add('anim-slide-out');
    try {
        await DairyAPI.enviarDatos("Ventas", { pestaña: "Ventas", accion: "editar_estado", ID_Venta: idVenta, Estado: "ENTREGADO" });
        statsSesion.dinero += pedidosLocal[idx].total;
        localStorage.setItem('statsDespachos', JSON.stringify(statsSesion));
        setTimeout(() => { cargarDatos(); }, 500);
    } catch (e) { alert("Error al sincronizar."); cargarDatos(); }
}

function actualizarResumen() {
    const pend = pedidosLocal.reduce((acc, curr) => acc + curr.total, 0);
    document.getElementById('dinero-pend').innerText = `$${pend.toFixed(2)}`;
    document.getElementById('dinero-ent').innerText = `$${statsSesion.dinero.toFixed(2)}`;
}

function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }
function filtrar() {
    const q = document.getElementById('filtroDespacho').value.toLowerCase();
    pedidosLocal.forEach((p, idx) => {
        const card = document.getElementById(`card-${idx}`);
        if(card) card.style.display = p.cliente.toLowerCase().includes(q) ? 'block' : 'none';
    });
}
window.onload = cargarDatos;
</script>
</body>
</html>
