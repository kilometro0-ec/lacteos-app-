<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Despachos - Lógica Láctea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: "#a21caf", background: "#faf5ff", outline: "#e9d5ff" } } } }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .active-icon { font-variation-settings: 'FILL' 1; }
        
        /* Animación de deslizamiento hacia la derecha */
        .anim-slide-out {
            animation: slideRight 0.6s forwards cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        @keyframes slideRight {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(150%); opacity: 0; }
        }
    </style>
</head>
<body class="bg-background text-gray-900 font-[Work_Sans] pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl">local_shipping</span>
        <h1 class="text-xl font-extrabold text-primary tracking-tight">Despachos</h1>
    </div>
    <button onclick="cargarDatos()" class="p-2 text-primary active:rotate-180 transition-transform">
        <span class="material-symbols-outlined">refresh</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-4xl mx-auto space-y-4">
    <div class="grid grid-cols-2 gap-3">
        <div class="bg-white p-3 rounded-3xl border border-orange-100 shadow-sm">
            <p class="text-[9px] font-black text-orange-400 uppercase text-center tracking-tighter">Por Despachar</p>
            <div class="flex justify-around items-end mt-1">
                <div class="text-center">
                    <p id="pedidos-pend" class="text-2xl font-black text-orange-600">0</p>
                    <p class="text-[8px] font-bold text-gray-400">Pedidos</p>
                </div>
                <div class="text-center">
                    <p id="items-pend" class="text-2xl font-black text-orange-600">0</p>
                    <p class="text-[8px] font-bold text-gray-400">Ítems</p>
                </div>
            </div>
        </div>
        <div class="bg-white p-3 rounded-3xl border border-green-100 shadow-sm">
            <p class="text-[9px] font-black text-green-400 uppercase text-center tracking-tighter">Entregados Hoy</p>
            <div class="flex justify-around items-end mt-1">
                <div class="text-center">
                    <p id="pedidos-ent" class="text-2xl font-black text-green-600">0</p>
                    <p class="text-[8px] font-bold text-gray-400">Pedidos</p>
                </div>
                <div class="text-center">
                    <p id="items-ent" class="text-2xl font-black text-green-600">0</p>
                    <p class="text-[8px] font-bold text-gray-400">Ítems</p>
                </div>
            </div>
        </div>
    </div>

    <div id="contenedor-pedidos" class="space-y-4 overflow-hidden pt-2"></div>
</main>

<div id="menu-container"></div>

<script>
let statsSesion = { pedidos: 0, items: 0 };

// 1. CARGADOR DEL MENÚ EXTERNO
fetch('menu.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('menu-container').innerHTML = data;
        marcarBotonActivo();
    });

function marcarBotonActivo() {
    const paginaActual = "GestióndeDespachos.html"; // Asegúrate que coincida con el nombre de tu archivo
    const botones = document.querySelectorAll('#menu-container button');
    botones.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes(paginaActual)) {
            btn.classList.add('text-primary', 'font-bold');
            btn.classList.remove('text-gray-400');
            btn.querySelector('.material-symbols-outlined').classList.add('active-icon');
        }
    });
}

// 2. LÓGICA DE DATOS
async function cargarDatos() {
    const contenedor = document.getElementById('contenedor-pedidos');
    contenedor.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold italic">Sincronizando ruta...</div>`;
    
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        const agrupados = {};
        let totalItemsGlobalPendientes = 0;

        // Solo procesamos lo PENDIENTE
        ventas.filter(v => v.Estado === "PENDIENTE").forEach(v => {
            const nom = String(v.Cliente).trim();
            if (!agrupados[nom]) {
                agrupados[nom] = {
                    cliente: nom,
                    items: [],
                    totalDinero: 0,
                    fecha: v.Fecha,
                    info: clientes.find(c => String(c.Nombre).trim().toLowerCase() === nom.toLowerCase())
                };
            }
            const cantidad = parseFloat(v.Cantidad) || 0;
            agrupados[nom].items.push({ p: v.Producto, c: cantidad });
            agrupados[nom].totalDinero += parseFloat(v["Precio Total"] || 0);
            totalItemsGlobalPendientes += cantidad;
        });

        const lista = Object.values(agrupados).reverse();
        
        // Actualizar contadores superiores
        document.getElementById('pedidos-pend').innerText = lista.length;
        document.getElementById('items-pend').innerText = totalItemsGlobalPendientes;
        document.getElementById('pedidos-ent').innerText = statsSesion.pedidos;
        document.getElementById('items-ent').innerText = statsSesion.items;

        contenedor.innerHTML = "";
        if (lista.length === 0) {
            contenedor.innerHTML = `<p class="text-center py-20 text-gray-400 font-bold italic">No hay despachos pendientes.</p>`;
            return;
        }

        lista.forEach((ped, idx) => {
            const telf = ped.info ? String(ped.info.Teléfono || "").replace(/[^0-9]/g, '') : "";
            const sumaItemsEnCard = ped.items.reduce((acc, curr) => acc + curr.c, 0);
            
            const filasHTML = ped.items.map(i => `
                <div class="flex justify-between border-b border-purple-50 py-2">
                    <span class="text-xs text-gray-700 font-medium">${i.p}</span>
                    <span class="text-xs font-black text-primary">x${i.c}</span>
                </div>
            `).join('');

            contenedor.innerHTML += `
                <div id="card-${idx}" class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-lg font-black text-gray-800 leading-tight">${ped.cliente}</h2>
                        <span class="text-[10px] font-bold text-gray-400">${new Date(ped.fecha).toLocaleDateString()}</span>
                    </div>
                    <div class="space-y-0">${filasHTML}</div>
                    <div class="bg-purple-50 p-3 rounded-2xl flex items-start gap-2">
                        <span class="material-symbols-outlined text-primary text-sm">location_on</span>
                        <p class="text-[11px] text-gray-600">${ped.info ? ped.info.Dirección : 'Sin dirección guardada'}</p>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <p class="text-xl font-black text-gray-900">$${ped.totalDinero.toFixed(2)}</p>
                        <div class="flex gap-2">
                            ${telf ? `<a href="https://wa.me/${telf}" class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined">chat</span></a>` : ''}
                            <button onclick="confirmarEntrega('${ped.cliente}', 'card-${idx}', ${sumaItemsEnCard})" 
                                    class="h-12 bg-primary text-white px-6 rounded-2xl text-[10px] font-black shadow-lg active:scale-95 transition-transform">
                                ENTREGADO
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    } catch (e) {
        contenedor.innerHTML = `<p class="text-center text-red-500 py-20 font-bold">Error de conexión.</p>`;
    }
}

async function confirmarEntrega(cliente, cardId, cantidadItemsEnCard) {
    const card = document.getElementById(cardId);
    card.classList.add('anim-slide-out');

    try {
        await DairyAPI.enviarDatos("Ventas", { 
            accion: "marcar_entregado", 
            pestaña: "Ventas", 
            Cliente: cliente 
        });

        setTimeout(() => {
            card.remove();
            // Actualizar datos de sesión (Lo que se ha hecho hoy)
            statsSesion.pedidos += 1;
            statsSesion.items += cantidadItemsEnCard;

            document.getElementById('pedidos-ent').innerText = statsSesion.pedidos;
            document.getElementById('items-ent').innerText = statsSesion.items;
            
            // Restar de los pendientes visualmente
            const pendsPed = document.getElementById('pedidos-pend');
            pendsPed.innerText = Math.max(0, parseInt(pendsPed.innerText) - 1);
            
            const pendsItem = document.getElementById('items-pend');
            pendsItem.innerText = Math.max(0, parseInt(pendsItem.innerText) - cantidadItemsEnCard);
        }, 600);
    } catch (e) {
        alert("Error de red al actualizar estado");
        card.classList.remove('anim-slide-out');
    }
}

window.onload = cargarDatos;
</script>
</body>
</html>
