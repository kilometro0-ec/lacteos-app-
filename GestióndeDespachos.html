<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Rutas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <style>
        body { background-color: #f8fafc; padding-bottom: 90px; font-family: sans-serif; }
        
        .card-pro {
            background: white; border-radius: 2rem; border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05); overflow: hidden;
        }

        .btn-verde {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white; font-weight: 900; text-transform: uppercase;
            border-radius: 1.2rem; transition: all 0.2s;
        }

        /* NAVEGACIÓN ESTILO ULTRA-FINO */
        .nav-fija { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            border-top: 1px solid #f3e8ff; padding: 10px 0 14px 0; z-index: 9999;
        }
        .menu-grid { max-width: 500px; margin: 0 auto; display: flex; justify-content: space-around; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #94a3b8; background: none; border: none; }
        .nav-btn .material-symbols-outlined { font-size: 22px !important; font-variation-settings: 'wght' 300; }
        .nav-btn span:last-child { font-size: 8px !important; font-weight: 800; text-transform: uppercase; }
        .active-btn { color: #a21caf !important; }
        .active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; }

        /* MODAL DE CONFIRMACIÓN PERSONALIZADO (Para Celular) */
        .modal-custom {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px); z-index: 10001; display: none;
            align-items: center; justify-content: center; padding: 25px;
        }
        .modal-box {
            background: white; width: 100%; max-width: 300px; 
            border-radius: 2.5rem; padding: 30px; text-align: center;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-white/80 backdrop-blur-sm border-b border-purple-50">
    <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-tr from-[#a21caf] to-[#db2777] flex items-center justify-center text-white shadow-md">
            <span class="material-symbols-outlined font-black">local_shipping</span>
        </div>
        <h1 class="font-black text-slate-800 tracking-tight">DESPACHOS</h1>
    </div>
    <button onclick="cargarDatos()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
        <span id="refresh-icon" class="material-symbols-outlined text-slate-500">sync</span>
    </button>
</header>

<main class="pt-24 px-5 max-w-lg mx-auto space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center">
            <p id="cont-pend" class="text-3xl font-black text-orange-500">0</p>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Pendientes</p>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border border-green-50 text-center">
            <p id="cont-ent" class="text-3xl font-black text-green-500">0</p>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Entregados</p>
        </div>
    </div>
    <div id="contenedor-pedidos" class="space-y-6 pb-20"></div>
</main>

<!-- MODAL DE CONFIRMACIÓN (Reemplaza al alert feo) -->
<div id="modal-confirm" class="modal-custom">
    <div class="modal-box">
        <div id="confirm-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"></div>
        <h3 id="confirm-title" class="font-black text-slate-800 text-lg leading-tight mb-2"></h3>
        <p id="confirm-text" class="text-slate-500 text-xs font-medium mb-6"></p>
        <div class="flex gap-3">
            <button onclick="cerrarConfirm(false)" class="flex-1 py-3 font-black text-slate-400 text-xs uppercase">No, cancelar</button>
            <button id="confirm-ok" class="flex-1 py-4 rounded-2xl font-black text-white text-xs uppercase shadow-lg shadow-purple-100">Sí, continuar</button>
        </div>
    </div>
</div>

<div id="menu-container"></div>

<script>
let statsSesion = JSON.parse(localStorage.getItem('statsDespachos')) || { pedidos: 0, dinero: 0 };
let pedidosLocal = [];
let pendingAction = null;

async function cargarDatos() {
    const icon = document.getElementById('refresh-icon');
    icon?.classList.add('animate-spin');
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);
        const agrupados = {};
        ventas.filter(v => String(v.Estado).trim().toUpperCase() === "PENDIENTE").forEach(v => {
            const idV = v.ID_Venta || "S/N";
            if (!agrupados[idV]) {
                agrupados[idV] = {
                    id: idV, cliente: v.Cliente, total: 0, items: [],
                    direccion: clientes.find(c => String(c.Nombre).trim().toLowerCase() === String(v.Cliente).trim().toLowerCase())?.Dirección || ""
                };
            }
            const precio = parseFloat(String(v["Precio Total"] || 0).replace(',', '.')) || 0;
            agrupados[idV].items.push({ producto: v.Producto, cant: v.Cantidad, precio: precio });
            agrupados[idV].total += precio;
        });
        pedidosLocal = Object.values(agrupados).reverse();
        renderizar();
    } catch (e) { console.error(e); }
    finally { icon?.classList.remove('animate-spin'); }
}

function renderizar() {
    const container = document.getElementById('contenedor-pedidos');
    document.getElementById('cont-pend').innerText = pedidosLocal.length;
    document.getElementById('cont-ent').innerText = statsSesion.pedidos;
    
    container.innerHTML = pedidosLocal.length ? "" : '<div class="text-center py-20 text-slate-300 font-black uppercase text-[10px]">Ruta Finalizada</div>';
    
    pedidosLocal.forEach((ped, idx) => {
        container.innerHTML += `
            <div class="card-pro p-6 space-y-5">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <span class="bg-purple-50 text-[#a21caf] text-[10px] font-black px-2 py-1 rounded-lg">ORDEN #${ped.id}</span>
                        <h2 class="text-xl font-black text-slate-800 uppercase mt-2">${ped.cliente}</h2>
                    </div>
                    <button onclick="abrirSelectorMapas('${ped.direccion}')" class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center border border-slate-100">
                        <span class="material-symbols-outlined text-2xl">location_on</span>
                    </button>
                </div>
                <div class="bg-slate-50/50 rounded-2xl p-3">
                    ${ped.items.map((it, iIdx) => `
                        <div class="flex justify-between items-center py-2.5 px-2 border-b border-white last:border-0">
                            <span class="text-xs font-bold text-slate-600 uppercase">${it.producto} <span class="text-purple-400 ml-1">x${it.cant}</span></span>
                            <button onclick="askDelete(${idx}, ${iIdx})" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-400 rounded-xl active:bg-red-500 active:text-white transition-all">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                        </div>
                    `).join('')}
                </div>
                <div class="flex justify-between items-center pt-2">
                    <p class="text-3xl font-black text-slate-900">$${ped.total.toFixed(2)}</p>
                    <button onclick="askEntrega('${ped.id}', ${idx})" class="btn-verde px-8 h-14 shadow-lg shadow-green-100">ENTREGADO</button>
                </div>
            </div>`;
    });
}

// FUNCIONES DE MODAL PERSONALIZADO
function showConfirm(title, text, type, onOk) {
    const modal = document.getElementById('modal-confirm');
    const iconBox = document.getElementById('confirm-icon');
    const okBtn = document.getElementById('confirm-ok');
    
    document.getElementById('confirm-title').innerText = title;
    document.getElementById('confirm-text').innerText = text;
    modal.style.display = 'flex';

    if(type === 'delete') {
        iconBox.className = "w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-red-50 text-red-500";
        iconBox.innerHTML = '<span class="material-symbols-outlined text-3xl">delete_forever</span>';
        okBtn.className = "flex-1 py-4 rounded-2xl font-black text-white text-xs uppercase bg-red-500";
    } else {
        iconBox.className = "w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-green-50 text-green-500";
        iconBox.innerHTML = '<span class="material-symbols-outlined text-3xl">check_circle</span>';
        okBtn.className = "flex-1 py-4 rounded-2xl font-black text-white text-xs uppercase bg-green-500";
    }

    okBtn.onclick = () => { onOk(); cerrarConfirm(); };
}

function cerrarConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }

function askDelete(pIdx, iIdx) {
    showConfirm("¿Eliminar producto?", "Se quitará de la lista y se recalculará el total.", "delete", () => {
        const item = pedidosLocal[pIdx].items[iIdx];
        pedidosLocal[pIdx].total -= item.precio;
        pedidosLocal[pIdx].items.splice(iIdx, 1);
        if(pedidosLocal[pIdx].items.length === 0) pedidosLocal.splice(pIdx, 1);
        renderizar();
    });
}

function askEntrega(id, idx) {
    showConfirm("¡Pedido Entregado!", "¿Confirmas la recepción del pago y entrega de productos?", "success", async () => {
        try {
            await DairyAPI.enviarDatos("Ventas", { pestaña: "Ventas", accion: "editar_estado", ID_Venta: id, Estado: "ENTREGADO" });
            statsSesion.pedidos++;
            localStorage.setItem('statsDespachos', JSON.stringify(statsSesion));
            cargarDatos();
        } catch (e) { alert("Error de red"); }
    });
}

function renderMenu() {
    const container = document.getElementById('menu-container');
    const opciones = [
        { nombre: 'Panel', icon: 'dashboard', link: 'DashboardLacteo.html' },
        { nombre: 'Ventas', icon: 'add_shopping_cart', link: 'RegistrodeVentas.html' },
        { nombre: 'Stock', icon: 'inventory', link: 'ControldeInventario.html' },
        { nombre: 'Clientes', icon: 'group', link: 'GestiondeClientes.html' },
        { nombre: 'Rutas', icon: 'local_shipping', link: 'GestióndeDespachos.html' }
    ];
    const pathActual = decodeURIComponent(window.location.pathname);
    let html = '<nav class="nav-fija"><div class="menu-grid">';
    opciones.forEach(opt => {
        const esActivo = pathActual.includes(opt.link) ? 'active-btn' : '';
        html += `<button onclick="location.href='${opt.link}'" class="nav-btn ${esActivo}"><span class="material-symbols-outlined">${opt.icon}</span><span>${opt.nombre}</span></button>`;
    });
    container.innerHTML = html + '</div></nav>';
}

function abrirSelectorMapas(dir) {
    if(!dir) return alert("Sin dirección");
    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dir)}`);
}

window.onload = () => { cargarDatos(); renderMenu(); };
</script>
</body>
</html>
