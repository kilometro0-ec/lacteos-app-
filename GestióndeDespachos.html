<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea - Ventas PRO</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#a21caf", secondary: "#db2777", error: "#ef4444", background: "#faf5ff", outline: "#e9d5ff" } } }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        .out-of-stock { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        @keyframes pulse-red {
            0%, 100% { border-color: #e9d5ff; box-shadow: 0 0 0 rgba(239, 68, 68, 0); }
            50% { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        }
        .stock-critico { animation: pulse-red 1.5s infinite; border-width: 2px; }
    </style>
</head>
<body class="bg-background text-gray-900 font-[Work_Sans] pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined text-3xl">opacity</span>
        </div>
        <h1 class="text-xl font-bold text-primary">Lógica Láctea</h1>
    </div>
    <button onclick="iniciar()" class="p-2 text-primary active:rotate-180 transition-transform duration-500"><span class="material-symbols-outlined">sync</span></button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-primary p-5 rounded-2xl text-white shadow-lg shadow-purple-100">
            <span class="text-[10px] uppercase font-bold tracking-widest opacity-80">Ventas Hoy</span>
            <h3 id="card-cant-ventas" class="text-3xl font-black">0</h3>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-outline shadow-sm">
            <span class="text-[10px] text-secondary uppercase font-bold tracking-widest">Total Recaudado</span>
            <h3 id="card-monto-ventas" class="text-3xl font-black text-primary">$0.00</h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="bg-white p-5 rounded-2xl border border-outline shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-black text-gray-400 uppercase">Cliente</h2>
                    <button onclick="abrirModalCliente()" class="text-xs font-bold text-secondary flex items-center gap-1"><span class="material-symbols-outlined text-sm">person_add</span> NUEVO</button>
                </div>
                <select id="select-cliente" class="w-full h-12 px-4 bg-purple-50 border-none rounded-xl font-bold text-gray-700 outline-none focus:ring-2 focus:ring-primary appearance-none">
                    <option value="">Cargando...</option>
                </select>
            </section>
            <section>
                <h2 class="text-xs font-black text-gray-400 uppercase mb-4 ml-2">Catálogo</h2>
                <div id="contenedor-productos" class="grid grid-cols-2 gap-4"></div>
            </section>
        </div>

        <div class="lg:col-span-5">
            <section class="bg-white rounded-3xl border border-outline shadow-xl sticky top-20 overflow-hidden">
                <div class="bg-secondary p-5 text-white flex justify-between items-center">
                    <h3 class="font-bold text-sm tracking-widest uppercase">Resumen Pedido</h3>
                    <span class="material-symbols-outlined">shopping_cart</span>
                </div>
                <div class="p-6">
                    <div id="lista-carrito" class="space-y-3 mb-6 max-h-64 overflow-y-auto">
                        <p id="carrito-vacio" class="text-center text-gray-400 py-6 italic text-sm">Carrito vacío</p>
                    </div>
                    <div class="border-t border-outline pt-4">
                        <div class="flex justify-between text-2xl font-black text-primary"><span>TOTAL</span><span id="total-venta">$0.00</span></div>
                    </div>
                    <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full mt-6 bg-primary text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all">FINALIZAR VENTA</button>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="modalCliente" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
        <h3 class="text-xl font-bold text-primary uppercase mb-6">Nuevo Cliente</h3>
        <div class="grid grid-cols-1 gap-4">
            <input type="text" id="nuevo-nombre" placeholder="Nombre completo" class="w-full p-3 bg-gray-50 border border-outline rounded-xl">
            <div class="space-y-1">
                <input type="text" id="nuevo-identificacion" placeholder="Cédula/RUC (10-13 dígitos)" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 13)" class="w-full p-3 bg-gray-50 border border-outline rounded-xl">
                <p id="id-error" class="text-[10px] text-red-500 font-bold hidden">Debe tener 10 o 13 números.</p>
            </div>
            <div class="flex gap-2">
                <div class="w-16 bg-gray-100 flex items-center justify-center rounded-xl font-bold text-gray-500">+593</div>
                <input type="tel" id="nuevo-tel" placeholder="999888777" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="flex-1 p-3 bg-gray-50 border border-outline rounded-xl">
            </div>
            <input type="email" id="nuevo-correo" placeholder="Email" class="w-full p-3 bg-gray-50 border border-outline rounded-xl">
            <input type="text" id="nuevo-dir" placeholder="Dirección" class="w-full p-3 bg-gray-50 border border-outline rounded-xl">
            <div class="flex gap-2 mt-4">
                <button onclick="cerrarModalCliente()" class="flex-1 py-3 text-gray-400 font-bold text-xs uppercase">Cerrar</button>
                <button onclick="guardarCliente()" id="btn-save" class="flex-1 py-3 bg-secondary text-white rounded-xl font-bold">REGISTRAR</button>
            </div>
        </div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50">
    <button onclick="window.location.href='DashboardLácteo.html'" class="text-gray-400 flex flex-col items-center gap-1"><span class="material-symbols-outlined">home</span><span class="text-[10px] font-bold">Inicio</span></button>
    <button class="text-primary flex flex-col items-center gap-1 font-bold"><span class="material-symbols-outlined">receipt</span><span class="text-[10px]">Ventas</span></button>
    <button onclick="window.location.href='ControldeInventario.html'" class="text-gray-400 flex flex-col items-center gap-1"><span class="material-symbols-outlined">inventory</span><span class="text-[10px]">Stock</span></button>
    <button onclick="window.location.href='GestióndeDespachos.html'" class="text-success flex flex-col items-center gap-1"><span class="material-symbols-outlined">local_shipping</span><span class="text-[10px]">Entregas</span></button>
</nav>

<script>
let carrito = {}; let productosData = [];

async function iniciar() {
    try {
        const [clientes, productos, ventas] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        const hoy = new Date().toLocaleDateString();
        const vHoy = ventas.filter(v => new Date(v.Fecha).toLocaleDateString() === hoy);
        document.getElementById('card-cant-ventas').innerText = vHoy.length;
        document.getElementById('card-monto-ventas').innerText = `$${vHoy.reduce((acc, v) => acc + (parseFloat(v.Total) || 0), 0).toFixed(2)}`;

        const select = document.getElementById('select-cliente');
        select.innerHTML = '<option value="">-- Seleccionar Cliente --</option>';
        clientes.forEach(c => select.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`);

        productosData = productos;
        renderizar();
    } catch (e) { console.error(e); }
}

function renderizar() {
    const cont = document.getElementById('contenedor-productos');
    cont.innerHTML = "";
    productosData.forEach(p => {
        const s = parseInt(p.Stock) || 0;
        cont.innerHTML += `
            <div class="bg-white p-4 rounded-2xl border border-outline shadow-sm ${s <= 0 ? 'out-of-stock' : ''} ${s > 0 && s <= 5 ? 'stock-critico' : ''}">
                <h4 class="font-bold text-gray-700 text-xs mb-1 line-clamp-1">${p.Producto}</h4>
                <span class="text-[10px] font-black ${s < 10 ? 'text-secondary' : 'text-primary'} uppercase">Stock: ${s}</span>
                <p class="text-lg font-black text-primary my-2">$${parseFloat(p.Precio_Venta).toFixed(2)}</p>
                <div class="flex items-center justify-between bg-purple-50 rounded-xl p-1">
                    <button onclick="cambiarCant('${p.Producto}', -1)" class="w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center font-bold text-primary">-</button>
                    <span id="cant-${p.Producto.replace(/\s+/g, '')}" class="text-xs font-bold">0</span>
                    <button onclick="cambiarCant('${p.Producto}', 1)" class="w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center font-bold text-primary">+</button>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if (!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    if (carrito[n] + d >= 0 && carrito[n] + d <= p.Stock) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g, '')}`).innerText = carrito[n];
        actualizarUI();
    }
}

function actualizarUI() {
    const lista = document.getElementById('lista-carrito');
    lista.innerHTML = ""; let t = 0;
    Object.keys(carrito).forEach(n => {
        if (carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * p.Precio_Venta;
            t += sub;
            lista.innerHTML += `<div class="flex justify-between bg-purple-50 p-3 rounded-xl border border-purple-100 text-xs font-bold"><span>${n} (x${carrito[n]})</span><span class="text-primary">$${sub.toFixed(2)}</span></div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').style.display = t > 0 ? 'none' : 'block';
}

async function finalizarVenta() {
    const c = document.getElementById('select-cliente').value;
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if (!c || items.length === 0) return alert("Faltan datos");
    
    document.getElementById('btn-finalizar').disabled = true;
    try {
        for (const n of items) {
            const p = productosData.find(x => x.Producto === n);
            await DairyAPI.enviarDatos("Ventas", { Fecha: new Date().toLocaleDateString(), Cliente: c, Producto: n, Cantidad: carrito[n], Precio_Venta: p.Precio_Venta, Total: (carrito[n] * p.Precio_Venta).toFixed(2) });
        }
        alert("Venta guardada!"); location.reload();
    } catch (e) { alert("Error al guardar"); document.getElementById('btn-finalizar').disabled = false; }
}

function abrirModalCliente() { document.getElementById('modalCliente').classList.remove('hidden'); }
function cerrarModalCliente() { document.getElementById('modalCliente').classList.add('hidden'); }

async function guardarCliente() {
    const id = document.getElementById('nuevo-identificacion').value;
    if (id.length < 10 || id.length > 13) return document.getElementById('id-error').classList.remove('hidden');
    
    document.getElementById('btn-save').innerText = "...";
    await DairyAPI.enviarDatos("Clientes", { pestaña: "Clientes", ID: id, Nombre: document.getElementById('nuevo-nombre').value, Teléfono: "+593" + document.getElementById('nuevo-tel').value, Correo: document.getElementById('nuevo-correo').value, Dirección: document.getElementById('nuevo-dir').value, Fecha: new Date().toLocaleDateString() });
    location.reload();
}

window.onload = iniciar;
</script>
</body>
</html>
