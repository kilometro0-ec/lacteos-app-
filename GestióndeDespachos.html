<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea - Gestión de Despachos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#a21caf", secondary: "#7e22ce", background: "#faf5ff", outline: "#e9d5ff" } } }
        }
    </script>
</head>
<body class="bg-background text-gray-900 font-[Work_Sans] pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined text-3xl">local_shipping</span>
        </div>
        <h1 class="text-xl font-bold text-primary">Despachos</h1>
    </div>
    <button onclick="cargarDatos()" class="p-2 text-primary active:rotate-180 transition-transform">
        <span class="material-symbols-outlined">refresh</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-4xl mx-auto space-y-6">
    <div id="contenedor-pedidos" class="space-y-4">
        <div class="text-center py-20 text-gray-400">
            <span class="material-symbols-outlined animate-spin text-4xl">sync</span>
            <p class="mt-2 font-bold">Consolidando pedidos...</p>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50 px-2">
    <button onclick="window.location.href='DashboardLácteo.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[9px] font-bold">Inicio</span>
    </button>
    <button onclick="window.location.href='RegistrodeVentas.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">receipt_long</span>
        <span class="text-[9px] font-bold">Ventas</span>
    </button>
    <button onclick="window.location.href='GestiondeClientes.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">group</span>
        <span class="text-[9px] font-bold">Clientes</span>
    </button>
    <button onclick="window.location.href='ControldeInventario.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">inventory_2</span>
        <span class="text-[9px] font-bold">Stock</span>
    </button>
    <button class="text-primary flex flex-col items-center gap-1 font-bold">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">local_shipping</span>
        <span class="text-[9px] font-bold">Despachos</span>
    </button>
</nav>

<script>
async function cargarDatos() {
    const contenedor = document.getElementById('contenedor-pedidos');
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        if (!ventas || ventas.length === 0) {
            contenedor.innerHTML = `<p class="text-center py-20 text-gray-400 font-bold text-sm">No hay pedidos pendientes.</p>`;
            return;
        }

        // --- LÓGICA DE AGRUPACIÓN POR CLIENTE ---
        const pedidosAgrupados = {};

        ventas.forEach(v => {
            const nombreCliente = String(v.Cliente).trim();
            if (!pedidosAgrupados[nombreCliente]) {
                pedidosAgrupados[nombreCliente] = {
                    cliente: nombreCliente,
                    productos: [],
                    totalVenta: 0,
                    fecha: v.Fecha
                };
            }
            pedidosAgrupados[nombreCliente].productos.push({
                nombre: v.Producto,
                cant: v.Cantidad
            });
            pedidosAgrupados[nombreCliente].totalVenta += parseFloat(v["Precio Total"] || 0);
        });

        contenedor.innerHTML = "";

        Object.values(pedidosAgrupados).reverse().forEach(pedido => {
            const clienteInfo = clientes.find(c => 
                String(c.Nombre).trim().toLowerCase() === pedido.cliente.toLowerCase()
            );

            const direccion = clienteInfo ? (clienteInfo.Dirección || "Sin dirección") : "Dirección no registrada";
            const telfRaw = clienteInfo ? (clienteInfo.Teléfono || "") : "";
            const telfString = String(telfRaw);
            const linkWA = telfString.replace(/[^0-9]/g, '');

            // Generar lista de productos para la tarjeta
            const listaHTML = pedido.productos.map(p => 
                `<div class="flex justify-between text-[11px] border-b border-purple-50 py-1">
                    <span class="font-medium text-gray-600">${p.nombre}</span>
                    <span class="font-black text-primary">x${p.cant}</span>
                </div>`
            ).join('');

            contenedor.innerHTML += `
                <div class="bg-white p-5 rounded-3xl border border-outline shadow-sm space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="bg-orange-100 text-orange-600 text-[9px] font-black px-2 py-1 rounded-lg uppercase">Pendiente</span>
                        <span class="text-[10px] font-bold text-gray-400">${new Date(pedido.fecha).toLocaleDateString()}</span>
                    </div>

                    <div>
                        <h2 class="text-lg font-black text-gray-800 leading-tight">${pedido.cliente}</h2>
                        <div class="mt-3 space-y-1">
                            ${listaHTML}
                        </div>
                    </div>

                    <div class="bg-purple-50 p-3 rounded-2xl flex items-start gap-3">
                        <span class="material-symbols-outlined text-primary text-sm">location_on</span>
                        <p class="text-[11px] font-medium text-gray-600 leading-relaxed">${direccion}</p>
                    </div>

                    <div class="flex justify-between items-center pt-2">
                        <div>
                            <p class="text-[9px] font-bold text-gray-400 uppercase leading-none">Total Pedido</p>
                            <p class="text-xl font-black text-gray-900">$${pedido.totalVenta.toFixed(2)}</p>
                        </div>
                        <div class="flex gap-2">
                            ${linkWA ? `
                                <a href="https://wa.me/${linkWA}" class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center">
                                    <span class="material-symbols-outlined">chat</span>
                                </a>
                            ` : ''}
                            <button onclick="this.closest('.bg-white').style.opacity='0.5'" class="h-12 bg-primary text-white px-5 rounded-2xl text-[10px] font-black shadow-lg shadow-purple-100">
                                ENTREGADO
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        console.error(error);
        contenedor.innerHTML = `<p class="text-center text-red-500 py-10 font-bold">Error de sincronización.</p>`;
    }
}

window.onload = cargarDatos;
</script>
</body>
</html>
