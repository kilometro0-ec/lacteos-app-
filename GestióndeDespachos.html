<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Despachos - Lógica Láctea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: "#a21caf", background: "#faf5ff", outline: "#e9d5ff" } } } }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0; }
        .active-icon { font-variation-settings: 'FILL' 1; }
        
        /* Animación de deslizamiento */
        .anim-entregado {
            animation: slideOut 0.6s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(150%); opacity: 0; }
        }
    </style>
</head>
<body class="bg-background text-gray-900 font-[Work_Sans] pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl">local_shipping</span>
        <h1 class="text-xl font-extrabold text-primary tracking-tight">Despachos</h1>
    </div>
    <button onclick="cargarDatos()" class="p-2 text-primary active:rotate-180 transition-transform">
        <span class="material-symbols-outlined">refresh</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-4xl mx-auto space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded-3xl border border-outline text-center shadow-sm">
            <p class="text-[10px] font-black text-gray-400 uppercase">Pendientes</p>
            <p id="cant-pendientes" class="text-3xl font-black text-orange-500">0</p>
        </div>
        <div class="bg-white p-4 rounded-3xl border border-outline text-center shadow-sm">
            <p class="text-[10px] font-black text-gray-400 uppercase">Entregados Hoy</p>
            <p id="cant-entregados" class="text-3xl font-black text-green-500">0</p>
        </div>
    </div>

    <div id="contenedor-pedidos" class="space-y-4 overflow-hidden"></div>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50 px-2">
    <button onclick="window.location.href='DashboardLacteo.html'" class="text-gray-400 flex flex-col items-center gap-1">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[9px] font-bold">Inicio</span>
    </button>
    <button class="text-primary flex flex-col items-center gap-1 font-bold">
        <span class="material-symbols-outlined active-icon">local_shipping</span>
        <span class="text-[9px] font-bold">Despachos</span>
    </button>
</nav>

<script>
let entregadosHoy = 0;

async function cargarDatos() {
    const contenedor = document.getElementById('contenedor-pedidos');
    contenedor.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold">Sincronizando...</div>`;
    
    try {
        const [ventas, clientes] = await Promise.all([
            DairyAPI.obtenerDatos("Ventas"),
            DairyAPI.obtenerDatos("Clientes")
        ]);

        const agrupados = {};
        // Solo agrupamos los que NO dicen ENTREGADO (es decir, los PENDIENTES o vacíos)
        ventas.filter(v => v.Estado !== "ENTREGADO").forEach(v => {
            const nom = String(v.Cliente).trim();
            if (!agrupados[nom]) {
                agrupados[nom] = {
                    cliente: nom,
                    items: [],
                    total: 0,
                    fecha: v.Fecha,
                    info: clientes.find(c => String(c.Nombre).trim().toLowerCase() === nom.toLowerCase())
                };
            }
            agrupados[nom].items.push({ p: v.Producto, c: v.Cantidad });
            agrupados[nom].total += parseFloat(v["Precio Total"] || 0);
        });

        const lista = Object.values(agrupados).reverse();
        document.getElementById('cant-pendientes').innerText = lista.length;
        document.getElementById('cant-entregados').innerText = entregadosHoy;
        contenedor.innerHTML = "";

        if (lista.length === 0) {
            contenedor.innerHTML = `<p class="text-center py-20 text-gray-400 font-bold">¡Todo entregado!</p>`;
            return;
        }

        lista.forEach((p, idx) => {
            const telf = p.info ? String(p.info.Teléfono || "").replace(/[^0-9]/g, '') : "";
            const filasProd = p.items.map(i => `
                <div class="flex justify-between border-b border-purple-50 py-2">
                    <span class="text-xs text-gray-700 font-medium">${i.p}</span>
                    <span class="text-xs font-black text-primary">x${i.c}</span>
                </div>
            `).join('');

            contenedor.innerHTML += `
                <div id="card-${idx}" class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm space-y-4 transition-all">
                    <div class="flex justify-between items-center">
                        <h2 class="text-lg font-black text-gray-800">${p.cliente}</h2>
                        <span class="text-[10px] font-bold text-gray-400">${new Date(p.fecha).toLocaleDateString()}</span>
                    </div>
                    <div class="space-y-1">${filasProd}</div>
                    <div class="bg-purple-50 p-3 rounded-2xl flex items-start gap-2">
                        <span class="material-symbols-outlined text-primary text-sm">location_on</span>
                        <p class="text-[11px] text-gray-600">${p.info ? p.info.Dirección : 'Dirección no registrada'}</p>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <p class="text-xl font-black text-gray-900">$${p.total.toFixed(2)}</p>
                        <div class="flex gap-2">
                            ${telf ? `<a href="https://wa.me/${telf}" class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined">chat</span></a>` : ''}
                            <button onclick="completarEntrega('${p.cliente}', 'card-${idx}')" class="h-12 bg-primary text-white px-6 rounded-2xl text-[10px] font-black shadow-lg">ENTREGADO</button>
                        </div>
                    </div>
                </div>`;
        });
    } catch (e) {
        contenedor.innerHTML = `<p class="text-center text-red-500 py-20 font-bold">Error al conectar.</p>`;
    }
}

async function completarEntrega(cliente, cardId) {
    const card = document.getElementById(cardId);
    
    // 1. Iniciamos animación visual inmediatamente
    card.classList.add('anim-entregado');

    try {
        // 2. Enviamos a la API
        await DairyAPI.enviarDatos("Ventas", { 
            accion: "marcar_entregado", 
            pestaña: "Ventas", 
            Cliente: cliente 
        });

        // 3. Esperamos a que termine la animación antes de borrar el elemento
        setTimeout(() => {
            card.remove();
            entregadosHoy++;
            document.getElementById('cant-entregados').innerText = entregadosHoy;
            const pends = document.getElementById('cant-pendientes');
            pends.innerText = Math.max(0, parseInt(pends.innerText) - 1);
        }, 600);

    } catch (e) {
        alert("Error al actualizar la base de datos");
        card.classList.remove('anim-entregado');
    }
}

window.onload = cargarDatos;
</script>
</body>
</html>
