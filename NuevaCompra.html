<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Registrar Compra</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        primary: "#a21caf", 
                        background: "#faf5ff", 
                        outline: "#e9d5ff", 
                        success: "#16a34a",
                        dark: "#1f012a"
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-background text-dark antialiased pb-20">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3" onclick="history.back()">
        <span class="material-symbols-outlined text-primary font-bold cursor-pointer">arrow_back_ios</span>
        <h1 class="text-sm font-black text-primary uppercase tracking-tighter italic">Nueva Compra</h1>
    </div>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm space-y-5">
        
        <!-- Info del Proveedor -->
        <div class="bg-slate-50 p-4 rounded-2xl border border-dashed border-outline">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Proveedor Habitual</p>
            <input type="text" id="prov-nombre" readonly 
                class="w-full bg-transparent border-none p-0 font-black text-primary text-lg focus:ring-0">
        </div>

        <!-- Formulario de Compra -->
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Producto / Insumo</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-slate-300">inventory_2</span>
                    <select id="producto" onchange="actualizarPrecioSugerido()" 
                        class="w-full border-none bg-slate-50 rounded-2xl p-4 pl-12 focus:ring-2 focus:ring-primary shadow-inner font-bold text-sm">
                        <option value="">Cargando catálogo filtrado...</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Cantidad</label>
                    <input type="number" id="cantidad" oninput="calcularTotal()" placeholder="0.00" 
                        class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner font-black text-center text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Costo Unit.</label>
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-slate-400 font-bold">$</span>
                        <input type="number" id="precio" oninput="calcularTotal()" placeholder="0.00" 
                            class="w-full border-none bg-slate-50 rounded-2xl p-4 pl-8 focus:ring-2 focus:ring-primary shadow-inner font-black text-center text-lg">
                    </div>
                </div>
            </div>

            <!-- Total Card -->
            <div class="bg-dark p-6 rounded-[2rem] text-center shadow-xl">
                <p class="text-[10px] font-black text-primary uppercase tracking-[0.3em] mb-1">Total del Pedido</p>
                <h2 id="total-display" class="text-3xl font-black text-white">$0.00</h2>
            </div>

            <button onclick="procesarCompra()" id="btn-compra" 
                class="w-full bg-primary text-white font-black py-5 rounded-[2rem] shadow-lg active:scale-95 transition-all flex justify-center items-center gap-3 tracking-widest text-xs uppercase">
                <span class="material-symbols-outlined">receipt_long</span> Confirmar y Recibir
            </button>
        </div>
    </section>
</main>

<script>
    // 1. Obtener Proveedor de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const provParam = urlParams.get('prov');
    const provInput = document.getElementById('prov-nombre');
    
    if(provParam) {
        provInput.value = decodeURIComponent(provParam);
    } else {
        alert("No se detectó un proveedor. Regresando...");
        history.back();
    }

    // 2. Cargar Catálogo Filtrado (Columna H: Proveedor Habitual)
    async function cargarCatalogo() {
        const select = document.getElementById('producto');
        const provActual = provInput.value.trim();

        try {
            const inventario = await DairyAPI.obtenerDatos("Inventario");
            
            // Filtramos productos donde el "Proveedor Habitual" coincida
            const productosFiltrados = inventario.filter(p => 
                p["Proveedor Habitual"] && p["Proveedor Habitual"].trim() === provActual
            );

            if (productosFiltrados.length > 0) {
                select.innerHTML = `<option value="" disabled selected>Selecciona un producto</option>` + 
                productosFiltrados.map(p => `
                    <option value="${p.Producto}" data-precio="${p.Costo_Unitario || 0}">
                        ${p.Producto} (Stock: ${p.Stock})
                    </option>
                `).join('');
            } else {
                select.innerHTML = `<option value="">Sin productos vinculados a ${provActual}</option>`;
            }
        } catch (e) {
            console.error("Error al cargar inventario:", e);
            select.innerHTML = `<option value="">Error al conectar con Inventario</option>`;
        }
    }

    // 3. Lógica de Cálculos
    function actualizarPrecioSugerido() {
        const select = document.getElementById('producto');
        const precioInput = document.getElementById('precio');
        const selectedOption = select.options[select.selectedIndex];
        
        if (selectedOption && selectedOption.dataset.precio) {
            precioInput.value = parseFloat(selectedOption.dataset.precio).toFixed(2);
            calcularTotal();
        }
    }

    function calcularTotal() {
        const cant = parseFloat(document.getElementById('cantidad').value) || 0;
        const prec = parseFloat(document.getElementById('precio').value) || 0;
        const total = cant * prec;
        document.getElementById('total-display').innerText = `$${total.toFixed(2)}`;
        return total;
    }

    // 4. Enviar a Google Sheets
    async function procesarCompra() {
        const btn = document.getElementById('btn-compra');
        const producto = document.getElementById('producto').value;
        const cantidad = document.getElementById('cantidad').value;
        const total = calcularTotal();

        if (!producto || !cantidad || cantidad <= 0) {
            return alert("Por favor completa producto y cantidad.");
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> PROCESANDO...`;

        const payload = {
            Fecha: new Date().toLocaleDateString(),
            Proveedor: provInput.value,
            Producto: producto,
            Cantidad: cantidad,
            Precio: document.getElementById('precio').value,
            Total: total.toFixed(2)
        };

        try {
            // Guardamos en la pestaña "Compras"
            await DairyAPI.guardarDatos("Compras", payload);
            alert("¡Compra registrada! El stock se actualizará automáticamente.");
            window.location.href = "Proveedores.html";
        } catch (e) {
            alert("Error al registrar la compra. Revisa tu conexión.");
            btn.disabled = false;
            btn.innerHTML = `<span class="material-symbols-outlined">receipt_long</span> Confirmar y Recibir`;
        }
    }

    window.onload = cargarCatalogo;
</script>
</body>
</html>
