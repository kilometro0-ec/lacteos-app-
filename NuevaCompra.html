<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Registrar Compra</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        primary: "#a21caf", 
                        background: "#faf5ff", 
                        outline: "#e9d5ff", 
                        success: "#16a34a",
                        danger: "#ef4444",
                        dark: "#1f012a"
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-background text-dark antialiased pb-20">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3" onclick="history.back()">
        <span class="material-symbols-outlined text-primary font-bold cursor-pointer">arrow_back_ios</span>
        <h1 class="text-sm font-black text-primary uppercase tracking-tighter italic">Nueva Compra</h1>
    </div>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm space-y-5">
        
        <div class="bg-slate-50 p-4 rounded-2xl border border-dashed border-outline">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Proveedor Actual</p>
            <input type="text" id="prov-nombre" readonly class="w-full bg-transparent border-none p-0 font-black text-primary text-lg focus:ring-0">
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Buscar Producto</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-4 text-slate-300">search</span>
                    <select id="producto" onchange="analizarPrecioAnterior()" 
                        class="w-full border-none bg-slate-50 rounded-2xl p-4 pl-12 focus:ring-2 focus:ring-primary shadow-inner font-bold text-sm">
                        <option value="">Cargando catálogo...</option>
                    </select>
                </div>
            </div>

            <div id="alerta-precio" class="hidden p-3 rounded-xl border flex items-center justify-between transition-all">
                <div class="flex items-center gap-2">
                    <span id="p-icono" class="material-symbols-outlined text-lg">history</span>
                    <span id="p-mensaje" class="text-[10px] font-bold uppercase italic"></span>
                </div>
                <span id="p-valor" class="text-xs font-black"></span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Cantidad</label>
                    <input type="number" id="cantidad" oninput="calcularTotal()" placeholder="0" 
                        class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner font-black text-center text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block">Precio Distr.</label>
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-slate-400 font-bold">$</span>
                        <input type="number" step="0.01" id="precio" oninput="calcularTotal(); compararAhora();" placeholder="0.00" 
                            class="w-full border-none bg-slate-50 rounded-2xl p-4 pl-8 focus:ring-2 focus:ring-primary shadow-inner font-black text-center text-lg">
                    </div>
                </div>
            </div>

            <div class="bg-dark p-6 rounded-[2rem] text-center shadow-xl">
                <p class="text-[10px] font-black text-primary uppercase tracking-[0.3em] mb-1">Total a Pagar</p>
                <h2 id="total-display" class="text-3xl font-black text-white">$0.00</h2>
            </div>

            <button onclick="procesarCompra()" id="btn-compra" 
                class="w-full bg-primary text-white font-black py-5 rounded-[2rem] shadow-lg active:scale-95 transition-all flex justify-center items-center gap-3 tracking-widest text-xs uppercase">
                <span class="material-symbols-outlined">shopping_bag</span> Registrar Compra
            </button>
        </div>
    </section>
</main>

<script>
    let comprasHistorial = [];
    let ultimoPrecioPagado = 0;

    // 1. Cargar datos iniciales
    async function inicializar() {
        const urlParams = new URLSearchParams(window.location.search);
        const provParam = urlParams.get('prov');
        if(provParam) document.getElementById('prov-nombre').value = decodeURIComponent(provParam);

        try {
            const [inventario, compras] = await Promise.all([
                DairyAPI.obtenerDatos("Inventario"),
                DairyAPI.obtenerDatos("Compras")
            ]);
            
            comprasHistorial = compras || [];
            
            // Filtrar catálogo por Proveedor Habitual (Columna H)
            const provActual = document.getElementById('prov-nombre').value;
            const filtrados = inventario.filter(p => p["Proveedor Habitual"] === provActual);
            
            const select = document.getElementById('producto');
            select.innerHTML = `<option value="" disabled selected>Selecciona un producto</option>` + 
                filtrados.map(p => `<option value="${p.Producto}">${p.Producto}</option>`).join('');
                
        } catch (e) { console.error(e); }
    }

    // 2. Lógica de comparación de precios
    function analizarPrecioAnterior() {
        const prod = document.getElementById('producto').value;
        const alerta = document.getElementById('alerta-precio');
        const pMensaje = document.getElementById('p-mensaje');
        const pValor = document.getElementById('p-valor');

        // Buscar la última compra de este producto
        const registro = [...comprasHistorial].reverse().find(c => c.Producto === prod);

        if (registro) {
            ultimoPrecioPagado = parseFloat(registro.Precio_Distribuidor || registro.Precio || 0);
            alerta.classList.remove('hidden');
            alerta.className = "p-3 rounded-xl border flex items-center justify-between bg-slate-50 border-slate-200 text-slate-500";
            pMensaje.innerText = "Último precio pagado:";
            pValor.innerText = `$${ultimoPrecioPagado.toFixed(2)}`;
            
            // Auto-llenar el precio para agilizar
            document.getElementById('precio').value = ultimoPrecioPagado.toFixed(2);
            calcularTotal();
        } else {
            alerta.classList.add('hidden');
            ultimoPrecioPagado = 0;
        }
    }

    function compararAhora() {
        const precioActual = parseFloat(document.getElementById('precio').value) || 0;
        const alerta = document.getElementById('alerta-precio');
        const pIcono = document.getElementById('p-icono');
        const pMensaje = document.getElementById('p-mensaje');

        if (ultimoPrecioPagado === 0) return;

        if (precioActual > ultimoPrecioPagado) {
            alerta.className = "p-3 rounded-xl border flex items-center justify-between bg-red-50 border-red-200 text-danger";
            pIcono.innerText = "trending_up";
            pMensaje.innerText = "El precio ha SUBIDO";
        } else if (precioActual < ultimoPrecioPagado && precioActual > 0) {
            alerta.className = "p-3 rounded-xl border flex items-center justify-between bg-green-50 border-green-200 text-success";
            pIcono.innerText = "trending_down";
            pMensaje.innerText = "El precio ha BAJADO";
        } else {
            alerta.className = "p-3 rounded-xl border flex items-center justify-between bg-slate-50 border-slate-200 text-slate-500";
            pIcono.innerText = "horizontal_rule";
            pMensaje.innerText = "Precio sin cambios";
        }
    }

    function calcularTotal() {
        const cant = parseFloat(document.getElementById('cantidad').value) || 0;
        const prec = parseFloat(document.getElementById('precio').value) || 0;
        const total = cant * prec;
        document.getElementById('total-display').innerText = `$${total.toFixed(2)}`;
    }

    async function procesarCompra() {
        const btn = document.getElementById('btn-compra');
        const producto = document.getElementById('producto').value;
        const cantidad = document.getElementById('cantidad').value;
        const precio = document.getElementById('precio').value;

        if (!producto || !cantidad || !precio) return alert("Completa todos los campos");

        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> REGISTRANDO...`;

        const datos = {
            Fecha: new Date().toLocaleDateString(),
            Proveedor: document.getElementById('prov-nombre').value,
            Producto: producto,
            Cantidad: cantidad,
            Precio_Distribuidor: precio,
            Total: (parseFloat(cantidad) * parseFloat(precio)).toFixed(2)
        };

        try {
            await DairyAPI.guardarDatos("Compras", datos);
            alert("Compra registrada correctamente");
            window.location.href = "Proveedores.html";
        } catch (e) {
            alert("Error al guardar");
            btn.disabled = false;
            btn.innerHTML = `<span class="material-symbols-outlined">shopping_bag</span> Registrar Compra`;
        }
    }

    window.onload = inicializar;
</script>
</body>
</html>
