<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lógica Láctea - Pedidos a Proveedor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#a21caf",
                        secondary: "#db2777",
                        background: "#faf5ff",
                        outline: "#e9d5ff",
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-nav { color: #a21caf !important; }
        .active-nav .icon-box { background-color: #f5f3ff !important; transform: translateY(-8px); shadow: 0 10px 15px -3px rgba(162, 28, 175, 0.2); }
    </style>
</head>

<body class="bg-background text-slate-900 antialiased pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3" onclick="window.location.href='DashboardLacteo.html'">
        <span class="material-symbols-outlined text-primary">arrow_back_ios</span>
        <h1 class="text-lg font-extrabold text-primary uppercase tracking-tighter">Nuevo Pedido</h1>
    </div>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">
    
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm space-y-4">
        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Proveedor</label>
            <input type="text" id="proveedor" placeholder="Nombre del distribuidor" 
                class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary">
        </div>

        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Producto</label>
            <select id="producto" class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary">
                <option value="">Seleccionar producto...</option>
                </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Cantidad</label>
                <input type="number" id="cantidad" placeholder="0" 
                    class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Costo Unit.</label>
                <input type="number" id="costo" placeholder="0.00" step="0.01"
                    class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary">
            </div>
        </div>

        <button onclick="registrarPedido()" id="btn-registrar"
            class="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg shadow-purple-200 active:scale-95 transition-all flex justify-center items-center gap-2">
            <span class="material-symbols-outlined">local_mall</span> GUARDAR PEDIDO
        </button>
    </section>

    <section class="space-y-3">
        <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 ml-2">Últimos Pedidos</h3>
        <div id="lista-pedidos" class="space-y-3">
            </div>
    </section>
</main>

<div id="menu-container"></div>

<script>
async function cargarConfiguracion() {
    try {
        // Cargar menú lateral/inferior
        const resMenu = await fetch('menu.html');
        document.getElementById('menu-container').innerHTML = await resMenu.text();

        // Cargar productos para el select
        const inventario = await DairyAPI.obtenerDatos("Inventario");
        const select = document.getElementById('producto');
        inventario.forEach(p => {
            select.innerHTML += `<option value="${p.Producto}">${p.Producto}</option>`;
        });

        actualizarLista();
    } catch (e) { console.error(e); }
}

async function registrarPedido() {
    const btn = document.getElementById('btn-registrar');
    const prov = document.getElementById('proveedor').value;
    const prod = document.getElementById('producto').value;
    const cant = parseFloat(document.getElementById('cantidad').value);
    const cost = parseFloat(document.getElementById('costo').value);

    if(!prov || !prod || !cant) return alert("Completa los datos");

    btn.disabled = true;
    btn.innerHTML = "Procesando...";

    const pedido = {
        Fecha: new Date().toLocaleDateString(),
        Proveedor: prov,
        Producto: prod,
        Cantidad: cant,
        Costo_Unitario: cost,
        Total: (cant * cost).toFixed(2),
        Estado: "Recibido"
    };

    try {
        await DairyAPI.guardarDatos("Compras", pedido);
        alert("Pedido registrado y stock actualizado");
        location.reload();
    } catch (e) {
        alert("Error al guardar");
        btn.disabled = false;
        btn.innerHTML = "GUARDAR PEDIDO";
    }
}

async function actualizarLista() {
    const contenedor = document.getElementById('lista-pedidos');
    try {
        const compras = await DairyAPI.obtenerDatos("Compras");
        contenedor.innerHTML = "";
        compras.reverse().slice(0, 5).forEach(c => {
            contenedor.innerHTML += `
                <div class="bg-white p-4 rounded-3xl border border-outline flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-primary uppercase">${c.Proveedor}</p>
                        <p class="font-bold text-slate-700">${c.Producto}</p>
                        <p class="text-[10px] text-slate-400">${c.Fecha}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-lg text-slate-900">${c.Cantidad}</p>
                        <p class="text-[10px] font-bold text-success">$${c.Total}</p>
                    </div>
                </div>`;
        });
    } catch (e) { contenedor.innerHTML = "No hay pedidos recientes"; }
}

window.onload = cargarConfiguracion;
</script>
</body>
</html>
