<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lógica Láctea - Gestión de Proveedores</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#a21caf",
                        secondary: "#db2777",
                        success: "#16a34a",
                        background: "#faf5ff",
                        outline: "#e9d5ff",
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .rotate-animation { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-background text-slate-900 antialiased pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3" onclick="window.location.href='DashboardLacteo.html'">
        <span class="material-symbols-outlined text-primary">arrow_back_ios</span>
        <h1 class="text-lg font-extrabold text-primary uppercase tracking-tighter">Proveedores</h1>
    </div>
    <button onclick="location.reload()" class="text-primary">
        <span class="material-symbols-outlined">refresh</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">
    
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-md space-y-4">
        <h2 class="text-xs font-black uppercase tracking-[0.2em] text-primary mb-2 flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">person_add</span> Registrar Nuevo
        </h2>
        
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nombre del Proveedor / Empresa</label>
                <input type="text" id="nombre" placeholder="Ej: Distribuidora del Valle" 
                    class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Teléfono</label>
                    <input type="tel" id="telefono" placeholder="099..." 
                        class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Categoría</label>
                    <select id="categoria" class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner">
                        <option value="Lácteos">Lácteos</option>
                        <option value="Insumos">Insumos</option>
                        <option value="Empaques">Empaques</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>
            </div>

            <button onclick="guardarProveedor()" id="btn-guardar"
                class="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg shadow-purple-200 active:scale-95 transition-all flex justify-center items-center gap-2">
                <span class="material-symbols-outlined">save</span> GUARDAR PROVEEDOR
            </button>
        </div>
    </section>

    <section class="space-y-4">
        <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input type="text" id="buscador" onkeyup="filtrarProveedores()" placeholder="Buscar proveedor..." 
                class="w-full border-none bg-white rounded-2xl py-4 pl-12 pr-4 shadow-sm border border-outline focus:ring-2 focus:ring-primary">
        </div>

        <div id="lista-proveedores" class="grid grid-cols-1 gap-3">
            <div class="text-center py-10 text-slate-400 font-bold italic">Sincronizando con Google Sheets...</div>
        </div>
    </section>
</main>

<div id="menu-container"></div>

<script>
let dataProveedores = [];

async function cargarPagina() {
    try {
        // Cargar Menú
        const resMenu = await fetch('menu.html');
        document.getElementById('menu-container').innerHTML = await resMenu.text();

        // Obtener Proveedores
        dataProveedores = await DairyAPI.obtenerDatos("Proveedores");
        renderizarProveedores(dataProveedores);
    } catch (e) { 
        console.error(e);
        document.getElementById('lista-proveedores').innerHTML = "Error al cargar datos.";
    }
}

function renderizarProveedores(lista) {
    const contenedor = document.getElementById('lista-proveedores');
    contenedor.innerHTML = "";
    
    if(lista.length === 0) {
        contenedor.innerHTML = `<p class="text-center py-4 text-slate-400">No hay proveedores registrados.</p>`;
        return;
    }

    lista.forEach(p => {
        contenedor.innerHTML += `
            <div class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm flex justify-between items-center group active:bg-slate-50 transition-colors">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-purple-100 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined text-2xl">storefront</span>
                    </div>
                    <div>
                        <p class="font-black text-slate-800 uppercase text-sm leading-tight">${p.Nombre || p["Nombre del Proveedor"]}</p>
                        <p class="text-[10px] font-bold text-slate-400 flex items-center gap-1">
                            <span class="material-symbols-outlined text-[10px]">call</span> ${p.Telefono || p["Contacto / Teléfono"] || 'Sin teléfono'}
                        </p>
                    </div>
                </div>
                <span class="bg-purple-50 text-primary text-[8px] font-black px-3 py-1 rounded-full border border-purple-100 uppercase tracking-widest">
                    ${p.Categoria || 'Lácteos'}
                </span>
            </div>`;
    });
}

async function guardarProveedor() {
    const btn = document.getElementById('btn-guardar');
    const nombre = document.getElementById('nombre').value;
    const telf = document.getElementById('telefono').value;
    const cat = document.getElementById('categoria').value;

    if(!nombre) return alert("Por favor ingresa el nombre");

    btn.disabled = true;
    btn.innerHTML = "Guardando...";

    const nuevo = {
        "Nombre del Proveedor": nombre,
        "Contacto / Teléfono": telf,
        "Categoría": cat,
        "Fecha Registro": new Date().toLocaleDateString()
    };

    try {
        await DairyAPI.guardarDatos("Proveedores", nuevo);
        alert("Proveedor guardado correctamente");
        location.reload();
    } catch (e) {
        alert("Error al guardar en la hoja");
        btn.disabled = false;
        btn.innerHTML = "GUARDAR PROVEEDOR";
    }
}

function filtrarProveedores() {
    const termino = document.getElementById('buscador').value.toLowerCase();
    const filtrados = dataProveedores.filter(p => 
        (p.Nombre || p["Nombre del Proveedor"] || "").toLowerCase().includes(termino)
    );
    renderizarProveedores(filtrados);
}

window.onload = cargarPagina;
</script>
</body>
</html>
