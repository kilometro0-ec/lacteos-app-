<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Gestión Proveedores | Lógica Láctea</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        primary: "#a21caf", 
                        background: "#faf5ff", 
                        outline: "#e9d5ff", 
                        dark: "#1f012a"
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .collapse-content { max-height: 0; overflow: hidden; transition: all 0.4s ease; }
        .expanded .collapse-content { max-height: 1000px; }
        .expanded .arrow-icon { transform: rotate(180deg); }
        
        /* Checkbox Personalizado Fucsia */
        .check-custom {
            width: 24px; height: 24px;
            border: 2px solid #e9d5ff;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .selected .check-custom {
            background-color: #a21caf;
            border-color: #a21caf;
        }
        .selected .check-custom::after {
            content: 'check';
            font-family: 'Material Symbols Outlined';
            color: white; font-size: 16px;
        }
        
        #btn-borrar-multiple { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-background text-dark antialiased pb-32">

<!-- Header con Botón de Eliminación Superior Derecha -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary font-bold cursor-pointer" onclick="location.reload()">arrow_back_ios</span>
        <h1 class="text-sm font-black text-primary uppercase italic">Proveedores</h1>
    </div>

    <!-- BOTÓN ELIMINAR (Invisible por defecto) -->
    <button id="btn-borrar-multiple" onclick="confirmarEliminacionMasiva()" 
        class="hidden bg-red-500 text-white px-4 py-2 rounded-2xl flex items-center gap-2 shadow-lg active:scale-90">
        <span class="material-symbols-outlined text-sm">delete_sweep</span>
        <span id="count-delete" class="text-[10px] font-black">0</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">
    
    <!-- SECCIÓN REGISTRO -->
    <section id="seccion-registro" class="bg-white rounded-[2.5rem] border border-outline shadow-sm overflow-hidden">
        <div onclick="toggleFormulario()" class="p-6 flex justify-between items-center cursor-pointer">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-primary flex items-center gap-2 italic">
                <span class="material-symbols-outlined text-sm">add_business</span> Nuevo Registro
            </h2>
            <span id="icono-registro" class="material-symbols-outlined text-primary">add_circle</span>
        </div>
        <div id="contenido-registro" class="px-6 pb-6 space-y-4 hidden border-t border-dashed border-outline pt-4">
            <input type="text" id="nombre" placeholder="Nombre de la Empresa" class="w-full border-none bg-slate-50 rounded-2xl p-4 text-sm font-bold shadow-inner focus:ring-2 focus:ring-primary">
            <input type="tel" id="telefono" placeholder="WhatsApp / Teléfono" class="w-full border-none bg-slate-50 rounded-2xl p-4 text-sm shadow-inner focus:ring-2 focus:ring-primary">
            <button onclick="guardarProveedor()" id="btn-guardar" class="w-full bg-dark text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-xs">
                GUARDAR PROVEEDOR
            </button>
        </div>
    </section>

    <!-- LISTADO -->
    <div id="contenedor-maestro" class="space-y-3">
        <p class="text-center py-10 text-slate-300 animate-pulse font-bold text-[10px] uppercase">Sincronizando...</p>
    </div>
</main>

<script>
    let seleccionados = [];

    function toggleFormulario() {
        const c = document.getElementById('contenido-registro');
        const i = document.getElementById('icono-registro');
        c.classList.toggle('hidden');
        i.innerText = c.classList.contains('hidden') ? "add_circle" : "do_not_disturb_on";
    }

    async function cargarData() {
        try {
            const proveedores = await DairyAPI.obtenerDatos("Proveedores");
            const contenedor = document.getElementById('contenedor-maestro');
            contenedor.innerHTML = "";

            proveedores.reverse().forEach((p, index) => {
                const nombreP = p["Nombre del Proveedor"];
                const card = document.createElement('div');
                card.id = `card-${index}`;
                card.className = "bg-white rounded-[2.2rem] border border-outline shadow-sm overflow-hidden transition-all select-none";
                
                card.innerHTML = `
                    <div class="p-5 flex items-center gap-4">
                        <!-- Checkbox para Selección Múltiple -->
                        <div class="check-box-container cursor-pointer" onclick="toggleSeleccion('${nombreP}', ${index})">
                            <div class="check-custom"></div>
                        </div>

                        <div class="flex-1 flex justify-between items-center cursor-pointer" onclick="this.parentElement.parentElement.classList.toggle('expanded')">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-2xl bg-fuchsia-100 text-primary flex items-center justify-center">
                                    <span class="material-symbols-outlined text-xl">factory</span>
                                </div>
                                <div>
                                    <p class="font-black text-dark uppercase text-[11px] leading-none">${nombreP}</p>
                                    <p class="text-[9px] font-bold text-slate-400 mt-1">${p.Ciudad || 'Ecuador'}</p>
                                </div>
                            </div>
                            <span class="material-symbols-outlined text-slate-200 arrow-icon">expand_more</span>
                        </div>
                    </div>
                    
                    <div class="collapse-content bg-slate-50/50 border-t border-dashed border-outline">
                        <div class="p-5 space-y-3">
                            <div class="bg-white p-3 rounded-xl border border-outline flex justify-between items-center">
                                <span class="text-[10px] font-black text-slate-400 uppercase">WhatsApp</span>
                                <a href="https://wa.me/${p["Contacto / Teléfono"]}" class="text-primary font-bold text-[10px]">${p["Contacto / Teléfono"] || 'N/A'}</a>
                            </div>
                        </div>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }

    function toggleSeleccion(nombre, index) {
        const card = document.getElementById(`card-${index}`);
        const btnBorrar = document.getElementById('btn-borrar-multiple');
        const countLabel = document.getElementById('count-delete');

        if (seleccionados.includes(nombre)) {
            seleccionados = seleccionados.filter(n => n !== nombre);
            card.classList.remove('selected');
        } else {
            seleccionados.push(nombre);
            card.classList.add('selected');
        }

        // Mostrar/Ocultar botón de borrado superior
        if (seleccionados.length > 0) {
            btnBorrar.classList.remove('hidden');
            countLabel.innerText = `ELIMINAR (${seleccionados.length})`;
        } else {
            btnBorrar.classList.add('hidden');
        }
    }

    async function confirmarEliminacionMasiva() {
        if (confirm(`¿Estás seguro de eliminar ${seleccionados.length} proveedores de la lista?`)) {
            const btn = document.getElementById('btn-borrar-multiple');
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span>`;
            btn.disabled = true;

            try {
                // Enviamos el array completo de nombres para borrar
                await DairyAPI.guardarDatos("Proveedores", { 
                    accion: "eliminar_multiple", 
                    nombres: seleccionados 
                });
                location.reload();
            } catch (e) {
                alert("Error al eliminar múltiples registros");
                btn.disabled = false;
            }
        }
    }

    async function guardarProveedor() {
        const nombre = document.getElementById('nombre').value.trim();
        if(!nombre) return alert("Nombre obligatorio");

        const nuevo = {
            "Nombre del Proveedor": nombre,
            "Contacto / Teléfono": document.getElementById('telefono').value,
            "Fecha Registro": new Date().toLocaleDateString()
        };

        try {
            await DairyAPI.guardarDatos("Proveedores", nuevo);
            location.reload();
        } catch(e) { alert("Error al guardar"); }
    }

    window.onload = cargarData;
</script>
</body>
</html>
