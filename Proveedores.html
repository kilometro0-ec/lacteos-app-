<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Gestión de Proveedores</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        primary: "#a21caf", 
                        background: "#faf5ff", 
                        outline: "#e9d5ff", 
                        success: "#16a34a",
                        dark: "#1f012a"
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .collapse-content { max-height: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0, 1, 0, 1); }
        .expanded .collapse-content { max-height: 2000px; transition: all 0.4s ease-in-out; }
        .expanded .arrow-icon { transform: rotate(180deg); color: #a21caf; }
        input, select { font-size: 16px !important; } 
    </style>
</head>
<body class="bg-background text-dark antialiased pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3" onclick="window.location.href='DashboardLacteo.html'">
        <span class="material-symbols-outlined text-primary font-bold cursor-pointer">arrow_back_ios</span>
        <h1 class="text-sm font-black text-primary uppercase tracking-tighter italic">Lógica Láctea / Proveedores</h1>
    </div>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">
    
    <!-- SECCIÓN REGISTRO -->
    <section class="bg-white p-6 rounded-[2.5rem] border border-outline shadow-sm space-y-4">
        <h2 class="text-[10px] font-black uppercase tracking-widest text-primary flex items-center gap-2 mb-2 italic">
            <span class="material-symbols-outlined text-sm">factory</span> Nuevo Registro
        </h2>

        <div class="space-y-3">
            <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-4 text-slate-300 text-xl">store</span>
                <input type="text" id="nombre" placeholder="Nombre de la Empresa" 
                    class="w-full border-none bg-slate-50 rounded-2xl p-4 pl-12 focus:ring-2 focus:ring-primary shadow-inner font-semibold">
            </div>
            
            <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-4 text-slate-300 text-xl">badge</span>
                <input type="text" id="ruc" inputmode="numeric" placeholder="RUC / Cédula" 
                    class="w-full border-none bg-slate-50 rounded-2xl p-4 pl-12 focus:ring-2 focus:ring-primary shadow-inner">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <select id="provincia" class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner text-sm font-bold italic">
                    <option value="Pichincha">Pichincha</option>
                    <option value="Guayas">Guayas</option>
                    <option value="Azuay">Azuay</option>
                    <option value="Manabí">Manabí</option>
                    <option value="Carchi">Carchi</option>
                </select>
                <input type="text" id="ciudad" placeholder="Ciudad" 
                    class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner font-bold">
            </div>

            <input type="text" id="direccion" placeholder="Dirección / Localización" 
                class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner text-xs italic">

            <div class="grid grid-cols-2 gap-3">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-4 text-slate-300 text-lg">call</span>
                    <input type="tel" id="telefono" placeholder="WhatsApp" 
                        class="w-full border-none bg-slate-50 rounded-2xl p-4 pl-10 focus:ring-2 focus:ring-primary shadow-inner">
                </div>
                <select id="categoria" class="w-full border-none bg-slate-50 rounded-2xl p-4 focus:ring-2 focus:ring-primary shadow-inner text-xs font-black uppercase tracking-tighter">
                    <option value="Lácteos">Lácteos</option>
                    <option value="Insumos">Insumos</option>
                    <option value="Servicios">Servicios</option>
                </select>
            </div>

            <button onclick="guardarProveedor()" id="btn-guardar" 
                class="w-full bg-slate-800 text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all flex justify-center items-center gap-3 tracking-widest text-xs">
                <span class="material-symbols-outlined">add_business</span> REGISTRAR PROVEEDOR
            </button>
        </div>
    </section>

    <!-- LISTADO -->
    <div class="flex justify-between items-center px-2">
        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-400 italic">Directorio Activo</h3>
        <span id="count-prov" class="bg-primary/10 text-primary text-[10px] px-3 py-1 rounded-full font-black italic">0 PROV</span>
    </div>

    <div id="contenedor-maestro" class="space-y-4">
        <div class="flex flex-col items-center py-10 text-slate-300 animate-pulse">
            <span class="material-symbols-outlined text-4xl mb-2">sync</span>
            <p class="text-[10px] font-bold uppercase tracking-widest">Sincronizando Base de Datos...</p>
        </div>
    </div>
</main>

<div id="menu-container"></div>

<script>
    async function cargarData() {
        try {
            // Se asume que DairyAPI.obtenerDatos existe en api-config.js
            const [proveedores, compras] = await Promise.all([
                DairyAPI.obtenerDatos("Proveedores"),
                DairyAPI.obtenerDatos("Compras")
            ]);

            const contenedor = document.getElementById('contenedor-maestro');
            contenedor.innerHTML = "";
            document.getElementById('count-prov').innerText = `${proveedores.length} PROV`;

            if (!proveedores || proveedores.length === 0) {
                contenedor.innerHTML = `<div class="text-center py-10 bg-white rounded-[2rem] border border-dashed border-outline text-slate-300 italic">No hay proveedores registrados.</div>`;
                return;
            }

            proveedores.reverse().forEach(p => {
                const nombreP = p["Nombre del Proveedor"];
                const historial = compras.filter(c => c.Proveedor === nombreP);
                const totalInvertido = historial.reduce((acc, curr) => acc + (parseFloat(curr.Total) || 0), 0);

                const card = document.createElement('div');
                card.className = "bg-white rounded-[2.5rem] border border-outline shadow-sm overflow-hidden transition-all";
                card.innerHTML = `
                    <div class="p-6 flex justify-between items-center cursor-pointer active:bg-slate-50" onclick="this.parentElement.classList.toggle('expanded')">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-2xl bg-slate-900 text-white flex items-center justify-center shadow-lg">
                                <span class="material-symbols-outlined text-2xl">factory</span>
                            </div>
                            <div>
                                <p class="font-black text-dark uppercase text-xs tracking-tight">${nombreP}</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[9px] font-black text-primary bg-primary/5 px-2 py-0.5 rounded-full uppercase">${p.Categoría || 'General'}</span>
                                    <span class="text-[9px] font-bold text-slate-400 italic">${p.Ciudad || 'Ecuador'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                             <p class="text-[10px] font-black text-dark">$${totalInvertido.toFixed(2)}</p>
                             <span class="material-symbols-outlined text-slate-300 arrow-icon transition-transform">expand_more</span>
                        </div>
                    </div>
                    
                    <div class="collapse-content bg-slate-50/50 border-t border-dashed border-outline">
                        <div class="p-6 space-y-5">
                            <div class="grid grid-cols-2 gap-3 text-[10px]">
                                <div class="bg-white p-3 rounded-2xl border border-outline shadow-sm">
                                    <p class="font-black text-slate-400 uppercase mb-1">RUC/ID</p>
                                    <p class="font-bold text-dark tracking-widest">${p.RUC || 'N/A'}</p>
                                </div>
                                <div class="bg-white p-3 rounded-2xl border border-outline shadow-sm" onclick="window.location.href='tel:${p["Contacto / Teléfono"]}'">
                                    <p class="font-black text-slate-400 uppercase mb-1 text-right">Contacto</p>
                                    <p class="font-bold text-primary text-right">${p["Contacto / Teléfono"] || 'N/A'}</p>
                                </div>
                            </div>

                            <div class="bg-white p-4 rounded-2xl border border-outline shadow-sm text-[10px]">
                                <p class="font-black text-slate-400 uppercase mb-1">Dirección Registrada</p>
                                <p class="font-semibold text-dark">${p.Direccion || 'Dirección no especificada'}</p>
                            </div>
                            
                            <div class="space-y-3">
                                <h4 class="text-[9px] font-black uppercase text-slate-400 tracking-[0.2em] italic px-1">Últimos Pedidos</h4>
                                ${historial.length > 0 ? historial.reverse().slice(0, 3).map(h => `
                                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-outline/30">
                                        <div class="flex items-center gap-2">
                                            <div class="w-1.5 h-1.5 rounded-full bg-success"></div>
                                            <div>
                                                <p class="font-black text-dark uppercase text-[10px]">${h.Producto}</p>
                                                <p class="text-[8px] text-slate-400 font-bold">${h.Fecha}</p>
                                            </div>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-black text-primary">$${parseFloat(h.Total).toFixed(2)}</p>
                                        </div>
                                    </div>
                                `).join('') : '<p class="text-[9px] italic text-slate-400 py-2 text-center">Sin historial de compras.</p>'}
                            </div>

                            <button onclick="window.location.href='NuevaCompra.html?prov=${encodeURIComponent(nombreP)}'" 
                                class="w-full bg-primary/10 text-primary font-black py-3 rounded-xl text-[10px] uppercase tracking-widest hover:bg-primary hover:text-white transition-all italic">
                                + Solicitar Nuevo Pedido
                            </button>
                        </div>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        } catch (e) { console.error("Error al cargar data:", e); }
    }

    async function guardarProveedor() {
        const btn = document.getElementById('btn-guardar');
        const nombre = document.getElementById('nombre').value.trim();
        
        if(!nombre) return alert("¡El nombre de la empresa es obligatorio!");

        const nuevo = {
            "Nombre del Proveedor": nombre,
            "RUC": document.getElementById('ruc').value.toString(),
            "Provincia": document.getElementById('provincia').value,
            "Ciudad": document.getElementById('ciudad').value,
            "Direccion": document.getElementById('direccion').value,
            "Contacto / Teléfono": document.getElementById('telefono').value,
            "Categoría": document.getElementById('categoria').value,
            "Fecha Registro": new Date().toLocaleDateString()
        };

        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> REGISTRANDO...`;
        
        try {
            // Usamos guardarDatos para coincidir con la API v3.4
            await DairyAPI.guardarDatos("Proveedores", nuevo);
            
            // Pausa estética para confirmar registro
            setTimeout(() => {
                location.reload();
            }, 1000);
        } catch(e) {
            console.error("Error al guardar:", e);
            alert("Error al conectar con la base de datos");
            btn.disabled = false;
            btn.innerHTML = `<span class="material-symbols-outlined">add_business</span> REGISTRAR PROVEEDOR`;
        }
    }

    window.onload = cargarData;
</script>
</body>
</html>
