<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff", outline: "#e9d5ff" }
          }
        }
      }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; color: #1f012a; }
        .card-sutil { background: white; border-radius: 2.5rem; border: 1px solid #e9d5ff; }
        .input-sutil { background-color: #fdfaff; border: 1.5px solid #f3e8ff; border-radius: 2rem; padding: 1rem 1.5rem; width: 100%; outline: none; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; text-transform: uppercase; border-radius: 2rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-magenta:active { transform: scale(0.95); }
        
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(250, 245, 255, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .vaca-animada { width: 100px; animation: bounce 1.2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-44"> 

<div id="loading-overlay">
    <img src="https://cdn-icons-png.flaticon.com/512/2395/2395796.png" class="vaca-animada">
    <p class="mt-4 text-primary font-black uppercase text-[10px] animate-pulse">Sincronizando Lógica Láctea...</p>
</div>

<header class="h-16 bg-white border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase">Ventas</h1>
        <p id="estado-carga" class="text-[8px] font-black text-secondary uppercase">En Línea</p>
    </div>
    <button onclick="location.reload()" class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-primary">
        <span class="material-symbols-outlined">sync</span>
    </button>
</header>

<main class="mt-6 px-4 max-w-6xl mx-auto space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div class="card-sutil p-5 text-center border-b-4 border-primary">
            <span class="text-[9px] font-black text-slate-400 uppercase">Pedidos Hoy</span>
            <span id="card-pedidos-pendientes" class="block text-3xl font-black text-primary">0</span>
        </div>
        <div class="card-sutil p-5 text-center border-b-4 border-secondary">
            <span class="text-[9px] font-black text-slate-400 uppercase">Unidades Hoy</span>
            <span id="card-productos-total" class="block text-3xl font-black text-secondary">0</span>
        </div>
    </div>

    <section class="card-sutil p-6 shadow-sm">
        <div id="vista-seleccion-cliente">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-primary uppercase">Cliente</span>
                <button onclick="alternarCliente(true)" class="text-[9px] font-black text-white bg-secondary px-4 py-2 rounded-full">+ NUEVO</button>
            </div>
            <select id="select-cliente" onchange="actualizarCarritoUI()" class="input-sutil font-bold">
                <option value="">Cargando clientes...</option>
            </select>
        </div>

        <div id="vista-nuevo-cliente" class="hidden space-y-3">
            <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-sutil">
            <input type="tel" id="reg-telefono" placeholder="Teléfono" class="input-sutil">
            <div class="flex gap-2">
                <button onclick="alternarCliente(false)" class="w-1/3 bg-slate-100 text-slate-400 font-black py-4 rounded-2xl text-[10px]">ATRÁS</button>
                <button onclick="guardarCliente()" class="w-2/3 btn-magenta py-4">GUARDAR</button>
            </div>
        </div>
    </section>

    <div class="px-1 relative">
        <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary opacity-40">search</span>
        <input type="text" id="buscarProducto" oninput="filtrar()" placeholder="¿Qué producto buscas?" class="input-sutil pl-12">
    </div>
    
    <section id="contenedor-productos" class="grid grid-cols-2 gap-4"></section>

    <section class="card-sutil overflow-hidden shadow-xl border-2 border-primary">
        <div class="bg-primary p-6 text-white">
            <div class="flex justify-between items-center mb-1">
                <h2 id="num-orden" class="text-[10px] font-mono opacity-80 uppercase">---</h2>
                <input type="date" id="fecha-entrega" class="bg-white/20 border-none text-white text-xs font-bold rounded-lg p-1">
            </div>
            <h2 id="cliente-resumen" class="text-xl font-black uppercase truncate">SIN CLIENTE</h2>
        </div>
        
        <div class="p-6 space-y-6">
            <div id="lista-carrito" class="space-y-2 max-h-60 overflow-y-auto min-h-[50px] text-center text-slate-300 text-xs italic">
                El carrito está esperando...
            </div>
            
            <div class="flex justify-between items-end border-t pt-4">
                <span class="text-xs font-black text-slate-400">TOTAL A COBRAR</span>
                <span id="total-venta" class="text-4xl font-black text-slate-900">$0.00</span>
            </div>
            
            <button id="btn-confirmar" onclick="confirmarPedido()" class="w-full btn-magenta py-5 text-lg shadow-lg">
                CONFIRMAR PEDIDO
            </button>
        </div>
    </section>
</main>

<div id="menu-container"></div>

<script>
let state = {
    productos: [],
    carrito: {},
    orden: ""
};

// --- INICIO ---
async function iniciar() {
    state.orden = `LL-${Date.now().toString().slice(-6)}`;
    document.getElementById('num-orden').innerText = state.orden;
    document.getElementById('fecha-entrega').valueAsDate = new Date();

    try {
        const [cl, pr, vn] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        state.productos = pr || [];
        
        // Cargar Clientes en Select
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        cl.sort((a,b) => a.Nombre.localeCompare(b.Nombre)).forEach(c => {
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`;
        });

        // Stats Rápidas
        const hoy = vn.filter(v => v.Estado === "PENDIENTE");
        document.getElementById('card-pedidos-pendientes').innerText = [...new Set(hoy.map(h => h.ID_Venta))].length;
        document.getElementById('card-productos-total').innerText = hoy.reduce((a, b) => a + (parseInt(b.Cantidad) || 0), 0);

        renderizarProductos();
        document.getElementById('loading-overlay').classList.add('hidden');
    } catch (e) {
        alert("Error de conexión. Reintenta.");
        console.error(e);
    }
}

// --- RENDER ---
function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos');
    cont.innerHTML = "";
    
    state.productos.forEach(p => {
        const stock = parseInt(p.Stock) || 0;
        const nombreID = p.Producto.replace(/\s+/g, '');
        cont.innerHTML += `
            <div class="card-sutil p-4 flex flex-col justify-between min-h-[160px] ${stock <= 0 ? 'opacity-40 grayscale' : ''}">
                <h4 class="font-black text-[10px] uppercase text-primary leading-tight">${p.Producto}</h4>
                <div>
                    <p class="text-xl font-black text-slate-800">$${parseFloat(p.Precio_Venta || 0).toFixed(2)}</p>
                    <p class="text-[8px] font-bold text-slate-400">STOCK: ${stock}</p>
                    
                    <div class="flex items-center justify-between bg-purple-50 rounded-2xl p-1 mt-2">
                        <button onclick="controlCant('${p.Producto}', -1)" class="w-8 h-8 bg-white rounded-xl shadow-sm text-primary font-black active:scale-90">-</button>
                        <span id="cant-${nombreID}" class="font-black text-primary">0</span>
                        <button onclick="controlCant('${p.Producto}', 1)" class="w-8 h-8 bg-white rounded-xl shadow-sm text-primary font-black active:scale-90">+</button>
                    </div>
                </div>
            </div>`;
    });
}

// --- LÓGICA BOTONES ---
function controlCant(prod, delta) {
    const p = state.productos.find(x => x.Producto === prod);
    const actual = state.carrito[prod] || 0;
    const nuevo = actual + delta;

    if (nuevo >= 0 && nuevo <= (parseInt(p.Stock) || 999)) {
        state.carrito[prod] = nuevo;
        document.getElementById(`cant-${prod.replace(/\s+/g, '')}`).innerText = nuevo;
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const lista = document.getElementById('lista-carrito');
    const cliente = document.getElementById('select-cliente').value;
    document.getElementById('cliente-resumen').innerText = cliente || "SIN CLIENTE";
    
    lista.innerHTML = "";
    let total = 0;

    Object.entries(state.carrito).forEach(([nombre, cant]) => {
        if (cant > 0) {
            const p = state.productos.find(x => x.Producto === nombre);
            const sub = cant * parseFloat(p.Precio_Venta || 0);
            total += sub;
            lista.innerHTML += `
                <div class="flex justify-between bg-purple-50 p-2 rounded-xl text-[10px] font-black uppercase">
                    <span>${nombre} x${cant}</span>
                    <span>$${sub.toFixed(2)}</span>
                </div>`;
        }
    });

    if (total === 0) lista.innerHTML = "El carrito está esperando...";
    document.getElementById('total-venta').innerText = `$${total.toFixed(2)}`;
}

async function confirmarPedido() {
    const cli = document.getElementById('select-cliente').value;
    const fec = document.getElementById('fecha-entrega').value;
    const items = Object.entries(state.carrito).filter(i => i[1] > 0);

    if (!cli) return alert("Por favor, selecciona un cliente.");
    if (items.length === 0) return alert("Agrega al menos un producto.");

    const btn = document.getElementById('btn-confirmar');
    btn.innerText = "ENVIANDO...";
    btn.disabled = true;

    try {
        for (const [nombre, cant] of items) {
            const p = state.productos.find(x => x.Producto === nombre);
            await DairyAPI.enviarDatos("Ventas", {
                ID_Venta: state.orden,
                Cliente: cli,
                Producto: nombre,
                Cantidad: cant,
                Precio_PVP: p.Precio_Venta,
                Fecha_Entrega: fec,
                Estado: "PENDIENTE"
            });
        }
        alert("¡Pedido guardado con éxito!");
        location.reload();
    } catch (e) {
        alert("Error al enviar. Verifica tu conexión.");
        btn.innerText = "CONFIRMAR PEDIDO";
        btn.disabled = false;
    }
}

function alternarCliente(mostrarNuevo) {
    document.getElementById('vista-seleccion-cliente').classList.toggle('hidden', mostrarNuevo);
    document.getElementById('vista-nuevo-cliente').classList.toggle('hidden', !mostrarNuevo);
}

async function guardarCliente() {
    const n = document.getElementById('reg-nombre').value;
    const t = document.getElementById('reg-telefono').value;
    if (!n) return alert("El nombre es obligatorio.");

    try {
        await DairyAPI.enviarDatos("Clientes", { Nombre: n, Telefono: t });
        alert("Cliente registrado.");
        location.reload();
    } catch (e) { alert("Error al guardar."); }
}

function filtrar() {
    const q = document.getElementById('buscarProducto').value.toLowerCase();
    document.querySelectorAll('#contenedor-productos > div').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(q) ? "flex" : "none";
    });
}

window.onload = iniciar;
</script>
</body>
</html>
