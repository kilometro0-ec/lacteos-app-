<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff" }
          }
        }
      }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; }
        .card-sutil { background: white; border-radius: 1.5rem; border: 1px solid #e9d5ff; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; border-radius: 1rem; transition: all 0.2s; }
        .btn-magenta:active { transform: scale(0.95); }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-32">

<div id="loading-overlay">
    <div class="text-center">
        <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="mt-4 text-[10px] font-black text-primary uppercase">Sincronizando...</p>
    </div>
</div>

<header class="h-16 bg-white border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <h1 class="text-xl font-black text-primary uppercase">Ventas</h1>
    <button onclick="location.reload()" class="text-primary"><span class="material-symbols-outlined">sync</span></button>
</header>

<main class="p-4 max-w-lg mx-auto space-y-6">
    <section class="card-sutil p-4">
        <select id="select-cliente" onchange="renderCarrito()" class="w-full p-3 rounded-xl border-none font-bold text-sm bg-purple-50">
            <option value="">Cargando clientes...</option>
        </select>
    </section>

    <div id="contenedor-productos" class="grid grid-cols-2 gap-3"></div>

    <section class="card-sutil p-5 border-2 border-primary">
        <h2 id="cliente-resumen" class="text-[10px] font-black text-gray-400 uppercase mb-2">Sin Cliente</h2>
        <div id="lista-carrito" class="text-[10px] font-bold uppercase space-y-2 mb-4">
            <p class="text-gray-300 italic">Carrito vacío</p>
        </div>
        <div class="flex justify-between items-center border-t pt-3">
            <span class="text-xs font-black text-gray-400">TOTAL</span>
            <span id="total-txt" class="text-2xl font-black text-gray-900">$0.00</span>
        </div>
        <button onclick="procesarVenta()" class="btn-magenta w-full mt-4 py-4 uppercase">Confirmar Pedido</button>
    </section>
</main>

<div id="menu-container"></div>

<script>
let db = { productos: [], carrito: {} };

async function iniciar() {
    try {
        // AQUÍ USAMOS DairyAPI QUE YA TIENE TU URL REAL
        const [cl, pr] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario")
        ]);

        db.productos = pr || [];

        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- SELECCIONAR CLIENTE --</option>';
        (cl || []).forEach(c => {
            if(c.Nombre) sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`;
        });

        const cont = document.getElementById('contenedor-productos');
        cont.innerHTML = "";
        db.productos.forEach(p => {
            const idLimpio = p.Producto.replace(/\s+/g, '');
            cont.innerHTML += `
                <div class="card-sutil p-3 flex flex-col justify-between">
                    <h4 class="text-[10px] font-black uppercase truncate">${p.Producto}</h4>
                    <p class="text-lg font-black text-primary">$${parseFloat(p.Precio_Venta || 0).toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-lg p-1 mt-2">
                        <button onclick="update('${p.Producto}', -1)" class="w-8 h-8 bg-white rounded shadow text-primary font-bold">-</button>
                        <span id="cant-${idLimpio}" class="text-xs font-black text-primary">0</span>
                        <button onclick="update('${p.Producto}', 1)" class="w-8 h-8 bg-white rounded shadow text-primary font-bold">+</button>
                    </div>
                </div>`;
        });

        document.getElementById('loading-overlay').classList.add('hidden');
    } catch(e) {
        console.error(e);
        alert("Error al cargar datos. Revisa la consola.");
    }
}

function update(nom, cant) {
    const actual = db.carrito[nom] || 0;
    const nuevo = actual + cant;
    if(nuevo >= 0) {
        db.carrito[nom] = nuevo;
        document.getElementById(`cant-${nom.replace(/\s+/g, '')}`).innerText = nuevo;
        renderCarrito();
    }
}

function renderCarrito() {
    const list = document.getElementById('lista-carrito');
    const cli = document.getElementById('select-cliente').value;
    document.getElementById('cliente-resumen').innerText = cli || "Sin Cliente";
    
    list.innerHTML = "";
    let total = 0;
    Object.entries(db.carrito).forEach(([n, c]) => {
        if(c > 0) {
            const p = db.productos.find(x => x.Producto === n);
            const sub = c * parseFloat(p.Precio_Venta);
            total += sub;
            list.innerHTML += `<div class="flex justify-between"><span>${n} x${c}</span><span>$${sub.toFixed(2)}</span></div>`;
        }
    });
    if(total === 0) list.innerHTML = "Carrito vacío";
    document.getElementById('total-txt').innerText = `$${total.toFixed(2)}`;
}

async function procesarVenta() {
    const cli = document.getElementById('select-cliente').value;
    if(!cli) return alert("Selecciona un cliente");
    
    const items = Object.entries(db.carrito).filter(i => i[1] > 0);
    if(items.length === 0) return alert("Carrito vacío");

    try {
        for(const [nom, cant] of items) {
            const p = db.productos.find(x => x.Producto === n);
            await DairyAPI.enviarDatos("Ventas", {
                ID_Venta: "V-" + Date.now().toString().slice(-5),
                Cliente: cli,
                Producto: nom,
                Cantidad: cant,
                Precio_PVP: p.Precio_Venta,
                Estado: "PENDIENTE",
                Fecha_Entrega: new Date().toISOString().split('T')[0]
            });
        }
        alert("¡Venta enviada!");
        location.reload();
    } catch(e) { alert("Error al enviar"); }
}

window.onload = iniciar;
</script>
</body>
</html>
