<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <link rel="stylesheet" href="Global.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff", outline: "#e9d5ff" }
          }
        }
      }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; color: #1f012a; }
        .card-sutil { background: white; border-radius: 2.5rem; border: 1px solid #e9d5ff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); }
        .input-sutil { background-color: #fdfaff; border: 1.5px solid #f3e8ff; border-radius: 2rem; padding: 1rem 1.5rem; width: 100%; transition: all 0.3s ease; font-size: 14px; color: #4a5568; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; text-transform: uppercase; border-radius: 2rem; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-magenta:active { transform: scale(0.96); }
        
        /* OVERLAY DE VACA */
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(250, 245, 255, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .vaca-animada { width: 80px; height: 80px; animation: vaca-bounce 1.2s infinite ease-in-out; }
        @keyframes vaca-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .spin-animation { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32"> 

<div id="loading-overlay">
    <img src="https://cdn-icons-png.flaticon.com/512/2395/2395796.png" class="vaca-animada">
    <p class="mt-4 text-primary font-black uppercase tracking-widest text-[10px]">Sincronizando Lácteos...</p>
</div>

<header class="h-16 bg-white/80 backdrop-blur-md border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase italic">Ventas</h1>
        <p id="estado-carga" class="text-[8px] font-black text-secondary uppercase">Quito • 2026</p>
    </div>
    
    <div class="flex items-center gap-2">
        <button onclick="recargarPagina()" id="btn-sync" class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-primary transition-all">
            <span class="material-symbols-outlined" id="icon-sync">sync</span>
        </button>
    </div>
</header>

<main id="main-content" class="mt-6 px-4 max-w-6xl mx-auto">
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card-sutil p-4 flex flex-col items-center border-b-4 border-primary">
            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Pendientes</span>
            <span id="card-pedidos-pendientes" class="text-2xl font-black text-primary">0</span>
        </div>
        <div class="card-sutil p-4 flex flex-col items-center border-b-4 border-secondary">
            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">En Carrito</span>
            <span id="card-productos-total" class="text-2xl font-black text-secondary">0</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="card-sutil p-6">
                <div id="vista-seleccion-cliente">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-primary uppercase">Cliente Destino</span>
                        <button onclick="alternarFormularioCliente(true)" class="text-[9px] font-black text-white bg-secondary px-3 py-1.5 rounded-full">NUEVO +</button>
                    </div>
                    <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil text-base font-bold appearance-none">
                        <option value="">Cargando clientes...</option>
                    </select>
                </div>

                <div id="vista-nuevo-cliente" class="hidden space-y-4">
                    <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-sutil">
                    <button onclick="guardarNuevoCliente()" class="w-full btn-magenta py-4">GUARDAR CLIENTE</button>
                    <button onclick="alternarFormularioCliente(false)" class="w-full text-[10px] font-bold text-slate-400 uppercase">Cancelar</button>
                </div>
            </section>

            <div class="relative">
                <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary opacity-40 text-xl">search</span>
                <input type="text" id="buscarProducto" oninput="filtrarProductos()" placeholder="Buscar producto lácteo..." class="input-sutil pl-12 shadow-sm">
            </div>
            
            <section id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></section>
        </div>

        <div class="lg:col-span-5">
            <section class="card-sutil overflow-hidden sticky top-24 border-2 border-primary/10">
                <div class="bg-gradient-to-br from-primary to-purple-800 p-6 text-white text-center">
                    <h2 id="num-orden" class="text-[10px] font-mono opacity-60 mb-1">---</h2>
                    <h2 id="cliente-resumen" class="text-xl font-black uppercase truncate tracking-tighter">SIN SELECCIONAR</h2>
                    <input type="date" id="fecha-entrega" class="w-full mt-4 font-bold text-slate-900 py-2 px-3 rounded-xl text-center">
                </div>
                <div class="p-6 space-y-6">
                    <div id="lista-carrito" class="space-y-2 max-h-60 overflow-y-auto">
                        <div id="carrito-vacio" class="text-center py-4 text-slate-300 italic text-xs">Carrito vacío</div>
                    </div>
                    <div class="flex justify-between items-end border-t pt-4">
                        <span class="text-xs font-black text-slate-400">TOTAL A COBRAR</span>
                        <span id="total-venta" class="text-3xl font-black text-slate-900">$0.00</span>
                    </div>
                    <button id="btn-finalizar" onclick="procesarVenta()" class="w-full btn-magenta py-5 text-lg shadow-lg">CONFIRMAR PEDIDO</button>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="menu-container"></div>

<script>
let carrito = {}; let productosData = []; let idOrdenActual = "";

function recargarPagina() {
    document.getElementById('icon-sync').classList.add('spin-animation');
    document.getElementById('loading-overlay').classList.remove('hidden');
    setTimeout(() => { location.reload(); }, 500);
}

async function iniciar() {
    const d = new Date();
    idOrdenActual = `LL-${d.getHours()}${d.getMinutes()}-${Math.floor(Math.random()*90+10)}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
    document.getElementById('fecha-entrega').value = new Date().toISOString().split('T')[0];

    try {
        const [cl, pr, vnt] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"), 
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);
        
        productosData = pr;
        
        // Conteo de Ventas Pendientes
        const pendientes = vnt.filter(v => String(v.Estado).trim().toUpperCase() === "PENDIENTE");
        const ordenesUnicas = [...new Set(pendientes.map(v => v.ID_Venta))].length;
        document.getElementById('card-pedidos-pendientes').innerText = ordenesUnicas;

        // Lista de Clientes
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        cl.sort((a,b)=>a.Nombre.localeCompare(b.Nombre)).forEach(c => { 
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`; 
        });
        
        renderizarProductos();
        
        // Quitar Overlay
        setTimeout(() => {
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 500);
        }, 800);

    } catch(e) { 
        console.error(e);
        document.getElementById('estado-carga').innerText = "Error de conexión";
    }
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); cont.innerHTML = "";
    productosData.forEach(p => {
        const stock = parseInt(p.Stock || p["Stock Inicial"] || 0);
        const idCant = `cant-${p.Producto.replace(/\s+/g,'-')}`;
        cont.innerHTML += `
            <div class="card-sutil p-4 flex flex-col justify-between min-h-[160px] ${stock <= 0 ? 'opacity-40 grayscale' : ''}">
                <h4 class="font-black text-[10px] uppercase text-primary leading-tight">${p.Producto}</h4>
                <div>
                    <p class="text-lg font-black text-slate-800">$${parseFloat(p.Precio_Venta || 0).toFixed(2)}</p>
                    <p class="text-[8px] font-bold text-slate-400 mb-2">STOCK: ${stock}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-xl p-1">
                        <button onclick="cambiarCant('${p.Producto}',-1)" class="w-8 h-8 bg-white rounded-lg text-primary font-black shadow-sm">-</button>
                        <span id="${idCant}" class="font-black text-primary text-sm">0</span>
                        <button onclick="cambiarCant('${p.Producto}',1)" class="w-8 h-8 bg-white rounded-lg text-primary font-black shadow-sm">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    const stock = parseInt(p.Stock || p["Stock Inicial"] || 0);
    
    if(carrito[n]+d >= 0 && (carrito[n]+d <= stock)) {
        carrito[n] += d;
        const id = `cant-${n.replace(/\s+/g,'-')}`;
        const el = document.getElementById(id);
        if(el) el.innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const l = document.getElementById('lista-carrito'); l.innerHTML = ""; let t = 0; let totalItems = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * parseFloat(p.Precio_Venta || 0);
            t += sub;
            totalItems += carrito[n];
            l.innerHTML += `<div class="flex justify-between items-center p-3 bg-purple-50 rounded-2xl text-[10px] font-black uppercase">
                <span>${n} <span class="text-primary">(x${carrito[n]})</span></span>
                <span>$${sub.toFixed(2)}</span>
            </div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('card-productos-total').innerText = totalItems;
    document.getElementById('carrito-vacio').classList.toggle('hidden', t > 0);
}

async function procesarVenta() {
    const cli = document.getElementById('select-cliente').value;
    const fec = document.getElementById('fecha-entrega').value;
    if(!cli || !fec) return alert("Por favor seleccione un cliente y fecha");
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("El carrito está vacío");
    
    const btn = document.getElementById('btn-finalizar');
    btn.innerText = "PROCESANDO...";
    btn.disabled = true;

    try {
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n);
            await DairyAPI.enviarDatos("Ventas", { 
                ID_Venta: idOrdenActual, Cliente: cli, Producto: n, 
                Cantidad: carrito[n], Precio_PVP: p.Precio_Venta, Fecha_Entrega: fec, 
                Estado: "PENDIENTE" 
            });
        }
        alert("Pedido registrado con éxito");
        location.reload();
    } catch(e) { 
        alert("Error al guardar la venta"); 
        btn.innerText = "CONFIRMAR PEDIDO";
        btn.disabled = false;
    }
}

function alternarFormularioCliente(m) {
    document.getElementById('vista-seleccion-cliente').classList.toggle('hidden', m);
    document.getElementById('vista-nuevo-cliente').classList.toggle('hidden', !m);
}

async function guardarNuevoCliente() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    if(!nombre) return alert("Escriba el nombre");
    
    document.getElementById('loading-overlay').classList.remove('hidden');
    try {
        await DairyAPI.enviarDatos("Clientes", { Nombre: nombre });
        location.reload();
    } catch(e) { alert("Error al guardar cliente"); }
}

function actualizarNombreCarrito() { 
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR"; 
}

function filtrarProductos() {
    const q = document.getElementById('buscarProducto').value.toLowerCase();
    document.querySelectorAll('#contenedor-productos > div').forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
    });
}

window.onload = iniciar;
</script>
</body>
</html>
