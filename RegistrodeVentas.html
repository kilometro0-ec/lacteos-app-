<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dairy Logic - Ventas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        primary: "#0055ff", // Azul Eléctrico
                        secondary: "#db2777", 
                        background: "#f0f4f8", 
                        outline: "#d1d9e6" 
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        .out-of-stock { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .id-card { transition: all 0.3s ease; }
        .id-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-background text-gray-900 font-[Work_Sans] pb-32">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
        <span class="material-symbols-outlined text-primary text-3xl">payments</span>
        <h1 class="text-xl font-black text-primary tracking-tight">Dairy Logic</h1>
    </div>
    <button onclick="iniciar()" class="w-10 h-10 rounded-full bg-blue-50 text-primary flex items-center justify-center">
        <span class="material-symbols-outlined">sync</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-6xl mx-auto space-y-6">
    
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-gradient-to-br from-primary to-blue-700 p-5 rounded-3xl text-white shadow-lg shadow-blue-200">
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Ventas Hoy</p>
            <h3 id="card-cant-ventas" class="text-3xl font-black">0</h3>
        </div>
        <div class="bg-white p-5 rounded-3xl border border-outline shadow-sm">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">A Recaudar</p>
            <h3 id="card-monto-ventas" class="text-3xl font-black text-primary">$0.00</h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-7 space-y-6">
            <section class="bg-white p-5 rounded-3xl border border-outline shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-black text-gray-500 uppercase">Cliente</h2>
                    <button onclick="abrirModalCliente()" class="text-xs font-bold text-primary">+ NUEVO</button>
                </div>
                <select id="select-cliente" class="w-full h-14 px-4 bg-gray-50 border border-outline rounded-2xl font-bold text-gray-700 outline-none focus:border-primary appearance-none">
                    <option value="">Seleccione un cliente...</option>
                </select>
            </section>

            <section>
                <h2 class="text-xs font-black text-gray-500 uppercase mb-4 ml-2">Catálogo de Productos</h2>
                <div id="contenedor-productos" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    </div>
            </section>
        </div>

        <div class="lg:col-span-5">
            <section class="bg-white rounded-[2.5rem] border border-outline shadow-xl overflow-hidden sticky top-20">
                <div class="bg-primary p-6 text-white">
                    <h3 class="font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined">receipt_long</span> Confirmar Venta
                    </h3>
                </div>
                <div class="p-6">
                    <div id="lista-carrito" class="space-y-3 mb-6 max-h-60 overflow-y-auto">
                        <p id="carrito-vacio" class="text-center text-gray-400 py-6 italic">Seleccione productos para vender</p>
                    </div>
                    <div class="border-t border-outline pt-4 space-y-1">
                        <div class="flex justify-between text-2xl font-black text-primary">
                            <span>TOTAL</span>
                            <span id="total-venta">$0.00</span>
                        </div>
                    </div>
                    <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full mt-6 bg-primary text-white py-4 rounded-2xl font-black shadow-lg hover:brightness-110 active:scale-95 transition-all">
                        FINALIZAR VENTA
                    </button>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="modalCliente" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-[2rem] w-full max-w-sm p-8">
        <h3 class="text-xl font-bold text-primary mb-6">Nuevo Cliente</h3>
        <div class="space-y-4">
            <input type="text" id="nuevo-nombre" placeholder="Nombre completo" class="w-full p-4 bg-gray-50 border border-outline rounded-2xl outline-none">
            <input type="text" id="nuevo-id" placeholder="Cédula / ID" class="w-full p-4 bg-gray-50 border border-outline rounded-2xl outline-none">
            <div class="flex gap-2">
                <button onclick="cerrarModalCliente()" class="flex-1 py-4 text-gray-400 font-bold uppercase text-xs">Cerrar</button>
                <button onclick="guardarCliente()" id="btn-save" class="flex-1 py-4 bg-primary text-white rounded-2xl font-bold">GUARDAR</button>
            </div>
        </div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-4 z-50 shadow-2xl">
    <button onclick="window.location.href='DashboardLácteo.html'" class="flex flex-col items-center gap-1 text-gray-400">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-bold">INICIO</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-primary">
        <span class="material-symbols-outlined">shopping_cart</span>
        <span class="text-[10px] font-bold">VENTAS</span>
    </button>
    <button onclick="window.location.href='ControldeInventario.html'" class="flex flex-col items-center gap-1 text-gray-400">
        <span class="material-symbols-outlined">inventory_2</span>
        <span class="text-[10px] font-bold">STOCK</span>
    </button>
    <button onclick="window.location.href='Entregas.html'" class="flex flex-col items-center gap-1 text-gray-400">
        <span class="material-symbols-outlined">local_shipping</span>
        <span class="text-[10px] font-bold">ENTREGAS</span>
    </button>
</nav>

<script>
let carrito = {};
let productosData = [];

async function iniciar() {
    try {
        const [clientes, productos, ventas] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        // Cargar Estadísticas (Mantenido)
        const hoy = new Date().toLocaleDateString();
        const vHoy = ventas.filter(v => new Date(v.Fecha).toLocaleDateString() === hoy);
        document.getElementById('card-cant-ventas').innerText = vHoy.length;
        const sumaTotal = vHoy.reduce((acc, v) => acc + parseFloat(v.total || 0), 0);
        document.getElementById('card-monto-ventas').innerText = `$${sumaTotal.toFixed(2)}`;

        // Cargar Clientes
        const select = document.getElementById('select-cliente');
        select.innerHTML = '<option value="">Seleccione un cliente...</option>';
        clientes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.Nombre;
            opt.textContent = c.Nombre;
            select.appendChild(opt);
        });

        productosData = productos;
        renderizarProductos();
    } catch (e) { alert("Error al conectar con la base de datos"); }
}

function renderizarProductos() {
    const container = document.getElementById('contenedor-productos');
    container.innerHTML = "";
    productosData.forEach(p => {
        const stock = parseInt(p.Stock) || 0;
        const idClean = p.Producto.replace(/\s+/g, '');
        container.innerHTML += `
            <div class="bg-white p-5 rounded-3xl border border-outline shadow-sm flex flex-col justify-between ${stock <= 0 ? 'out-of-stock' : 'id-card'}">
                <div>
                    <h4 class="font-bold text-gray-700 text-sm">${p.Producto}</h4>
                    <span class="text-[10px] font-black ${stock <= 3 ? 'text-red-500' : 'text-primary'}">STOCK: ${stock}</span>
                </div>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-lg font-black text-primary">$${parseFloat(p.Precio_Venta).toFixed(2)}</span>
                    <div class="flex items-center gap-2 bg-gray-100 p-1 rounded-xl">
                        <button onclick="cambiarCant('${p.Producto}', -1)" class="w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center font-bold text-primary">-</button>
                        <span id="cant-${idClean}" class="text-xs font-bold w-4 text-center">0</span>
                        <button onclick="cambiarCant('${p.Producto}', 1)" class="w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center font-bold text-primary">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(nombre, delta) {
    if (!carrito[nombre]) carrito[nombre] = 0;
    const p = productosData.find(prod => prod.Producto === nombre);
    const nuevaCant = carrito[nombre] + delta;

    if (nuevaCant >= 0 && nuevaCant <= p.Stock) {
        carrito[nombre] = nuevaCant;
        document.getElementById(`cant-${nombre.replace(/\s+/g, '')}`).innerText = nuevaCant;
        actualizarCarritoUI();
    } else if (nuevaCant > p.Stock) {
        alert("Stock insuficiente");
    }
}

function actualizarCarritoUI() {
    const lista = document.getElementById('lista-carrito');
    const totalLabel = document.getElementById('total-venta');
    const vacio = document.getElementById('carrito-vacio');
    lista.innerHTML = "";
    let total = 0;
    let items = 0;

    Object.keys(carrito).forEach(nombre => {
        if (carrito[nombre] > 0) {
            items++;
            const p = productosData.find(prod => prod.Producto === nombre);
            const sub = carrito[nombre] * p.Precio_Venta;
            total += sub;
            lista.innerHTML += `
                <div class="flex justify-between items-center bg-blue-50/50 p-3 rounded-2xl">
                    <span class="text-xs font-bold">${nombre} (${carrito[nombre]})</span>
                    <span class="font-black text-primary">$${sub.toFixed(2)}</span>
                </div>`;
        }
    });

    totalLabel.innerText = `$${total.toFixed(2)}`;
    vacio.style.display = items > 0 ? 'none' : 'block';
}

async function finalizarVenta() {
    const cliente = document.getElementById('select-cliente').value;
    if (!cliente) return alert("Seleccione un cliente");
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if (items.length === 0) return alert("Carrito vacío");

    const btn = document.getElementById('btn-finalizar');
    btn.disabled = true; btn.innerText = "PROCESANDO...";

    try {
        for (const item of items) {
            const p = productosData.find(prod => prod.Producto === item);
            await DairyAPI.enviarDatos("Ventas", {
                pestaña: "Ventas",
                cliente: cliente,
                producto: item,
                cantidad: carrito[item],
                precio_usado: p.Precio_Venta,
                total: carrito[item] * p.Precio_Venta
            });
        }
        alert("¡Venta completada!");
        location.reload();
    } catch (e) { alert("Error al registrar venta"); btn.disabled = false; btn.innerText = "FINALIZAR VENTA"; }
}

function abrirModalCliente() { document.getElementById('modalCliente').classList.remove('hidden'); }
function cerrarModalCliente() { document.getElementById('modalCliente').classList.add('hidden'); }

async function guardarCliente() {
    const nombre = document.getElementById('nuevo-nombre').value;
    const id = document.getElementById('nuevo-id').value;
    if(!nombre || !id) return alert("Faltan datos");
    document.getElementById('btn-save').innerText = "...";
    await DairyAPI.enviarDatos("Clientes", { pestaña: "Clientes", ID: id, Nombre: nombre, Fecha: new Date().toLocaleDateString() });
    cerrarModalCliente(); iniciar();
}

window.onload = iniciar;
</script>
</body>
</html>
