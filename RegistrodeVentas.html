<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#a21caf", background: "#faf5ff", outline: "#e9d5ff" } } }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .input-field { width: 100%; background-color: white; border: 1px solid #e9d5ff; border-radius: 1.25rem; padding: 1rem; margin-bottom: 1rem; outline: none; }
        .input-field:focus { border-color: #a21caf; }
    </style>
</head>
<body class="bg-background text-slate-900 min-h-screen flex flex-col px-5 py-8 pb-24">

    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">Ventas</h1>
            <p class="text-primary font-bold text-[10px] uppercase tracking-[0.2em] mt-1">Lógica Láctea</p>
        </div>
        <button onclick="location.replace('index.html')" class="w-12 h-12 bg-white rounded-2xl border border-outline flex items-center justify-center text-primary shadow-sm active:scale-90 transition-transform">
            <span class="material-symbols-outlined font-bold text-2xl">home</span>
        </button>
    </header>

    <main class="flex-grow">
        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block tracking-widest">Seleccionar Cliente</label>
        <select id="cliente" class="input-field appearance-none">
            <option value="">Cargando clientes...</option>
        </select>

        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block tracking-widest">Producto</label>
        <select id="producto" class="input-field appearance-none" onchange="actualizarPrecio()">
            <option value="">Cargando inventario...</option>
        </select>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block tracking-widest">Cantidad</label>
                <input type="number" id="cantidad" class="input-field" placeholder="0" oninput="calcularTotal()">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block tracking-widest">PVP Unitario</label>
                <input type="text" id="precio" class="input-field bg-slate-50" readonly>
            </div>
        </div>

        <div class="bg-white border border-outline p-6 rounded-[2rem] mb-8 flex justify-between items-center shadow-sm">
            <span class="text-sm font-black uppercase text-slate-400 italic">Total</span>
            <span id="total-final" class="text-3xl font-black text-primary">$0.00</span>
        </div>

        <button id="btn-enviar" onclick="registrarVenta()" class="w-full bg-primary text-white font-black py-5 rounded-[2.5rem] shadow-lg active:scale-95 transition-all uppercase tracking-widest italic">
            Registrar Venta
        </button>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-around items-center h-16 w-full px-2">
            <button onclick="location.replace('index.html')" class="flex flex-col items-center text-slate-400">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-[10px]">Inicio</span>
            </button>
            <button onclick="location.replace('RegistrodeVentas.html')" class="flex flex-col items-center text-primary">
                <span class="material-symbols-outlined font-variation-fill">shopping_cart</span>
                <span class="text-[10px] font-bold">Ventas</span>
            </button>
            <button onclick="location.replace('GestióndeDespachos.html')" class="flex flex-col items-center text-slate-400">
                <span class="material-symbols-outlined">local_shipping</span>
                <span class="text-[10px]">Ruta</span>
            </button>
            <button onclick="location.replace('ControldeInventario.html')" class="flex flex-col items-center text-slate-400">
                <span class="material-symbols-outlined">package_2</span>
                <span class="text-[10px]">Stock</span>
            </button>
        </div>
    </nav>

    <script>
        const DAIRY_API_URL = "https://script.google.com/macros/s/AKfycby68_4A0MEp7EDNa89HGePvhWC56j3GyKx8RRIX3BGd-E_J6DG3sT-8DEXEYMXr_qMTrA/exec";
        let inventario = [];

        async function cargarDatos() {
            try {
                const [cResp, iResp] = await Promise.all([
                    fetch(`${DAIRY_API_URL}?pestaña=Clientes`).then(r => r.json()),
                    fetch(`${DAIRY_API_URL}?pestaña=Inventario`).then(r => r.json())
                ]);

                const selectC = document.getElementById('cliente');
                selectC.innerHTML = '<option value="">Seleccionar Cliente</option>';
                cResp.forEach(c => selectC.add(new Option(c.Nombre, c.Nombre)));

                inventario = iResp;
                const selectP = document.getElementById('producto');
                selectP.innerHTML = '<option value="">Seleccionar Producto</option>';
                iResp.forEach(p => selectP.add(new Option(p.Producto, p.Producto)));
            } catch (e) { console.error("Error cargando datos"); }
        }

        function actualizarPrecio() {
            const prod = document.getElementById('producto').value;
            const item = inventario.find(i => i.Producto === prod);
            if (item) {
                document.getElementById('precio').value = item.PVP || "0,00";
                calcularTotal();
            }
        }

        function calcularTotal() {
            const c = parseFloat(document.getElementById('cantidad').value) || 0;
            const p = parseFloat(document.getElementById('precio').value.replace(',', '.')) || 0;
            document.getElementById('total-final').innerText = `$${(c * p).toFixed(2)}`;
        }

        async function registrarVenta() {
            const btn = document.getElementById('btn-enviar');
            const data = {
                pestaña: "Ventas",
                ID_Venta: "V-" + Math.floor(Math.random() * 900000 + 100000),
                Cliente: document.getElementById('cliente').value,
                Producto: document.getElementById('producto').value,
                Cantidad: document.getElementById('cantidad').value,
                Precio_PVP: document.getElementById('precio').value
            };

            if (!data.Cliente || !data.Producto || !data.Cantidad) return alert("Faltan datos");

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            try {
                await fetch(DAIRY_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Venta registrada");
                location.replace('index.html');
            } catch (e) {
                alert("Error");
                btn.disabled = false;
                btn.innerText = "Registrar Venta";
            }
        }

        cargarDatos();
    </script>
</body>
</html>
