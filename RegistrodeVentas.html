<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#a21caf",
            secondary: "#db2777",
            background: "#faf5ff",
            outline: "#e9d5ff",
          }
        }
      }
    }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; }
        .card-sutil { background: white; border-radius: 2rem; border: 1px solid #e9d5ff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .input-sutil { background-color: #fdfaff; border: 1px solid #e9d5ff; border-radius: 1rem; padding: 1rem; width: 100%; transition: all 0.2s; font-size: 14px; }
        .input-sutil:focus { outline: none; border-color: #a21caf; ring: 2px; ring-color: #a21caf; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; text-transform: uppercase; border-radius: 1.5rem; transition: all 0.2s; }
        .btn-magenta:active { transform: scale(0.95); }
        .btn-outline { border: 2px solid #e9d5ff; color: #a21caf; font-weight: 800; text-transform: uppercase; border-radius: 1.5rem; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

<header class="h-16 bg-white border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase">Ventas</h1>
    </div>
    <button onclick="iniciar()" class="material-symbols-outlined text-primary/40 hover:text-primary transition-all">sync</button>
</header>

<main class="mt-6 px-4 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <div class="lg:col-span-7 space-y-4">
        
        <section class="card-sutil p-5">
            <div id="vista-seleccion-cliente">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-black text-primary uppercase tracking-widest">Cliente Existente</span>
                    <button onclick="alternarFormularioCliente(true)" class="text-[10px] font-black text-secondary bg-pink-50 px-3 py-1 rounded-full">+ NUEVO REGISTRO</button>
                </div>
                <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil text-base font-bold text-slate-700">
                    <option value="">-- Buscar Cliente --</option>
                </select>
            </div>

            <div id="vista-nuevo-cliente" class="hidden space-y-4 animate-in fade-in duration-300">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-black text-secondary uppercase tracking-tight">Registro de Nuevo Cliente</h2>
                    <button onclick="alternarFormularioCliente(false)" class="material-symbols-outlined text-slate-400">close</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-sutil">
                    <input type="text" id="reg-ci" placeholder="Cédula / RUC" class="input-sutil">
                    <input type="tel" id="reg-tel" placeholder="Teléfono" class="input-sutil">
                    <input type="text" id="reg-dir" placeholder="Dirección" class="input-sutil">
                </div>
                <button onclick="guardarNuevoCliente()" id="btn-guardar-cli" class="w-full btn-magenta py-4 shadow-lg shadow-pink-100 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">person_add</span>
                    GUARDAR Y SELECCIONAR
                </button>
            </div>
        </section>

        <div class="flex items-center gap-2 px-2">
            <span class="material-symbols-outlined text-primary text-sm">grid_view</span>
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Catálogo Disponible</span>
        </div>
        <section id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></section>
    </div>

    <div class="lg:col-span-5">
        <section class="card-sutil overflow-hidden sticky top-24 border-2 border-primary/10 shadow-xl">
            <div class="bg-primary p-6 text-white">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[10px] font-black opacity-70 uppercase tracking-widest mb-1">Orden de Pedido</p>
                        <h2 id="cliente-resumen" class="text-xl font-black uppercase truncate tracking-tighter">SIN SELECCIONAR</h2>
                    </div>
                    <span id="num-orden" class="text-[10px] bg-white/20 px-2 py-1 rounded-lg font-mono">---</span>
                </div>
            </div>
            
            <div class="p-6 space-y-6">
                <div id="lista-carrito" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                    <div id="carrito-vacio" class="text-center py-10">
                        <span class="material-symbols-outlined text-slate-200 text-5xl">shopping_basket</span>
                        <p class="text-slate-300 text-xs font-bold italic mt-2">No hay productos seleccionados</p>
                    </div>
                </div>

                <div class="pt-4 border-t border-outline">
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Fecha de Entrega</label>
                    <input type="date" id="fecha-entrega" class="input-sutil font-bold text-primary">
                </div>

                <div class="flex justify-between items-end border-t border-outline pt-4">
                    <span class="text-xs font-black text-slate-400 uppercase mb-1">Total a Pagar</span>
                    <span id="total-venta" class="text-4xl font-black text-slate-900 tracking-tighter">$0.00</span>
                </div>

                <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full btn-magenta py-5 text-lg shadow-xl shadow-pink-100 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">send_to_mobile</span>
                    FINALIZAR PEDIDO
                </button>
            </div>
        </section>
    </div>
</main>

<div id="menu-container"></div>

<script>
let carrito = {}; let productosData = []; let clientesData = []; let idOrdenActual = "";

function generarIDOrden() {
    const d = new Date();
    idOrdenActual = `ORD-${d.getHours()}${d.getMinutes()}-${Math.floor(Math.random()*90+10)}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
}

// LÓGICA DE INTERFAZ DE CLIENTE
function alternarFormularioCliente(mostrarNuevo) {
    const vistaSel = document.getElementById('vista-seleccion-cliente');
    const vistaNuevo = document.getElementById('vista-nuevo-cliente');
    
    if(mostrarNuevo) {
        vistaSel.classList.add('hidden');
        vistaNuevo.classList.remove('hidden');
    } else {
        vistaSel.classList.remove('hidden');
        vistaNuevo.classList.add('hidden');
    }
}

async function guardarNuevoCliente() {
    const n = document.getElementById('reg-nombre').value, c = document.getElementById('reg-ci').value, t = document.getElementById('reg-tel').value, d = document.getElementById('reg-dir').value;
    if(!n || !t) return alert("Nombre y Teléfono son obligatorios");
    
    const btn = document.getElementById('btn-guardar-cli');
    btn.innerText = "REGISTRANDO...";
    btn.disabled = true;

    try {
        await DairyAPI.enviarDatos("Clientes", { pestaña: "Clientes", Nombre: n, CI: c, Teléfono: t, Dirección: d });
        
        // Recargar datos y auto-seleccionar al nuevo cliente
        await iniciar(); 
        document.getElementById('select-cliente').value = n;
        actualizarNombreCarrito();
        alternarFormularioCliente(false);
        
        // Limpiar campos
        document.getElementById('reg-nombre').value = "";
        document.getElementById('reg-ci').value = "";
        document.getElementById('reg-tel').value = "";
        document.getElementById('reg-dir').value = "";

    } catch(e) { 
        alert("Error al conectar con la base de datos"); 
    } finally {
        btn.innerText = "GUARDAR Y SELECCIONAR";
        btn.disabled = false;
    }
}

async function iniciar() {
    generarIDOrden();
    fetch('menu.html').then(r => r.text()).then(d => document.getElementById('menu-container').innerHTML = d);
    try {
        const [cl, pr] = await Promise.all([DairyAPI.obtenerDatos("Clientes"), DairyAPI.obtenerDatos("Inventario")]);
        clientesData = cl; productosData = pr;
        
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Buscar Cliente --</option>';
        cl.sort((a,b)=>a.Nombre.localeCompare(b.Nombre)).forEach(c => {
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`;
        });
        renderizarProductos();
    } catch(e) { console.error(e); }
}

function actualizarNombreCarrito() { 
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR"; 
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); cont.innerHTML = "";
    productosData.forEach(p => {
        const s = parseInt(p.Stock) || 0, pr = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
        cont.innerHTML += `
            <div class="card-sutil p-4 flex flex-col justify-between min-h-[150px] ${s <= 0 ? 'opacity-40 grayscale pointer-events-none' : ''}">
                <div>
                    <h4 class="font-black text-[10px] uppercase text-slate-400 truncate leading-tight mb-1">${p.Producto}</h4>
                    <div class="flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full ${s < 10 ? 'bg-amber-400' : 'bg-green-400'}"></span>
                        <p class="text-[10px] text-slate-500 font-bold">${s} disponibles</p>
                    </div>
                </div>
                <div>
                    <p class="text-xl font-black text-slate-800">$${pr.toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-xl p-1 mt-2 border border-outline">
                        <button onclick="cambiarCant('${p.Producto}',-1)" class="w-8 h-8 bg-white rounded-lg text-primary shadow-sm font-black border border-outline">-</button>
                        <span id="cant-${p.Producto.replace(/\s+/g,'')}" class="font-black text-slate-600 text-sm">0</span>
                        <button onclick="cambiarCant('${p.Producto}',1)" class="w-8 h-8 bg-white rounded-lg text-primary shadow-sm font-black border border-outline">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    if(carrito[n]+d >= 0 && carrito[n]+d <= p.Stock) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const l = document.getElementById('lista-carrito'); l.innerHTML = ""; let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * parseFloat(p.Precio_Venta.toString().replace(',','.'));
            t += sub;
            l.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-purple-50/50 rounded-xl border border-outline">
                    <span class="text-xs font-bold text-slate-700">${carrito[n]}x ${n}</span>
                    <span class="text-xs font-black text-primary">$${sub.toFixed(2)}</span>
                </div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').classList.toggle('hidden', t > 0);
}

async function finalizarVenta() {
    const cli = document.getElementById('select-cliente').value, f = document.getElementById('fecha-entrega').value;
    if(!cli || !f) return alert("Debes seleccionar un cliente y una fecha de entrega");
    
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("El carrito está vacío");
    
    const btn = document.getElementById('btn-finalizar');
    btn.innerText = "ENVIANDO DATOS...";
    btn.disabled = true;

    try {
        let det = "", total = 0;
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n), pvp = parseFloat(p.Precio_Venta.toString().replace(',','.'));
            const sub = carrito[n] * pvp; total += sub;
            det += `• ${carrito[n]} x ${n} ($${sub.toFixed(2)})\n`;
            
            await DairyAPI.enviarDatos("Ventas", { 
                pestaña: "Ventas", 
                ID_Venta: idOrdenActual, 
                Cliente: cli, 
                Producto: n, 
                Cantidad: carrito[n], 
                Precio_PVP: p.Precio_Venta, 
                Fecha_Entrega: f,
                Estado: "PENDIENTE"
            });
        }
        
        const cObj = clientesData.find(c => c.Nombre === cli);
        let tel = "593" + (cObj?.Teléfono?.toString().replace(/\D/g, '').slice(-9) || "");
        
        window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(`*LÓGICA LÁCTEA - PEDIDO #${idOrdenActual}*\n*Cliente:* ${cli}\n*Entrega:* ${f}\n\n*DETALLE:*\n${det}\n*TOTAL: $${total.toFixed(2)}*`)}`, '_blank');
        
        location.reload();
    } catch(e) { 
        alert("Error en el servidor"); 
        btn.innerText = "FINALIZAR PEDIDO";
        btn.disabled = false;
    }
}
window.onload = iniciar;
</script>
</body>
</html>
