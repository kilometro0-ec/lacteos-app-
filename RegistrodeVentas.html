<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea - Ventas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,400;0,500;0,700;1,800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        primary: "#a21caf", 
                        secondary: "#db2777", 
                        background: "#faf5ff", 
                        outline: "#e9d5ff" 
                    } 
                } 
            } 
        }
    </script>
    <style>
        body { 
            font-family: 'Work Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .out-of-stock { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .stock-critico { border: 2px solid #ef4444 !important; }
        
        .brand-title {
            font-style: italic;
            font-weight: 800;
            letter-spacing: -0.05em;
        }
        
        /* Scrollbar estética para el carrito */
        #lista-carrito::-webkit-scrollbar { width: 4px; }
        #lista-carrito::-webkit-scrollbar-thumb { background: #e9d5ff; border-radius: 10px; }
    </style>
</head>
<body class="bg-background pb-40">

<header class="fixed top-0 w-full h-16 bg-white border-b border-outline flex justify-between items-center px-4 z-50 shadow-sm">
    <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">LL</div>
        <h1 class="text-xl text-primary uppercase brand-title">Ventas</h1>
    </div>
    <button onclick="iniciar()" class="p-2 text-primary active:rotate-180 transition-transform">
        <span class="material-symbols-outlined">sync</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-primary p-5 rounded-[2rem] text-white shadow-lg">
            <p class="text-[10px] font-bold uppercase opacity-70">Pedidos Hoy</p>
            <h3 id="card-cant-ventas" class="text-3xl font-bold">0</h3>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border border-outline text-center shadow-sm">
            <p class="text-[10px] text-secondary font-bold uppercase">Monto Total</p>
            <h3 id="card-monto-ventas" class="text-2xl font-bold text-primary">$0.00</h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="bg-white p-5 rounded-3xl border border-outline">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest italic">Seleccionar Cliente</h2>
                    <button onclick="abrirModalCliente()" class="text-[10px] font-bold text-secondary bg-pink-50 px-3 py-1 rounded-full">+ NUEVO</button>
                </div>
                <select id="select-cliente" onchange="actualizarNombreCarrito()" class="w-full h-14 bg-purple-50 border-none rounded-2xl font-bold text-lg focus:ring-2 focus:ring-primary">
                    <option value="">-- Buscar Cliente --</option>
                </select>
            </section>

            <section id="contenedor-productos" class="grid grid-cols-2 gap-4"></section>
        </div>

        <div class="lg:col-span-5">
            <section class="bg-white rounded-[2.5rem] border-2 border-outline shadow-xl sticky top-20 overflow-hidden">
                <div class="bg-secondary p-5 text-white">
                    <h3 class="font-bold text-[10px] uppercase tracking-widest mb-1 opacity-70 italic">Pedido para:</h3>
                    <h2 id="cliente-resumen" class="text-xl brand-title uppercase leading-tight">SIN SELECCIONAR</h2>
                </div>
                <div class="p-6">
                    <div id="lista-carrito" class="space-y-3 mb-6 max-h-60 overflow-y-auto">
                        <p id="carrito-vacio" class="text-center text-gray-400 py-10 italic text-sm">Agrega productos al carrito</p>
                    </div>
                    
                    <div class="pt-4 border-t border-dashed border-outline">
                        <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Fecha Programada de Entrega</label>
                        <input type="date" id="fecha-entrega" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold text-primary focus:ring-2 focus:ring-primary">
                    </div>

                    <div class="mt-6 flex justify-between items-center">
                        <span class="text-xs font-bold text-primary uppercase">Total a Pagar</span>
                        <span id="total-venta" class="text-4xl font-bold text-slate-900">$0.00</span>
                    </div>

                    <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full mt-8 bg-primary text-white py-5 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all uppercase italic">
                        Confirmar Pedido
                    </button>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="menu-container"></div>

<script>
let carrito = {};
let productosData = [];
let clientesData = [];

async function iniciar() {
    fetch('menu.html').then(r => r.text()).then(d => document.getElementById('menu-container').innerHTML = d);
    try {
        const [clientes, productos, ventas] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);
        
        clientesData = clientes;
        productosData = productos;
        
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Buscar Cliente --</option>';
        clientes.forEach(c => sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`);
        
        const hoy = new Date().toLocaleDateString();
        const vHoy = ventas.filter(v => new Date(v.Fecha).toLocaleDateString() === hoy);
        document.getElementById('card-cant-ventas').innerText = vHoy.length;
        const totalSumado = vHoy.reduce((acc, v) => acc + (parseFloat(v["Precio Total"]?.toString().replace(',','.')) || 0), 0);
        document.getElementById('card-monto-ventas').innerText = `$${totalSumado.toFixed(2)}`;

        renderizarProductos();
    } catch(e) { console.error("Error de inicio:", e); }
}

function actualizarNombreCarrito() {
    const nombre = document.getElementById('select-cliente').value;
    document.getElementById('cliente-resumen').innerText = nombre || "SIN SELECCIONAR";
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos');
    cont.innerHTML = "";
    productosData.forEach(p => {
        const stock = parseInt(p.Stock) || 0;
        const precio = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
        cont.innerHTML += `
            <div class="bg-white p-4 rounded-[2rem] border-2 border-outline shadow-sm flex flex-col justify-between h-48 ${stock <= 0 ? 'out-of-stock' : ''} ${stock <= 5 && stock > 0 ? 'stock-critico' : ''}">
                <div>
                    <h4 class="font-bold text-[11px] uppercase text-slate-700 leading-tight">${p.Producto}</h4>
                    <p class="text-[10px] font-bold text-primary">STOCK: ${stock}</p>
                </div>
                <div>
                    <p class="text-xl font-bold mb-2">$${precio.toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-xl p-1">
                        <button onclick="cambiarCant('${p.Producto}', -1)" class="w-8 h-8 bg-white rounded-lg font-bold text-primary">-</button>
                        <span id="cant-${p.Producto.replace(/\s+/g,'')}" class="font-bold text-primary">0</span>
                        <button onclick="cambiarCant('${p.Producto}', 1)" class="w-8 h-8 bg-white rounded-lg font-bold text-primary">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    const nueva = carrito[n] + d;
    if(nueva >= 0 && nueva <= p.Stock) {
        carrito[n] = nueva;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = nueva;
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const list = document.getElementById('lista-carrito');
    const tot = document.getElementById('total-venta');
    list.innerHTML = "";
    let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const precio = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
            const sub = carrito[n] * precio;
            t += sub;
            list.innerHTML += `<div class="flex justify-between text-[11px] font-bold bg-purple-50 p-3 rounded-xl border border-dashed border-outline">
                <span>${carrito[n]}x ${n}</span><span>$${sub.toFixed(2)}</span>
            </div>`;
        }
    });
    tot.innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').style.display = t > 0 ? 'none' : 'block';
}

async function finalizarVenta() {
    const cliNombre = document.getElementById('select-cliente').value;
    const fecha = document.getElementById('fecha-entrega').value;
    if(!cliNombre || !fecha) return alert("Selecciona cliente y fecha de entrega");
    
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("El carrito está vacío");

    const btn = document.getElementById('btn-finalizar');
    btn.disabled = true; 
    btn.innerText = "REGISTRANDO...";

    try {
        let totalGral = 0;
        let listaProductosTxt = "";

        // Proceso de guardado
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n);
            const pvpVal = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
            const sub = carrito[n] * pvpVal;
            totalGral += sub;
            listaProductosTxt += `• ${carrito[n]} x ${n} ($${sub.toFixed(2)})\n`;

            await DairyAPI.enviarDatos("Ventas", {
                pestaña: "Ventas", Cliente: cliNombre, Producto: n,
                Cantidad: carrito[n], Precio_PVP: p.Precio_Venta, Fecha_Entrega: fecha
            });
        }

        // Construir mensaje WhatsApp
        let txtWA = `*LÓGICA LÁCTEA - PEDIDO CONFIRMADO*\n\n`;
        txtWA += `*Cliente:* ${cliNombre}\n`;
        txtWA += `*Entrega:* ${fecha}\n\n`;
        txtWA += `*DETALLE:*\n${listaProductosTxt}`;
        txtWA += `\n*TOTAL A PAGAR: $${totalGral.toFixed(2)}*`;
        
        const cliObj = clientesData.find(c => c.Nombre === cliNombre);
        
        // Formatear Teléfono
        let tel = "593"; 
        if (cliObj && cliObj.Teléfono) {
            let numLimpio = cliObj.Teléfono.toString().replace(/\D/g, '');
            if (numLimpio.startsWith('0')) {
                tel = "593" + numLimpio.substring(1);
            } else if (numLimpio.length < 10) {
                tel = "593" + numLimpio;
            } else {
                tel = numLimpio;
            }
        }

        const urlFinal = `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(txtWA)}`;
        
        alert("¡Venta Exitosa! Abriendo WhatsApp del cliente...");
        
        // Abrir WhatsApp con respaldo por si falla window.open
        const waWindow = window.open(urlFinal, '_blank');
        if (!waWindow) {
            location.href = urlFinal;
        } else {
            location.reload();
        }

    } catch(e) { 
        alert("Error de conexión. Intenta de nuevo."); 
        btn.disabled = false; 
        btn.innerText = "Confirmar Pedido"; 
    }
}

window.onload = iniciar;
</script>
</body>
</html>
