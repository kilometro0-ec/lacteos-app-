<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a21caf">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3050/3050158.png">

    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#a21caf",
            secondary: "#db2777",
            background: "#faf5ff",
            outline: "#e9d5ff",
          }
        }
      }
    }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; color: #1f012a; }
        .card-sutil { background: white; border-radius: 2.5rem; border: 1px solid #e9d5ff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); }
        .input-sutil { background-color: #fdfaff; border: 1.5px solid #f3e8ff; border-radius: 2rem; padding: 1rem 1.5rem; width: 100%; transition: all 0.3s ease; font-size: 14px; color: #4a5568; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; text-transform: uppercase; border-radius: 2rem; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-magenta:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        .fade-in-sutil { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .loading-state { opacity: 0.4; pointer-events: none; filter: grayscale(1); transition: all 0.5s ease; }
        
        .active-nav { color: #a21caf !important; }
        .active-nav .icon-box { background-color: #f5f3ff !important; transform: translateY(-4px) !important; }

        input[type="date"] {
            -webkit-appearance: listbox !important; 
            appearance: none !important;
            background-color: #ffffff !important;
            color: #000000 !important;
        }
    </style>
</head>
<body class="pb-44"> 

<header class="h-16 bg-white/80 backdrop-blur-md border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase">Ventas</h1>
        <p id="estado-carga" class="text-[8px] font-black text-secondary animate-pulse uppercase">Sincronizando...</p>
    </div>
    
    <div class="flex items-center gap-2">
        <button onclick="location.reload()" class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-primary/40">
            <span class="material-symbols-outlined">sync</span>
        </button>
        <button onclick="window.location.href='./DashboardLacteo.html'" class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg active:scale-90">
            <span class="material-symbols-outlined">home</span>
        </button>
    </div>
</header>

<main id="main-content" class="mt-6 px-4 max-w-6xl mx-auto loading-state">
    
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="card-sutil p-5 flex flex-col items-center justify-center text-center border-b-4 border-b-primary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Pedidos Pendientes</span>
            <div class="flex items-baseline gap-1">
                <span id="card-pedidos-pendientes" class="text-3xl font-black text-primary tracking-tighter">0</span>
                <span class="text-[10px] font-bold text-primary/40 uppercase">Ventas</span>
            </div>
        </div>
        <div class="card-sutil p-5 flex flex-col items-center justify-center text-center border-b-4 border-b-secondary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Productos por Entregar</span>
            <div class="flex items-baseline gap-1">
                <span id="card-productos-total" class="text-3xl font-black text-secondary tracking-tighter">0</span>
                <span class="text-[10px] font-bold text-secondary/40 uppercase">Items</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="card-sutil p-6">
                <div id="vista-seleccion-cliente" class="fade-in-sutil">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <span class="text-[10px] font-black text-primary uppercase tracking-widest">Seleccionar Cliente</span>
                        <button onclick="alternarFormularioCliente(true)" class="text-[9px] font-black text-white bg-secondary px-4 py-2 rounded-full shadow-sm">+ NUEVO</button>
                    </div>
                    <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil text-base font-bold">
                        <option value="">-- Cargando... --</option>
                    </select>
                </div>

                <div id="vista-nuevo-cliente" class="hidden space-y-4 fade-in-sutil">
                    <div class="flex justify-between items-center px-2">
                        <h2 class="text-sm font-black text-secondary uppercase">Nuevo Registro</h2>
                        <button onclick="alternarFormularioCliente(false)" class="text-slate-400"><span class="material-symbols-outlined">close</span></button>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-sutil">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="reg-ci" placeholder="CI / RUC" class="input-sutil">
                            <input type="tel" id="reg-tel" placeholder="Teléfono" class="input-sutil">
                        </div>
                        <input type="text" id="reg-dir" placeholder="Dirección" class="input-sutil">
                    </div>
                    <button onclick="guardarNuevoCliente()" id="btn-guardar-cli" class="w-full btn-magenta py-4">GUARDAR</button>
                </div>
            </section>

            <div class="px-1">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-primary opacity-40">search</span>
                    </div>
                    <input type="text" id="buscarProducto" oninput="filtrarProductos()" 
                           placeholder="Buscar sabor o producto..." 
                           class="input-sutil pl-12 border-2 border-outline focus:border-primary font-bold text-lg">
                </div>
            </div>
            
            <section id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></section>
        </div>

        <div class="lg:col-span-5">
            <section class="card-sutil overflow-hidden sticky top-24 border-2 border-primary/5 shadow-xl">
                <div class="bg-gradient-to-br from-primary to-purple-700 p-6 text-white">
                    <p class="text-[10px] font-black opacity-60 uppercase mb-1">Resumen de Venta</p>
                    <h2 id="cliente-resumen" class="text-2xl font-black uppercase truncate tracking-tighter mb-4">SIN SELECCIONAR</h2>
                    
                    <div class="flex justify-between items-end gap-2">
                        <div class="flex flex-col gap-1">
                            <span class="text-[9px] font-black opacity-80 uppercase">Pedido #</span>
                            <span id="num-orden" class="text-[10px] bg-white/20 px-3 py-2 rounded-lg font-mono font-bold">---</span>
                        </div>
                        <div class="relative flex-1 max-w-[160px]">
                            <label for="fecha-entrega" class="text-[9px] font-black opacity-90 uppercase mb-1 block">FECHA ENTREGA:</label>
                            <input type="date" id="fecha-entrega" class="w-full font-bold text-[14px] py-2 px-3 rounded-xl outline-none text-black">
                        </div>
                    </div>
                </div>
                
                <div class="p-6 space-y-6">
                    <div id="lista-carrito" class="space-y-3 max-h-60 overflow-y-auto pr-1">
                        <div id="carrito-vacio" class="text-center py-8">
                            <p class="text-slate-300 text-xs font-bold italic">No hay productos seleccionados</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end border-t border-purple-50 pt-4">
                        <span class="text-xs font-black text-slate-400 uppercase">Total</span>
                        <span id="total-venta" class="text-4xl font-black text-slate-900 tracking-tighter">$0.00</span>
                    </div>
                    <div id="contenedor-boton-finalizar">
                        <button id="btn-finalizar" onclick="procesarVenta()" class="w-full btn-magenta py-5 text-lg shadow-xl shadow-pink-100">
                            <span class="material-symbols-outlined text-xl">rocket_launch</span> CONFIRMAR PEDIDO
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-purple-100 pb-6 pt-3 shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.1)] z-[100] px-2">
    <div class="flex justify-around items-center max-w-lg mx-auto">
        <button onclick="window.location.href='./DashboardLacteo.html'" class="nav-link text-gray-400 flex flex-col items-center group" data-path="dashboard">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">home</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Inicio</span>
        </button>
        <button onclick="window.location.href='./RegistrodeVentas.html'" class="nav-link text-gray-400 flex flex-col items-center group active-nav" data-path="ventas">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">receipt_long</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Ventas</span>
        </button>
        <button onclick="window.location.href='./PedidosProveedor.html'" class="nav-link text-gray-400 flex flex-col items-center group" data-path="pedidos">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">shopping_cart_checkout</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Pedidos</span>
        </button>
        <button onclick="window.location.href='./GestiondeClientes.html'" class="nav-link text-gray-400 flex flex-col items-center group" data-path="clientes">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">group</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Clientes</span>
        </button>
        <button onclick="window.location.href='./ControldeInventario.html'" class="nav-link text-gray-400 flex flex-col items-center group" data-path="inventario">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">inventory_2</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Stock</span>
        </button>
        <button onclick="window.location.href='./GestióndeDespachos.html'" class="nav-link text-gray-400 flex flex-col items-center group" data-path="despachos">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">local_shipping</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Ruta</span>
        </button>
    </div>
</nav>

<script>
let carrito = {}; let productosData = []; let clientesData = []; let idOrdenActual = "";

async function iniciar() {
    const d = new Date();
    idOrdenActual = `LL-${d.getHours()}${d.getMinutes()}-${Math.floor(Math.random()*90+10)}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
    document.getElementById('fecha-entrega').value = new Date().toISOString().split('T')[0];

    try {
        const [cl, pr, vnt] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"), 
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);
        
        clientesData = cl; productosData = pr;
        
        // CÁLCULO DE INDICADORES (VENTAS PENDIENTES)
        const pendientes = vnt.filter(v => v.Estado === "PENDIENTE");
        const idsUnicos = [...new Set(pendientes.map(v => v.ID_Venta))].length;
        const totalProductos = pendientes.reduce((acc, v) => acc + (parseInt(v.Cantidad) || 0), 0);

        document.getElementById('card-pedidos-pendientes').innerText = idsUnicos;
        document.getElementById('card-productos-total').innerText = totalProductos;

        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Buscar cliente --</option>';
        cl.sort((a,b)=>a.Nombre.localeCompare(b.Nombre)).forEach(c => { 
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`; 
        });
        
        renderizarProductos();

        // HABILITAR INTERFAZ
        document.getElementById('main-content').classList.remove('loading-state');
        document.getElementById('estado-carga').innerText = "Sincronizado";
        document.getElementById('estado-carga').classList.remove('animate-pulse');
        
    } catch(e) { 
        console.error(e);
        document.getElementById('estado-carga').innerText = "Error de conexión";
    }
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); cont.innerHTML = "";
    productosData.forEach(p => {
        const s = parseInt(p.Stock) || 0;
        const pr = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
        const idCant = `cant-${p.Producto.replace(/\s+/g,'')}`;
        cont.innerHTML += `
            <div class="card-sutil p-4 flex flex-col justify-between min-h-[200px] ${s <= 0 ? 'opacity-40 grayscale pointer-events-none' : ''}">
                <div>
                    <h4 class="font-black text-[12px] uppercase text-primary leading-tight mb-2">${p.Producto}</h4>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Stock: <span class="${s < 5 ? 'text-red-500' : 'text-slate-600'}">${s}</span></p>
                </div>
                <div class="mt-auto">
                    <p class="text-2xl font-black text-slate-800 tracking-tighter mb-2">$${pr.toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-2xl p-1 border border-purple-100">
                        <button onclick="cambiarCant('${p.Producto}',-1)" class="w-10 h-10 bg-white rounded-xl text-primary font-black active:scale-90">-</button>
                        <span id="${idCant}" class="font-black text-primary text-base px-1">0</span>
                        <button onclick="cambiarCant('${p.Producto}',1)" class="w-10 h-10 bg-white rounded-xl text-primary font-black active:scale-90">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    if(carrito[n]+d >= 0 && (carrito[n]+d <= p.Stock)) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const l = document.getElementById('lista-carrito'); l.innerHTML = ""; let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * parseFloat(p.Precio_Venta.toString().replace(',','.'));
            t += sub;
            l.innerHTML += `<div class="flex justify-between items-center p-3 bg-purple-50 rounded-2xl border border-purple-100 fade-in-sutil">
                <div class="flex flex-col"><span class="text-[10px] font-black text-primary uppercase leading-tight">${n}</span><span class="text-[10px] font-bold">Cant: ${carrito[n]}</span></div>
                <span class="text-sm font-black">$${sub.toFixed(2)}</span>
            </div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').classList.toggle('hidden', t > 0);
}

async function procesarVenta() {
    const cliNombre = document.getElementById('select-cliente').value;
    const f = document.getElementById('fecha-entrega').value;
    if(!cliNombre || !f) return alert("Selecciona cliente y fecha");
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("Carrito vacío");
    
    const btn = document.getElementById('btn-finalizar');
    btn.innerHTML = `GUARDANDO...`; btn.disabled = true;

    try {
        let detalleTexto = ""; let totalVenta = 0;
        const horaQuito = new Date().toLocaleTimeString('es-EC', { hour12: false, timeZone: 'America/Guayaquil' });

        for(const n of items) {
            const p = productosData.find(x => x.Producto === n);
            const pvp = parseFloat(p.Precio_Venta.toString().replace(',','.'));
            const sub = carrito[n] * pvp; totalVenta += sub;
            detalleTexto += `• ${carrito[n]} x ${n} = $${sub.toFixed(2)}\n`;
            
            await DairyAPI.enviarDatos("Ventas", { 
                pestaña: "Ventas", ID_Venta: idOrdenActual, Cliente: cliNombre, Producto: n, 
                Cantidad: carrito[n], Precio_PVP: p.Precio_Venta, Fecha_Entrega: f, 
                Hora_Registro: horaQuito, Estado: "PENDIENTE" 
            });
        }
        
        const cli = clientesData.find(c => c.Nombre === cliNombre);
        let tel = cli?.Teléfono?.toString().replace(/\D/g, '') || "";
        if (tel.startsWith('0')) tel = tel.substring(1); 
        if (!tel.startsWith('593')) tel = '593' + tel; 
        
        let msj = `*LÓGICA LÁCTEA - PEDIDO #${idOrdenActual}*\n*Cliente:* ${cliNombre}\n*Entrega:* ${f}\n\n*DETALLE:*\n${detalleTexto}\n*TOTAL: $${totalVenta.toFixed(2)}*`;
        const urlwa = `whatsapp://send?phone=${tel}&text=${encodeURIComponent(msj)}`;

        document.getElementById('contenedor-boton-finalizar').innerHTML = `
            <a href="${urlwa}" onclick="setTimeout(()=>location.reload(), 2000)" class="w-full btn-magenta py-5 text-lg bg-green-600">
                <span class="material-symbols-outlined">chat</span> ENVIAR WHATSAPP
            </a>`;
            
    } catch(e) { 
        alert("Error al guardar"); btn.disabled = false; btn.innerText = "REINTENTAR";
    }
}

function alternarFormularioCliente(m) {
    document.getElementById('vista-seleccion-cliente').classList.toggle('hidden', m);
    document.getElementById('vista-nuevo-cliente').classList.toggle('hidden', !m);
}

function actualizarNombreCarrito() { 
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR"; 
}

function filtrarProductos() {
    const termino = document.getElementById('buscarProducto').value.toLowerCase();
    document.querySelectorAll('#contenedor-productos > div').forEach(card => {
        const nombre = card.querySelector('h4').innerText.toLowerCase();
        card.style.display = nombre.includes(termino) ? "flex" : "none";
    });
}

window.onload = iniciar;
</script>
</body>
</html>
