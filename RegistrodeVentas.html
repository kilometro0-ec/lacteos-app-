<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
        // CONFIGURACIÓN DE TEMA
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff", outline: "#e9d5ff" }
                }
            }
        }

        // --- API CONFIG INCRUSTADA PARA EVITAR ERRORES ---
        const DAIRY_API_URL = "AQUÍ_VA_TU_URL_DE_APPS_SCRIPT"; // Asegúrate de que esta URL sea la correcta

        const DairyAPI = {
            async obtenerDatos(pestaña) {
                const res = await fetch(`${DAIRY_API_URL}?pestaña=${pestaña}`);
                return await res.json();
            },
            async enviarDatos(pestaña, datos) {
                return await fetch(DAIRY_API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pestaña, ...datos })
                });
            }
        };
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; }
        .card-sutil { background: white; border-radius: 2rem; border: 1px solid #e9d5ff; }
        .input-sutil { background: #fdfaff; border: 1.5px solid #f3e8ff; border-radius: 1.5rem; padding: 0.8rem 1.2rem; width: 100%; outline: none; }
        .btn-magenta { background: #db2777; color: white; font-weight: 800; border-radius: 1.5rem; padding: 1rem; transition: all 0.2s; text-align: center; width: 100%; }
        .btn-magenta:active { transform: scale(0.95); }
        #loading { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

<div id="loading">
    <p class="font-black text-primary animate-pulse">CARGANDO SISTEMA...</p>
</div>

<header class="h-16 bg-white border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <h1 class="text-xl font-black text-primary uppercase">Ventas</h1>
    <button onclick="location.reload()" class="text-primary"><span class="material-symbols-outlined">sync</span></button>
</header>

<main class="p-4 max-w-lg mx-auto space-y-6">
    <section class="card-sutil p-4">
        <label class="text-[10px] font-black text-primary uppercase block mb-2">Seleccionar Cliente</label>
        <select id="select-cliente" onchange="actualizarResumen()" class="input-sutil font-bold text-sm">
            <option value="">Cargando...</option>
        </select>
    </section>

    <div id="lista-productos" class="grid grid-cols-2 gap-3">
        </div>

    <section class="card-sutil p-6 border-2 border-primary shadow-lg">
        <h2 id="resumen-nombre" class="font-black uppercase text-gray-400 text-xs mb-1">Sin cliente</h2>
        <div id="items-carrito" class="space-y-2 text-xs font-bold uppercase py-2">
            </div>
        <div class="flex justify-between items-baseline border-t pt-3 mt-3">
            <span class="text-xs font-black text-gray-400">TOTAL</span>
            <span id="total-txt" class="text-3xl font-black text-primary">$0.00</span>
        </div>
        <button id="btn-enviar" onclick="enviarPedido()" class="btn-magenta mt-4">CONFIRMAR PEDIDO</button>
    </section>
</main>

<nav class="fixed bottom-0 left-0 w-full bg-white border-t p-4 flex justify-around items-center z-[100]">
    <button onclick="window.location.href='DashboardLacteo.html'" class="flex flex-col items-center text-gray-400">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[8px] font-black uppercase">Inicio</span>
    </button>
    <button class="flex flex-col items-center text-primary">
        <span class="material-symbols-outlined">receipt_long</span>
        <span class="text-[8px] font-black uppercase">Ventas</span>
    </button>
    <button onclick="window.location.href='ControldeInventario.html'" class="flex flex-col items-center text-gray-400">
        <span class="material-symbols-outlined">inventory_2</span>
        <span class="text-[8px] font-black uppercase">Stock</span>
    </button>
    <button onclick="window.location.href='GestióndeDespachos.html'" class="flex flex-col items-center text-gray-400">
        <span class="material-symbols-outlined">local_shipping</span>
        <span class="text-[8px] font-black uppercase">Ruta</span>
    </button>
</nav>

<script>
let localData = { productos: [], carrito: {} };

async function cargar() {
    try {
        const [cl, pr] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario")
        ]);
        
        localData.productos = pr;

        // Llenar Clientes
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- CLIENTE --</option>';
        cl.forEach(c => sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`);

        // Llenar Productos
        const cont = document.getElementById('lista-productos');
        cont.innerHTML = "";
        pr.forEach(p => {
            const idBtn = p.Producto.replace(/\s+/g, '');
            cont.innerHTML += `
                <div class="card-sutil p-3">
                    <h4 class="text-[10px] font-black uppercase truncate mb-1">${p.Producto}</h4>
                    <p class="font-black text-lg">$${parseFloat(p.Precio_Venta).toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-xl p-1 mt-2">
                        <button onclick="sumar('${p.Producto}', -1)" class="w-8 h-8 bg-white rounded-lg font-black">-</button>
                        <span id="q-${idBtn}" class="font-black text-primary text-sm">0</span>
                        <button onclick="sumar('${p.Producto}', 1)" class="w-8 h-8 bg-white rounded-lg font-black">+</button>
                    </div>
                </div>`;
        });
        document.getElementById('loading').style.display = 'none';
    } catch(e) { alert("Error de carga. Revisa la URL de tu API."); }
}

function sumar(prod, d) {
    const actual = localData.carrito[prod] || 0;
    const nuevo = actual + d;
    if(nuevo >= 0) {
        localData.carrito[prod] = nuevo;
        document.getElementById(`q-${prod.replace(/\s+/g, '')}`).innerText = nuevo;
        actualizarResumen();
    }
}

function actualizarResumen() {
    const cont = document.getElementById('items-carrito');
    const cli = document.getElementById('select-cliente').value;
    document.getElementById('resumen-nombre').innerText = cli || "Sin cliente";
    
    cont.innerHTML = "";
    let total = 0;
    Object.entries(localData.carrito).forEach(([nom, cant]) => {
        if(cant > 0) {
            const p = localData.productos.find(x => x.Producto === nom);
            const sub = cant * parseFloat(p.Precio_Venta);
            total += sub;
            cont.innerHTML += `<div class="flex justify-between"><span>${nom} x${cant}</span><span>$${sub.toFixed(2)}</span></div>`;
        }
    });
    document.getElementById('total-txt').innerText = `$${total.toFixed(2)}`;
}

async function enviarPedido() {
    const cli = document.getElementById('select-cliente').value;
    if(!cli) return alert("Selecciona un cliente");
    
    const items = Object.entries(localData.carrito).filter(i => i[1] > 0);
    if(items.length === 0) return alert("Carrito vacío");

    const btn = document.getElementById('btn-enviar');
    btn.innerText = "ENVIANDO...";
    btn.disabled = true;

    const idVenta = "V-" + Math.floor(Math.random()*9999);

    try {
        for(const [nom, cant] of items) {
            const p = localData.productos.find(x => x.Producto === nom);
            await DairyAPI.enviarDatos("Ventas", {
                ID_Venta: idVenta,
                Cliente: cli,
                Producto: nom,
                Cantidad: cant,
                Precio_PVP: p.Precio_Venta,
                Estado: "PENDIENTE",
                Fecha_Entrega: new Date().toISOString().split('T')[0]
            });
        }
        alert("¡Venta registrada!");
        location.reload();
    } catch(e) {
        alert("Error al enviar.");
        btn.innerText = "CONFIRMAR PEDIDO";
        btn.disabled = false;
    }
}

window.onload = cargar;
</script>
</body>
</html>
