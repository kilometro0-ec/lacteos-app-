<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff", outline: "#e9d5ff" }
          }
        }
      }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; color: #1f012a; }
        
        .card-producto { 
            background: white; border-radius: 1rem; border: 1px solid #e9d5ff; 
            padding: 12px; display: flex; align-items: center; justify-content: space-between;
            gap: 10px; margin-bottom: 8px;
        }

        .input-sutil { 
            background-color: #fdfaff; border: 1.5px solid #f3e8ff; 
            border-radius: 0.75rem; padding: 0.7rem; width: 100%; font-weight: 600;
        }

        /* CARRITO FLOTANTE */
        #carrito-flotante {
            position: fixed; bottom: 65px; left: 10px; right: 10px;
            background: #a21caf; color: white; border-radius: 1.5rem;
            padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            z-index: 100; transition: all 0.3s ease;
            display: flex; flex-direction: column; gap: 8px;
        }
        
        /* Ajuste para que el menú de abajo no tape nada */
        #menu-container nav { height: 55px !important; }
    </style>
</head>
<body class="pb-60"> 

<header class="h-14 bg-white border-b border-outline flex justify-between items-center px-4 sticky top-0 z-40">
    <div>
        <h1 class="text-lg font-black text-primary italic uppercase leading-none">Ventas</h1>
        <span id="orden-header" class="text-[9px] font-mono font-bold text-slate-400">ID: ---</span>
    </div>
    <button onclick="location.reload()" class="text-primary"><span class="material-symbols-outlined">sync</span></button>
</header>

<main class="mt-4 px-4 max-w-xl mx-auto">
    <section class="bg-white p-4 rounded-2xl border border-outline mb-4">
        <div id="vista-seleccion-cliente">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-black text-primary uppercase">Cliente</span>
                <button onclick="alternarFormularioCliente(true)" class="text-[9px] font-bold text-secondary border border-secondary px-3 py-1 rounded-lg">NUEVO +</button>
            </div>
            <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil">
                <option value="">-- Seleccionar --</option>
            </select>
        </div>

        <div id="vista-nuevo-cliente" class="hidden space-y-3">
            <input type="text" id="reg-nombre" placeholder="Nombre del cliente" class="input-sutil">
            <div class="flex gap-2">
                <button onclick="guardarNuevoCliente()" class="flex-1 bg-primary text-white font-bold py-2 rounded-lg text-sm uppercase">Guardar</button>
                <button onclick="alternarFormularioCliente(false)" class="flex-1 bg-slate-100 text-slate-500 font-bold py-2 rounded-lg text-sm uppercase">Cancelar</button>
            </div>
        </div>
    </section>

    <div class="relative mb-4">
        <input type="text" id="buscarProducto" oninput="filtrarProductos()" placeholder="Buscar producto lácteo..." class="input-sutil pl-10">
        <span class="material-symbols-outlined absolute left-3 top-2.5 text-slate-300">search</span>
    </div>
    
    <div id="contenedor-productos" class="space-y-2"></div>
</main>

<div id="carrito-flotante">
    <div class="flex justify-between items-start border-b border-white/20 pb-2">
        <div class="flex-1">
            <p id="flotante-cliente" class="text-xs font-black uppercase truncate italic">SIN CLIENTE</p>
            <p id="flotante-id" class="text-[9px] font-mono opacity-80">ID: LL-0000</p>
        </div>
        <div class="text-right">
            <p id="flotante-items" class="text-[10px] font-black bg-white text-primary px-2 py-0.5 rounded-full inline-block">0 ÍTEMS</p>
            <p id="flotante-total" class="text-xl font-black">$0.00</p>
        </div>
    </div>
    
    <div class="flex gap-2 items-center">
        <input type="date" id="fecha-entrega" class="flex-1 bg-white/20 border-none rounded-lg text-[11px] font-bold text-white py-2 px-2">
        <button id="btn-finalizar" onclick="procesarVenta()" class="flex-[1.5] bg-secondary text-white font-black py-3 rounded-xl text-xs uppercase shadow-lg active:scale-95 transition-transform">
            Confirmar Pedido
        </button>
    </div>
</div>

<div id="menu-container"></div>

<script>
let carrito = {}; let productosData = []; let idOrdenActual = "";

async function iniciar() {
    const d = new Date();
    idOrdenActual = `LL-${d.getHours()}${d.getMinutes()}-${Math.floor(Math.random()*90+10)}`;
    document.getElementById('flotante-id').innerText = `ID: ${idOrdenActual}`;
    document.getElementById('orden-header').innerText = `ID: ${idOrdenActual}`;
    document.getElementById('fecha-entrega').value = new Date().toISOString().split('T')[0];

    try {
        const [cl, pr] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"), 
            DairyAPI.obtenerDatos("Inventario")
        ]);
        productosData = pr;
        const sel = document.getElementById('select-cliente');
        cl.sort((a,b)=>a.Nombre.localeCompare(b.Nombre)).forEach(c => { 
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`; 
        });
        renderizarProductos();
    } catch(e) { console.error(e); }
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); cont.innerHTML = "";
    productosData.forEach(p => {
        const stock = parseInt(p.Stock || 0);
        const idCant = `cant-${p.Producto.replace(/\s+/g,'-')}`;
        cont.innerHTML += `
            <div class="card-producto">
                <div class="flex-1">
                    <h4 class="font-black text-xs uppercase text-slate-700 leading-tight">${p.Producto}</h4>
                    <div class="flex items-center gap-3 mt-1">
                        <span class="text-sm font-black text-primary">$${parseFloat(p.Precio_Venta).toFixed(2)}</span>
                        <span class="text-[10px] font-bold ${stock < 5 ? 'text-red-500' : 'text-slate-400'}">STOCK: ${stock}</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 bg-slate-50 p-1 rounded-xl border border-outline">
                    <button onclick="cambiarCant('${p.Producto}',-1)" class="w-10 h-10 bg-white rounded-lg shadow-sm font-black text-xl text-primary">-</button>
                    <span id="${idCant}" class="w-6 text-center font-black text-lg">0</span>
                    <button onclick="cambiarCant('${p.Producto}',1)" class="w-10 h-10 bg-white rounded-lg shadow-sm font-black text-xl text-primary">+</button>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    const stock = parseInt(p.Stock || 0);
    if(carrito[n]+d >= 0 && (carrito[n]+d <= stock)) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g,'-')}`).innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    let t = 0; let totalItems = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            t += (carrito[n] * parseFloat(p.Precio_Venta));
            totalItems += carrito[n];
        }
    });
    document.getElementById('flotante-total').innerText = `$${t.toFixed(2)}`;
    document.getElementById('flotante-items').innerText = `${totalItems} ÍTEMS`;
}

function alternarFormularioCliente(mostrar) {
    document.getElementById('vista-seleccion-cliente').classList.toggle('hidden', mostrar);
    document.getElementById('vista-nuevo-cliente').classList.toggle('hidden', !mostrar);
}

async function guardarNuevoCliente() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    if(!nombre) return alert("Escribe el nombre");
    try {
        await DairyAPI.enviarDatos("Clientes", { Nombre: nombre });
        location.reload();
    } catch(e) { alert("Error"); }
}

function actualizarNombreCarrito() { 
    const val = document.getElementById('select-cliente').value;
    document.getElementById('flotante-cliente').innerText = val || "SIN CLIENTE"; 
}

function filtrarProductos() {
    const q = document.getElementById('buscarProducto').value.toLowerCase();
    document.querySelectorAll('.card-producto').forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
    });
}

async function procesarVenta() {
    const cli = document.getElementById('select-cliente').value;
    const fec = document.getElementById('fecha-entrega').value;
    if(!cli || !fec || document.getElementById('flotante-items').innerText === "0 ÍTEMS") 
        return alert("Seleccione cliente, fecha y productos");
    
    const btn = document.getElementById('btn-finalizar');
    btn.innerText = "PROCESANDO..."; btn.disabled = true;

    try {
        for(const n in carrito) {
            if(carrito[n] > 0) {
                const p = productosData.find(x => x.Producto === n);
                await DairyAPI.enviarDatos("Ventas", { 
                    ID_Venta: idOrdenActual, Cliente: cli, Producto: n, 
                    Cantidad: carrito[n], Precio_PVP: p.Precio_Venta, Fecha_Entrega: fec, Estado: "PENDIENTE" 
                });
            }
        }
        alert("¡Venta Exitosa!"); location.reload();
    } catch(e) { alert("Error"); btn.disabled = false; btn.innerText = "Confirmar Pedido"; }
}

window.onload = iniciar;
</script>
</body>
</html>
