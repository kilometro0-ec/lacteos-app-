<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a21caf">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff", outline: "#e9d5ff" }
          }
        }
      }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; color: #1f012a; }
        .card-sutil { background: white; border-radius: 2.5rem; border: 1px solid #e9d5ff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); }
        .input-sutil { background-color: #fdfaff; border: 1.5px solid #f3e8ff; border-radius: 2rem; padding: 1rem 1.5rem; width: 100%; transition: all 0.3s ease; font-size: 14px; color: #4a5568; outline: none; }
        .input-sutil:focus { border-color: #a21caf; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; text-transform: uppercase; border-radius: 2rem; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 12px; border: none; cursor: pointer; }
        .btn-magenta:active { transform: scale(0.96); }
        .btn-magenta:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(250, 245, 255, 0.95);
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .vaca-animada { width: 120px; animation: vaca-bounce 1.5s infinite ease-in-out; }
        @keyframes vaca-bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-10px); } }
        .spin-animation { animation: spin 0.8s ease-in-out; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Estilos para resaltar el botón activo que viene del menú externo */
        .active-nav { color: #a21caf !important; font-weight: 900; }
        .active-nav .icon-box { background-color: #f5f3ff !important; transform: translateY(-5px); }
    </style>
</head>
<body class="pb-44"> 

<div id="loading-overlay">
    <img src="https://cdn-icons-png.flaticon.com/512/2395/2395796.png" alt="Cargando..." class="vaca-animada">
    <p class="mt-4 text-primary font-black uppercase tracking-[0.2em] text-[10px] animate-pulse">Lógica Láctea Sincronizando...</p>
</div>

<header class="h-16 bg-white/80 backdrop-blur-md border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase">Ventas</h1>
        <p id="estado-carga" class="text-[8px] font-black text-secondary uppercase">Conectado</p>
    </div>
    <div class="flex items-center gap-2">
        <button onclick="recargarPagina()" id="btn-sync" class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-primary transition-all">
            <span class="material-symbols-outlined" id="icon-sync">sync</span>
        </button>
        <button onclick="window.location.href='DashboardLacteo.html'" class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg">
            <span class="material-symbols-outlined">home</span>
        </button>
    </div>
</header>

<main id="main-content" class="mt-6 px-4 max-w-6xl mx-auto">
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="card-sutil p-5 flex flex-col items-center border-b-4 border-b-primary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Pedidos Pendientes</span>
            <span id="card-pedidos-pendientes" class="text-3xl font-black text-primary tracking-tighter">0</span>
        </div>
        <div class="card-sutil p-5 flex flex-col items-center border-b-4 border-b-secondary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Unidades x Despachar</span>
            <span id="card-productos-total" class="text-3xl font-black text-secondary tracking-tighter">0</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="card-sutil p-6">
                <div id="vista-seleccion-cliente">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <span class="text-[10px] font-black text-primary uppercase tracking-widest">Cliente</span>
                        <button onclick="alternarFormularioCliente(true)" class="text-[9px] font-black text-white bg-secondary px-4 py-2 rounded-full">+ NUEVO</button>
                    </div>
                    <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil text-base font-bold">
                        <option value="">-- Seleccionar --</option>
                    </select>
                </div>

                <div id="vista-nuevo-cliente" class="hidden space-y-3">
                    <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-sutil">
                    <input type="text" id="reg-ci" placeholder="CI / RUC" class="input-sutil">
                    <input type="tel" id="reg-telefono" placeholder="Teléfono" class="input-sutil">
                    <input type="text" id="reg-direccion" placeholder="Dirección" class="input-sutil">
                    <div class="flex gap-2">
                        <button onclick="alternarFormularioCliente(false)" class="w-1/3 bg-slate-100 text-slate-400 font-black py-4 rounded-2xl text-[10px]">CANCELAR</button>
                        <button id="btn-reg-cliente" onclick="guardarNuevoCliente()" class="w-2/3 btn-magenta py-4">GUARDAR</button>
                    </div>
                </div>
            </section>

            <div class="px-1 relative">
                <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary opacity-40">search</span>
                <input type="text" id="buscarProducto" oninput="filtrarProductos()" placeholder="Buscar producto..." class="input-sutil pl-12">
            </div>
            
            <section id="contenedor-productos" class="grid grid-cols-2 gap-4"></section>
        </div>

        <div class="lg:col-span-5">
            <section class="card-sutil overflow-hidden sticky top-24">
                <div class="bg-gradient-to-br from-primary to-purple-700 p-6 text-white text-center">
                    <h2 id="num-orden" class="text-xs font-mono opacity-60 mb-2">---</h2>
                    <h2 id="cliente-resumen" class="text-xl font-black uppercase truncate tracking-tighter">SIN SELECCIONAR</h2>
                    <input type="date" id="fecha-entrega" class="w-full mt-4 font-bold text-black py-2 px-3 rounded-xl border-none">
                </div>
                <div class="p-6 space-y-6">
                    <div id="lista-carrito" class="space-y-2 max-h-60 overflow-y-auto">
                        <div id="carrito-vacio" class="text-center py-4 text-slate-300 italic text-xs">Carrito vacío</div>
                    </div>
                    <div class="flex justify-between items-end border-t pt-4">
                        <span class="text-xs font-black text-slate-400">TOTAL</span>
                        <span id="total-venta" class="text-4xl font-black text-slate-900">$0.00</span>
                    </div>
                    <button id="btn-finalizar" onclick="procesarVenta()" class="w-full btn-magenta py-5 text-lg">CONFIRMAR PEDIDO</button>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="menu-container"></div>

<script>
let carrito = {}; 
let productosData = []; 
let idOrdenActual = "";

// FUNCIÓN PARA CARGAR EL MENÚ EXTERNO
async function cargarMenu() {
    try {
        const response = await fetch('menu.html');
        const text = await response.text();
        const contenedor = document.getElementById('menu-container');
        contenedor.innerHTML = text;

        const urlActual = window.location.href.toLowerCase();
        const botones = contenedor.querySelectorAll('.nav-link');
        
        botones.forEach(btn => {
            const dataPath = btn.getAttribute('data-path').toLowerCase();
            // Si la URL contiene "ventas", marcamos este botón como activo
            if (urlActual.includes(dataPath)) {
                btn.classList.add('active-nav');
                btn.classList.remove('text-gray-400');
            }
        });
    } catch (e) { console.error("Error cargando menú:", e); }
}

function recargarPagina() {
    document.getElementById('icon-sync').classList.add('spin-animation');
    location.reload();
}

async function iniciar() {
    cargarMenu(); // Cargamos el menú apenas inicia
    const d = new Date();
    idOrdenActual = `LL-${d.getHours()}${d.getMinutes()}-${Math.floor(Math.random()*90+10)}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
    document.getElementById('fecha-entrega').value = new Date().toISOString().split('T')[0];

    try {
        const [cl, pr, vnt] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes").catch(() => []), 
            DairyAPI.obtenerDatos("Inventario").catch(() => []),
            DairyAPI.obtenerDatos("Ventas").catch(() => [])
        ]);
        
        productosData = pr || [];
        
        const pendientes = (vnt || []).filter(v => v && v.Estado === "PENDIENTE");
        document.getElementById('card-pedidos-pendientes').innerText = [...new Set(pendientes.map(v => v.ID_Venta))].length;
        document.getElementById('card-productos-total').innerText = pendientes.reduce((acc, v) => acc + (parseInt(v.Cantidad) || 0), 0);

        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        (cl || []).filter(c => c && c.Nombre).sort((a,b)=>a.Nombre.localeCompare(b.Nombre)).forEach(c => { 
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`; 
        });
        
        renderizarProductos();
        ocultarLoader();

    } catch(e) { 
        console.error(e);
        document.getElementById('estado-carga').innerText = "Error de sincronización";
        ocultarLoader();
    }
}

function ocultarLoader() {
    const loader = document.getElementById('loading-overlay');
    if(loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.classList.add('hidden'), 500);
    }
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); 
    cont.innerHTML = "";
    productosData.forEach(p => {
        if(!p.Producto) return;
        const s = parseInt(p.Stock) || 0;
        const idCant = `cant-${p.Producto.replace(/\s+/g,'')}`;
        cont.innerHTML += `
            <div class="card-sutil p-4 flex flex-col justify-between min-h-[170px] ${s <= 0 ? 'opacity-40 grayscale' : ''}">
                <h4 class="font-black text-[11px] uppercase text-primary mb-2">${p.Producto}</h4>
                <div>
                    <p class="text-xl font-black text-slate-800">$${parseFloat(p.Precio_Venta || 0).toFixed(2)}</p>
                    <p class="text-[8px] font-bold text-slate-400 mb-2">STOCK: ${s}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-2xl p-1 mt-2">
                        <button onclick="cambiarCant('${p.Producto}',-1)" class="w-7 h-7 bg-white rounded-lg text-primary font-black">-</button>
                        <span id="${idCant}" class="font-black text-primary text-xs">0</span>
                        <button onclick="cambiarCant('${p.Producto}',1)" class="w-7 h-7 bg-white rounded-lg text-primary font-black">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    if(!p) return;
    if(carrito[n]+d >= 0 && (carrito[n]+d <= (parseInt(p.Stock) || 0))) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const l = document.getElementById('lista-carrito'); 
    l.innerHTML = ""; 
    let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * parseFloat(p.Precio_Venta || 0);
            t += sub;
            l.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-purple-50 rounded-xl text-[10px] font-black uppercase">
                    <span>${n} (x${carrito[n]})</span>
                    <span>$${sub.toFixed(2)}</span>
                </div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').classList.toggle('hidden', t > 0);
}

async function procesarVenta() {
    const cli = document.getElementById('select-cliente').value;
    const fec = document.getElementById('fecha-entrega').value;
    const btn = document.getElementById('btn-finalizar');

    if(!cli || !fec) return alert("Selecciona cliente y fecha.");
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("Carrito vacío.");
    
    btn.innerText = "PROCESANDO...";
    btn.disabled = true;

    try {
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n);
            await DairyAPI.enviarDatos("Ventas", { 
                ID_Venta: idOrdenActual, 
                Cliente: cli, 
                Producto: n, 
                Cantidad: carrito[n], 
                Precio_PVP: p.Precio_Venta, 
                Fecha_Entrega: fec, 
                Estado: "PENDIENTE" 
            });
        }
        alert("Pedido guardado.");
        location.reload();
    } catch(e) { 
        alert("Error al guardar."); 
        btn.innerText = "CONFIRMAR PEDIDO";
        btn.disabled = false;
    }
}

function alternarFormularioCliente(m) {
    document.getElementById('vista-seleccion-cliente').classList.toggle('hidden', m);
    document.getElementById('vista-nuevo-cliente').classList.toggle('hidden', !m);
}

async function guardarNuevoCliente() {
    const nom = document.getElementById('reg-nombre').value;
    const ci = document.getElementById('reg-ci').value;
    const tel = document.getElementById('reg-telefono').value;
    const dir = document.getElementById('reg-direccion').value;
    
    if(!nom) return alert("Ingresa el nombre.");
    const btn = document.getElementById('btn-reg-cliente');
    btn.disabled = true;
    btn.innerText = "...";

    try {
        await DairyAPI.enviarDatos("Clientes", { 
            Nombre: nom, 
            Identificacion: ci, 
            Telefono: tel, 
            Direccion: dir,
            Fecha_Registro: new Date().toLocaleString() 
        });
        alert("Cliente registrado.");
        recargarPagina();
    } catch(e) { 
        alert("Error."); 
        btn.disabled = false; 
        btn.innerText = "GUARDAR";
    }
}

function actualizarNombreCarrito() { 
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR"; 
}

function filtrarProductos() {
    const q = document.getElementById('buscarProducto').value.toLowerCase();
    document.querySelectorAll('#contenedor-productos > div').forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
    });
}

window.onload = iniciar;
</script>
</body>
</html>
