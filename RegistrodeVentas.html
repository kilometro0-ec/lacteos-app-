<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; color: #1f012a; }
        .card-sutil { background: white; border-radius: 2.5rem; border: 1px solid #e9d5ff; }
        .input-sutil { background-color: #fdfaff; border: 1.5px solid #f3e8ff; border-radius: 2rem; padding: 1rem 1.5rem; width: 100%; transition: all 0.3s ease; font-size: 14px; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; text-transform: uppercase; border-radius: 2rem; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; }
        .btn-magenta:active { transform: scale(0.96); }
        .active-nav { color: #a21caf !important; }
        
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(250, 245, 255, 0.95);
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }

        .vaca-animada { width: 100px; animation: vaca-bounce 1.5s infinite ease-in-out; }
        @keyframes vaca-bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-10px); } }
        .spin-animation { animation: spin 0.8s ease-in-out; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-44"> 

<div id="loading-overlay">
    <img src="https://cdn-icons-png.flaticon.com/512/2395/2395796.png" alt="Cargando..." class="vaca-animada">
    <p class="mt-4 text-primary font-black uppercase tracking-[0.2em] text-[10px] animate-pulse">Sincronizando Inventario...</p>
</div>

<header class="h-16 bg-white/80 backdrop-blur-md border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase">Ventas</h1>
        <p id="estado-carga" class="text-[8px] font-black text-secondary uppercase">Conectado</p>
    </div>
    <button onclick="recargarPagina()" class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-primary">
        <span class="material-symbols-outlined" id="icon-sync">sync</span>
    </button>
</header>

<main class="mt-6 px-4 max-w-6xl mx-auto">
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="card-sutil p-5 flex flex-col items-center border-b-4 border-b-primary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Pedidos Hoy</span>
            <span id="card-pedidos-pendientes" class="text-3xl font-black text-primary">0</span>
        </div>
        <div class="card-sutil p-5 flex flex-col items-center border-b-4 border-b-secondary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Stock General</span>
            <span id="card-productos-total" class="text-3xl font-black text-secondary">0</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="card-sutil p-6">
                <div id="vista-seleccion-cliente">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <span class="text-[10px] font-black text-primary uppercase tracking-widest">Cliente</span>
                        <button onclick="alternarFormularioCliente(true)" class="text-[9px] font-black text-white bg-secondary px-4 py-2 rounded-full">+ NUEVO</button>
                    </div>
                    <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil text-base font-bold"></select>
                </div>

                <div id="vista-nuevo-cliente" class="hidden space-y-4">
                    <input type="text" id="reg-nombre" placeholder="Nombre del Cliente" class="input-sutil">
                    <div class="flex gap-2">
                        <button onclick="alternarFormularioCliente(false)" class="w-1/2 bg-slate-100 text-slate-400 font-black py-4 rounded-2xl text-[10px]">CANCELAR</button>
                        <button onclick="guardarNuevoCliente()" class="w-1/2 btn-magenta py-4">GUARDAR</button>
                    </div>
                </div>
            </section>

            <div class="px-1 relative">
                <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary opacity-40">search</span>
                <input type="text" id="buscarProducto" oninput="filtrarProductos()" placeholder="Buscar producto..." class="input-sutil pl-12">
            </div>
            
            <section id="contenedor-productos" class="grid grid-cols-2 gap-4"></section>
        </div>

        <div class="lg:col-span-5">
            <section class="card-sutil overflow-hidden sticky top-24 shadow-xl">
                <div class="bg-primary p-6 text-white text-center">
                    <h2 id="num-orden" class="text-xs font-mono opacity-60 mb-2">---</h2>
                    <h2 id="cliente-resumen" class="text-xl font-black uppercase truncate">SIN SELECCIONAR</h2>
                    <input type="date" id="fecha-entrega" class="w-full mt-4 font-bold text-black py-2 px-3 rounded-xl">
                </div>
                <div class="p-6 space-y-6">
                    <div id="lista-carrito" class="space-y-2 max-h-60 overflow-y-auto">
                        <div id="carrito-vacio" class="text-center py-4 text-slate-300 italic text-xs">Carrito vacío</div>
                    </div>
                    <div class="flex justify-between items-end border-t pt-4">
                        <span class="text-xs font-black text-slate-400">TOTAL</span>
                        <span id="total-venta" class="text-4xl font-black text-slate-900">$0.00</span>
                    </div>
                    <button id="btn-finalizar" onclick="procesarVenta()" class="w-full btn-magenta py-5 text-lg">CONFIRMAR PEDIDO</button>
                </div>
            </section>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-purple-100 pb-8 pt-4 z-[100]">
    <div class="flex justify-around items-center max-w-lg mx-auto">
        <button onclick="window.location.href='DashboardLacteo.html'" class="text-slate-400 flex flex-col items-center gap-1">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Panel</span>
        </button>
        <button onclick="window.location.href='Ventas.html'" class="active-nav flex flex-col items-center gap-1">
            <span class="material-symbols-outlined">receipt_long</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Ventas</span>
        </button>
        <button onclick="window.location.href='ControldeInventario.html'" class="text-slate-400 flex flex-col items-center gap-1">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Stock</span>
        </button>
        <button onclick="window.location.href='Finanzas.html'" class="text-slate-400 flex flex-col items-center gap-1">
            <span class="material-symbols-outlined">payments</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Finanzas</span>
        </button>
    </div>
</nav>

<script>
let carrito = {}; 
let productosData = []; 
let idOrdenActual = "";

function recargarPagina() {
    document.getElementById('icon-sync').classList.add('spin-animation');
    location.reload();
}

async function iniciar() {
    const d = new Date();
    idOrdenActual = `ORD-${d.getHours()}${d.getMinutes()}${d.getSeconds()}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
    document.getElementById('fecha-entrega').value = new Date().toISOString().split('T')[0];

    try {
        const [cl, pr, vnt] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"), 
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);
        
        // CORRECCIÓN DE NOMBRES DE PROPIEDADES (Case Insensitive)
        productosData = pr.map(item => ({
            Producto: item.Producto || item.producto,
            Precio_Venta: parseFloat(item.Precio_Venta || item.precio_venta || 0),
            Stock: parseInt(item.Stock || item.stock || 0)
        }));
        
        // Actualizar indicadores
        const pendientes = vnt.filter(v => (v.Estado || v.estado) === "PENDIENTE");
        document.getElementById('card-pedidos-pendientes').innerText = [...new Set(pendientes.map(v => v.ID_Venta || v.id_venta))].length;
        document.getElementById('card-productos-total').innerText = productosData.reduce((acc, p) => acc + p.Stock, 0);

        // Llenar Clientes
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        cl.forEach(c => { 
            const nombre = c.Nombre || c.nombre;
            sel.innerHTML += `<option value="${nombre}">${nombre}</option>`; 
        });
        
        renderizarProductos();
        document.getElementById('loading-overlay').classList.add('hidden');

    } catch(e) { 
        console.error(e);
        document.getElementById('loading-overlay').innerHTML = `<p class="text-red-500 font-bold">Error al conectar con la base de datos</p>`;
    }
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); 
    cont.innerHTML = "";
    productosData.forEach(p => {
        const idCant = `cant-${p.Producto.replace(/\s+/g,'')}`;
        cont.innerHTML += `
            <div class="card-sutil p-4 flex flex-col justify-between min-h-[160px] ${p.Stock <= 0 ? 'opacity-40' : 'shadow-sm'}">
                <h4 class="font-black text-[11px] uppercase text-primary leading-tight">${p.Producto}</h4>
                <div>
                    <p class="text-xl font-black text-slate-800">$${p.Precio_Venta.toFixed(2)}</p>
                    <p class="text-[9px] font-bold text-secondary">DISPONIBLE: ${p.Stock}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-2xl p-1 mt-2">
                        <button onclick="cambiarCant('${p.Producto}',-1)" class="w-8 h-8 bg-white rounded-xl text-primary font-black shadow-sm">-</button>
                        <span id="${idCant}" class="font-black text-primary text-sm">0</span>
                        <button onclick="cambiarCant('${p.Producto}',1)" class="w-8 h-8 bg-white rounded-xl text-primary font-black shadow-sm">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    if(carrito[n]+d >= 0 && (carrito[n]+d <= p.Stock)) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const l = document.getElementById('lista-carrito'); 
    l.innerHTML = ""; 
    let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * p.Precio_Venta;
            t += sub;
            l.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-purple-50 rounded-xl text-[10px] font-black uppercase">
                    <span>${n} (x${carrito[n]})</span>
                    <span>$${sub.toFixed(2)}</span>
                </div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').classList.toggle('hidden', t > 0);
}

async function procesarVenta() {
    const cli = document.getElementById('select-cliente').value;
    const fec = document.getElementById('fecha-entrega').value;
    if(!cli || !fec) return alert("Selecciona cliente y fecha.");

    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("Carrito vacío.");
    
    document.getElementById('btn-finalizar').innerText = "GUARDANDO...";
    document.getElementById('btn-finalizar').disabled = true;

    try {
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n);
            await DairyAPI.enviarDatos("Ventas", { 
                ID_Venta: idOrdenActual, 
                Cliente: cli, 
                Producto: n, 
                Cantidad: carrito[n], 
                Precio_PVP: p.Precio_Venta, 
                Fecha_Entrega: fec, 
                Estado: "PENDIENTE" 
            });
        }
        alert("¡Pedido registrado!");
        location.reload();
    } catch(e) { 
        alert("Error al guardar.");
        document.getElementById('btn-finalizar').disabled = false;
    }
}

function alternarFormularioCliente(m) {
    document.getElementById('vista-seleccion-cliente').classList.toggle('hidden', m);
    document.getElementById('vista-nuevo-cliente').classList.toggle('hidden', !m);
}

async function guardarNuevoCliente() {
    const nom = document.getElementById('reg-nombre').value;
    if(!nom) return alert("Nombre obligatorio");
    try {
        await DairyAPI.enviarDatos("Clientes", { Nombre: nom });
        location.reload();
    } catch(e) { alert("Error"); }
}

function actualizarNombreCarrito() { 
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR"; 
}

function filtrarProductos() {
    const q = document.getElementById('buscarProducto').value.toLowerCase();
    document.querySelectorAll('#contenedor-productos > div').forEach(c => {
        c.classList.toggle('hidden', !c.innerText.toLowerCase().includes(q));
    });
}

window.onload = iniciar;
</script>
</body>
</html>
