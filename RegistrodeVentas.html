<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea - Vender</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; }
        .card-item { background: white; border-radius: 2rem; border: 2px solid #e9d5ff; transition: all 0.2s; }
        .rotate-animation { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { display: none; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 3rem 3rem 0 0; padding: 2rem; max-height: 90vh; }
        
        .carrito-container { background: #fdf4ff; border-top: 4px solid #a21caf; border-radius: 2.5rem 2.5rem 0 0; }
    </style>
</head>

<body class="pb-[350px]">

<header class="fixed top-0 w-full h-16 bg-white border-b border-purple-100 flex justify-between items-center px-4 z-50 shadow-sm">
    <div class="flex items-center gap-3" onclick="window.location.href='DashboardLacteo.html'">
        <span class="material-symbols-outlined text-[#a21caf]">arrow_back_ios</span>
        <h1 class="text-xl font-black text-[#a21caf] uppercase tracking-tighter">Nueva Venta</h1>
    </div>
    <button onclick="window.location.href='index.html'" class="p-2 text-[#a21caf] bg-purple-50 rounded-xl active:scale-90 transition-all">
        <span class="material-symbols-outlined">home</span>
    </button>
</header>

<main class="pt-20 px-4 space-y-6 max-w-2xl mx-auto">
    <section class="bg-white p-6 rounded-[2.5rem] border-2 border-[#e9d5ff] shadow-sm space-y-4">
        <div class="flex justify-between items-end gap-2">
            <div class="flex-1">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-2 tracking-widest">Cliente</label>
                <select id="cliente-select" onchange="actualizarTotales()" class="w-full border-none bg-purple-50 rounded-2xl p-4 font-bold text-gray-700 mt-1">
                    <option value="">Cargando...</option>
                </select>
            </div>
            <button onclick="abrirModalCliente()" class="bg-[#a21caf] text-white p-4 rounded-2xl shadow-lg active:scale-90">
                <span class="material-symbols-outlined">person_add</span>
            </button>
        </div>
        <div>
            <label class="text-[10px] font-black uppercase text-gray-400 ml-2 tracking-widest">Fecha de Entrega Deseada</label>
            <input type="date" id="fecha-entrega" class="w-full border-none bg-purple-50 rounded-2xl p-4 font-bold text-gray-700 mt-1">
        </div>
    </section>

    <div class="relative">
        <input type="text" id="busqueda" oninput="filtrarProductos()" placeholder="Buscar producto..." 
               class="w-full bg-white border-2 border-[#e9d5ff] rounded-2xl p-4 pl-12 font-bold outline-none focus:border-[#a21caf]">
        <span class="material-symbols-outlined absolute left-4 top-4 text-gray-400">search</span>
    </div>

    <div id="lista-productos" class="grid grid-cols-1 gap-3"></div>
</main>

<div id="panel-carrito" class="fixed bottom-20 left-0 w-full z-40 carrito-container p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
    <div class="max-w-2xl mx-auto space-y-3">
        <div id="carrito-detalle" class="max-h-40 overflow-y-auto space-y-2">
            </div>

        <div class="flex justify-between items-center border-t border-purple-200 pt-3">
            <div>
                <p class="text-[10px] font-black text-gray-400 uppercase">Total a Cobrar</p>
                <p class="text-2xl font-black text-[#a21caf]" id="total-final">$0.00</p>
            </div>
            <div class="flex gap-2 w-1/2">
                <button id="btn-whatsapp" onclick="enviarWhatsApp()" class="hidden bg-green-500 text-white p-4 rounded-2xl shadow-lg flex-1 font-black text-[10px] uppercase flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined">share</span> WhatsApp
                </button>
                <button id="btn-finalizar" onclick="finalizarVenta()" 
                        class="flex-1 bg-[#a21caf] text-white py-4 rounded-2xl font-black shadow-lg uppercase text-[10px] active:scale-95">
                    Confirmar
                </button>
            </div>
        </div>
    </div>
</div>

<div id="modal-cliente" class="modal-overlay">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-[#a21caf] uppercase">Nuevo Cliente</h2>
            <button onclick="cerrarModalCliente()" class="text-gray-400"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="space-y-4">
            <input type="text" id="new-nombre" placeholder="Nombre Completo" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <input type="text" id="new-ci" placeholder="CI o RUC" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <input type="tel" id="new-tel" placeholder="WhatsApp (Ej: 099...)" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <input type="text" id="new-dir" placeholder="Dirección" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <button id="btn-guardar-cliente" onclick="guardarNuevoCliente()" class="w-full bg-[#a21caf] text-white py-4 rounded-2xl font-black uppercase shadow-lg">Guardar y Seleccionar</button>
        </div>
    </div>
</div>

<div id="menu-container"></div>

<script>
let productosMaster = [];
let carrito = [];
let currentIDVenta = "V-" + Date.now().toString().slice(-6);

async function inicializar() {
    document.getElementById('fecha-entrega').valueAsDate = new Date();
    await cargarClientes();
    await cargarInventario();
    actualizarTotales();
}

async function cargarClientes() {
    const clientes = await DairyAPI.obtenerDatos("Clientes");
    const select = document.getElementById('cliente-select');
    if (clientes) {
        select.innerHTML = '<option value="">-- Seleccionar --</option>';
        clientes.forEach(c => select.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`);
    }
}

async function cargarInventario() {
    const inv = await DairyAPI.obtenerDatos("Inventario");
    if (inv) {
        productosMaster = inv.map(p => ({
            ...p,
            Precio_Venta: parseFloat(String(p.Precio_Venta || 0).replace(',', '.')),
            Stock: parseFloat(String(p.Stock || 0).replace(',', '.'))
        }));
        renderizarProductos(productosMaster);
    }
}

function renderizarProductos(lista) {
    const container = document.getElementById('lista-productos');
    container.innerHTML = "";
    lista.forEach(p => {
        const item = carrito.find(i => i.ID === p.ID);
        const cant = item ? item.cantidad : 0;
        container.innerHTML += `
            <div class="card-item p-4 flex items-center justify-between">
                <div class="flex-1">
                    <h3 class="font-black text-gray-800 uppercase text-xs">${p.Producto}</h3>
                    <p class="text-[#a21caf] font-black text-lg">$${p.Precio_Venta.toFixed(2)}</p>
                </div>
                <div class="flex items-center gap-3 bg-purple-50 p-2 rounded-2xl">
                    <button onclick="cambiarCant('${p.ID}', -1)" class="w-10 h-10 rounded-xl bg-white text-[#a21caf] shadow-sm"><span class="material-symbols-outlined">remove</span></button>
                    <span class="font-black text-lg w-6 text-center">${cant}</span>
                    <button onclick="cambiarCant('${p.ID}', 1)" class="w-10 h-10 rounded-xl bg-[#a21caf] text-white shadow-sm"><span class="material-symbols-outlined">add</span></button>
                </div>
            </div>`;
    });
}

function cambiarCant(id, delta) {
    const prod = productosMaster.find(p => p.ID === id);
    let item = carrito.find(i => i.ID === id);
    if (!item && delta > 0) {
        carrito.push({ ...prod, cantidad: 1 });
    } else if (item) {
        item.cantidad += delta;
        if (item.cantidad <= 0) carrito = carrito.filter(i => i.ID !== id);
        else if (item.cantidad > prod.Stock) { alert("Stock insuficiente"); item.cantidad = prod.Stock; }
    }
    actualizarTotales();
    renderizarProductos(productosMaster);
}

function actualizarTotales() {
    const ahora = new Date();
    const fechaStr = ahora.toLocaleDateString();
    const horaStr = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const cliente = document.getElementById('cliente-select').value || "SIN SELECCIONAR";

    const total = carrito.reduce((acc, i) => acc + (i.Precio_Venta * i.cantidad), 0);
    document.getElementById('total-final').innerText = `$${total.toFixed(2)}`;
    
    const detalle = document.getElementById('carrito-detalle');
    
    let htmlEncabezado = `
        <div class="bg-white/50 p-3 rounded-2xl border border-purple-100 mb-3 text-[10px] font-bold text-[#a21caf] uppercase">
            <div class="flex justify-between"><span>ORDEN: ${currentIDVenta}</span> <span>${fechaStr} ${horaStr}</span></div>
            <div class="mt-1 text-gray-500">CLIENTE: ${cliente}</div>
        </div>
    `;

    if(carrito.length === 0) {
        detalle.innerHTML = htmlEncabezado + '<p class="text-center text-gray-400 text-[10px] py-2 italic uppercase">Carrito vacío</p>';
    } else {
        detalle.innerHTML = htmlEncabezado + carrito.map(i => `
            <div class="flex justify-between text-[11px] font-bold uppercase mb-1">
                <span class="text-gray-600">${i.cantidad}x ${i.Producto}</span>
                <span class="text-[#a21caf] font-black">$${(i.cantidad * i.Precio_Venta).toFixed(2)}</span>
            </div>
        `).join('');
    }
}

async function guardarNuevoCliente() {
    const btn = document.getElementById('btn-guardar-cliente');
    const n = document.getElementById('new-nombre').value.trim();
    if(!n) return alert("Nombre obligatorio");
    
    btn.disabled = true;
    btn.innerText = "GUARDANDO...";

    const payload = {
        pestaña: "Clientes",
        Nombre: n,
        CI_RUC: document.getElementById('new-ci').value,
        Teléfono: document.getElementById('new-tel').value,
        Dirección: document.getElementById('new-dir').value
    };

    try {
        await DairyAPI.guardarDatos(payload);
        await cargarClientes();
        document.getElementById('cliente-select').value = n;
        
        // Limpiar
        document.getElementById('new-nombre').value = "";
        document.getElementById('new-ci').value = "";
        document.getElementById('new-tel').value = "";
        document.getElementById('new-dir').value = "";
        
        cerrarModalCliente();
        actualizarTotales();
    } catch (e) {
        alert("Error al guardar");
    } finally {
        btn.disabled = false;
        btn.innerText = "Guardar y Seleccionar";
    }
}

async function finalizarVenta() {
    if (carrito.length === 0) return alert("Carrito vacío");
    const cli = document.getElementById('cliente-select').value;
    if (!cli) return alert("Selecciona cliente");

    const btn = document.getElementById('btn-finalizar');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined rotate-animation">sync</span>';

    try {
        const p = carrito.map(i => DairyAPI.guardarDatos({
            pestaña: "Ventas", ID_Venta: currentIDVenta, Cliente: cli, Producto: i.Producto,
            Cantidad: i.cantidad, Precio_PVP: i.Precio_Venta, Fecha_Entrega: document.getElementById('fecha-entrega').value
        }));
        await Promise.all(p);
        
        document.getElementById('btn-whatsapp').classList.remove('hidden');
        btn.classList.add('hidden');
        alert("¡Venta Exitosa! Detalle listo para WhatsApp.");
    } catch (e) { alert("Error"); btn.disabled = false; btn.innerHTML = "Confirmar"; }
}

function enviarWhatsApp() {
    const cli = document.getElementById('cliente-select').value;
    const items = carrito.map(i => `*${i.cantidad}x* ${i.Producto} ($${i.Precio_Venta.toFixed(2)})`).join('%0A');
    const total = document.getElementById('total-final').innerText;
    const fecha = document.getElementById('fecha-entrega').value;

    const mensaje = `*LÓGICA LÁCTEA - PEDIDO*%0A%0A` +
                    `*ID:* ${currentIDVenta}%0A` +
                    `*Cliente:* ${cli}%0A` +
                    `*Entrega:* ${fecha}%0A%0A` +
                    `*PRODUCTOS:*%0A${items}%0A%0A` +
                    `*TOTAL: ${total}*%0A%0A` +
                    `¡Gracias por su compra! 🥛🧀`;

    window.open(`https://wa.me/?text=${mensaje}`, '_blank');
    setTimeout(() => { window.location.href = 'DashboardLacteo.html'; }, 1000);
}

function abrirModalCliente() { document.getElementById('modal-cliente').style.display = 'block'; }
function cerrarModalCliente() { document.getElementById('modal-cliente').style.display = 'none'; }
function filtrarProductos() {
    const b = document.getElementById('busqueda').value.toLowerCase();
    renderizarProductos(productosMaster.filter(p => p.Producto.toLowerCase().includes(b)));
}

window.onload = inicializar;
</script>
</body>
</html>
