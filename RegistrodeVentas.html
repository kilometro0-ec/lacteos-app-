<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea v19.0</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; }
        .card-item { background: white; border-radius: 2rem; border: 2px solid #e9d5ff; transition: all 0.3s; }
        
        /* Estado bloqueado */
        .bloqueado { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        
        @keyframes custom-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .sync-active { animation: custom-spin 0.8s ease-in-out; }
        
        @keyframes pulse-shimmer {
            0% { box-shadow: 0 0 0 0 rgba(162, 28, 175, 0.4); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(162, 28, 175, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(162, 28, 175, 0); transform: scale(1); }
        }
        .btn-animado { animation: pulse-shimmer 2s infinite; }

        ::-webkit-scrollbar { display: none; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 3rem 3rem 0 0; padding: 2rem; max-height: 90vh; }
        
        .carrito-container { 
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .carrito-visible { transform: translateY(0); }

        .stat-card { background: white; border: 2px solid #f3e8ff; border-radius: 1.5rem; padding: 0.75rem; display: flex; flex-direction: column; align-items: center; }
        #seccion-cliente { transition: all 0.3s ease; }
        .cliente-minimizado { max-height: 65px !important; opacity: 0.9; border-color: #a21caf; }
    </style>
</head>

<body class="pb-[420px]">

<header class="fixed top-0 w-full h-16 bg-white border-b border-purple-100 flex justify-between items-center px-4 z-50 shadow-sm">
    <div class="flex items-center gap-2">
        <h1 class="text-xl font-black text-[#a21caf] uppercase tracking-tighter italic">Lógica Láctea</h1>
    </div>
    <div class="flex items-center gap-2">
        <button id="btn-sync" onclick="refrescarPagina()" class="p-2 text-[#a21caf] bg-purple-50 rounded-xl transition-all">
            <span class="material-symbols-outlined">sync</span>
        </button>
        <button onclick="window.location.href='index.html'" class="p-2 text-[#a21caf] bg-purple-50 rounded-xl active:scale-90 transition-all">
            <span class="material-symbols-outlined">home</span>
        </button>
    </div>
</header>

<main class="pt-20 px-4 space-y-4 max-w-2xl mx-auto">
    <div class="grid grid-cols-2 gap-3">
        <div class="stat-card shadow-sm border-b-4 border-b-purple-400">
            <span class="text-[9px] font-black uppercase text-gray-400">Ventas Hoy</span>
            <span id="stat-ventas" class="text-xl font-black text-[#a21caf]">0</span>
        </div>
        <div class="stat-card shadow-sm border-b-4 border-b-purple-400">
            <span class="text-[9px] font-black uppercase text-gray-400">Unidades Hoy</span>
            <span id="stat-prods" class="text-xl font-black text-[#a21caf]">0</span>
        </div>
    </div>

    <section id="seccion-cliente" class="bg-white p-5 rounded-[2.5rem] border-4 border-dashed border-purple-200 shadow-sm space-y-4 overflow-hidden max-h-[300px]">
        <div class="flex justify-between items-center" onclick="toggleCliente()">
            <label id="label-cliente" class="text-[10px] font-black uppercase text-[#a21caf] tracking-widest">⚠️ Seleccione Cliente para empezar</label>
            <span id="icon-toggle" class="material-symbols-outlined text-purple-300">expand_less</span>
        </div>
        
        <div class="flex justify-between items-end gap-2">
            <div class="flex-1">
                <select id="cliente-select" onchange="activarVenta(this.value)" class="w-full border-none bg-purple-50 rounded-2xl p-4 font-bold text-gray-700 mt-1 ring-2 ring-purple-100 focus:ring-[#a21caf]">
                    <option value="">Cargando clientes...</option>
                </select>
            </div>
            <button onclick="abrirModalCliente()" class="bg-[#a21caf] text-white p-4 rounded-2xl shadow-lg active:scale-90">
                <span class="material-symbols-outlined">person_add</span>
            </button>
        </div>
    </section>

    <div id="contenedor-productos" class="bloqueado space-y-4">
        <div class="relative">
            <input type="text" id="busqueda" oninput="filtrarProductos()" placeholder="Buscar producto..." 
                   class="w-full bg-white border-2 border-[#e9d5ff] rounded-3xl p-4 pl-12 font-bold outline-none shadow-inner">
            <span class="material-symbols-outlined absolute left-4 top-4 text-gray-400">search</span>
        </div>
        <div id="lista-productos" class="grid grid-cols-1 gap-3"></div>
    </div>
</main>

<div id="panel-carrito" class="fixed bottom-20 left-0 w-full z-40 carrito-container bg-[#fdf4ff] border-top-4 border-[#a21caf] rounded-t-[2.5rem] p-6 shadow-[0_-15px_50px_rgba(162,28,175,0.2)]">
    <div class="max-w-2xl mx-auto space-y-4">
        <div id="carrito-detalle" class="max-h-40 overflow-y-auto space-y-2 pr-2"></div>

        <div class="bg-white p-3 rounded-2xl border border-purple-100 flex items-center justify-between">
            <label class="text-[9px] font-black uppercase text-gray-400 italic">Fecha Entrega:</label>
            <input type="date" id="fecha-entrega" class="border-none bg-transparent font-black text-[#a21caf] text-sm p-0 focus:ring-0">
        </div>

        <div class="flex justify-between items-center border-t border-purple-200 pt-3">
            <div>
                <p class="text-[10px] font-black text-gray-400 uppercase">Total Pedido</p>
                <p class="text-2xl font-black text-[#a21caf]" id="total-final">$0.00</p>
            </div>
            <div class="flex gap-2 w-1/2">
                <button id="btn-whatsapp" onclick="enviarWhatsApp()" class="hidden bg-green-500 text-white p-4 rounded-2xl shadow-lg flex-1 font-black text-[10px] uppercase flex items-center justify-center gap-1 btn-animado">
                    <span class="material-symbols-outlined">share</span> WhatsApp
                </button>
                <button id="btn-finalizar" onclick="finalizarVenta()" 
                        class="flex-1 bg-[#a21caf] text-white py-4 rounded-2xl font-black shadow-lg uppercase text-[10px] transition-all">
                    Confirmar
                </button>
            </div>
        </div>
    </div>
</div>

<div id="modal-cliente" class="modal-overlay">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-[#a21caf] uppercase italic">Nuevo Cliente</h2>
            <button onclick="cerrarModalCliente()" class="text-gray-400"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="space-y-4">
            <input type="text" id="new-nombre" placeholder="Nombre" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <input type="text" id="new-ci" placeholder="CI/RUC" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <input type="tel" id="new-tel" placeholder="WhatsApp" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <input type="text" id="new-dir" placeholder="Dirección" class="w-full bg-purple-50 border-none rounded-2xl p-4 font-bold">
            <button id="btn-guardar-cliente" onclick="guardarNuevoCliente()" class="w-full bg-[#a21caf] text-white py-4 rounded-2xl font-black uppercase">Guardar</button>
        </div>
    </div>
</div>

<div id="menu-container"></div>

<script>
let productosMaster = [];
let carrito = [];
let currentIDVenta = "V-" + Date.now().toString().slice(-6);

async function inicializar() {
    document.getElementById('fecha-entrega').valueAsDate = new Date();
    await cargarClientes();
    await cargarInventario();
    await cargarEstadisticasDia();
    actualizarTotales();
}

function activarVenta(val) {
    const contenedor = document.getElementById('contenedor-productos');
    const panel = document.getElementById('panel-carrito');
    const seccionCli = document.getElementById('seccion-cliente');
    const labelCli = document.getElementById('label-cliente');

    if(val) {
        contenedor.classList.remove('bloqueado');
        panel.classList.add('carrito-visible');
        seccionCli.classList.add('cliente-minimizado');
        seccionCli.style.borderStyle = "solid";
        labelCli.innerText = "👤 Cliente: " + val;
        document.getElementById('icon-toggle').innerText = 'expand_more';
    } else {
        contenedor.classList.add('bloqueado');
        panel.classList.remove('carrito-visible');
        seccionCli.classList.remove('cliente-minimizado');
        seccionCli.style.borderStyle = "dashed";
        labelCli.innerText = "⚠️ Seleccione Cliente para empezar";
    }
    actualizarTotales();
}

function refrescarPagina() {
    document.getElementById('btn-sync').classList.add('sync-active');
    setTimeout(() => window.location.reload(), 800);
}

function toggleCliente() {
    const sec = document.getElementById('seccion-cliente');
    const ico = document.getElementById('icon-toggle');
    sec.classList.toggle('cliente-minimizado');
    ico.innerText = sec.classList.contains('cliente-minimizado') ? 'expand_more' : 'expand_less';
}

async function cargarEstadisticasDia() {
    const ventas = await DairyAPI.obtenerDatos("Ventas");
    if (ventas) {
        const hoy = new Date().toLocaleDateString();
        const ventasHoy = ventas.filter(v => v.Fecha && new Date(v.Fecha).toLocaleDateString() === hoy);
        document.getElementById('stat-ventas').innerText = [...new Set(ventasHoy.map(v => v.ID_Venta))].length;
        document.getElementById('stat-prods').innerText = ventasHoy.reduce((acc, v) => acc + (parseFloat(v.Cantidad) || 0), 0).toFixed(0);
    }
}

async function cargarClientes() {
    const clientes = await DairyAPI.obtenerDatos("Clientes");
    const select = document.getElementById('cliente-select');
    if (clientes) {
        select.innerHTML = '<option value="">-- Buscar Cliente --</option>';
        clientes.forEach(c => select.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`);
    }
}

async function cargarInventario() {
    const inv = await DairyAPI.obtenerDatos("Inventario");
    if (inv) {
        productosMaster = inv.map(p => ({
            ...p,
            Precio_Venta: parseFloat(String(p.Precio_Venta || 0).replace(',', '.')),
            Stock: parseFloat(String(p.Stock || 0).replace(',', '.'))
        }));
        renderizarProductos(productosMaster);
    }
}

function renderizarProductos(lista) {
    const container = document.getElementById('lista-productos');
    container.innerHTML = "";
    lista.forEach(p => {
        const item = carrito.find(i => i.ID === p.ID);
        const cant = item ? item.cantidad : 0;
        container.innerHTML += `
            <div class="card-item p-4 flex items-center justify-between border-l-8 ${p.Stock <= 5 ? 'border-l-orange-400' : 'border-l-purple-400'}">
                <div class="flex-1">
                    <h3 class="font-black text-gray-800 uppercase text-xs">${p.Producto}</h3>
                    <div class="flex items-center gap-2">
                        <span class="text-[#a21caf] font-black text-lg">$${p.Precio_Venta.toFixed(2)}</span>
                        <span class="text-[9px] bg-gray-100 px-2 rounded-full font-bold text-gray-400">Stock: ${p.Stock}</span>
                    </div>
                </div>
                <div class="flex items-center gap-3 bg-purple-50 p-2 rounded-2xl">
                    <button onclick="cambiarCant('${p.ID}', -1)" class="w-10 h-10 rounded-xl bg-white text-[#a21caf] shadow-sm"><span class="material-symbols-outlined">remove</span></button>
                    <span class="font-black text-lg w-6 text-center">${cant}</span>
                    <button onclick="cambiarCant('${p.ID}', 1)" class="w-10 h-10 rounded-xl bg-[#a21caf] text-white shadow-sm"><span class="material-symbols-outlined">add</span></button>
                </div>
            </div>`;
    });
}

function cambiarCant(id, delta) {
    const prod = productosMaster.find(p => p.ID === id);
    let item = carrito.find(i => i.ID === id);
    if (!item && delta > 0) carrito.push({ ...prod, cantidad: 1 });
    else if (item) {
        item.cantidad += delta;
        if (item.cantidad <= 0) carrito = carrito.filter(i => i.ID !== id);
        else if (item.cantidad > prod.Stock) { alert("Stock insuficiente"); item.cantidad = prod.Stock; }
    }
    actualizarTotales();
    renderizarProductos(productosMaster);
}

function actualizarTotales() {
    const ahora = new Date();
    const totalDinero = carrito.reduce((acc, i) => acc + (i.Precio_Venta * i.cantidad), 0);
    const totalUnidades = carrito.reduce((acc, i) => acc + i.cantidad, 0);
    
    document.getElementById('total-final').innerText = `$${totalDinero.toFixed(2)}`;
    const btnFin = document.getElementById('btn-finalizar');
    
    if(totalUnidades > 0) btnFin.classList.add('btn-animado');
    else btnFin.classList.remove('btn-animado');

    const detalle = document.getElementById('carrito-detalle');
    const cliente = document.getElementById('cliente-select').value || "SIN CLIENTE";

    let htmlEncabezado = `
        <div class="bg-white/70 p-3 rounded-2xl border border-purple-100 mb-2 text-[10px] font-black text-[#a21caf] uppercase">
            <div class="flex justify-between mb-1">
                <span>ORDEN: ${currentIDVenta}</span> 
                <span>${ahora.toLocaleDateString()}</span>
            </div>
            <div class="flex justify-between items-center border-t border-purple-50 pt-1">
                <span class="truncate max-w-[150px]">👤 ${cliente}</span>
                <span class="bg-[#a21caf] text-white px-3 py-0.5 rounded-lg">📦 ${totalUnidades} UNID.</span>
            </div>
        </div>
    `;

    detalle.innerHTML = htmlEncabezado + (carrito.length === 0 ? '<p class="text-center text-gray-400 text-[10px] py-2 italic uppercase">Cargue productos para continuar</p>' : 
        carrito.map(i => `
            <div class="flex justify-between text-[11px] font-bold uppercase mb-1 px-1">
                <span class="text-gray-600">${i.cantidad}x ${i.Producto}</span>
                <span class="text-[#a21caf] font-black">$${(i.cantidad * i.Precio_Venta).toFixed(2)}</span>
            </div>
        `).join(''));
}

async function guardarNuevoCliente() {
    const btn = document.getElementById('btn-guardar-cliente');
    const n = document.getElementById('new-nombre').value.trim();
    if(!n) return;
    btn.disabled = true;
    try {
        await DairyAPI.guardarDatos({
            pestaña: "Clientes", Nombre: n, CI_RUC: document.getElementById('new-ci').value,
            Teléfono: document.getElementById('new-tel').value, Dirección: document.getElementById('new-dir').value
        });
        await cargarClientes();
        document.getElementById('cliente-select').value = n;
        activarVenta(n);
        cerrarModalCliente();
    } catch (e) { alert("Error"); } finally { btn.disabled = false; }
}

async function finalizarVenta() {
    const cli = document.getElementById('cliente-select').value;
    if (carrito.length === 0 || !cli) return;
    const btn = document.getElementById('btn-finalizar');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined rotate-animation">sync</span>';
    try {
        const p = carrito.map(i => DairyAPI.guardarDatos({
            pestaña: "Ventas", ID_Venta: currentIDVenta, Cliente: cli,
            Producto: i.Producto, Cantidad: i.cantidad, Precio_PVP: i.Precio_Venta, 
            Fecha_Entrega: document.getElementById('fecha-entrega').value
        }));
        await Promise.all(p);
        document.getElementById('btn-whatsapp').classList.remove('hidden');
        btn.classList.add('hidden');
        await cargarEstadisticasDia();
    } catch (e) { btn.disabled = false; btn.innerText = "Confirmar"; }
}

function enviarWhatsApp() {
    const items = carrito.map(i => `${i.cantidad}x ${i.Producto}`).join('%0A');
    const msg = `*LÓGICA LÁCTEA*%0AID: ${currentIDVenta}%0ACliente: ${document.getElementById('cliente-select').value}%0AEntrega: ${document.getElementById('fecha-entrega').value}%0A%0A*PEDIDO:*%0A${items}%0A%0A*TOTAL: ${document.getElementById('total-final').innerText}*`;
    window.open(`https://wa.me/?text=${msg}`, '_blank');
    setTimeout(() => window.location.href='DashboardLacteo.html', 1000);
}

function abrirModalCliente() { document.getElementById('modal-cliente').style.display = 'block'; }
function cerrarModalCliente() { document.getElementById('modal-cliente').style.display = 'none'; }
function filtrarProductos() {
    const b = document.getElementById('busqueda').value.toLowerCase();
    renderizarProductos(productosMaster.filter(p => p.Producto.toLowerCase().includes(b)));
}
window.onload = inicializar;
</script>
</body>
</html>
