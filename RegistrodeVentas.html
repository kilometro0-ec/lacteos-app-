<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Lógica Láctea - Vender</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <script src="menu-logic.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; }
        .card-item { background: white; border-radius: 2rem; border: 2px solid #e9d5ff; transition: all 0.2s; }
        .card-item:active { transform: scale(0.98); }
        .rotate-animation { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="pb-60">

<header class="fixed top-0 w-full h-16 bg-white border-b border-outline flex justify-between items-center px-4 z-50 shadow-sm">
    <div class="flex items-center gap-3" onclick="window.location.href='DashboardLacteo.html'">
        <span class="material-symbols-outlined text-[#a21caf]">arrow_back_ios</span>
        <h1 class="text-xl font-black text-[#a21caf] uppercase tracking-tighter">Nueva Venta</h1>
    </div>
    <div id="total-flotante" class="bg-[#a21caf] text-white px-4 py-1.5 rounded-full font-black text-lg shadow-lg">
        $0.00
    </div>
</header>

<main class="pt-20 px-4 space-y-6 max-w-2xl mx-auto">
    <section class="bg-white p-6 rounded-[2.5rem] border-2 border-outline shadow-sm space-y-4">
        <div>
            <label class="text-[10px] font-black uppercase text-gray-400 ml-2 tracking-widest">Cliente</label>
            <select id="cliente-select" class="w-full border-none bg-purple-50 rounded-2xl p-4 font-bold text-gray-700 mt-1 focus:ring-2 focus:ring-[#a21caf]">
                <option value="">Cargando clientes...</option>
            </select>
        </div>
        <div>
            <label class="text-[10px] font-black uppercase text-gray-400 ml-2 tracking-widest">Fecha de Entrega</label>
            <input type="date" id="fecha-entrega" class="w-full border-none bg-purple-50 rounded-2xl p-4 font-bold text-gray-700 mt-1 focus:ring-2 focus:ring-[#a21caf]">
        </div>
    </section>

    <div class="relative">
        <input type="text" id="busqueda" oninput="filtrarProductos()" placeholder="Buscar producto..." 
               class="w-full bg-white border-2 border-outline rounded-2xl p-4 pl-12 font-bold shadow-sm outline-none focus:border-[#a21caf]">
        <span class="material-symbols-outlined absolute left-4 top-4 text-gray-400">search</span>
    </div>

    <div id="lista-productos" class="grid grid-cols-1 gap-3">
        </div>
</main>

<div class="fixed bottom-20 left-0 w-full p-4 z-40">
    <div class="bg-white rounded-[2.5rem] border-2 border-[#a21caf] p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <span class="text-xs font-black uppercase text-gray-400">Resumen de Venta</span>
            <span id="items-count" class="text-[#a21caf] font-black">0 Items</span>
        </div>
        <button id="btn-finalizar" onclick="finalizarVenta()" 
                class="w-full bg-[#a21caf] text-white py-5 rounded-2xl font-black shadow-lg flex items-center justify-center gap-3 uppercase active:scale-95 transition-all">
            <span class="material-symbols-outlined">payments</span>
            Confirmar Pedido
        </button>
    </div>
</div>

<div id="menu-container"></div>

<script>
let productosMaster = [];
let carrito = [];

async function inicializar() {
    // Establecer fecha de hoy por defecto
    document.getElementById('fecha-entrega').valueAsDate = new Date();
    
    // Cargar Clientes para el Select
    const clientes = await DairyAPI.obtenerDatos("Clientes");
    const select = document.getElementById('cliente-select');
    if (clientes) {
        select.innerHTML = '<option value="">-- Seleccionar Cliente --</option>';
        clientes.forEach(c => {
            select.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`;
        });
    }

    // Cargar Inventario
    const inv = await DairyAPI.obtenerDatos("Inventario");
    if (inv) {
        productosMaster = inv.map(p => ({
            ...p,
            Precio_Venta: parseFloat(String(p.Precio_Venta || 0).replace(',', '.')),
            Stock: parseFloat(String(p.Stock || 0).replace(',', '.'))
        }));
        renderizarProductos(productosMaster);
    }
}

function renderizarProductos(lista) {
    const container = document.getElementById('lista-productos');
    container.innerHTML = "";
    
    lista.forEach(p => {
        const enCarrito = carrito.find(item => item.ID === p.ID);
        const cant = enCarrito ? enCarrito.cantidad : 0;

        container.innerHTML += `
            <div class="card-item p-4 flex items-center justify-between">
                <div class="flex-1">
                    <h3 class="font-black text-gray-800 uppercase text-sm">${p.Producto}</h3>
                    <p class="text-[#a21caf] font-black text-lg">$${p.Precio_Venta.toFixed(2)}</p>
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Stock: ${p.Stock} und</p>
                </div>
                
                <div class="flex items-center gap-3 bg-purple-50 p-2 rounded-2xl">
                    <button onclick="cambiarCant('${p.ID}', -1)" class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-[#a21caf] shadow-sm active:bg-red-50">
                        <span class="material-symbols-outlined">remove</span>
                    </button>
                    <span class="font-black text-lg w-6 text-center">${cant}</span>
                    <button onclick="cambiarCant('${p.ID}', 1)" class="w-10 h-10 rounded-xl bg-[#a21caf] flex items-center justify-center text-white shadow-sm active:opacity-80">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>
        `;
    });
}

function filtrarProductos() {
    const busqueda = document.getElementById('busqueda').value.toLowerCase();
    const filtrados = productosMaster.filter(p => p.Producto.toLowerCase().includes(busqueda));
    renderizarProductos(filtrados);
}

function cambiarCant(id, delta) {
    const prod = productosMaster.find(p => p.ID === id);
    let item = carrito.find(i => i.ID === id);

    if (!item && delta > 0) {
        carrito.push({ ...prod, cantidad: 1 });
    } else if (item) {
        item.cantidad += delta;
        if (item.cantidad <= 0) {
            carrito = carrito.filter(i => i.ID !== id);
        } else if (item.cantidad > prod.Stock) {
            alert("No hay suficiente stock");
            item.cantidad = prod.Stock;
        }
    }
    actualizarTotales();
    renderizarProductos(productosMaster);
}

function actualizarTotales() {
    const total = carrito.reduce((acc, item) => acc + (item.Precio_Venta * item.cantidad), 0);
    document.getElementById('total-flotante').innerText = `$${total.toFixed(2)}`;
    document.getElementById('items-count').innerText = `${carrito.length} Items`;
}

async function finalizarVenta() {
    if (carrito.length === 0) return alert("Agrega productos al carrito");
    const cliente = document.getElementById('cliente-select').value;
    const fechaE = document.getElementById('fecha-entrega').value;
    if (!cliente) return alert("Selecciona un cliente");

    const btn = document.getElementById('btn-finalizar');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined rotate-animation">sync</span> PROCESANDO...';

    const idVenta = "V-" + Date.now().toString().slice(-6);

    try {
        const promesas = carrito.map(item => DairyAPI.guardarDatos({
            pestaña: "Ventas",
            ID_Venta: idVenta,
            Cliente: cliente,
            Producto: item.Producto,
            Cantidad: item.cantidad,
            Precio_PVP: item.Precio_Venta,
            Fecha_Entrega: fechaE
        }));

        await Promise.all(promesas);
        alert("Venta registrada con éxito");
        window.location.href = 'DashboardLacteo.html';
    } catch (e) {
        alert("Error al guardar venta");
        btn.disabled = false;
        btn.innerHTML = 'Confirmar Pedido';
    }
}

window.onload = inicializar;
</script>

</body>
</html>
