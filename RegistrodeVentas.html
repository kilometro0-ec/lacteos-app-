<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dairy Logic - Sales Entry</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#a21caf",
        "primary-container": "#c026d3",
        secondary: "#db2777",
        "secondary-container": "#fbcfe8",
        background: "#faf5ff",
        surface: "#ffffff",
        "on-primary": "#ffffff",
        "on-surface": "#1f012a",
        "on-surface-variant": "#6b21a8",
        outline: "#e9d5ff",
        "outline-variant": "#f3e8ff",
        error: "#dc2626",
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
}
.zebra-table tr:nth-child(even) {
  background-color: #faf5ff;
}
</style>

</head>

<body class="bg-background text-on-surface font-[Work_Sans]">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm shadow-purple-500/10">
  <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
    <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary">person</span>
    </div>
    <h1 class="text-xl font-bold text-primary">Dairy Logic</h1>
  </div>

  <button class="p-2 text-on-surface-variant hover:bg-purple-50 rounded-lg">
    <span class="material-symbols-outlined">notifications</span>
  </button>
</header>

<main class="pt-20 pb-32 px-4 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-4">

<div class="md:col-span-8 space-y-6">

<section class="bg-white p-4 rounded-xl border border-outline shadow-sm">
  <h2 class="text-lg font-bold text-primary mb-3 flex items-center gap-2">
      <span class="material-symbols-outlined">person_search</span> Seleccionar Cliente
  </h2>
  <div class="relative">
      <input class="w-full h-12 pl-12 pr-4 bg-purple-50 border border-outline rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all"
        placeholder="Buscar cliente por nombre o ID..." />
      <span class="material-symbols-outlined absolute left-4 top-3 text-on-surface-variant">search</span>
  </div>
</section>

<section>
  <h2 class="text-lg font-bold mb-4 text-primary flex items-center gap-2">
      <span class="material-symbols-outlined">category</span> Productos Disponibles
  </h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

    <div class="bg-white p-4 rounded-xl border border-outline shadow-sm hover:border-primary transition-colors group">
      <div class="flex justify-between items-start mb-2">
          <h4 class="font-bold text-lg">Leche 1L</h4>
          <span class="bg-primary-container/10 text-primary text-xs px-2 py-1 rounded">Stock: 50</span>
      </div>
      <p class="text-xl font-bold text-secondary mb-4">$2.45</p>

      <div class="flex items-center justify-between bg-surface-container rounded-lg p-1">
        <button class="w-10 h-10 flex items-center justify-center bg-white rounded-md border border-outline text-primary font-bold hover:bg-primary hover:text-white transition-colors">-</button>
        <span class="font-bold text-lg">0</span>
        <button class="w-10 h-10 flex items-center justify-center bg-white rounded-md border border-outline text-primary font-bold hover:bg-primary hover:text-white transition-colors">+</button>
      </div>
    </div>

    <div class="bg-white p-4 rounded-xl border border-outline shadow-sm hover:border-primary transition-colors group">
      <div class="flex justify-between items-start mb-2">
          <h4 class="font-bold text-lg">Queso Fresco</h4>
          <span class="bg-red-100 text-red-600 text-xs px-2 py-1 rounded">Stock: 10</span>
      </div>
      <p class="text-xl font-bold text-secondary mb-4">$4.80</p>

      <div class="flex items-center justify-between bg-surface-container rounded-lg p-1">
        <button class="w-10 h-10 flex items-center justify-center bg-white rounded-md border border-outline text-primary font-bold hover:bg-primary hover:text-white transition-colors">-</button>
        <span class="font-bold text-lg">0</span>
        <button class="w-10 h-10 flex items-center justify-center bg-white rounded-md border border-outline text-primary font-bold hover:bg-primary hover:text-white transition-colors">+</button>
      </div>
    </div>

  </div>
</section>

</div>

<div class="md:col-span-4">

<section class="bg-white rounded-xl border border-outline shadow-lg overflow-hidden sticky top-20">

  <div class="bg-primary text-white p-4 flex items-center gap-2">
    <span class="material-symbols-outlined">shopping_cart</span>
    <h3 class="text-lg font-bold">Resumen de Venta</h3>
  </div>

  <div class="p-4">
    <table class="w-full zebra-table text-sm">
      <thead>
          <tr class="text-left text-on-surface-variant border-b border-outline">
              <th class="pb-2">Prod.</th>
              <th class="pb-2">Cant.</th>
              <th class="pb-2 text-right">Total</th>
          </tr>
      </thead>
      <tbody>
        <tr class="border-b border-outline/50">
          <td class="py-3">Leche 1L</td>
          <td class="py-3 text-center">2</td>
          <td class="py-3 text-right font-bold">$4.90</td>
        </tr>
      </tbody>
    </table>

    <div class="mt-6 space-y-2">
      <div class="flex justify-between text-on-surface-variant">
        <span>Subtotal</span>
        <span>$4.90</span>
      </div>
      <div class="flex justify-between text-xl font-bold text-primary pt-2 border-t border-outline">
        <span>Total</span>
        <span>$4.90</span>
      </div>
    </div>

    <button class="w-full mt-6 bg-primary hover:bg-primary-container text-white py-4 rounded-xl font-bold shadow-lg shadow-purple-500/30 transition-transform active:scale-95">
      Completar Venta
    </button>
    
    <button onclick="window.location.href='DashboardLácteo.html'" class="w-full mt-2 text-on-surface-variant py-2 text-sm font-medium hover:underline">
      Cancelar
    </button>

  </div>

</section>

</div>

</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white border-t border-outline py-3 shadow-lg z-50">
  
  <button onclick="window.location.href='DashboardLácteo.html'" class="text-on-surface-variant hover:text-primary flex flex-col items-center gap-1 transition-colors">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px]">Inicio</span>
  </button>

  <button onclick="window.location.href='RegistrodeVentas.html'" class="text-primary flex flex-col items-center gap-1">
    <span class="material-symbols-outlined">receipt</span>
    <span class="text-[10px] font-bold">Ventas</span>
  </button>

  <button onclick="window.location.href='ControldeInventario.html'" class="text-on-surface-variant hover:text-primary flex flex-col items-center gap-1 transition-colors">
    <span class="material-symbols-outlined">inventory</span>
    <span class="text-[10px]">Stock</span>
  </button>

  <button onclick="window.location.href='GestióndeDespachos.html'" class="text-on-surface-variant hover:text-primary flex flex-col items-center gap-1 transition-colors">
    <span class="material-symbols-outlined">local_shipping</span>
    <span class="text-[10px]">Entregas</span>
  </button>

</nav>

</body>
</html>
