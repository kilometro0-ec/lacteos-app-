<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a21caf">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3050/3050158.png">

    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff", outline: "#e9d5ff" }
        }
      }
    }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; -webkit-tap-highlight-color: transparent; color: #1f012a; }
        .card-sutil { background: white; border-radius: 2.5rem; border: 1px solid #e9d5ff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); }
        .input-sutil { background-color: #fdfaff; border: 1.5px solid #f3e8ff; border-radius: 2rem; padding: 1rem 1.5rem; width: 100%; transition: all 0.3s ease; font-size: 14px; color: #4a5568; }
        .btn-magenta { background-color: #db2777; color: white; font-weight: 800; text-transform: uppercase; border-radius: 2rem; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-magenta:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        .fade-in-sutil { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* ANIMACIONES SOLICITADAS */
        .loading-state { opacity: 0.4; pointer-events: none; filter: grayscale(1); transition: all 0.5s ease; }
        .spin-animation { animation: spin 0.8s ease-in-out; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .header-btn:active { transform: scale(0.9); }
        .active-nav { color: #a21caf !important; }
        .active-nav .icon-box { background-color: #f5f3ff !important; transform: translateY(-4px); }

        input[type="date"] { -webkit-appearance: listbox !important; appearance: none !important; background-color: #ffffff !important; color: #000000 !important; }
    </style>
</head>
<body class="pb-44"> 

<header class="h-16 bg-white/80 backdrop-blur-md border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase">Ventas</h1>
        <p id="estado-carga" class="text-[8px] font-black text-secondary animate-pulse uppercase">Sincronizando...</p>
    </div>
    
    <div class="flex items-center gap-2">
        <button onclick="animarSync()" id="btn-sync" class="header-btn w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-primary/40 transition-all">
            <span class="material-symbols-outlined" id="icon-sync">sync</span>
        </button>
        <button onclick="window.location.href='index.html'" class="header-btn w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg active:scale-90 transition-all">
            <span class="material-symbols-outlined">home</span>
        </button>
    </div>
</header>

<main id="main-content" class="mt-6 px-4 max-w-6xl mx-auto loading-state">
    
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="card-sutil p-5 flex flex-col items-center text-center border-b-4 border-b-primary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Ventas Pendientes</span>
            <div class="flex items-baseline gap-1">
                <span id="card-pedidos-pendientes" class="text-3xl font-black text-primary tracking-tighter">0</span>
                <span class="text-[10px] font-bold text-primary/40 uppercase">IDs</span>
            </div>
        </div>
        <div class="card-sutil p-5 flex flex-col items-center text-center border-b-4 border-b-secondary">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Productos</span>
            <div class="flex items-baseline gap-1">
                <span id="card-productos-total" class="text-3xl font-black text-secondary tracking-tighter">0</span>
                <span class="text-[10px] font-bold text-secondary/40 uppercase">Und</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="card-sutil p-6">
                <div id="vista-seleccion-cliente">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <span class="text-[10px] font-black text-primary uppercase tracking-widest">Seleccionar Cliente</span>
                        <button onclick="alternarFormularioCliente(true)" class="text-[9px] font-black text-white bg-secondary px-4 py-2 rounded-full shadow-sm">+ NUEVO</button>
                    </div>
                    <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil text-base font-bold">
                        <option value="">-- Buscando... --</option>
                    </select>
                </div>

                <div id="vista-nuevo-cliente" class="hidden space-y-4 fade-in-sutil">
                    <div class="flex justify-between items-center">
                        <h2 class="text-sm font-black text-secondary uppercase">Nuevo Registro</h2>
                        <button onclick="alternarFormularioCliente(false)" class="text-slate-400"><span class="material-symbols-outlined">close</span></button>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-sutil">
                        <input type="text" id="reg-ci" placeholder="CI / RUC" class="input-sutil">
                        <input type="text" id="reg-dir" placeholder="Dirección" class="input-sutil">
                    </div>
                    <button onclick="guardarNuevoCliente()" class="w-full btn-magenta py-4">GUARDAR</button>
                </div>
            </section>

            <div class="px-1 relative">
                <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary opacity-40">search</span>
                <input type="text" id="buscarProducto" oninput="filtrarProductos()" placeholder="Buscar producto..." class="input-sutil pl-12">
            </div>
            
            <section id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></section>
        </div>

        <div class="lg:col-span-5">
            <section class="card-sutil overflow-hidden sticky top-24 border-2 border-primary/5">
                <div class="bg-gradient-to-br from-primary to-purple-700 p-6 text-white">
                    <p class="text-[10px] font-black opacity-60 uppercase mb-1">Pedido #</p>
                    <h2 id="num-orden" class="text-xl font-mono font-bold mb-4">---</h2>
                    <h2 id="cliente-resumen" class="text-2xl font-black uppercase truncate mb-4 tracking-tighter">SIN SELECCIONAR</h2>
                    <input type="date" id="fecha-entrega" class="w-full font-bold text-black py-2 px-3 rounded-xl outline-none">
                </div>
                <div class="p-6 space-y-6">
                    <div id="lista-carrito" class="space-y-3 max-h-60 overflow-y-auto">
                        <div id="carrito-vacio" class="text-center py-8 font-bold text-slate-300 italic text-xs">Carrito vacío</div>
                    </div>
                    <div class="flex justify-between items-end border-t pt-4">
                        <span class="text-xs font-black text-slate-400 uppercase">Total</span>
                        <span id="total-venta" class="text-4xl font-black text-slate-900 tracking-tighter">$0.00</span>
                    </div>
                    <button id="btn-finalizar" onclick="procesarVenta()" class="w-full btn-magenta py-5 text-lg shadow-xl shadow-pink-100">
                        CONFIRMAR PEDIDO
                    </button>
                </div>
            </section>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-purple-100 pb-6 pt-3 shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.1)] z-[100] px-2">
    <div class="flex justify-around items-center max-w-lg mx-auto">
        <button onclick="window.location.href='./DashboardLacteo.html'" class="nav-link text-gray-400 flex flex-col items-center group">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">home</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Inicio</span>
        </button>
        <button onclick="window.location.href='./RegistrodeVentas.html'" class="nav-link text-gray-400 flex flex-col items-center group active-nav">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">receipt_long</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Ventas</span>
        </button>
        <button onclick="window.location.href='./PedidosProveedor.html'" class="nav-link text-gray-400 flex flex-col items-center group">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">shopping_cart_checkout</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Pedidos</span>
        </button>
        <button onclick="window.location.href='./GestiondeClientes.html'" class="nav-link text-gray-400 flex flex-col items-center group">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">group</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Clientes</span>
        </button>
        <button onclick="window.location.href='./ControldeInventario.html'" class="nav-link text-gray-400 flex flex-col items-center group">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">inventory_2</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Stock</span>
        </button>
        <button onclick="window.location.href='./GestióndeDespachos.html'" class="nav-link text-gray-400 flex flex-col items-center group">
            <div class="icon-box p-2 rounded-2xl transition-all duration-300 ease-out active:scale-75">
                <span class="material-symbols-outlined text-[26px]">local_shipping</span>
            </div>
            <span class="text-[9px] font-black uppercase mt-1">Ruta</span>
        </button>
    </div>
</nav>

<script>
let carrito = {}; let productosData = []; let clientesData = []; let idOrdenActual = "";

function animarSync() {
    const icon = document.getElementById('icon-sync');
    icon.classList.add('spin-animation');
    iniciar();
    setTimeout(() => icon.classList.remove('spin-animation'), 800);
}

async function iniciar() {
    const d = new Date();
    idOrdenActual = `LL-${d.getHours()}${d.getMinutes()}-${Math.floor(Math.random()*90+10)}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
    document.getElementById('fecha-entrega').value = new Date().toISOString().split('T')[0];

    try {
        const [cl, pr, vnt] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"), 
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);
        
        clientesData = cl; productosData = pr;
        
        const pendientes = vnt.filter(v => v.Estado === "PENDIENTE");
        document.getElementById('card-pedidos-pendientes').innerText = [...new Set(pendientes.map(v => v.ID_Venta))].length;
        document.getElementById('card-productos-total').innerText = pendientes.reduce((acc, v) => acc + (parseInt(v.Cantidad) || 0), 0);

        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        cl.sort((a,b)=>a.Nombre.localeCompare(b.Nombre)).forEach(c => { 
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`; 
        });
        
        renderizarProductos();
        document.getElementById('main-content').classList.remove('loading-state');
        document.getElementById('estado-carga').innerText = "Sincronizado";
    } catch(e) { console.error(e); }
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); cont.innerHTML = "";
    productosData.forEach(p => {
        const s = parseInt(p.Stock) || 0;
        const idCant = `cant-${p.Producto.replace(/\s+/g,'')}`;
        cont.innerHTML += `
            <div class="card-sutil p-4 flex flex-col justify-between min-h-[200px] ${s <= 0 ? 'opacity-40 grayscale' : ''}">
                <h4 class="font-black text-[12px] uppercase text-primary mb-2">${p.Producto}</h4>
                <div class="mt-auto">
                    <p class="text-2xl font-black text-slate-800">$${parseFloat(p.Precio_Venta).toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-2xl p-1 mt-2">
                        <button onclick="cambiarCant('${p.Producto}',-1)" class="w-8 h-8 bg-white rounded-lg text-primary font-black">-</button>
                        <span id="${idCant}" class="font-black text-primary">0</span>
                        <button onclick="cambiarCant('${p.Producto}',1)" class="w-8 h-8 bg-white rounded-lg text-primary font-black">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    if(carrito[n]+d >= 0 && (carrito[n]+d <= p.Stock)) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const l = document.getElementById('lista-carrito'); l.innerHTML = ""; let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * parseFloat(p.Precio_Venta);
            t += sub;
            l.innerHTML += `<div class="flex justify-between items-center p-3 bg-purple-50 rounded-xl">
                <span class="text-[10px] font-black uppercase text-primary">${n} (x${carrito[n]})</span>
                <span class="text-sm font-black">$${sub.toFixed(2)}</span>
            </div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').classList.toggle('hidden', t > 0);
}

async function procesarVenta() {
    const cli = document.getElementById('select-cliente').value;
    const fec = document.getElementById('fecha-entrega').value;
    if(!cli || !fec) return alert("Faltan datos");
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("Sin productos");
    
    document.getElementById('btn-finalizar').innerText = "GUARDANDO...";
    try {
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n);
            await DairyAPI.enviarDatos("Ventas", { 
                ID_Venta: idOrdenActual, Cliente: cli, Producto: n, 
                Cantidad: carrito[n], Precio_PVP: p.Precio_Venta, Fecha_Entrega: fec, 
                Estado: "PENDIENTE" 
            });
        }
        location.reload();
    } catch(e) { alert("Error"); }
}

function alternarFormularioCliente(m) {
    document.getElementById('vista-seleccion-cliente').classList.toggle('hidden', m);
    document.getElementById('vista-nuevo-cliente').classList.toggle('hidden', !m);
}

function actualizarNombreCarrito() { 
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR"; 
}

function filtrarProductos() {
    const q = document.getElementById('buscarProducto').value.toLowerCase();
    document.querySelectorAll('#contenedor-productos > div').forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
    });
}

window.onload = iniciar;
</script>
</body>
</html>
