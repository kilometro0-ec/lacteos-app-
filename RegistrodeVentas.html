<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea - Ventas PRO</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        primary: "#a21caf", 
                        secondary: "#db2777", 
                        error: "#ef4444",
                        background: "#faf5ff", 
                        outline: "#e9d5ff" 
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        .active-icon { font-variation-settings: 'FILL' 1; }
        .out-of-stock { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        
        @keyframes pulse-red {
            0%, 100% { border-color: #e9d5ff; box-shadow: 0 0 0 rgba(239, 68, 68, 0); }
            50% { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        }
        .stock-critico { animation: pulse-red 1.5s infinite; border-width: 2px; }
        body { font-family: 'Work Sans', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-surface pb-40">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-outline shadow-sm">
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined text-3xl active-icon">opacity</span>
        </div>
        <h1 class="text-xl font-extrabold text-primary tracking-tight">Ventas</h1>
    </div>
    <button onclick="iniciar()" class="p-2 text-primary active:rotate-180 transition-transform duration-500">
        <span class="material-symbols-outlined">sync</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
    
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-primary p-5 rounded-[2rem] text-white shadow-lg shadow-purple-100">
            <span class="text-[10px] uppercase font-black tracking-widest opacity-80">Pedidos Hoy</span>
            <h3 id="card-cant-ventas" class="text-3xl font-black">0</h3>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm">
            <span class="text-[10px] text-secondary uppercase font-black tracking-widest">Total</span>
            <h3 id="card-monto-ventas" class="text-3xl font-black text-primary">$0.00</h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="bg-white p-5 rounded-3xl border border-outline shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest">Cliente</h2>
                    <button onclick="abrirModalCliente()" class="text-xs font-black text-secondary flex items-center gap-1 bg-pink-50 px-3 py-1 rounded-full">
                        <span class="material-symbols-outlined text-sm">person_add</span> NUEVO
                    </button>
                </div>
                <select id="select-cliente" class="w-full h-14 px-4 bg-purple-50 border-none rounded-2xl font-bold text-gray-700 outline-none focus:ring-2 focus:ring-primary appearance-none text-lg">
                    <option value="">-- Seleccionar Cliente --</option>
                </select>
            </section>

            <section>
                <h2 class="text-xs font-black text-gray-400 uppercase mb-4 ml-2 tracking-widest">Catálogo de Productos</h2>
                <div id="contenedor-productos" class="grid grid-cols-2 gap-4"></div>
            </section>
        </div>

        <div class="lg:col-span-5">
            <section class="bg-white rounded-[2.5rem] border-2 border-outline shadow-xl sticky top-20 overflow-hidden">
                <div class="bg-secondary p-5 text-white flex justify-between items-center">
                    <h3 class="font-black text-xs tracking-widest uppercase">Resumen de Venta</h3>
                    <span class="material-symbols-outlined active-icon">shopping_cart</span>
                </div>
                <div class="p-6">
                    <div id="lista-carrito" class="space-y-3 mb-6 max-h-80 overflow-y-auto">
                        <p id="carrito-vacio" class="text-center text-gray-400 py-10 italic text-sm font-medium">El carrito está vacío</p>
                    </div>
                    <div class="border-t-2 border-dashed border-outline pt-6">
                        <div class="flex justify-between text-3xl font-black text-gray-900">
                            <span class="text-primary text-xl uppercase mt-1">Total</span>
                            <span id="total-venta">$0.00</span>
                        </div>
                    </div>
                    <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full mt-8 bg-primary text-white py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all uppercase tracking-tight">
                        Confirmar Venta
                    </button>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="modalCliente" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-black text-primary uppercase tracking-tight">Nuevo Registro</h3>
            <button onclick="cerrarModalCliente()" class="text-gray-400"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="grid grid-cols-1 gap-4">
            <input type="text" id="nuevo-nombre" placeholder="Nombre completo" class="w-full p-4 bg-gray-50 border border-outline rounded-2xl focus:border-primary outline-none font-bold">
            
            <div class="space-y-1">
                <input type="text" id="nuevo-identificacion" 
                       placeholder="Cédula o RUC" 
                       inputmode="numeric"
                       oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 13)"
                       class="w-full p-4 bg-gray-50 border border-outline rounded-2xl focus:border-primary outline-none font-bold">
                <p id="id-error" class="text-[10px] text-red-500 font-black hidden px-1 uppercase">Mínimo 10 números</p>
            </div>

            <div class="flex gap-2">
                <div class="w-20 bg-gray-100 flex items-center justify-center rounded-2xl font-black text-gray-400 text-sm border border-outline">+593</div>
                <input type="tel" id="nuevo-tel" 
                       placeholder="999888777" 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                       class="flex-1 p-4 bg-gray-50 border border-outline rounded-2xl focus:border-primary outline-none font-bold">
            </div>
            
            <input type="text" id="nuevo-dir" placeholder="Dirección de entrega" class="w-full p-4 bg-gray-50 border border-outline rounded-2xl focus:border-primary outline-none font-bold">
            
            <button onclick="guardarCliente()" id="btn-save" class="w-full py-4 bg-secondary text-white rounded-2xl font-black shadow-lg mt-4 uppercase tracking-widest text-sm">
                Guardar Cliente
            </button>
        </div>
    </div>
</div>

<div id="menu-container"></div>

<script>
let carrito = {};
let productosData = [];

// CARGAR MENU Y DATOS
async function iniciar() {
    // Carga el menú externo
    fetch('menu.html').then(r => r.text()).then(data => {
        document.getElementById('menu-container').innerHTML = data;
        marcarBotonActivo();
    });

    try {
        const [clientes, productos, ventas] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);

        // Stats Rápidas
        const hoy = new Date().toLocaleDateString();
        const vHoy = ventas.filter(v => new Date(v.Fecha).toLocaleDateString() === hoy);
        document.getElementById('card-cant-ventas').innerText = vHoy.length;
        const totalSumado = vHoy.reduce((acc, v) => acc + (parseFloat(v["Precio Total"] || v.total) || 0), 0);
        document.getElementById('card-monto-ventas').innerText = `$${totalSumado.toFixed(2)}`;

        // Cargar Clientes al Select
        const select = document.getElementById('select-cliente');
        select.innerHTML = '<option value="">-- Seleccionar Cliente --</option>';
        clientes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.Nombre;
            opt.textContent = c.Nombre;
            select.appendChild(opt);
        });

        productosData = productos;
        renderizarProductos();
    } catch (e) { console.error(e); }
}

function marcarBotonActivo() {
    const botones = document.querySelectorAll('.nav-item');
    botones.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes('RegistrodeVentas.html')) {
            btn.classList.add('text-primary');
            btn.classList.remove('text-gray-400');
        }
    });
}

function renderizarProductos() {
    const container = document.getElementById('contenedor-productos');
    container.innerHTML = "";
    productosData.forEach(p => {
        const stock = parseInt(p.Stock) || 0;
        const critico = stock > 0 && stock <= 5;
        const idClean = p.Producto.replace(/\s+/g, '');
        
        container.innerHTML += `
            <div class="bg-white p-5 rounded-[2rem] border border-outline shadow-sm flex flex-col justify-between 
                ${stock <= 0 ? 'out-of-stock' : ''} ${critico ? 'stock-critico' : ''}">
                <div>
                    <h4 class="font-extrabold text-gray-800 text-sm mb-1 leading-tight h-10 overflow-hidden">${p.Producto}</h4>
                    <span class="text-[10px] font-black ${stock < 10 ? 'text-secondary' : 'text-primary'} uppercase tracking-tighter">Disponible: ${stock}</span>
                </div>
                <div class="mt-4">
                    <p class="text-2xl font-black text-gray-900 mb-3">$${parseFloat(p.Precio_Venta).toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-2xl p-1 border border-purple-100">
                        <button onclick="cambiarCant('${p.Producto}', -1)" class="w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center font-black text-primary active:scale-90">-</button>
                        <span id="cant-${idClean}" class="text-lg font-black w-8 text-center text-primary">0</span>
                        <button onclick="cambiarCant('${p.Producto}', 1)" class="w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center font-black text-primary active:scale-90">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(nombre, delta) {
    if (!carrito[nombre]) carrito[nombre] = 0;
    const p = productosData.find(prod => prod.Producto === nombre);
    const nuevaCant = carrito[nombre] + delta;
    if (nuevaCant >= 0 && nuevaCant <= p.Stock) {
        carrito[nombre] = nuevaCant;
        document.getElementById(`cant-${nombre.replace(/\s+/g, '')}`).innerText = nuevaCant;
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const lista = document.getElementById('lista-carrito');
    const totalLabel = document.getElementById('total-venta');
    const vacio = document.getElementById('carrito-vacio');
    lista.innerHTML = "";
    let total = 0;
    let items = 0;
    Object.keys(carrito).forEach(n => {
        if (carrito[n] > 0) {
            items++;
            const p = productosData.find(prod => prod.Producto === n);
            const sub = carrito[n] * p.Precio_Venta;
            total += sub;
            lista.innerHTML += `
                <div class="flex justify-between items-center bg-purple-50/50 p-4 rounded-2xl border border-purple-100 border-dashed">
                    <div class="flex flex-col">
                        <span class="text-xs font-extrabold text-gray-800">${n}</span>
                        <span class="text-[10px] font-black text-primary">CANTIDAD: ${carrito[n]}</span>
                    </div>
                    <span class="font-black text-lg text-primary">$${sub.toFixed(2)}</span>
                </div>`;
        }
    });
    totalLabel.innerText = `$${total.toFixed(2)}`;
    vacio.style.display = items > 0 ? 'none' : 'block';
}

async function finalizarVenta() {
    const cliente = document.getElementById('select-cliente').value;
    if (!cliente) return alert("Error: Selecciona un cliente primero");
    
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if (items.length === 0) return alert("Error: El carrito está vacío");
    
    const btn = document.getElementById('btn-finalizar');
    btn.disabled = true; 
    btn.innerText = "PROCESANDO...";
    
    try {
        for (const item of items) {
            const p = productosData.find(prod => prod.Producto === item);
            await DairyAPI.enviarDatos("Ventas", {
                pestaña: "Ventas", 
                Cliente: cliente, 
                Producto: item,
                Cantidad: carrito[item], 
                Precio_PVP: p.Precio_Venta, 
                "Precio Total": carrito[item] * p.Precio_Venta,
                Estado: "PENDIENTE",
                Fecha: new Date().toISOString()
            });
        }
        alert("Venta guardada como PENDIENTE para despacho");
        location.reload();
    } catch (e) { 
        alert("Error de conexión"); 
        btn.disabled = false; 
        btn.innerText = "CONFIRMAR VENTA"; 
    }
}

// FUNCIONES DEL MODAL CLIENTE
function abrirModalCliente() { document.getElementById('modalCliente').classList.remove('hidden'); }
function cerrarModalCliente() { 
    document.getElementById('modalCliente').classList.add('hidden'); 
    document.getElementById('id-error').classList.add('hidden');
}

async function guardarCliente() {
    const nombre = document.getElementById('nuevo-nombre').value;
    const iden = document.getElementById('nuevo-identificacion').value;
    const tel = document.getElementById('nuevo-tel').value;
    const dir = document.getElementById('nuevo-dir').value;

    if(iden.length < 10) return document.getElementById('id-error').classList.remove('hidden');
    if(!nombre || !tel) return alert("Completa los campos obligatorios");
    
    const btn = document.getElementById('btn-save');
    btn.innerText = "GUARDANDO...";
    btn.disabled = true;

    await DairyAPI.enviarDatos("Clientes", {
        pestaña: "Clientes",
        ID: iden,
        Nombre: nombre,
        Teléfono: "+593" + tel,
        Dirección: dir,
        Fecha: new Date().toLocaleDateString()
    });
    
    cerrarModalCliente();
    iniciar();
}

window.onload = iniciar;
</script>
</body>
</html>
