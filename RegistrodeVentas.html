<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ventas - Lógica Láctea</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#a21caf",
            secondary: "#db2777",
            background: "#faf5ff",
            outline: "#e9d5ff",
          }
        }
      }
    }
    </script>

    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #faf5ff; }
        
        /* Contenedores con bordes extra redondeados */
        .card-sutil { 
            background: white; 
            border-radius: 2.5rem; 
            border: 1px solid #e9d5ff; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); 
        }

        /* Inputs ultra-redondeados */
        .input-sutil { 
            background-color: #fdfaff; 
            border: 1.5px solid #f3e8ff; 
            border-radius: 2rem; 
            padding: 1rem 1.5rem; 
            width: 100%; 
            transition: all 0.3s ease; 
            font-size: 14px;
            color: #4a5568;
        }
        
        .input-sutil:focus { 
            outline: none; 
            border-color: #a21caf; 
            background-color: white;
            box-shadow: 0 0 0 4px rgba(162, 28, 175, 0.05);
        }

        /* Botón Magenta Redondeado */
        .btn-magenta { 
            background-color: #db2777; 
            color: white; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-radius: 2rem; 
            transition: all 0.2s ease;
            letter-spacing: 0.025em;
        }
        
        .btn-magenta:active { transform: scale(0.96); }
        
        .hidden { display: none !important; }

        /* Animación de entrada sutil */
        .fade-in-sutil {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-24">

<header class="h-16 bg-white/80 backdrop-blur-md border-b border-outline flex justify-between items-center px-6 sticky top-0 z-50">
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
        <div class="w-10 h-10 rounded-2xl bg-purple-100 flex items-center justify-center text-primary font-bold">
            <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h1 class="text-xl font-black text-primary tracking-tighter uppercase">Ventas</h1>
    </div>
    <button onclick="iniciar()" class="material-symbols-outlined text-primary/30 hover:text-primary transition-all">sync</button>
</header>

<main class="mt-6 px-4 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <div class="lg:col-span-7 space-y-6">
        
        <section class="card-sutil p-6">
            <div id="vista-seleccion-cliente" class="fade-in-sutil">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="text-[10px] font-black text-primary uppercase tracking-widest">Seleccionar Cliente</span>
                    <button onclick="alternarFormularioCliente(true)" class="text-[9px] font-black text-white bg-secondary px-4 py-2 rounded-full shadow-sm">+ NUEVO CLIENTE</button>
                </div>
                <select id="select-cliente" onchange="actualizarNombreCarrito()" class="input-sutil text-base font-bold">
                    <option value="">-- Buscar en la lista --</option>
                </select>
            </div>

            <div id="vista-nuevo-cliente" class="hidden space-y-4 fade-in-sutil">
                <div class="flex justify-between items-center px-2">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">person_add</span>
                        <h2 class="text-sm font-black text-secondary uppercase tracking-tight">Nuevo Registro</h2>
                    </div>
                    <button onclick="alternarFormularioCliente(false)" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                </div>
                
                <div class="space-y-3">
                    <input type="text" id="reg-nombre" placeholder="Nombre y Apellido" class="input-sutil">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <input type="text" id="reg-ci" placeholder="Cédula / RUC" class="input-sutil">
                        <input type="tel" id="reg-tel" placeholder="Teléfono Móvil" class="input-sutil">
                    </div>
                    <input type="text" id="reg-dir" placeholder="Dirección Exacta" class="input-sutil">
                </div>

                <button onclick="guardarNuevoCliente()" id="btn-guardar-cli" class="w-full btn-magenta py-4 shadow-lg shadow-pink-100 flex items-center justify-center gap-2 mt-2">
                    <span class="material-symbols-outlined text-base">task_alt</span>
                    GUARDAR Y SELECCIONAR
                </button>
            </div>
        </section>

        <section id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></section>
    </div>

    <div class="lg:col-span-5">
        <section class="card-sutil overflow-hidden sticky top-24 border-2 border-primary/5 shadow-xl">
            <div class="bg-gradient-to-br from-primary to-purple-700 p-7 text-white">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[10px] font-black opacity-60 uppercase tracking-widest mb-1">Resumen de Venta</p>
                        <h2 id="cliente-resumen" class="text-2xl font-black uppercase truncate tracking-tighter leading-none">SIN SELECCIONAR</h2>
                    </div>
                    <span id="num-orden" class="text-[9px] bg-white/20 px-3 py-1.5 rounded-full font-mono font-bold">---</span>
                </div>
            </div>
            
            <div class="p-7 space-y-6">
                <div id="lista-carrito" class="space-y-3 max-h-64 overflow-y-auto pr-1">
                    <div id="carrito-vacio" class="text-center py-12">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
                            <span class="material-symbols-outlined text-slate-200 text-3xl">shopping_cart_checkout</span>
                        </div>
                        <p class="text-slate-300 text-xs font-bold italic">Selecciona productos para comenzar</p>
                    </div>
                </div>

                <div class="pt-5 border-t border-purple-50">
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2 px-1">Fecha Programada</label>
                    <input type="date" id="fecha-entrega" class="input-sutil font-bold text-primary">
                </div>

                <div class="flex justify-between items-end px-1">
                    <span class="text-xs font-black text-slate-400 uppercase">Total Pedido</span>
                    <span id="total-venta" class="text-4xl font-black text-slate-900 tracking-tighter">$0.00</span>
                </div>

                <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full btn-magenta py-5 text-lg shadow-xl shadow-pink-100 flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined">rocket_launch</span>
                    CONFIRMAR Y ENVIAR
                </button>
            </div>
        </section>
    </div>
</main>

<div id="menu-container"></div>

<script>
let carrito = {}; let productosData = []; let clientesData = []; let idOrdenActual = "";

function generarIDOrden() {
    const d = new Date();
    idOrdenActual = `LL-${d.getHours()}${d.getMinutes()}-${Math.floor(Math.random()*90+10)}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
}

function alternarFormularioCliente(mostrarNuevo) {
    const vistaSel = document.getElementById('vista-seleccion-cliente');
    const vistaNuevo = document.getElementById('vista-nuevo-cliente');
    
    if(mostrarNuevo) {
        vistaSel.classList.add('hidden');
        vistaNuevo.classList.remove('hidden');
    } else {
        vistaSel.classList.remove('hidden');
        vistaNuevo.classList.add('hidden');
    }
}

async function guardarNuevoCliente() {
    const n = document.getElementById('reg-nombre').value, c = document.getElementById('reg-ci').value, t = document.getElementById('reg-tel').value, d = document.getElementById('reg-dir').value;
    if(!n || !t) return alert("Por favor ingresa al menos Nombre y Teléfono");
    
    const btn = document.getElementById('btn-guardar-cli');
    btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> REGISTRANDO...`;
    btn.disabled = true;

    try {
        await DairyAPI.enviarDatos("Clientes", { pestaña: "Clientes", Nombre: n, CI: c, Teléfono: t, Dirección: d });
        await iniciar(); 
        document.getElementById('select-cliente').value = n;
        actualizarNombreCarrito();
        alternarFormularioCliente(false);
        
        // Limpiar
        document.getElementById('reg-nombre').value = "";
        document.getElementById('reg-ci').value = "";
        document.getElementById('reg-tel').value = "";
        document.getElementById('reg-dir').value = "";

    } catch(e) { alert("Error de conexión"); }
    finally {
        btn.innerHTML = `<span class="material-symbols-outlined text-base">task_alt</span> GUARDAR Y SELECCIONAR`;
        btn.disabled = false;
    }
}

async function iniciar() {
    generarIDOrden();
    fetch('menu.html').then(r => r.text()).then(d => document.getElementById('menu-container').innerHTML = d);
    try {
        const [cl, pr] = await Promise.all([DairyAPI.obtenerDatos("Clientes"), DairyAPI.obtenerDatos("Inventario")]);
        clientesData = cl; productosData = pr;
        
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Buscar en la lista --</option>';
        cl.sort((a,b)=>a.Nombre.localeCompare(b.Nombre)).forEach(c => {
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`;
        });
        renderizarProductos();
    } catch(e) { console.error(e); }
}

function actualizarNombreCarrito() { 
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR"; 
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos'); cont.innerHTML = "";
    productosData.forEach(p => {
        const s = parseInt(p.Stock) || 0, pr = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
        cont.innerHTML += `
            <div class="card-sutil p-5 flex flex-col justify-between min-h-[160px] ${s <= 0 ? 'opacity-40 grayscale pointer-events-none' : ''}">
                <div>
                    <h4 class="font-black text-[10px] uppercase text-slate-400 truncate tracking-tight mb-1">${p.Producto}</h4>
                    <p class="text-[9px] font-black ${s < 5 ? 'text-red-500' : 'text-primary'} uppercase">Stock: ${s}</p>
                </div>
                <div>
                    <p class="text-2xl font-black text-slate-800 tracking-tighter">$${pr.toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-2xl p-1 mt-2 border border-purple-100/50">
                        <button onclick="cambiarCant('${p.Producto}',-1)" class="w-9 h-9 bg-white rounded-xl text-primary shadow-sm font-black border border-outline">-</button>
                        <span id="cant-${p.Producto.replace(/\s+/g,'')}" class="font-black text-slate-600 text-sm">0</span>
                        <button onclick="cambiarCant('${p.Producto}',1)" class="w-9 h-9 bg-white rounded-xl text-primary shadow-sm font-black border border-outline">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    if(carrito[n]+d >= 0 && (carrito[n]+d <= p.Stock)) {
        carrito[n] += d;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = carrito[n];
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const l = document.getElementById('lista-carrito'); l.innerHTML = ""; let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const sub = carrito[n] * parseFloat(p.Precio_Venta.toString().replace(',','.'));
            t += sub;
            l.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-purple-50/50 rounded-2xl border border-purple-100/50 fade-in-sutil">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-primary uppercase">${n}</span>
                        <span class="text-xs font-bold text-slate-700">Cant: ${carrito[n]}</span>
                    </div>
                    <span class="text-sm font-black text-slate-900">$${sub.toFixed(2)}</span>
                </div>`;
        }
    });
    document.getElementById('total-venta').innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').classList.toggle('hidden', t > 0);
}

async function finalizarVenta() {
    const cli = document.getElementById('select-cliente').value, f = document.getElementById('fecha-entrega').value;
    if(!cli || !f) return alert("Selecciona cliente y fecha de entrega");
    
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("Agrega productos al carrito");
    
    const btn = document.getElementById('btn-finalizar');
    btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> PROCESANDO...`;
    btn.disabled = true;

    try {
        let det = "", total = 0;
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n), pvp = parseFloat(p.Precio_Venta.toString().replace(',','.'));
            const sub = carrito[n] * pvp; total += sub;
            det += `• ${carrito[n]} x ${n} ($${sub.toFixed(2)})\n`;
            
            await DairyAPI.enviarDatos("Ventas", { 
                pestaña: "Ventas", 
                ID_Venta: idOrdenActual, 
                Cliente: cli, 
                Producto: n, 
                Cantidad: carrito[n], 
                Precio_PVP: p.Precio_Venta, 
                Fecha_Entrega: f,
                Estado: "PENDIENTE"
            });
        }
        
        const cObj = clientesData.find(c => c.Nombre === cli);
        let tel = "593" + (cObj?.Teléfono?.toString().replace(/\D/g, '').slice(-9) || "");
        
        window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(`*LÓGICA LÁCTEA - PEDIDO #${idOrdenActual}*\n*Cliente:* ${cli}\n*Entrega:* ${f}\n\n*DETALLE:*\n${det}\n*TOTAL: $${total.toFixed(2)}*`)}`, '_blank');
        
        location.reload();
    } catch(e) { 
        alert("Error de red"); 
        btn.innerHTML = `<span class="material-symbols-outlined">rocket_launch</span> CONFIRMAR Y ENVIAR`;
        btn.disabled = false;
    }
}
window.onload = iniciar;
</script>
</body>
</html>
