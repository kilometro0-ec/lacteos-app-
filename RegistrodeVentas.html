<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lógica Láctea - Ventas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="api-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,400;0,500;0,700;1,800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { primary: "#a21caf", secondary: "#db2777", background: "#faf5ff", outline: "#e9d5ff" } 
                } 
            } 
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .brand-title { font-style: italic; font-weight: 800; letter-spacing: -0.05em; }
        .out-of-stock { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        #modal-cliente { transition: all 0.3s ease; }
        .modal-open { display: flex !important; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-background pb-40">

<div id="modal-cliente" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl">
        <div class="bg-primary p-6 text-white">
            <h2 class="brand-title text-2xl italic uppercase">Nuevo Cliente</h2>
            <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Lógica Láctea Registro</p>
        </div>
        <div class="p-6 space-y-4">
            <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="w-full p-4 bg-purple-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-primary text-lg">
            <input type="text" id="reg-ci" placeholder="CI / RUC" class="w-full p-4 bg-purple-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-primary">
            <input type="tel" id="reg-tel" placeholder="Teléfono (ej: 0991234567)" class="w-full p-4 bg-purple-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-primary">
            <input type="text" id="reg-dir" placeholder="Dirección Exacta" class="w-full p-4 bg-purple-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-primary">
            
            <div class="flex gap-3 pt-4">
                <button onclick="cerrarModalCliente()" class="flex-1 py-4 font-bold text-gray-400 uppercase text-xs">Cancelar</button>
                <button onclick="guardarNuevoCliente()" id="btn-guardar-cli" class="flex-[2] bg-secondary text-white py-4 rounded-2xl font-bold uppercase italic shadow-lg active:scale-95 transition-all">Guardar Cliente</button>
            </div>
        </div>
    </div>
</div>

<header class="fixed top-0 w-full h-16 bg-white border-b border-outline flex justify-between items-center px-4 z-50 shadow-sm">
    <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='DashboardLácteo.html'">
        <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-primary font-bold italic">LL</div>
        <h1 class="text-xl text-primary uppercase brand-title">Ventas</h1>
    </div>
    <button onclick="iniciar()" class="p-2 text-primary active:rotate-180 transition-transform">
        <span class="material-symbols-outlined">sync</span>
    </button>
</header>

<main class="pt-20 px-4 max-w-7xl mx-auto space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-primary p-5 rounded-[2rem] text-white shadow-lg">
            <p class="text-[10px] font-bold uppercase opacity-70 italic">Pedidos Hoy</p>
            <h3 id="card-cant-ventas" class="text-3xl font-bold">0</h3>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border border-outline text-center shadow-sm">
            <p class="text-[10px] text-secondary font-bold uppercase italic">Ingreso Total</p>
            <h3 id="card-monto-ventas" class="text-2xl font-bold text-primary">$0.00</h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 space-y-6">
            <section class="bg-white p-5 rounded-3xl border border-outline shadow-sm">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest italic">Seleccionar Cliente</h2>
                    <button onclick="abrirModalCliente()" class="text-[10px] font-bold text-secondary bg-pink-50 px-4 py-1.5 rounded-full border border-pink-100 shadow-sm active:scale-90 transition-all">+ NUEVO</button>
                </div>
                <select id="select-cliente" onchange="actualizarNombreCarrito()" class="w-full h-14 bg-purple-50 border-none rounded-2xl font-bold text-lg focus:ring-2 focus:ring-primary">
                    <option value="">-- Buscar Cliente --</option>
                </select>
            </section>
            <section id="contenedor-productos" class="grid grid-cols-2 gap-4"></section>
        </div>

        <div class="lg:col-span-5">
            <section class="bg-white rounded-[2.5rem] border-2 border-outline shadow-xl sticky top-20 overflow-hidden">
                <div class="bg-secondary p-5 text-white flex justify-between items-center">
                    <div class="flex-1">
                        <h3 class="font-bold text-[10px] uppercase opacity-70 italic">Pedido para:</h3>
                        <h2 id="cliente-resumen" class="text-xl brand-title uppercase leading-tight truncate">SIN SELECCIONAR</h2>
                    </div>
                    <div class="text-right pl-4">
                        <p class="text-[8px] font-bold uppercase opacity-70">Orden ID</p>
                        <p id="num-orden" class="font-bold text-sm">---</p>
                    </div>
                </div>
                <div class="p-6">
                    <div id="lista-carrito" class="space-y-3 mb-6 max-h-60 overflow-y-auto pr-2">
                        <p id="carrito-vacio" class="text-center text-gray-400 py-10 italic text-sm">Agrega productos</p>
                    </div>
                    <div class="pt-4 border-t border-dashed border-outline">
                        <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1 italic">Fecha de Entrega</label>
                        <input type="date" id="fecha-entrega" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold text-primary focus:ring-2 focus:ring-primary">
                    </div>
                    <div class="mt-6 flex justify-between items-center">
                        <span class="text-xs font-bold text-primary uppercase">Total a cobrar</span>
                        <span id="total-venta" class="text-4xl font-bold text-slate-900">$0.00</span>
                    </div>
                    <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full mt-8 bg-primary text-white py-5 rounded-2xl font-bold text-xl uppercase italic shadow-lg active:scale-95 transition-all">
                        Confirmar Pedido
                    </button>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="menu-container"></div>

<script>
let carrito = {};
let productosData = [];
let clientesData = [];
let idOrdenActual = "";

function generarIDOrden() {
    const d = new Date();
    idOrdenActual = `ORD-${d.getFullYear().toString().substr(-2)}${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getHours().toString().padStart(2,'0')}${d.getMinutes().toString().padStart(2,'0')}`;
    document.getElementById('num-orden').innerText = idOrdenActual;
}

function abrirModalCliente() { document.getElementById('modal-cliente').classList.add('modal-open'); }
function cerrarModalCliente() { document.getElementById('modal-cliente').classList.remove('modal-open'); }

async function guardarNuevoCliente() {
    const nombre = document.getElementById('reg-nombre').value;
    const ci = document.getElementById('reg-ci').value;
    const tel = document.getElementById('reg-tel').value;
    const dir = document.getElementById('reg-dir').value;

    if(!nombre || !tel) return alert("Nombre y Teléfono requeridos");

    const btn = document.getElementById('btn-guardar-cli');
    btn.disabled = true; btn.innerText = "REGISTRANDO...";

    try {
        await DairyAPI.enviarDatos("Clientes", {
            pestaña: "Clientes", Nombre: nombre, CI_RUC: ci, Teléfono: tel, Dirección: dir
        });
        alert("¡Cliente registrado!");
        cerrarModalCliente();
        iniciar(); 
    } catch(e) { alert("Error al guardar cliente"); }
    btn.disabled = false; btn.innerText = "Guardar Cliente";
}

async function iniciar() {
    generarIDOrden();
    fetch('menu.html').then(r => r.text()).then(d => document.getElementById('menu-container').innerHTML = d);
    try {
        const [clientes, productos, ventas] = await Promise.all([
            DairyAPI.obtenerDatos("Clientes"),
            DairyAPI.obtenerDatos("Inventario"),
            DairyAPI.obtenerDatos("Ventas")
        ]);
        clientesData = clientes;
        productosData = productos;
        const sel = document.getElementById('select-cliente');
        sel.innerHTML = '<option value="">-- Buscar Cliente --</option>';
        clientes.sort((a,b) => a.Nombre.localeCompare(b.Nombre)).forEach(c => {
            sel.innerHTML += `<option value="${c.Nombre}">${c.Nombre}</option>`;
        });
        
        const hoy = new Date().toLocaleDateString();
        const vHoy = ventas.filter(v => new Date(v.Fecha).toLocaleDateString() === hoy);
        document.getElementById('card-cant-ventas').innerText = vHoy.length;
        const totalSumado = vHoy.reduce((acc, v) => acc + (parseFloat(v["Precio Total"]?.toString().replace(',','.')) || 0), 0);
        document.getElementById('card-monto-ventas').innerText = `$${totalSumado.toFixed(2)}`;
        renderizarProductos();
    } catch(e) { console.error(e); }
}

function actualizarNombreCarrito() {
    document.getElementById('cliente-resumen').innerText = document.getElementById('select-cliente').value || "SIN SELECCIONAR";
}

function renderizarProductos() {
    const cont = document.getElementById('contenedor-productos');
    cont.innerHTML = "";
    productosData.forEach(p => {
        const stock = parseInt(p.Stock) || 0;
        const precio = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
        cont.innerHTML += `
            <div class="bg-white p-4 rounded-[2rem] border-2 border-outline flex flex-col justify-between h-48 shadow-sm ${stock <= 0 ? 'out-of-stock' : ''}">
                <div>
                    <h4 class="font-bold text-[11px] uppercase text-slate-700 leading-tight">${p.Producto}</h4>
                    <p class="text-[10px] font-bold text-primary italic">STK: ${stock}</p>
                </div>
                <div>
                    <p class="text-xl font-bold mb-2">$${precio.toFixed(2)}</p>
                    <div class="flex items-center justify-between bg-purple-50 rounded-xl p-1">
                        <button onclick="cambiarCant('${p.Producto}', -1)" class="w-8 h-8 bg-white rounded-lg font-bold text-primary shadow-sm">-</button>
                        <span id="cant-${p.Producto.replace(/\s+/g,'')}" class="font-bold text-primary text-lg">0</span>
                        <button onclick="cambiarCant('${p.Producto}', 1)" class="w-8 h-8 bg-white rounded-lg font-bold text-primary shadow-sm">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function cambiarCant(n, d) {
    if(!carrito[n]) carrito[n] = 0;
    const p = productosData.find(x => x.Producto === n);
    const nueva = carrito[n] + d;
    if(nueva >= 0 && nueva <= p.Stock) {
        carrito[n] = nueva;
        document.getElementById(`cant-${n.replace(/\s+/g,'')}`).innerText = nueva;
        actualizarCarritoUI();
    }
}

function actualizarCarritoUI() {
    const list = document.getElementById('lista-carrito');
    const tot = document.getElementById('total-venta');
    list.innerHTML = "";
    let t = 0;
    Object.keys(carrito).forEach(n => {
        if(carrito[n] > 0) {
            const p = productosData.find(x => x.Producto === n);
            const precio = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
            const sub = carrito[n] * precio;
            t += sub;
            list.innerHTML += `<div class="flex justify-between text-[11px] font-bold bg-purple-50 p-3 rounded-xl border border-dashed border-outline"><span>${carrito[n]}x ${n}</span><span>$${sub.toFixed(2)}</span></div>`;
        }
    });
    tot.innerText = `$${t.toFixed(2)}`;
    document.getElementById('carrito-vacio').style.display = t > 0 ? 'none' : 'block';
}

async function finalizarVenta() {
    const cliNombre = document.getElementById('select-cliente').value;
    const fecha = document.getElementById('fecha-entrega').value;
    if(!cliNombre || !fecha) return alert("Falta Cliente o Fecha");
    const items = Object.keys(carrito).filter(n => carrito[n] > 0);
    if(items.length === 0) return alert("Carrito vacío");

    const btn = document.getElementById('btn-finalizar');
    btn.disabled = true; btn.innerText = "GUARDANDO...";

    try {
        let totalGral = 0;
        let detalleTxt = "";
        for(const n of items) {
            const p = productosData.find(x => x.Producto === n);
            const pvp = parseFloat(p.Precio_Venta?.toString().replace(',','.')) || 0;
            const sub = carrito[n] * pvp;
            totalGral += sub;
            detalleTxt += `• ${carrito[n]} x ${n} ($${sub.toFixed(2)})\n`;
            await DairyAPI.enviarDatos("Ventas", {
                pestaña: "Ventas", ID_Venta: idOrdenActual, Cliente: cliNombre, 
                Producto: n, Cantidad: carrito[n], Precio_PVP: p.Precio_Venta, Fecha_Entrega: fecha
            });
        }
        let txtWA = `*LÓGICA LÁCTEA - PEDIDO #${idOrdenActual}*\n*Cliente:* ${cliNombre}\n*Entrega:* ${fecha}\n\n*DETALLE:*\n${detalleTxt}\n*TOTAL A PAGAR: $${totalGral.toFixed(2)}*`;
        const cliObj = clientesData.find(c => c.Nombre === cliNombre);
        let tel = "593" + (cliObj?.Teléfono?.toString().replace(/\D/g, '').slice(-9) || "");
        
        alert("¡ORDEN GUARDADA EXITOSAMENTE!");
        window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(txtWA)}`, '_blank');
        location.reload(); 
    } catch(e) { alert("Error al conectar"); btn.disabled = false; btn.innerText = "Confirmar Pedido"; }
}

window.onload = iniciar;
</script>
</body>
</html>
