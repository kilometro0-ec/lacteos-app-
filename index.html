<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#a21caf", background: "#faf5ff", outline: "#e9d5ff", success: "#16a34a" } } }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .grid-button { 
            position: relative; transition: transform 0.1s ease;
            cursor: pointer; overflow: visible; /* Permitir que el badge resalte un poco sin cortarse */
        }
        .grid-button:active { transform: scale(0.94); filter: brightness(0.9); }

        /* AJUSTE DE NOTIFICACIÓN (BADGE) */
        .badge {
            position: absolute; 
            top: 10px;    /* Bajado un poco para que no se pegue al borde */
            right: 15px;  /* Movido hacia la izquierda para que sea visible */
            background-color: #ef4444; color: white;
            font-size: 11px; font-weight: 800;
            min-width: 26px; height: 26px; padding: 0 4px;
            border-radius: 13px; display: none;
            align-items: center; justify-content: center;
            border: 2.5px solid white; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            z-index: 20;
        }

        .loading-overlay { opacity: 0.4; pointer-events: none; filter: blur(2px); }
    </style>
</head>
<body class="bg-background text-slate-900 min-h-screen flex flex-col px-5 py-8">

    <header class="mb-8 flex justify-between items-start">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">Lógica Láctea</h1>
            <p id="saludo" class="text-primary font-bold text-[10px] uppercase tracking-[0.2em] mt-1">Sincronizando...</p>
        </div>
    </header>

    <main id="main-panel" class="grid grid-cols-2 gap-4 flex-grow content-start transition-all duration-500 loading-overlay">
        
        <button onclick="window.location.href='RegistrodeVentas.html'" class="grid-button col-span-2 bg-primary p-6 rounded-[2.5rem] flex items-center justify-between shadow-lg text-white">
            <div class="flex items-center gap-4 text-left">
                <div class="bg-white/20 p-3 rounded-2xl"><span class="material-symbols-outlined text-3xl font-bold text-white">add_shopping_cart</span></div>
                <div>
                    <span class="text-xl font-black uppercase italic block">Ventas</span>
                    <span class="text-[9px] opacity-80 font-medium">Registrar salida de productos</span>
                </div>
            </div>
            <div id="badge-ventas" class="badge">0</div>
        </button>

        <button onclick="window.location.href='PedidosProveedor.html'" class="grid-button bg-white border border-outline p-5 rounded-[2.5rem] flex flex-col items-center gap-1 shadow-sm">
            <div id="badge-pedidos" class="badge">0</div>
            <span class="material-symbols-outlined text-3xl text-amber-500">inventory</span>
            <span class="text-[10px] font-black uppercase text-slate-700">Pedidos</span>
            <span class="text-[8px] text-slate-400 text-center leading-tight">Solicitud de mercadería</span>
        </button>

        <button onclick="window.location.href='ControldeInventario.html'" class="grid-button bg-white border border-outline p-5 rounded-[2.5rem] flex flex-col items-center gap-1 shadow-sm">
            <div id="badge-stock" class="badge">!</div>
            <span class="material-symbols-outlined text-3xl text-emerald-500 font-variation-fill">package_2</span>
            <span class="text-[10px] font-black uppercase text-slate-700">Inventario</span>
            <span class="text-[8px] text-slate-400 text-center leading-tight">Control de existencias</span>
        </button>

        <button onclick="window.location.href='DashboardLacteo.html#finanzas'" class="grid-button bg-white border border-outline p-5 rounded-[2.5rem] flex flex-col items-center gap-1 shadow-sm">
            <div id="badge-finanzas" class="badge">0</div>
            <span class="material-symbols-outlined text-3xl text-rose-500 font-variation-fill">payments</span>
            <span class="text-[10px] font-black uppercase text-slate-700">Finanzas</span>
            <span class="text-[8px] text-slate-400 text-center leading-tight">Dinero por recaudar</span>
        </button>

        <button onclick="window.location.href='GestióndeDespachos.html'" class="grid-button col-span-2 bg-slate-900 text-white p-5 rounded-[2.5rem] flex items-center justify-center gap-4 shadow-xl mt-2">
            <div id="badge-ruta" class="badge">0</div>
            <span class="material-symbols-outlined text-success font-variation-fill">local_shipping</span>
            <div class="text-left">
                <span class="text-xs font-black uppercase tracking-[0.2em] block leading-none">Ruta de Hoy</span>
                <span class="text-[8px] opacity-60 font-medium">Entregas pendientes</span>
            </div>
        </button>

    </main>

    <script>
        const DAIRY_API_URL = "https://script.google.com/macros/s/AKfycby68_4A0MEp7EDNa89HGePvhWC56j3GyKx8RRIX3BGd-E_J6DG3sT-8DEXEYMXr_qMTrA/exec";

        async function sincronizarApp() {
            try {
                const responseV = await fetch(`${DAIRY_API_URL}?pestaña=Ventas`);
                const ventas = await responseV.json();
                
                const responseI = await fetch(`${DAIRY_API_URL}?pestaña=Inventario`);
                const inventario = await responseI.json();

                // 1. RUTA: Cuenta pedidos PENDIENTES
                const pedidosPendientes = ventas.filter(v => 
                    String(v.Estado || "").trim().toUpperCase() === "PENDIENTE"
                );
                mostrarBadge("badge-ruta", pedidosPendientes.length);

                // 2. FINANZAS: Suma Total PENDIENTE
                const totalFinanzas = pedidosPendientes.reduce((acc, v) => {
                    let totalStr = String(v.Total || "0").replace(',', '.').replace(/[^\d.-]/g, '');
                    return acc + (parseFloat(totalStr) || 0);
                }, 0);
                
                if (totalFinanzas > 0) {
                    mostrarBadge("badge-finanzas", `$${totalFinanzas.toFixed(2)}`);
                }

                // 3. STOCK: Alerta productos < 5
                const stockCritico = inventario.filter(i => {
                    let cantStr = String(i["Stock Inicial"] || "0").replace(',', '.').replace(/[^\d.-]/g, '');
                    return (parseFloat(cantStr) || 0) < 5;
                }).length;
                mostrarBadge("badge-stock", stockCritico > 0 ? "!" : 0);

                document.getElementById('main-panel').classList.remove('loading-overlay');
                actualizarSaludo();
            } catch (e) {
                document.getElementById('main-panel').classList.remove('loading-overlay');
            }
        }

        function mostrarBadge(id, valor) {
            const el = document.getElementById(id);
            if (el && (valor > 0 || valor !== 0 || valor === "!")) {
                el.innerText = valor;
                el.style.display = "flex";
            } else if (el) { el.style.display = "none"; }
        }

        function actualizarSaludo() {
            const hr = new Date().getHours();
            const s = document.getElementById('saludo');
            if (hr < 12) s.innerText = "¡Buenos días, Darwin!";
            else if (hr < 18) s.innerText = "¡Buenas tardes!";
            else s.innerText = "¡Buenas noches!";
        }

        sincronizarApp();
    </script>
</body>
</html>
