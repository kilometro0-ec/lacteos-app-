<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Lógica Láctea - Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#a21caf", background: "#faf5ff", outline: "#e9d5ff" } } }
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .btn-giant { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-giant:active { transform: scale(0.95); filter: brightness(0.9); }
    </style>
</head>
<body class="bg-background text-slate-900 min-h-screen flex flex-col px-6 py-12">

    <header class="mb-10 text-center">
        <div class="w-20 h-20 bg-primary rounded-[2rem] flex items-center justify-center text-white shadow-xl shadow-purple-200 mx-auto mb-4">
            <span class="material-symbols-outlined text-4xl font-bold">water_drop</span>
        </div>
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Lógica Láctea</h1>
        <p id="saludo" class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em] mt-1">Cargando...</p>
    </header>

    <main class="grid grid-cols-1 gap-4 w-full max-w-sm mx-auto flex-grow">
        
        <button onclick="window.location.href='RegistrodeVentas.html'" 
            class="btn-giant bg-primary text-white p-6 rounded-[2.5rem] flex items-center gap-6 shadow-lg shadow-purple-100">
            <div class="bg-white/20 p-3 rounded-2xl">
                <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
            </div>
            <div class="text-left">
                <span class="block text-xs font-bold opacity-80 uppercase tracking-widest">Registrar</span>
                <span class="block text-xl font-black uppercase">Ventas</span>
            </div>
        </button>

        <button onclick="window.location.href='PedidosProveedor.html'" 
            class="btn-giant bg-white border-2 border-amber-400 text-amber-600 p-6 rounded-[2.5rem] flex items-center gap-6 shadow-sm">
            <div class="bg-amber-50 p-3 rounded-2xl">
                <span class="material-symbols-outlined text-3xl">inventory</span>
            </div>
            <div class="text-left">
                <span class="block text-[10px] font-bold opacity-80 uppercase tracking-widest">Compras</span>
                <span class="block text-lg font-black uppercase">Pedidos Prov.</span>
            </div>
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="window.location.href='GestiondeClientes.html'" 
                class="btn-giant bg-white border-2 border-outline text-slate-600 p-5 rounded-[2.5rem] flex flex-col items-center justify-center gap-2 shadow-sm">
                <span class="material-symbols-outlined text-3xl text-blue-500">group</span>
                <span class="text-[10px] font-black uppercase tracking-tighter">Clientes</span>
            </button>

            <button onclick="window.location.href='ControldeInventario.html'" 
                class="btn-giant bg-white border-2 border-outline text-slate-600 p-5 rounded-[2.5rem] flex flex-col items-center justify-center gap-2 shadow-sm">
                <span class="material-symbols-outlined text-3xl text-emerald-500">package_2</span>
                <span class="text-[10px] font-black uppercase tracking-tighter">Stock</span>
            </button>
        </div>

        <button onclick="window.location.href='GestióndeDespachos.html'" 
            class="btn-giant bg-slate-800 text-white p-6 rounded-[2.5rem] flex items-center justify-center gap-4 shadow-xl">
            <span class="material-symbols-outlined text-2xl text-success">local_shipping</span>
            <span class="text-sm font-black uppercase tracking-widest">Ver Ruta de Entrega</span>
        </button>

        <button onclick="window.location.href='DashboardLacteo.html'" 
            class="mt-4 text-primary font-black text-[10px] uppercase tracking-[0.3em] flex items-center justify-center gap-2 opacity-60">
            <span class="material-symbols-outlined text-sm">analytics</span> Ver Métricas Avanzadas
        </button>

    </main>

    <footer class="mt-8 text-center">
        <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Sistema Operativo v2.0 • Quito</p>
    </footer>

    <script>
        function actualizarSaludo() {
            const hora = new Date().getHours();
            let mensaje = "¡Buenas noches!";
            if (hora >= 5 && hora < 12) mensaje = "¡Buenos días, Darwin!";
            else if (hora >= 12 && hora < 18) mensaje = "¡Buenas tardes!";
            document.getElementById('saludo').innerText = mensaje;
        }
        actualizarSaludo();
    </script>
</body>
</html>
