<style>
    /* Estilo Activo: Se aplica mediante JS */
    .nav-item.active-nav {
        color: #a21caf !important; /* Tu color primary */
    }

    .nav-item.active-nav .icon-box {
        background-color: #f5f3ff; /* Fondo lila suave */
        transform: translateY(-8px);
        box-shadow: 0 10px 15px -3px rgba(162, 28, 175, 0.2);
    }

        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    .nav-item:active {
        scale: 0.9;
    }
</style>

<script>
    function navegar(url) {
        // Al cambiar el href, la página se refresca por defecto
        window.location.href = url;
    }

    function marcarRutaActiva() {
        // 1. Obtener el nombre del archivo actual desde la URL
        const path = window.location.pathname;
        const paginaActual = path.split("/").pop() || "DashboardLacteo.html";

        // 2. Limpiar estados previos
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.remove('active-nav', 'text-primary');
            btn.classList.add('text-gray-400');
        });

        // 3. Identificar el botón correspondiente
        // Nota: El ID del botón debe coincidir con el nombre del archivo sin el .html
        const idLimpio = paginaActual.replace('.html', '');
        const botonActivo = document.getElementById('btn-' + idLimpio);

        if (botonActivo) {
            botonActivo.classList.remove('text-gray-400');
            botonActivo.classList.add('active-nav');
        }
    }

    // Ejecutar la detección apenas se cargue el menú
    marcarRutaActiva();
</script>
