<script>
    function navegar(url) {
        // Forzamos la navegación y el refresco
        window.location.href = url;
    }

    function pintarMenu() {
        // Obtenemos el nombre del archivo actual de la URL
        const path = window.location.pathname;
        let paginaActual = path.split("/").pop();
        
        // Si estamos en la raíz o carpeta vacía, asumimos Dashboard
        if (!paginaActual || paginaActual === "") paginaActual = "DashboardLacteo.html";

        document.querySelectorAll('.nav-link').forEach(btn => {
            const dataPage = btn.getAttribute('data-page');
            
            // Si el nombre del archivo contiene el texto de data-page, lo activamos
            if (paginaActual.toLowerCase().includes(dataPage.toLowerCase())) {
                btn.classList.add('active-nav');
                btn.classList.remove('text-gray-400');
            } else {
                btn.classList.remove('active-nav');
                btn.classList.add('text-gray-400');
            }
        });
    }

    // Ejecutar al cargar el fragmento
    pintarMenu();
</script>
