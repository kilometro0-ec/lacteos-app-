<script>
    function navegar(url) {
        window.location.replace(url); // replace es más directo para móviles
    }

    // Esta función la llamaremos desde la página principal para asegurar que el DOM esté listo
    function pintarMenu() {
        const paginaActual = window.location.pathname.split("/").pop().replace('.html', '') || 'DashboardLacteo';
        
        document.querySelectorAll('.nav-link').forEach(btn => {
            btn.classList.remove('active-nav');
            // Si el atributo data-page coincide con el nombre del archivo
            if(btn.getAttribute('data-page') === paginaActual) {
                btn.classList.add('active-nav');
            }
        });
    }
    // Ejecución inmediata por si acaso
    pintarMenu();
</script>
