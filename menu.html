<script>
    function navegar(url) {
        window.location.href = url;
    }

    function marcarRutaActiva() {
        const path = window.location.pathname;
        const paginaActual = path.split("/").pop() || "DashboardLacteo.html";

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.remove('active-nav');
            btn.classList.add('text-gray-400');
        });

        // Limpiar el nombre de la página para que coincida con el ID
        const idLimpio = paginaActual.replace('.html', '');
        const botonActivo = document.getElementById('btn-' + idLimpio);

        if (botonActivo) {
            botonActivo.classList.remove('text-gray-400');
            botonActivo.classList.add('active-nav');
        }
    }

    // Ejecutar inmediatamente
    marcarRutaActiva();
</script>
